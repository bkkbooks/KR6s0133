body:
  text: 沙門守其等奉勑挍勘雜阿含經卷第四之餘如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名僧迦羅來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇不善男子云何可知佛告婆羅門譬猶如月婆羅門復問善男子云何可知佛告婆羅門譬猶如月婆羅門白佛云何不善男子如月佛告婆羅門如月黑分光明亦失色亦失所係亦失日夜消滅乃至不現如是有人於如來所得信家心受持淨戒善學多聞己布施正見真實於如來所淨信持戒惠施多聞正見真直已然後退失於戒聞施正見悉皆忘失日夜消滅乃至須臾一切忘失復次婆羅門若善男子不習近善知識不數聞法不正思惟身行𢙣行口行𢙣行意行𢙣行行𢙣因緣故身壞命終墮𢙣趣泥梨中如是婆羅門不善男子其譬如月婆羅門白佛云何善男子其譬如月佛告婆羅門譬如明月淨分光明色澤日夜增明乃至月滿一切圓淨如是善男子於如來法律得淨信心乃至正見真淨增明戒增施增聞增慧增日夜增長復於餘時親近善知識聞説正法內正思惟行身善行行口善行行意善行故以是因緣身壞命終化生天上婆羅門是故善男子譬如月爾時世尊而説偈言譬如月無垢周行於虛空一切小星中其光最盛明淨信亦如是戒間離慳施於諸慳世間其施特明顯佛説此經已僧迦羅婆羅門聞佛所説歡喜隨喜從座起而去如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門來詣佛所與世尊靣相問訊慰勞已退坐一靣白佛言瞿曇我聞瞿曇説言唯應施我不應施餘人施我得大果非施餘人而得大果應施我弟子不應施餘弟子施我弟子得大果報非施餘弟子得大果報云何瞿曇作是語者為實説耶非為謗毀瞿曇乎為如説説如法説耶法次法説不為餘人以同法來訶責耶佛告婆羅門彼如是説者謗毀我耳非如説説如法説法次法説不致他人來以同法呵責所以者何我不如是説應施於我不應施餘施我得大果報非施餘人得大果報應施我弟子施我弟子得大果報非施餘弟子得大果報然婆羅門我作如是説者作二種障障施者施障受者利婆羅門乃至士夫以洗器餘食著於淨地令彼處衆生即得利樂我説斯等亦入福門況復施人婆羅門然我復説施持戒者得果報不同犯戒生聞婆羅門白佛言如是瞿曇我亦如是説施持戒者得大果報非施犯戒爾時世尊復説偈言若黑若有白若赤若有色犂雜及金色純黃及鴿色如是等牸牛生犢姝好者丁壯力具足調善行捷疾但使堪運重不問本生色人亦復如是各隨彼彼生剎利婆羅門毗舍首陀羅旃陀羅下賤所生悉不同但使持淨戒離重擔煩惱純一修梵行漏盡阿羅漢於世間善逝施彼得大果愚者無智慧未嘗聞正法施彼無大果不近善友故若習善知識如來及聲聞清淨信善逝根生堅固力所住之善趣及生大姓家究竟般涅盤大仙如是説佛説此經已生聞婆羅門聞佛所説歡喜隨喜作禮而去如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊晨朝著衣持鉢入舍衛城𠧒食時有異婆羅門年耆根熟執杖持鉢家家𠧒食爾時世尊告婆羅門汝今云何年耆根熟柱杖持鉢家家𠧒食婆羅門白佛瞿曇我家中所有財物悉付其子為子娶妻然後捨家是故柱杖持鉢家家𠧒食佛告婆羅門汝能於我所受誦一偈還歸於衆中為兒説耶婆羅門白佛能受瞿曇爾時世尊即説偈言生子心歡喜為子聚財物亦為娉其妻而自捨出家邊鄙田舍兒違負於其父人形羅剎心棄捨於尊老老馬無復用則奪其䵃麥兒少而父老家家行𠧒食曲杖為最勝非子為恩愛為我防𢙣牛免險地得安能却龱暴狗扶我暗處行避深坑空井草木𣗥刺林憑杖威力故峙立不墮落時婆羅門從世尊受斯偈已還歸婆羅門大衆中為子而説先白大衆聽我所説然後誦偈如上廣説其子愧怖即抱其父還將入家摩身洗浴覆以青衣被立為家主時婆羅門作是念我今得勝族姓是沙門瞿曇恩我經所説為師者如師供養為和尚者如和尚供養我今所得皆沙門瞿曇力即是我師我今當以上妙好衣以奉瞿曇時婆羅門持上妙衣至世尊所面前問訊慰勞已退坐一面白佛言瞿曇我今居家成就是瞿曇力我經記説為師者以師供養為和尚者以和尚供養今日瞿曇即為我師願受此衣哀愍故世尊即受為哀愍故爾時世尊為婆羅門説種種法示教照喜時婆羅門聞佛所説歡喜隨喜作禮而去如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊晨朝著衣持鉢入舍衛城𠧒食時有異婆羅門年耆根熟攝杖持鉢家家𠧒食彼婆羅門遙見世尊而作是念沙門瞿曇攝杖持鉢家家𠧒食我亦攝杖持鉢家家𠧒食我與瞿曇俱是比丘爾時世尊説偈答曰所謂比丘者非但以𠧒食受持在家法是何名比丘於功德過𢙣俱離修正行其心無所畏是則名比丘佛説是經已彼婆羅門聞佛所説歡喜隨喜作禮而去如是我聞一時佛在拘薩羅人間遊行至一那羅聚落住一那羅林中爾時世尊著衣持鉢入一陀羅聚落𠧒食而作是念今日大早今且可過耕田婆羅豆婆遮婆羅門作飲食處爾時耕田婆羅豆婆遮婆羅門五百具犁耕田為作飲食時耕田婆羅豆婆遮婆羅門遙見世尊白言瞿曇我今耕田下種以供飲食沙門瞿曇亦應耕田下種以供飲食佛告婆羅門我亦耕田下種以供飲食婆羅門白佛我都不見沙門瞿曇若犁若軛若鞅若縻若鑱若鞭而今瞿曇説言我亦耕田下種以供飲食爾時耕田婆羅豆婆遮婆羅門即説偈言自説耕田者而不見其耕為我説耕田令我知耕法爾時世尊説偈答言信心為種子苦行為時雨智慧為時軛慚愧心為轅正念自守護是則善御者包藏身口業知食處內藏真實為真乘樂住為懈息精進為廢荒安隱而速進直往不轉還得到無憂處如是耕田者逮得甘露果如是耕田者不還受諸有時耕田婆羅豆婆遮婆羅門白佛言善耕田瞿曇極善耕田瞿曇於是耕田婆羅豆婆遮婆羅門聞世尊説偈心轉增信以滿鉢香美飲食以奉世尊世尊不受以因説偈得故即説偈言不因説法故受彼食而食如是廣説如前為火與婆羅門廣説時耕田婆羅豆婆遮婆羅門白佛言瞿曇今以此食安著何處佛告婆羅門我不見諸天魔梵沙門婆羅門天神世人堪食此食而得安身婆羅門汝持此食著無蟲水中及少生草地時婆羅門即持此食著無蟲水中水即煙起涌沸啾啾作聲如熱丸投於冷水啾啾作聲如是彼食投著無蟲水中煙起涌沸啾啾作聲時婆羅門作是念沙門瞿曇實為奇特大德大力乃令飲食神變如是時彼婆羅門見食瑞應信心轉增白佛言瞿曇我今可得於正法中出家受具足不佛告婆羅門汝今可得於正法中出家受具足得比丘分彼即出家已獨靜思惟所以族姓子剃除鬚髮著袈裟衣正信非家出家學道乃至得阿羅漢心善解脫如是我聞一時佛住王舍城時有尊者名曰淨天在鞞提訶國人間遊行至絺羅城菴羅園中時尊者淨天晨朝著衣持鉢入絺羅城𠧒食次第𠧒食到自本家時淨天母年老在中堂持食祀火求生梵天不覺尊者淨天在門外立時毗沙門天王於尊者淨天所極生敬信時毗沙門天王諸夜叉導從乘虛而行見尊者淨天在門外立又見其母手擎飲食在中堂上供養祀火不見其子在外門立見已從空中下至淨天母前而説偈言此婆羅門尼梵天極遼遠為求彼生故於此祠祀火此非梵天道何為徒祀此汝婆羅門尼淨天住門外垢穢永無餘是則天中天蕭然無所有獨一不兼資為𠧒食入舍所應供養者淨天善修身人天良福田遠離一切𢙣不為染所染德同於梵天形在人間住不著一切法如彼淳熟龍比丘正念住其心善解脫應奉以初佛是則上福田應以正信心及時速施與當𥎀建立洲令未來安樂汝觀此牟尼已渡苦海流是故當信心及時速施與當𥎀建立洲令未來安樂毗沙門天王開發彼令捨時尊者淨天即為其母種種説法示教照喜已復道而去如是我聞一時佛住舍衛國祇樹給孤獨園時有異婆羅門來詣佛所面前問訊相慰勞已退坐一面白佛言瞿曇所謂佛者云何為佛為是父母制名為是婆羅門制名時婆羅門即説偈言佛者是世間超渡之勝名為是父母制名之為佛耶爾時世尊説偈答言佛見過去世如是見未來亦見現在世一切行起滅明智所了知所應修已修應斷悉已斷是故名為佛歷劫求選擇純苦無暫樂生者悉磨滅遠離息塵垢拔諸使刺本等覺故名佛佛説偈已彼婆羅門聞佛所説歡喜隨喜從座起去如是我聞一時佛在拘薩羅人間遊行有從迦帝聚落墮鳩羅聚落二村中間一樹下坐入盡正受時有豆磨種姓婆羅門隨彼道行尋佛後來見佛腳迹千輻輪相印文顯現齊輻圓衆好滿足見已作是念我未曾見人間有如是足迹今當隨迹以求其人即尋腳迹至於佛所來見世尊坐一樹下入盡正受嚴容絶世諸根澄靜其心寂定第一調伏正觀成就光相巍巍猶若金山見已白言為是天耶佛告婆羅門我非天也為龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等佛告婆羅門我非龍乃至人非人也婆羅門白佛若言非天非龍乃至非人非非人為是何等爾時世尊説偈答言天龍乾闥婆緊那羅夜叉無善阿修羅諸摩睺羅伽人與非人等悉由煩惱生如是煩惱漏一切我已捨已破已磨滅如芬陀利生雖生於水中而未曾著水我雖生世間不為世間著歷劫常選擇純苦無暫樂一切有為行悉皆生滅故離垢不傾動已拔諸劒刺究竟生死除故名為佛陀佛説此經已豆摩種婆羅門聞佛所説歡喜隨喜從路而去如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊晨朝著衣持鉢入王舍城𠧒食次第𠧒食至婆羅豆婆遮婆羅門舍時婆羅門手執木杓盛諸飲食供養火具住於門邊遙見佛來見已白佛作是言住住領羣特慎勿近我門佛告婆羅門汝知領羣特領羣特法耶婆羅門言我不知領羣特亦不知領羣特法沙門瞿曇知領羣特及領羣特法不佛言我善知是領羣特及領羣特法是時婆羅門即放事火具疾敷牀座請佛令坐白言瞿曇為我説領羣特及領羣特法佛即就座為説偈言瞋恚心懷恨隱覆諸過𢙣犯戒起𢙣見虛偽不真實如是等士夫當知領羣特憋暴貪惜𢙣欲慳諂偽無慚無愧心當知領羣特一生二生者一切皆殺害無有慈愍心是為領羣特若殺縛椎打聚落及城邑無道以切責當知領羣特住止及行路為衆之導首苦切諸羣下恐怛相迫愶取利以供己當知領羣特聚落及空地有主無主物掠護為己有當知領羣特自薄其妻又不入淫舍侵陵他所愛當知領羣特內外諸親屬同心善知識侵掠彼所受當知領羣特妄語欺誑人詐取無證財他索而不還當知領羣特為己亦為他舉責及財與或復順他語妄語為他證如是妄語者當知領羣特作𢙣不善業無有人知者隱諱覆藏𢙣當知領羣特若人問其義而答以非義顛倒欺誑人當知領羣特實空無所有而輕毀智者愚癡為利故當知領羣特高慢自稱舉毀壞於他人是極卑鄙慢當知領羣特自造諸過𢙣移過誣他人妄語謗清白當知領羣特前受他利養他人來詣己無有敬報心當知領羣特沙門婆羅門如法來𠧒求呵責而不與當知領羣特若父母年老少壯氣已謝不勤加奉養當知領羣特父母諸尊長兄弟親眷屬實非阿羅漢自顯羅漢德世間之大賊當知領羣特上種姓生習婆羅門典而於其中間習行諸𢙣業不以勝生故障呵責𢙣道現法受呵責後世墮𢙣道生旃陀羅家世稱須陀夷名聞遍天下旃陀羅所無婆羅門剎利大姓所供養乘於淨天道平等正直住不以生處障令不生梵天現法善名譽後世生善趣二生汝當知如我所顯示不以所生故名為領羣特不以所生故名為婆羅門業為領羣特業為婆羅門婆羅門白佛言如是大精進如是大牟尼不以所生故名為領羣特不以所生故名為婆羅門業故領羣特業故婆羅門時事火婆羅豆婆遮婆羅門轉得信心以滿鉢好食奉上世尊世尊不受以説偈得故偈如上説時事火婆羅豆婆遮婆羅門見食瑞應已增其信心白佛言世尊我今可得為正法律出家受具足不佛告婆羅門汝今可得於正法律出家受具足戒即得出家獨靜思惟如前説乃至得阿羅漢心善解脫時婆羅豆婆遮婆羅門得阿羅漢心善解脫自覺喜樂即説偈言非道求清淨供養祠祀火不識清淨道猶如生盲者今已得安樂出家受具足逮得於三明佛所教已作先婆羅門難今為婆羅門沐浴離塵垢度諸天彼岸川函雜阿含經第三十四卷此經此卷第二十七幅第二行令我三之下宋經脫結盡得須陀洹乃至記説道令正等凡五百一十六字遂令婆蹉經尾落三百四十七字鬱低迦經首無一百六十九字今依二本補之二經方成矣今為看舊宋藏經者具録其文于左結盡得須陀洹三結盡貪恚癡薄得斯陀含五下分結盡得阿那含種種神通境界天眼天耳他心智宿命智生死智漏盡智皆悉得是故比丘當修二法修習多修習修二法故知種種界乃至漏盡爾時尊者婆蹉聞佛所説歡喜作禮而去爾時婆蹉獨一靜處專精思惟不放逸住乃至自知不受後有時有衆多比丘莊嚴方便欲詣世尊恭敬供養爾時婆蹉問衆多比丘汝等莊嚴方便欲詣世尊恭敬供養耶諸比丘答言爾爾時婆蹉語諸比丘尊者持我語敬禮世尊問訊起居輕利少病少惱安樂住不言婆蹉比丘白世尊言我已供養世尊具足奉事令歡恱非不歡恱大師弟子所作皆悉已作供養大師令歡恱非不歡恱時衆多比丘往詣佛所稽首佛足退坐一面白佛言世尊尊者婆蹉稽首敬禮世尊足乃至歡恱非不歡恱佛告諸比丘諸天先已語我汝今復説如來成就第一知見亦知婆蹉比丘有如是德力爾時世尊為彼婆蹉比丘説第一記佛説此經已諸比丘聞佛所説歡喜奉行如是我聞一時佛住王舍城迦蘭陀竹園時有外道出家名曰鬱迦來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇云何瞿曇世有邊耶佛告鬱低迦此是無記鬱低迦白佛云何瞿曇世無邊耶有邊無邊耶非有邊非無邊耶佛告鬱低迦此是無記鬱低迦白佛云何瞿曇世有邊耶答言無記世無邊耶世有邊無邊耶非有邊非無邊耶答言無記瞿曇於何等法而可記説佛告鬱低迦知者智者我為諸弟子而記説道令正不函別譯雜阿含經第五卷末五經及第六卷初五經皆國宋本所無而丹本獨有者前九是梵問經第十是度須跋經今檢梵問經者與彼大本雜阿含經第四十四卷之初同本異譯度須跋經與大本第三十五卷十六卜已下同本異譯則國宋二本無此經者脫之耳今依丹藏加之分入二卷焉如是我聞一時佛在優樓頻螺聚落泥連河岸菩提樹下成佛未久爾時世尊獨坐思惟而作是念夫人無敬心不能恭順於其尊長不受教誨無所畏憚縱情自逸永失義利若如是者衆苦緾集若人孝事尊長敬養畏慎隨順不逆所願滿足得大義利若如是者觸事安樂復作是念一切世間若天若人若天世界若人世界若魔世界若梵世界沙門婆羅門一切世間有生類中若有戒定慧解脫解脫知見勝於我者我當親近依止於彼供養恭敬遍觀察已都不見於世間人天魔梵沙門婆羅門一切世間有勝於我戒定慧解脫解脫知見為我依止復作是念我所覺法我今應當親近供養恭敬誠心尊重何以故過去諸佛一切皆悉親近依止供養恭敬尊重斯法未來現在諸佛亦復親近依止斯法供養恭敬生尊重心我今亦當如過去未來現在諸佛親近依止供養恭敬尊重於法爾時梵主天王遙知世尊在優樓頻螺聚落泥連河岸菩提樹下而作是念觀察世間若天若人若魔若梵沙門婆羅門一切生類若有勝我戒定慧解脫解脫知見者我當依止然都不見有能勝我者又復觀察過去未來現在諸佛悉皆親近依止於法供養恭敬生尊重心我今亦當隨三世佛之所應作親近依止供養恭敬尊重於法時梵主天復作是念我當從此處沒往到佛所時梵主天譬如壯士屈申臂頃來至佛所白佛言世尊實如所念誠如所念即説偈言過去現在諸如來未來世中一切佛是諸正覺能除惱一切皆依法為師親近於法依止住斯是三世諸佛法是故欲尊於己者應先尊重敬彼法冝當憶念佛所教尊重供養無上法爾時梵王讚歎世尊深生隨喜作禮而去如是我聞一時佛在優樓頻螺聚落泥連河側菩提樹下成佛未久佛於樹下獨坐思惟而作是念唯有一道能淨衆生使離苦惱亦能除滅不善𢙣業獲正法利所言法者即四念處云何名為四念處耶觀身念處觀受念處觀心念處觀法念處若人不修四念處者為遠離賢聖之法遠離聖道若離聖道即遠離甘露若遠離甘露則不免生老病死憂悲苦惱如是等人我説終不能得離於一切諸苦若修四念處即親近賢聖法者若親近賢聖法即親近賢聖道若親近賢聖道即親近甘露法若親近甘露法即能得免生老病死憂悲苦惱若免生老病死憂悲苦惱如是等人即説離苦時梵主天遙知如來心之所念作是念言我於今者當至佛所隨喜勸善思惟是已譬如壯士屈申譬頃來至佛所頂禮佛足在一面立白佛言誠如世尊心之所念唯有一道能淨衆生乃至得免憂悲苦惱時梵主天即説偈言唯此道出要斯處可精勤欲求遠離苦唯有此一道若涉斯道者如鸖飛空逝釋迦牟尼尊逮得於佛道一切正道師當以此覺道顯示於衆生常應數數説咸令一切知生有之邊際唯願説一道愍濟諸衆生過去一切佛從斯道得度未來及今佛亦從此道度云何名為度能度瀑駛流究竟於無邊調伏得極淨世間悉生死解知一切界為於具眼者宣明如此道譬如彼恆河流赴於大海聖道亦如是佛為開顯現斯道如彼河趣於甘露海昔來未曾聞轉妙法輪音唯願天人尊度老病死者一切所歸命為轉妙法輪時梵主天頂禮佛足即沒而去
