body:
  text: 沙門守其等奉勑挍勘集神州三寶感通録卷上之二岐州岐山縣華陽鄉王莊村憑玄嗣者先來獷殊不信向母兄承舍利從東都來將欲藏掩嗣不許往母兄不用其語至舍利所禮拜訖還家玄嗣怒曰此有何功德若舍利有功德家中佛像亦有功德即取像燒之有何靈驗母兄救之已燒下半玄嗣即時忽倒後醒曰忽到一處似是地獄大鳥飛來啄睛噉肉入大火坑燒烙困苦以手摩靣眉鬢墮落自看天地全無精光親屬傍看曰汝自造罪無可代者玄嗣神識不與人對但曰火燒我心東西馳走又被持拍之狀摧慟號哭又稱懺悔懺悔而晝夜唯走不曾得住至二月十三日親屬將至塔所于時京邑大德行虔法師等百餘僧為衆説法裴尚官比丘尼等數百俗士五六千人咸見玄嗣五體投地對舍利前號哭懺悔不信之罪又懺犯尼淨行打罵衆僧盜食僧果自懺已後眠夢稍安云其佛頂骨國用寶贖之計寶約估評直四千匹遂依其數以蕃練酬之頂骨今仍在內云六瓜州城東古基者乃周朝阿育王寺也廢教已後隋雖興法更不置寺今為寺莊塔有舍覆東西廊廡周回牆匝時現光相士俗敬重每道俗宿齋集會興福官私上下乞願有應云云七沙州城內廢大乘寺塔者周朝古寺見有塔基相傳云是育王本塔才有災禍多來求救云云八洛都故都塔者在城西一里故白馬寺南一里許古基俗傳為阿育王舍利塔疑即迦葉摩騰所將來者降邪通正故立塔表以傳真云云九涼州姑𮍏塔者依撿諸傳咸云姑𮍏有育王塔然姑𮍏郡名今以為縣屬州漢書河西四郡則張掖姑𮍏酒泉燉煌也然塔未詳十甘州刪丹塔者今名為縣在甘州東一百二十里縣城東弱水北大道側土塠者俗傳是阿育王塔但有古基荒廢極久斯即疑為姑𮍏塔也十一晉州北霍山南原大塠塔者遠近道俗咸稱是育王塔余曾遊焉地居爽塏南望逈敞示是古基材落稀遠十二代州城東古塔俗云阿育王寺考北朔鴈門周時北狄地也故詩云北逐玁狁至于太原然朔方馬邑古城大往往非一此非北狄所有明知本是夏人為狄所侵故至太原也十三益州郭下福感寺塔者在州郭下城西本名大石相傳云是鬼神奉育王教西山取大石為塔基舍利在其中故名大石也隋蜀王秀作鎮井絡聞之令人掘𮢶全是一石尋縫至泉不見其際風雨暴至人有於石傍鑿取一片將出乃是醫玉問於識寶商者云此真醫玉世中希有隋初有詵律師見此古迹於上起九級木浮圖今見在益州旱潦年官人祈雨必於此塔祈而有應特有感徵故又名福感余嘗至焉誠如所述近有人盜鈴將下三級有神擎櫨枓起以賊䏶內中其人被押唱呼寺僧為射枓起方得脫出永徽元年有王顏子者剽掠有名夜上相輪取博山將下至底級兩柱忽夾之求出不得漸漸急困見一梵僧曰可大唱賊不爾死矣即唱數聲寺僧聞救方得拔出貞觀年初地大震動此塔搖揚將欲摧倒于時郭下無數人來忽見四神形如塔量各以背塔之四靣乍倚乍傾卒以免倒有一人極豪侈多産業見前露盤由來小短不稱塔形乃捨金三百兩共諸信者更造露盤既成下至覆盆香氣熢㶿如雲騰涌流芳城邑十日乃歇十四益州晉源塔者在州西南一百餘里今號為等衆寺本名大石基本緣略亦同前尋諸古塔其相不同豈非當部鬼神情有所樂按蜀三塔同一石蓋餘不定準益州北百里雒縣塔者在縣城北郭下寶興寺中本名大石基相同前隋初有天笁僧曇摩掘叉遠至東夏禮育王塔承蜀三塔又往禮拜至雒縣大石寺塔所敬事已訖欲往成都宿兩女驛將旦聞左右行動聲叉曰是何人耶妄相恐動空中應曰有十二神王從本國來所在擁護明日當見成都塔今欲西還與師別耳叉曰既能遠送何不現形神即現形叉為人善畫便一一貌之既遍形隱及至成都禮大石塔訖詵律師乃依圖刻木為十二神像莊餝在於塔下今猶見在云云益州郭下法成寺沙門道卓有名僧也大業初雒縣寺塔無人修葺才有下基卓乃率化四部造木浮圖莊餝備矣塔為龍護居在西南角井中時有相現側有三池莫知深淺三龍居之人莫敢臨視貞觀十三年三龍大鬪雷振擊水火交飛久之乃靜塔如本住人皆拾取龍毛長三尺許黃赤可愛十五鄭州起化寺塔者在州西南百餘里密縣界在縣東南十五里東大川西嵩嶽南歸山北又川寺院東西五六十步南北亦爾塔在寺東南角其北連寺方十五步許其寺塔基在淖泥之上西靣有五六泉南靣亦有皆孔方三尺騰涌沸出流溢成川灌溉遠近泉上皆下安柏柱鋪在泥水上以炭沙石灰次而重填最上以大方石可如八尺牀編次鋪之四靣細腰長一尺五寸深五寸生鐵固之近有人試發一石下有石灰乃至柏團便抽出一團長三丈徑四尺見在自非輪王表塔神功所為何能辦此基搆終古不見其儔也今於上架塔三重塔南大泉涌沸鼓怒絶無水聲豈非神化所致也有幽州僧道嚴者姓李氏形極奇偉本入隋煬帝四道場後從俗服今年一百五歲獨住深山每年七日來此塔上盡力供養嚴𪫦其泉流涌注無極乃遣善水崑崙入泉討之但見石柱羅列不測其際中有寶塔可高三尺獨立空中四靣水圍疑然而住竟不至塔所考其原始莫測其由時俗所傳育王所立隋祖已來寺塔見在寺南歸山寺西嵩山寺在川中地極汙下每年二山大水常東流注繞寺北轉方始東逝水漲寺高水減寺下自古至今終不遭溺泉初出孔文如蓮花下打碾磑浪極恬靜水中沙石緑色鮮明國家見寺衝要欲造離宮尋行有塔將欲南徙其基牢固遂休近有僧於南夜坐望見此塔光明殊異矣十六懷州妙樂寺塔者在州東武陟縣西七里妙樂寺中見有五級白浮圖塔方可十五步並是側石編砌石長五尺闊三寸以下鱗次葺之極細密道俗目見咸驚訝其鬼作其下不測其底古老相傳塔從地涌下有大水莫委真虛有刺史疑僧濫餝乃使人傍掘其下至泉源猶不盡其基際也十七并州子城東淨明寺塔者本號育王是僧所住唐初已來僧散寺空尼請居之余往問塔全無蹤迹但有空名遂失其本十八并州大谷榆社塔者今在縣郭下育王寺中見有僧住中有小塔古今相傳此是本塔亦未聞異相十九魏州臨災塔者在縣西北三十里本名舍利寺今為尼住其塔見在三邊有水唯西開路基搆編石從水底上蓮花滿於三靣其水澄深人皆怯入傳云舍利真塔在水內空中如鄭州者今改為冀州大都督府二十雜明神州山澤所藏異神寶如上所列育王寺之諸塔沉隱未形其徒不一如後列之滄州長河中塔稱育王名非虛立豈唯骨塔靈像亦尓吳冝涼三州俱山現像郊北屬山近復出佛愚俗謗為虛誕故知謗者虛焉豈有人造訛山中藏三丈石佛特是諸謗者坎井焉知九海之天池哉齊州臨邑縣東有甎塔云是志公所營四靣石獸石獸迅煞可畏周滅法時令人百牟出終不可脫亦勞有今在彼云高麗遼東城傍塔者古老傳云往昔高麗聖王出見案行國界次至此城見五色雲覆地即往雲中有僧執錫住立既至便滅遠看還見傍有土塔三重上如覆釜不知是何更往覓僧唯有荒草掘深一丈得杖并履又掘得銘上有梵書侍臣識之云是佛塔王委曲問答曰漢國有之彼名蒲圖王因生信起木塔七重後佛法始至具知始末今更高本塔朽壞斯則育王所統一閻浮洲處處立塔不足可𪫦倭國在此洲外大海中距會稽万餘里有會承者隋時來此學諸子史統及術藝無事不間武德之末猶在京邑貞觀五年方還本國會問彼國昧谷東隅佛法晚至未知已前育王及不會答云文字不言無以承據驗其事迹則是所歸何者有人開發土地往往得古塔露盤佛諸儀相故知素有也益州城南空慧寺金藏者有穴在寺近有道士素知有藏來就守寺神乞神令入穴取二升金粟依言即入唯見地下金甕行行相對莫測其邊寺僧通知無敢侵者雍州渭南縣南山倒豺谷崖有懸石文狀倒豺因以名焉谷有巖像於佛靣亦號像谷古老傳云昔有梵僧來云我聞此谷有像靣山七佛龕昔七佛曾來此谷説法澗內有瞻蔔華常所供養近永徽中南山龍池寺沙門智積聞之往尋至谷聞香莫知何所深訝香從澗內沙出即撥沙看形似茅根裹夾沙土然極芬馥就水抖擻洗之一澗皆香將返龍池佛堂中合堂皆香極深美山下俗人時見此山或如佛塔或全如佛靣出空際故像顏之號非是虛立像去嘉美谷甚近即姚秦時王嘉美所住者也坊州玉華宮寺南二十里許大高嶺俗號檀臺山上有古塔基甚宏壯靣方四十三尺上有一層甎塔四靣開戶石門高七尺餘廣五尺餘傍有破甎無數古老傳云昔周文王於此遊獵見有沙門執錫持鉢山頭立住喚下不來王遣往捉將至不見遠看仍在時乃勑掘所立處深三丈獲鉢及杖而已王重之為起甎塔一十三級左近村墟常聞鍾聲龍朔元年京師大慈恩寺沙門惠貴聞之便往又聞鍾聲慷慨古迹將事修理恨無泉貝懷惑猶預貴又感祥云護塔善神曰可即經始不勞疑慮又感異僧曰我是南方淨土菩薩行化至此云此塔自古至今已經四造勿辝勞倦功用必成惟須牢作不事華侈三層便止貴聞此告親事經營塔側古窯三十餘所猶有熟甎填滿更尋塔南川中乃是古寺背山靣水一期幽栖之勝地也自未修前鍾聲時至即令營搆依時發聲三下長打如今僧事龍朔三年掘得古銘云周保定年塔崩塔初成時南望見渭又云置塔經四百餘年崩計周保定至開皇元年得二十年開皇至今龍朔初得八十一年又計銘記四百年後始崩則塔是後漢時所造後周無諡文者前周大遠未知古老所傳周文是何帝代但知塔甎巨万終非下俗所立耳江州廬山有三石梁長數十丈廣不及尺下望無底晉咸康年中𢈔亮為江州登山過梁見老公殊偉夏屋崇峻玉堂眩目靈塔高竦莫測是何修葺久之終非人宅乃拜謝而返唐貞觀二十一年荊州大興國寺塔西南柱無故有聲人往看之乃見有金銅佛頭出如是日日漸出經三夕方盡長六寸許是立佛道俗咸異之唐初相州大慈寺塔被焚余至彼問焚所由僧云大業末歲群盜㸦陳寺在三爵臺西葛屨山上四鄉來投築城固守人物擁聚尺地不空塔之上下重復皆滿於中穢汙不可見聞及賊平人出𡐢穢狼藉寺僧無力可用屏除忽然火起焚蕩都盡唯東南角太子思惟像殿得存可謂火淨以除其臭穢也此塔即隋高祖手勑所置初以隋運創臨天下未附吳國公蔚逈周之柱臣鎮守河北作𢪛舊都聞楊氏御圖心所未允即日聚結舉兵抗詔官軍一臨大陳摧解收擁俘虜將百萬人捴集寺北遊豫園中明旦斬決園牆有孔出者縱之至曉便斷猶有六十万人並於漳河岸斬之流尸水中水為不流𮕜河一月夜夜鬼哭哀怨切人以事聞帝帝曰此假一誅深有抂濫賊止蔚逈餘並被驅當時惻隱咸知此事國初機候不獲縱之可於遊豫園南葛屨山上立大慈寺三爵臺以營之六時禮佛加一拜為園中抂死者寺成僧住依勑禮唱怨哭之聲一期頓絶矣振旦神州佛舍利感通序原夫大聖謀㩲通濟為本容光或隨緣隱遺景有可承真故將事拘尸從於俗化入金剛定碎此金軀欲使福被天人功流海陸至於牙齒髮爪之屬頂蓋目精之流衣瓶杖之具坐處足蹈之迹備滿中天罕被東夏而齒牙髮骨時聞視聽昔育王土中之塔略顯於前而偏感別應之形隨機又出自漢洎唐無時不有既稱靈骨不可以事求任緣而舉止得以敬及通信之士舉神光而應心懷疑之夫假琢磨而發念所以討尋往傳及以現祥故依纘序庶有披者識釋門之骨鯁万載之後難可塵沒矣漢法本內傳云明帝既𪪺佛法立寺度僧五嶽觀諸道士等請求捔試以燒經神變為驗及經從火化隱沒莫陳費才自憾於衆前張衍啓悟於時俗于時西域所將舍利光明五色直上空中旋環如蓋映蔽日光摩騰羅漢踊身高飛神化自在天雨寶花散佛僧上又聞天樂繁會人感信心焉魏明帝洛城中本有三寺其一在宮之西每繫憣剎頭輒厈見宮內帝患之將毀除壞時外國沙門居寺乃齎金盤盛水以貯舍利五色光明騰焰不息帝歎曰非夫神效安得尓乎乃於道東造周閭百間名為官佛圖精舍云吳孫權赤烏四年沙門康僧會創達江表設像行道吳人以為異以狀聞之㩲召會問佛有何靈會曰佛晦靈迹遺骨舍利應現無方權曰何在會曰神迹感通祈求可獲權曰若得舍利當為興寺經三七日遂獲瓶中旦呈於㩲光照宮殿權執瓶寫于銅盤舍利下衝盤即破碎㩲大驚嗟希有瑞也會進曰佛之靈骨金剛不碎劫火不燋㩲乃使力者擊之捶砧俱陷舍利不光明四射耀晃人目又以火燒乃騰光上踊作大蓮花權大發信乃為立建初寺改所住地名佛陀里孫晧虐政將欲除屏佛法燔經夷塔有諫晧曰且少寬假信無神驗誅除不晚晧從之召會曰若能驗現於目前助君興之如其不能將道廢而人戮會曰道以緣應感而必通如蒙寬假庶降神效晧與期三日僧衆百餘同集會寺晧陳兵圍寺乃巨齊至尅期就戮或懼無靈先自縊者會謂衆曰佛留舍利止在今時前已有驗今豈欺哉恰期便獲乃進於晧曰此如來金剛之骨賁獲擊以百鈞之杵終莫毀也晧曰金石可磨枯骨豈在沙門面欺祇速死耳乃置之鐵砧以金鎚擊之金鐵並陷而舍利如故又以清水行之舍利揚光散彩洞燭一殿晧乃欣服革心膺化云晉初竺長舒先有舍利重之其子為沙門名法顏每欲還俗笑曰是沙石耳何足可貴父投之水中五色三匝光高數尺遂不還俗長舒死後還發俗念輒病委頓卒為沙門以舍利安江夏塔中晉大興中於潛董汪信尚木像夜有光明後像側有聲投地視乃舍利水中浮沉五色晃昱左右行三匝後沙門法恆看之遙起四五投恆懷中恆曰若使恆興立寺宇更見威神又耀於前於即恆建寺塔於潛入法者日以十數云晉大興中北人流播廣陵日有千數有將舍利者建立小寺立剎舍利放光至於剎杪遂感動遠近信心云晉咸和中北僧安法開至餘欲建立寺無地欠財手索錢貫貨之積年得錢三萬市地作屋常以索貫為資欲立剎無舍利有羅幼者先自有之開求不許及開至寺禮佛見幼舍利囊已在座前即告幼幼隨來見之喜恱與開共立寺宇於餘云晉咸康中建安大守孟景欲建剎孟寺於夕聞牀頭鏘然視得舍利三枚景立剎時元嘉十六年六月舍利放光通照上下七夕乃止一切咸見云晉義興元年有林邑人嘗有一舍利每齋日有光沙門慧邃隨廣州刺史刁逵在南敬其光相欲請之未及發言而舍利自分為二逵聞心恱又請留敬而又分為三逵欲摸長干像寺主固執不許夜夢人長數丈告曰像貴宣導何故吝耶明報聽摸既成逵以舍利著像髻中西來諸像放光者多懷舍利故也宋元嘉六年賈道子行荊上明見芙蓉方發聊取還家聞華有聲𪫦尋之得一舍利白如真珠焰照梁棟敬之擎以箱盛懸于屋壁家人每見佛僧外來解所被衣躍坐案上有人寄宿不知汗慢之乃夢人告曰此有釋迦真身衆聖來敬尓何行𢙣死墮地獄出為尼婢何得不怖其人大懼無幾癩死舍利屋地生荷八枚六旬乃枯歲餘失之不知所去宋元嘉八年會稽安千載者家世奉佛夜有扣門者出見十餘人著赤衣運材積門內云官使作佛圖忽無所見明至他家齋食上得一舍利紫金色椎打不碎以水行之光明照發便自舉敬常有異香後出欲禮忽而失之尋覓備至半日還得臨川王鎮江陵迎而行之雜光間出佐史沙門咸見不同王捧水器咒曰詞多如別辨之咒訖輒應聲光出夜見百餘人繞舍利屋燒香特如佛狀及明人及舍利俱失矣宋元嘉九年潯陽張須元家設八閞齊道俗數十人見像前花上似氷雪視得舍利數十便以水行之光焰相屬後遂失之數十日開厨更視獲牙中有白㲲裹舍利十枚光焰屬天諸處咸來請之宋元嘉十五年南郡劉凝之隱衡山徵不出奉五斗米道不信佛法夢見人去地數丈曰汝疑方解覺忽乃悟旦夕勤至半年禮佛忽見額下有紫光瑞光處得舍利二枚剖擊不水行光出後於食時口中隱齒吐出有光妻息又獲一枚合有五枚後又失之尋爾又得云宋元嘉十九年高平徐椿讀經及食得二舍利盛銀瓶中後看漸增乃至二十後寄廣陵今馥私開之空椿在都忽自得之後退轉皆失舍利應現值者甚多皆敬而得之而失也舍利東流綿歷帝代傳紀所及略陳万一由事相重沓屢現非奇佛現栖隱誠其致也然有國興塔無勝有隋一化之中百有餘所神瑞開發陳諸別傳今略出之以顯盛德云爾隋高祖昔在龍潛有神尼智仙無何而至曰佛法將滅一切神明今已西去兒當為普天慈父重興佛法神明還來後周氏果滅佛法及隋受命常以為言又昔有婆羅門僧詣宅出一裹舍利曰檀越好心故留供養尋尓不知所在帝曰我興由佛故於天下立塔并置神尼像焉又於京師法界寺造連基浮圖下安舍利開皇十五年秋夜神光自基上繞露盤赫若冶焰一旬內四如之帝於仁壽宮仁壽元年六月十三日御宮之仁壽殿降生日也帝於此日追惟永往報父母恩延諸沙門與論至道欲於海內清靜處三十所建塔下詔曰仰惟正覺大慈大悲救護群生津梁庶品朕歸依三寶重興聖教思與四海共修福業令使現在未來俱為利益冝請沙門三十人解法相堪宣導者各將侍者散官分道送舍利於諸州起塔盡州現僧為朕及皇后太子諸王官人民庶幽顯生靈七日行道懺悔打剎布施限以十文以供塔用不充伇丁用正庫物其刺史以下常務停七日專知塔事同至十月十五日正午入函一時起塔帝以起塔之旦在京大興殿西執而立延佛像沙門三百六十人上殿左右密數三度常賸一人帝見異僧披褐色覆膊語左右曰勿驚置之及行道散不復見帝曰今佛法重興立舍利塔必有感應果如言矣雍州仙遊寺立塔天降陰雪舍利將下日光朗照及入函雲合丙午歲高麗國大藏都監奉敕雕造
