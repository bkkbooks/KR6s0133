body:
  text: 沙門守其等奉勑挍勘鞠函月燈三昧經之餘丹本佛語童子坐禪菩薩有十事行何等為十一者專行住二者行道事三者無有恐難四者諦正諸根五者為人所愛六者遠離欲七者不轉一心八者脫於魔界九者住佛界十者得解脫童子是為坐禪菩薩十事行佛於是說偈言其人不轉所行即為住諦之行專行諸度之事其人捨不正行所修無所復著諸根以為寂定即為得安隱喜坐思惟道行事其人已離愛欲安隱坐於一心以遠離魔境界即住於佛境界專行者有是持其獨樂樹閒者即便解脫之行便成得十事句其菩薩住轉不行皆捐於不當行不正行樂正行念三昧者有是事其人終無貪著時行安隱者賢不貪身意善覺而持戒行三昧者有是事行空樹閒無所畏其人終無著貪時諸非人皆愛念之如是遠離欲獨行終不著欲亦不貪如是即脫魔境界便住於如來境界其人解脫邪事竟佛語童子菩薩行般若波羅密有十事何等為十一者一切所有悉布施無所希望二者不復犯戒不以戒自綺三者住忍辱力無人想住四者行精進不貪身命五者行禪不住禪六者降伏弊魔七者九十六種外道不能動之八者自得知生死九者於衆生有悲意十者不求弟子緣一覺地童子是為菩薩行般若波羅密十事佛於是說偈言其人所施皆等亦不念望其報護經戒不敢犯亦不有想著求行忍辱及智慧終無有人之想見人即有精進身志意無所著行一心及智慧無所住無有想以降伏於衆魔智慧者有是德九十六種之道皆無能動搖者得知了生死事智慧者有是事於一切衆生所有大悲哀之行於弟子緣一覺皆不念所求行所有皆施無希望為不犯戒不念𢙣行忍辱者無人想奉智慧者有是事精進為在空間處禪無有想亦無住其人智慧降伏魔行智慧者有是事諸外道者不能動其人即為知生死於衆人民有哀傷行智慧者有是事諸弟子及緣一覺於彼終無念求索其人住佛道如是行智慧者有是事佛語童子多智菩薩有十事行何等為十一者知𢙣道二者知善道三者解疑事四者為現直道五者捐𢙣道六者住正道七者在甘露門八者得坐佛樹下九者為人民現明道十者不畏𢙣道童子是為多智菩薩十事行佛於是說偈言為知了諸塵勞悉曉了是兩事其人便塵勞即隨佛道之行慧而解諸狐疑便為現直見事則捐𢙣道行即得在於正道見在於甘露門則得坐佛樹下為人民解現王令不畏諸𢙣道曉了無數塵勞法知解兩事為如是其人便捐塵勞便於彼學上善法為一切人解其疑便為得見善正直即捐去𢙣道事其多智常在道住常為住在甘露門得坐在無量佛樹為無量億人現明其人終不畏𢙣道佛語童子菩薩尊法施持法與他人者有十事何等為十一者捐𢙣二者奉行善三者修正士四者淨其佛剎五者坐佛樹下六者布施衆用七者降伏諸塵勞八者與一切人智九者行慈心十者現在得安隱意童子是為菩薩持尊法施十事以法施與他人者佛於是說偈言諸不善皆捐之諸善事悉奉行得在住法智慧意常好喜布施便淨其佛國土即得無上之國便則坐佛樹下興法施譬如寶布施一切所有便學於諸法王則遠除諸塵勞其人得佛不難布施於一切人常有慈心之行其無有嫉妒行為安隱諸非人多智便諸不善其人常為在善住於尊法堅不可動其多智者常與法即常得清淨之國常奉行佛道之事為常得在佛樹下興法施者有是事無有塵勞布施衆便即知了己身事皆解脫諸世之事其人終無所罣㝵其人自知而發意為一切人如是施有慈心者無嫉妒見諸法安無有我佛語童子菩薩行空有十事何等為十一者行佛道二者無所著行三者不願所生四者不犯戒法五者不誹謗賢者六者不為諍行七者無所得八者獨行道九者不諍佛十者受法行童子是為菩薩行十空事佛於是說偈言其諸上人所行得上尊之世界勇猛者於彼行諸所不可得命皆不著諸世界於禪思安隱坐亦不願諸所生便曉知諸空法終不復犯戒法持於戒無有呵其盡壽不說𢙣不誹謗餘賢者其行道無所諍終無有諸諍訟其便知諸所事譬如法而習行乃至亡失其命終不謗於世尊積纍於一切法自保意無所畏於一切諸世界佛道不可思議即奉持諸佛法不復疑於空法其人之行而上妙住不在於諸外道行禪安隱無所著諸所無命亦無人其人終無有貪者行一心者無所想以知無人無我法終復無有於所願悉曉諸空之法事於衆所用終不著其人終無貪著念於佛常有淨信意其人終無諍訟事獨處行者空衆用其人為住於佛道便持如來諸所法佛語童子菩薩在獨處行有十事何等為十一者有清淨意二者無有欲三者念諸佛四者信行五者不疑慧六者有反復於諸佛七者不誹謗法八者寂寞行九者得調住十者智四解事童子是為菩薩獨處行十事佛於是說偈言終無有愛欲行常有清淨之意便奉無所欲事於獨處一心行思念普世閒明其人轉而成信於智慧一無疑佛慧不可思議於諸佛有反復佛終不捐法即而作寂定行便為住於寂法其人即得解事獨自樂於樹閒便捐於財利在一處而行道有人則為有清意常皆捐諸𢙣事其人行寂無有上終不復疑諸佛慧其人思念佛無上信於諸天中天行亦不復疑諸佛慧寂寞行者有是事於諸上人有反復終不復諸法行獨處行者而寂寞間處行者有是事便得善諦寂寞地即疾解了諸證事常解說無央數經其人無有罣㝵時佛語童子菩薩在間處行有十事何等為十一者寂行二者遠離衆人三者無諍訟四者無瞋恚五者不入諸行六者不入人罪七者念解脫事八者安隱一心行九者疾作證解脫十者以無所著故得三昧童子是為菩薩間處尊行十事佛於是說偈言常有寂寞之事便遠離衆會人終無有諍訟時而獨自作於行常無有瞋恚意終不轉著諸界亦不復作諍訟在間處是有德便為寂寞之行常在於獨處行即有解脫之事便疾得過度去獨自在上間處坐常捐𢙣衆會人其人終不入人罪樹閒坐者有是事便猒於一切生死其人無有貪衆用亦不有衆畏之事在樹下坐有是事終不與人共諍訟常獨行者樂寂寞常護守於身口意其在間處德無數便得上妙解脫事即好坐在寂三昧其於樹閒習寂行在間處者有是德佛語童子菩薩行分衛有十事何等為十一者不欲令知其行二者不令人知其功德三者不欲有財利四者不有自稱亦無諛諂五者在賢聖道住六者不自說功德七者不從他人取足八者至他家舍亦不喜亦不憂九者離衣食施持法施與人十者住令德無諛諂皆取於其法施童子是為菩薩行分衛住十事令德無諛諂佛於是說偈言彼不欲令知行亦不著所為事利無利而等意其人住於教令亦不犯賢聖事不有稱諛諂行亦不自說其善復不說他人𢙣亦不愁不歡喜說法離於衣食所說皆令歡喜分衛者有是德不欲令稱不求名常住在四賢聖行亦無諛諂求財利受教令者有是事不自稱譽不說𢙣初不說𢙣𢙣舌者聞人功德常歡喜其分衛者知止足離衣食善與法施亦不求索於財利所說善人皆歡喜受尊教者有是事佛說是經時七萬二千人發無上正真道萬菩薩得無所從生法忍佛說如是文殊師利童子及一切衆會天龍世閒人皆歡喜前為佛作禮而去佛說月燈經一卷鞠函月燈三昧經一卷宋沙門先公譯國宋藏本二十六紙此是國宋二藏所謂月燈三昧經先公譯者而與彼丹藏經文義逈異未知孰是按開元録先公譯本目下注云一名文殊師利菩薩十事行經又指多小云一十紙今撿之彼丹藏經乃是矣此國宋藏經始從三界乃至道識凡歷九十餘法皆以六行說之曾無十事之言又其多小是古之二十紙則知非先公譯明矣今恐宋藏失先公之譯而得古所失安世高譯無譯主之名者見目録中有月燈經名是先公譯者乃錯題其名耳又録云出大經第七卷今撿似出第五卷之後半猶未適當何也此須更勘耳養函佛說彌勒下生經竺法護譯此經六譯三失此本宋有丹無按開元録有譯無本中有法護譯彌勒成佛經一名彌勒當來下生經者乍觀此經似彼失本而還得之其實非也何則羅什譯勒成佛經目下注云與下生經異本與法護譯彌勒成佛經同本兩譯一闕則彼失本經非此下生經六譯三失之一者明矣又按孤山智圓重校金剛般若後序云古德分經皆用紙數者一紙有二十五行一行十七字今撿失本彌勒經目下注云一十七紙則計有七千二百二十二字此經只有三千一百七十六字則尚未其半豈是彼經歟則丹藏無此經為得然此經文頗似漢晉經注又有漢云之言還恐此是三失本中第一本録云今附西晉者耳宋藏還得而編入之為得之矣而二録並無下生經是法護譯者今云法護譯者何耶伏俟賢哲養函佛說彌勒下生成佛經義淨譯宋無丹有今還𠬧入藏按開元録彌勒下生經前後六譯三存三失而此本亦在三存之一也則宋藏無此經者失之耳今得於丹藏而編入之又為看國宋藏者具録于左佛說勒下生成佛經唐三藏法師義淨奉制譯如是我聞一時薄伽梵在王舍城鷲峯山上與大苾芻衆俱爾時大智舍利子法將中最哀愍世閒從座而起偏袒右肩右膝著地合掌恭敬而白佛言世尊我今欲少咨問願垂聽許佛告舍利弗隨汝所問我當為說時舍利子即以伽他請世尊曰大師所授記當來佛下生彼號為慈氏如前後經說唯願人中尊伽陀重分別彼神通威德我今樂欲聞佛告舍利子應至心諦聽當來慈氏尊為汝廣宣說爾時大海水以漸減三千二百踰繕那為顯輪王路贍部洲縱廣有萬踰繕那有情住其中在處皆充滿國土咸富盛無罰無灾厄彼諸男女等皆由善業生地無諸𣗥㓨唯生青䎡草履踐隨人足喻若覩羅綿自然出香稻美味皆充足諸樹生衣服衆綵共莊嚴樹高三俱舍花果常充實時彼國中人皆壽八萬歲無有諸疾苦離惱常安樂具相悉端嚴色力皆圓滿人患有三種食衰老便利女年五百歲方乃作婚姻諸有欲便利地裂而容受人命將終盡自往詣尸林城名妙幢相輪王之所都縱十二由旬廣七由旬量其中所居者皆曾植妙因此城有勝德住者咸歡喜樓臺并却敵七寶之所成開鑰及門種種寶嚴飾繞𡍕諸隍塹皆營以妙名花悉充滿好鳥皆翔集七行多羅樹周匝而圍繞衆寶以莊嚴皆懸鈴鐸微風吹寶樹演出衆妙聲猶如奏八音聞者生歡喜處處有池沼覆雜色花園苑擢芳林莊嚴此城郭國中有聖主其名曰餉佉金輪王四洲富盛多威力其王福德業勇健兼四兵七寶皆成就千子悉具足四海咸清肅無有戰兵戈正法理群生設化皆平等王有四大藏各在諸國中一一藏皆有寶百万億羯陵伽國內藏名氷竭羅蜜絺羅國中般逐迦大藏伊羅鉢羅藏安處揵陀國婆羅痆斯境藏名為餉佉此諸四伏藏咸屬餉佉王百福之所資果報咸成就輔國之大臣婆羅門善淨四明皆曉達多聞為國師通諸雜論善教有聞持訓解及聲明莫不咸究了有女名淨妙為大臣夫人名稱相端嚴見者皆歡恱大丈夫慈氏辭於喜足天來託彼夫人作後身生處既懷此大聖滿足於十月於是慈尊母往趣妙花園至彼妙園中不坐亦不臥徐立攀花樹俄誕勝慈尊爾時最勝尊出母右脅已如日出雲翳普放大光明不染觸胞胎如蓮花出水光流三界內咸仰大慈輝當爾降生時千眼帝釋主躬自擎菩薩欣逢兩足尊菩薩於此時自然行七步而於足履處皆出寶蓮花遍觀於十方告諸天人衆我此身最後無生證涅槃龍降清涼水澡沐大悲身天散殊妙花虛空遍飄灑諸天持白蓋掩庇大慈尊各生希有心守護於菩薩褓母擎菩薩三十二相身具足諸光明捧持來授母御者進雕輦皆用寶莊嚴母子升其中諸天共持輿千種妙音樂引導而還宮慈氏入都城天花如雨落慈尊誕降日懷妊諸婇女普得身安隱皆生智慧男善淨慈尊父覩子奇妙容具三十二相心生大歡喜父依占察法知子有二相處俗作輪王出家成正覺菩薩既成立慈愍諸群生衆苦險難中輪回常不息金色光明朗聲如大梵音目等青蓮支體悉圓滿身長八十肘二十肘肩量面廣肩量半滿月相端嚴菩薩明衆藝善教受學者請業童蒙等八萬四千人時彼餉佉王建立七寶幢幢高七十尋廣有尋六十寶幢造成已王發大捨心施與婆羅門等設無遮會其時諸梵志數有一千人得此妙寶幢毀坼須頃菩薩覩斯已念世俗皆無生死苦羈籠思求於出離祈誠寂滅道棄俗而出家生老病死中救之令得出慈尊興願曰八萬四千人俱生猒離心並隨修梵行於初發心夜捨俗而出家還於此夜中而升等覺地時有菩提樹號名曰龍花高四踰繕那蓊鬱而榮茂枝條覆四面蔭六俱盧舍慈氏大悲尊於下成正覺於人中尊勝具八梵音聲說法度衆生令離諸煩惱苦及苦生處一切皆除滅能修八正道登彼涅槃岸為諸清信者說此四真諦得聞此妙法至誠而奉持於妙花園中諸衆如雲集滿百由旬內眷屬皆充滿彼輪王餉佉聞深妙法已𣫆捨諸寶祈心慕出家不戀上宮闈至求於出離八萬四千衆咸隨而出家復八萬四千婆羅門童子聞王捨塵俗亦來求出家主藏臣長者其名曰善財并與千眷屬亦來求出家寶女毗舍佉及餘諸從者八萬四千衆亦來求出家復過百千數善男善女等聞佛宣妙法亦來求出家天上天人尊大慈悲聖主普觀衆心已而演出要法告衆汝應知慈悲釋迦主教汝修正道來生我法中或以香花鬘幢幡蓋嚴飾供養牟尼主來生我法中或鬱金沉水香泥用塗拭供養牟尼塔來生我法中或歸佛法僧恭敬常親近常修諸善行來生我法中或於佛法中受持諸學處善護無犯來生我法中或於四方僧施衣服飲食并奉妙醫藥來生我法中或於四齊辰及在神通月受持八支戒來生我法中或以三種通神境記教授化道聲聞衆咸令煩惑除初會為說法廣度諸聲聞九十六億人令出煩惱障第二會說法廣度諸聲聞九十四億人令渡無明海第三會說法廣度諸聲聞九十二億人令心善調伏三轉法輪已人天普純淨將諸弟子衆乞食入城中既入妙幢城衢巷皆嚴飾為供養佛故天雨曼陀花四王及梵王并餘諸天衆香花鬘供養輔翼大悲尊大威德諸天散以妙衣服繽紛遍城邑瞻仰大醫王以妙寶香花散灑諸衢街履踐於其上喻若覩羅綿音樂及幢幡夾路而行列人天帝釋衆稱讚大慈尊南謨天上尊南謨士中勝善哉薄伽梵能哀愍世閒有大威德天當作魔王衆歸心合掌禮讚仰於導師梵王諸天衆眷屬而圍繞各以梵音聲闡揚微妙法於此世界中多是阿羅漢蠲除有漏業永離煩惱苦人天龍神等乾闥阿修羅羅剎及藥叉皆歡喜供養彼時諸大衆斷障除疑惑超越生死流善修清淨行彼時諸大衆離著財無我我所心善修清淨行彼時諸大衆毀破貪愛網圓滿靜慮心善修清淨行慈氏天人尊哀愍有情類期於六萬歲說法度衆生化滿百千億令渡煩惱海有緣皆拯濟方入涅般城慈氏大悲尊入般涅槃後正法住於世亦滿六萬年若於我法中深心能信受當來下生日必奉大悲尊若有聰慧者聞說如是事誰不起欣樂願逢慈氏尊若求解脫人希遇龍花會常供養三寶當勤莫放逸爾時世尊為舍利子及諸大衆記說當來慈氏事已復告舍利子若有善男子善女人聞此法已受持讀誦為他演說如說修行香花供養書寫經卷是諸人等當來之世必得值遇慈氏下生於三會中咸蒙救度爾時世尊說此頌已舍利子及諸大衆歡喜信受頂戴奉行佛說勒下生成佛經敢函佛說申日經法護譯此經四譯一失此本宋有丹無按開元録法護譯中有月光童子經亦名申日經者自是一經有二名耳非別有申日經亦是法護譯者藏中既有月光童子經為法護譯斯已矣此何更有申日經亦是法護之譯耶則未知此經是誰之譯又何據謂之法護譯耶今以録中有云支謙譯中有申日經一卷云與月光童子經同本異譯今撿尋文句二經不殊故不雙出云云則藏中古有支謙所譯申日經亦名月光童子經者今諸藏皆無恐此經即是支謙之譯而誤安法護之名耳如是則四譯還具矣冒陳𥌒言以俟來哲才函六字神呪經大唐天笁菩提流志譯諸藏皆有國宋二藏此才函中更有六字神呪王經菩提流志譯者丹藏即無按開元録才函六字神呪經與陀羅尼集經第六卷文殊師利菩薩呪法及呪五首經中六字陀羅尼等同本異譯今撿之此經是耳更無佛說六字神呪王經亦是流志譯者按彼經則後知函之中失譯人名今附梁録者耳意者宋藏見彼題中六字神呪之言以為此經之異譯遂將類聚重編於此是一錯也而又妄安流志之名何耶故今刪去此函中者後賢欲知今所去經是何等者請見知函六字神呪王經則是耳丙午歲高麗國大藏都監奉𠡠雕造
