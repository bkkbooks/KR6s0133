body:
  text: 沙門守其等奉勑挍勘沙塞五分戒本之餘若比丘為破和合僧勤方便諸比丘語彼比丘汝莫為破和合僧勤方便當與僧和合僧和合故歡喜無諍一心一學如水乳合共弘師教安樂行如是諫堅持不捨應第二第三諫第二第三諫捨是事善若不捨者僧伽婆尸沙若比丘助破和合僧若二若三若衆多語諸比丘言是比丘所説是知説非不知説説法不説非法説律不説非律皆是我等心所忍樂諸比丘語彼比丘汝莫作是語是比丘所説是知説非不知説説法不説非法説律不説非律皆是我等心所忍樂何以故是比丘非知説不説法不説律汝莫樂助破和合僧當樂助和合僧僧和合故歡喜無諍一心一學如水乳合共弘師教安樂行如是諫堅持不捨應第二第三諫第二第三諫捨是事善不捨者僧伽婆尸沙若比丘惡性難共語與諸比丘同學經戒數數犯罪諸比丘如法如律諫其所犯答言大德汝莫語我若好若惡我亦不以好惡語汝諸比丘復語言汝莫作自我不可共語汝當為諸比丘説如法諸比丘亦當為汝説如法如是展轉相教轉相出罪成如來衆如是諫堅持不捨應第二第三諫第二第三諫捨是事善不捨者僧伽婆尸沙若比丘依聚落住行惡行汙他家行惡行皆見聞知汙他家亦見聞知諸比丘語彼比丘汝行惡行汙他家行惡行皆見聞知汙他家亦見聞知汝出去不應此中住彼比丘言諸大德隨愛恚癡畏何以故有如是等同罪比丘有驅者有不驅者諸比丘復語言汝莫作是語諸大德隨愛恚癡畏有如是等同罪比丘有驅者有不驅者汝行惡行汙他家行惡行皆見聞知汙他家亦見聞知汝捨是隨愛恚癡畏語汝出去不應此中住如是諫堅持不捨應第二第三諫第二第三諫捨是事善不捨者僧伽婆尸沙諸大德已説十三僧伽婆尸沙法九初罪四乃至三諫若比丘犯一一戒知故覆藏隨幾時應與波利婆沙行波利婆沙已六夜行摩那埵次到阿浮呵那如法作已應二十僧中出罪若少一人不滿二十是比丘不得出罪諸比丘應如法呵是法應爾今問諸大德是中清淨不第二第三亦如是説諸大德是中清淨默然故是事如是持諸大德是二不定法半月半月戒經中説若比丘共一女人獨屏處可淫處坐可信優婆夷見於三法中一一法説若波羅夷若僧伽婆尸沙若波逸提若比丘言如優婆夷所説應三法中隨所説治是初不定法若比丘共一女人獨露處坐説惡淫欲語可信優婆夷見於二法中一一法説若僧伽婆尸沙若波逸提若比丘言如優婆夷所説應二法中隨所説治是二不定法諸大德已説二不定法今問諸大德是中清淨不第二第三亦如是説諸大德是中清淨默然故是事如是持諸大德是三十尼薩耆波逸提法半月半月戒經中説若比丘三衣竟捨迦絺那衣已長衣乃至十日若過尼薩耆波逸提若比丘三衣竟捨迦絺那衣已三衣中離一一衣宿過一夜除僧羯磨尼薩耆波逸提若比丘三衣竟捨迦絺那衣已得非時衣若須應受速作受持若足者善若不足望更有得處令具足成乃至一月若過尼薩耆波逸提若比丘從非親里比丘尼取衣除貿易尼薩耆波逸提若比丘使非親里比丘尼浣故衣若染若打尼薩耆波逸提若比丘從非親里居士居士婦乞衣除因緣尼薩耆波逸提因緣者奪衣失衣燒衣漂衣衣壞是名因緣若比丘奪衣失衣燒衣漂衣衣壞從非親里居士居士婦乞衣若居士居士婦欲多與衣是比丘應受二衣若過是受尼薩耆波逸提若比丘非親里居士居士婦共議當以如是衣直作衣與某甲比丘是比丘先不自恣請便往問居士居士婦言汝為我以如是衣直作衣不答言如是便言善哉居士居士婦可作如是衣與我為好故尼薩耆波逸提若非親里居士居士婦共議我當各以如是衣直作衣與某甲比丘是比丘先不自恣請便往問居士居士婦言汝各為我以如是衣直作衣不答言如是便言善哉居士居士婦可合作一衣與我為好故尼薩耆波逸提若王若大臣婆羅門居士為比丘故遣使送衣直使到比丘所言大德彼王大臣送此衣直大德受之是比丘言我不應受衣直若得淨衣當手受持使言大德有執事人不比丘即指示處使便到執事所語言某王大臣送此衣直與某甲比丘汝為受作取便與之使既與已還比丘所白言大德所示執事人我已與竟大德須衣便可往取是比丘二返三返到執事所語言我須衣我須衣若得者善若不得四返五返六返到執事前默然立若得者善若過求得者尼薩耆波逸提若不得衣隨使來處若自往若遣信語言汝為某甲比丘送衣直是比丘竟不得汝還自索莫使失是事應爾若比丘自行乞縷雇織師織作衣尼薩耆波逸提若居士居士婦為比丘使織師織作衣是比丘先不自恣請便到織師所作是言汝知不此衣為我作汝好為我織令極緻廣當別相報後若與一食若一食直得者尼薩耆波逸提若比丘與比丘衣後瞋不喜若自奪若使人奪作是語還我衣不與汝尼薩耆波逸提若比丘知檀越欲與僧物回以入己尼薩耆波逸提若比丘病得服四種含消藥酥油蜜石蜜一受乃至七日若過尼薩耆波逸提若比丘住阿鍊若處安居三月未滿八月若處有恐怖聽寄一一衣著界內白衣家若有因緣出界離此衣宿乃至六夜若過尼薩耆波逸提若比丘春餘一月應求雨浴衣餘半月應持若未至一月求先半月持尼薩耆波逸提若比丘前後安居十日未至自恣得急施衣若須應受乃至衣時若過尼薩耆波逸提若比丘鉢未滿五綴更𠧒新鉢為好故尼薩耆波逸提是鉢應僧中捨僧應取衆中最下鉢與之語言汝受是鉢乃至破是法應爾若比丘長鉢乃至十日若過尼薩耆波逸提若比丘新憍耶作臥具尼薩耆波逸提若比丘純黑羺羊毛作新臥具尼薩耆波逸提若比丘作新臥具應用二分純黑羺羊毛第三分白第四分下若過是作尼薩耆波逸提若比丘作新臥具應六年畜未滿六年若捨若不捨更作新臥具除僧羯磨尼薩耆波逸提若比丘純黑羺羊毛作新尼師壇應用故尼師壇一修伽陀搩手壞好色若不壞尼薩耆波逸提若比丘得羊毛須持有所至若自持乃至三由旬若過尼薩耆波逸提若比丘使非親里比丘尼浣染擘羺羊毛尼薩耆波逸提若比丘種種販賣求利尼薩耆波逸提若比丘以金銀及錢種種賣買尼薩耆波逸提若比丘自捉金銀及錢若使人捉若發心受尼薩耆波逸提諸大德已説三十尼薩耆波逸提法今問諸大德是中清淨不第二第三亦如是説諸大德是中清淨默然故是事如是持諸大德是九十一波逸提法半月半月戒經中説若比丘故妄語波逸提若比丘毀呰比丘波逸提若比丘兩舌鬪亂比丘波逸提若比丘為女人説法過五六語除有別知善惡語男子波逸提若比丘知僧如法斷事竟還發起波逸提若比丘教未受具戒人經並誦者波逸提若比丘與未受具戒人宿過三夜波逸提若比丘向未受具戒人自説得過人法言我如是知如是見實者波逸提若比丘知他比丘麁罪向未受具戒人説除僧羯磨波逸提若比丘作是語何用是雜碎戒為説是戒時令人憂惱作如是毀呰戒者波逸提若比丘自伐鬼村若使人伐波逸提若比丘故不隨問答波逸提若比丘誣説僧所差人波逸提若比丘於露地自敷僧臥具若使人敷若他敷若坐若臥去時不自舉不教人舉不囑舉若見僧臥具敷在露地而不舉者波逸提若比丘於僧房內自敷僧臥具若使人敷若他敷若坐若臥去時不自舉不教人舉不囑舉波逸提若比丘瞋不喜於僧房中自牽比丘出若使人牽作是語出去滅去莫此中住波逸提若比丘知他先敷臥具後來強自敷若使人敷作是念若不樂者自當出去波逸提若比丘僧重閣上尖腳繩牀木牀用力坐臥波逸提若比丘作大房舍從平地壘留窗戶處極令堅牢再三重覆若過波逸提若比丘知水有蟲若取澆泥若飲食諸用波逸提若比丘僧不差教誡比丘尼波逸提若比丘僧差教誡比丘尼至日沒波逸提若比丘僧不差為教誡故入比丘尼住處除病因緣波逸提若比丘作是語諸比丘為供養利故教誡比丘尼波逸提若比丘與比丘尼式叉摩那沙彌尼獨屏處坐波逸提若比丘與非親里比丘尼衣除貿易波逸提若比丘與非親里比丘尼作衣波逸提若比丘與比丘尼先期共道行從此聚落到彼聚落除因緣波逸提因緣者若多伴有疑畏處是名因緣若比丘與比丘尼先期共船行若上水若下水除直渡波逸提若比丘知比丘尼讚歎因緣得食食除檀越先發心作波逸提若比丘數數食除因緣波逸提因緣者病時衣時施衣時是名因緣若比丘受別請衆食波逸提除因緣因緣者病時衣時施衣時作衣時行路時船上行時大會時沙門會時是名因緣若比丘無病施一食處過一食波逸提若比丘到白衣家自恣多與飲食若餅若若不住其家食須二三鉢應受出外與餘比丘共食若無病過是受及不與餘比丘共食波逸提若比丘食竟不作殘食法波逸提若比丘知他比丘食竟不作殘食法強勸令食欲使犯罪波逸提若比丘不受食著口中除嘗食楊枝及水波逸提若比丘非時食波逸提若比丘食殘宿食波逸提若比丘自手與外道裸形若男若女食波逸提若諸家中有如是美食乳酪酥油魚肉若比丘無病為己索得食者波逸提若比丘食家中與女人坐波逸提若比丘與女人獨屏處坐波逸提若比丘與女人獨露處坐波逸提若比丘觀軍發行波逸提若比丘有因緣到軍中乃至二三宿若過波逸提若比丘有因緣到軍中二三宿觀軍陳合戰波逸提若比丘作是語如我解佛所説障道法不能障道諸比丘語彼比丘汝莫作是語莫謗佛莫誣佛佛説障道法實能障道汝捨是惡邪見如是諫堅持不捨應第二第三諫捨是事善不捨者波逸提若比丘知彼比丘不如法悔不捨惡邪見共坐共語共宿共事波逸提若沙彌作是語如我解佛所説受五欲不能障道諸比丘語是沙彌汝莫作是語莫謗佛莫誣佛佛説五欲障道實能障道汝沙彌捨是惡邪見如是教堅持不捨應第二第三教第二第三教捨是事善若不捨諸比丘應語是沙彌汝出去從今莫言佛是我師莫在比丘後行如餘沙彌得共比丘二宿汝亦無是事癡人出去滅去莫此中住若比丘知如法沙彌畜使共住共語波逸提若比丘故奪畜生命波逸提若比丘故令比丘生疑悔作是念令彼比丘乃至少時惱波逸提若比丘僧斷事時不與欲起去波逸提若比丘擊攊比丘波逸提若比丘水中戲波逸提若比丘與女人同室宿波逸提若比丘飲酒波逸提若比丘輕師及戒波逸提若比丘自掘地若使人掘言掘者波逸提若比丘共諍已默聽作是念諸比丘所説我憶持波逸提若比丘知不滿二十歲與受具足戒波逸提是人不得戒諸比丘亦可呵是法應爾若比丘受四月自恣請藥若過是受除更請自送請長請波逸提若比丘數數犯罪諸比丘如法諫作是語我不學是戒當問餘比丘持法持律者波逸提比丘欲求解應問持法持律者是法應爾若比丘説戒時作是語我今始知是法半月布薩戒經中説諸比丘知是比丘已再三説戒中生是比丘不以不知故得脫隨所犯罪如法治應呵其不知所作不善説戒時不一心聽不著心中波逸提若比丘王未出未藏寶若入過後宮門限波逸提若比丘與賊期共道行從此聚落到彼聚落波逸提若比丘與女人期共道行從此聚落到彼聚落波逸提若比丘無病為炙故自然火若使人然波逸提若比丘若寶若寶等物若自取若教人取除僧坊內及宿處波逸提若僧坊內及宿處取寶等物後有主索應還是事應爾若比丘半月內浴除因緣波逸提因緣者病時作時行時風雨時熱時是名因緣若比丘瞋故打比丘