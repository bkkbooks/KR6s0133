body:
  text: 沙門守其等奉勑挍勘鼻奈耶卷第七姚秦涼州沙門笁佛念等譯波逸提法之一佛世尊遊舍衛國祇樹給孤獨園時尊者羅藝於衆人中戲笑妄語諸比丘誨責汝為佛子云何妄語諸比丘往具白世尊世尊告羅藝曰汝何為戲笑妄語以偈誨責羅藝妄語地獄近作之言不作二罪後俱受是行自牽去法衣在其身為𢙣不自禁苟為𢙣行者命逝墮地獄無戒受供養街巷乞不慙死噉燒䥫丸極熱劇赤火如是世尊誨責已為沙門結戒若比丘戲笑妄語者貝夜提佛世尊遊舍衛國祇樹給孤獨園時六群比丘種類罵諸比丘諸比丘往具白世尊世尊告曰若比丘種類相罵者貝夜提佛世尊遊舍衛國祇樹給孤獨園時六群比丘常與十七群比丘共諍此閒聞語便往告彼彼閒聞語便來告此諸比丘聞往白世尊世尊告曰若比丘調戲兩舌鬪亂彼此者貝夜提佛世尊遊拘舍瞿師羅園彼拘舍比丘喜鬪繫閉坐衆耆𦒳事以得解六群比丘還揚舉本事諸君以何事諍不使我等斷諸比丘聞六群比丘事解還揚舉往具白世尊世尊告曰若比丘諍如法事止還揚舉者貝夜提佛世尊遊舍衛國祇樹給孤獨園時迦留陀夷獨入宮與末利夫人說法王諸大臣自相謂言云何比丘獨入宮說法十二法比丘往白世尊世尊告曰若比丘獨與女人說法不得過五六語除其有人貝夜提佛世尊遊舍衛國祇樹給孤獨園時六群比丘向沙說毗𡰱語諸比丘見云何向未受大戒者說戒往具白世尊世尊告曰若比丘向未受大戒者說一句戒法貝夜提佛世尊遊舍衛國祇樹給孤獨園時有一比丘入沙聚自稱譽言我得初禪第二第三第四禪慈悲喜護諸比丘見即往責數云何比丘向未受大戒者自稱得禪往具白世尊世尊告曰若比丘向未受大戒人自稱譽言我知是見是實者貝逸提佛世尊遊舍衛國祇樹給孤獨園時六群比丘語不受大戒人某甲比丘犯僧伽婆施沙貝逸提諸比丘聞便往白世尊世尊告曰若比丘向未受大戒人說犯僧伽婆施沙貝逸提者除其僧使貝逸提佛世尊遊舍衛國祇樹給孤獨園時諸長者來詣園房觀看若還去者身飢不能得達便語十二法比丘此沙門釋子常食人供而到園了無待賔比丘語六群比丘此諸長者詣園觀看若還去時飢不能得至可聽少糴穀米以供賔客六群比丘答言大善後比丘多糴穀米以待賔客六群比丘語諸比丘誰使汝等大散僧物糴穀米以待賔客比丘答君前自許復言我不許汝諸比丘不知當何答往白世尊世尊告曰若比丘先共要後作是語汝减比丘僧物用違前要者貝逸提佛世尊遊舍衛國祇樹給孤獨園時十五日撾揵𥣔比丘僧集說戒尊者闡怒語諸比丘半月用說是雜碎戒為使諸比丘愁憒不得行道諸比丘聞便往白世尊世尊因此事集和合僧備十功德佛為沙門結戒若比丘說戒之日作是語半月用說此雜碎戒為彈却戒者貝逸提佛世尊遊舍衛國祇樹給孤獨園六群比丘斫樹作牀樹神瞋往語十二法比丘我所居舍盡斫壞諸比丘往白世尊世尊告曰有神依樹根有神依樹岐有神依樹枝裏有神依樹皮裏有神依樹皮裂中有神依樹蓓蕾有神依樹有神依樹花住有神依樹果一切藥草樹木盡有神神所以依住者食其香故若比丘自斫樹教他斫墮佛世尊遊舍衛國祇樹給孤獨園六群比丘常與十七群比丘共諍十七群比丘不能忍卒便瞋恚諸十二法比丘聞往白世尊世尊告曰卒瞋恚者墮佛世尊遊舍衛國祇樹給孤獨園時六群比丘撓擾激動阿練兒諸君已得初禪第二第三第四盡生死修梵行諸比丘聞便往白世尊世尊告曰若比丘激動人使瞋者墮佛世尊遊舍衛國祇樹給孤獨園時六群比丘於露地敷牀薦席拘柘竟日坐論便起去時天大雨盡汙濕座具牀豸席拘拓諸長者見自相謂言我等减子孫分以供比丘僧此比丘不慙取他信施使雨澆爛十二法比丘往白世尊世尊告曰若比丘於露地敷比丘僧牀豸席拘拓若坐若臥起後不自不教他人者墮佛世尊遊舍衛國祇樹給孤獨園時六群比丘於房中敷臥具起去後不坐具蟲食諸長者來房中見自相謂言此沙門釋子夜臥已不臥具使蟲噉食十二法比丘聞往白世尊世尊告曰若比丘比丘僧坐具於房中敷若坐若臥起後不自不教人者墮佛世尊遊舍衛國祇樹給孤獨園時尊者耶舍將五百衆從拘薩羅至舍衛國六群比丘自相謂言我等小避須此比丘掃灑房室敷坐具已我等當往問君為幾歲彼自當說爾許歲答言我等大君若不出者當強驅出伺諸比丘掃灑房室敷坐具已即往問君為幾歲答我爾許歲六群比丘言我大君促出去不須住此諸比丘不知當云何往白世尊世尊告曰若比丘至比丘房詐為瞋恚驅他使出若使人驅者墮佛世尊遊舍衛國祇樹給孤獨園有衆多比丘於講堂前夜敷坐具或禪或臥迦留陀夷從後至亦敷坐具臥時迦留陀夷詐囈喘喘息𢙣如厭喚呼手腳煩擾諸坐禪比丘不住即皆坐具避去諸十二法比丘聞往白世尊世尊告曰若比丘於房中先敷臥具若後有來強敷坐具若不憘我者自當出去及煩擾者墮佛世尊遊羅城迦蘭陀竹園所時新成重閣重閣上敷義足牀閣下有一比丘禪跋難陀釋子於閣上放身疾坐牀上牀足下陷蹄比丘頭破禪比丘即失聲喚衆比丘集問汝何以頭破具陳所由諸比丘不知當云何往白世尊世尊告曰若比丘上重閣上作尖足繩牀縱力坐若臥者墮佛世尊遊羅城迦蘭陀竹園所尊者闡怒以有蟲水灑地和泥諸比丘語闡怒汝無以蟲水灑地和泥闡怒佷戾不隨諫語諸比丘不知當如何往白世尊世尊告曰若比丘知有蟲水灑地若教人灑自和泥若教人和者墮佛世尊遊舍衛國祇樹給孤獨園有一摩訶盧比丘取檀越百千兩金作大講堂一日纍塗覆即夜𡶤壞其長者聞驚怪愁憂用乃爾所錢竟不成講堂即往具白世尊世尊因此事集和合僧備十功德佛為沙門結戒比丘作大講堂先作閾窗牖得通日光細泥塗地再三覆之重草蓋之若過三者貝逸提佛遊舍衛國祇樹給孤獨園時六群比丘次未應與比丘𡰱說法自往與說法十二法比丘聞往白世尊世尊告曰若比丘比丘僧次未差與比丘𡰱說法自往說法者墮佛遊舍衛國祇樹給孤獨園諸比丘次第與比丘尼說法尊者難陀次應直往而不肯行摩訶愛道瞿曇彌將五百比丘尼詣如來所頭面禮足在一面住時世尊與大愛道及五百比丘尼說微妙法說法已今正是時各還所在大愛道及五百比丘尼頭面禮足右繞三匝而去去不久顧問阿難次應誰與比丘尼說法耶阿難白佛言比丘僧已周次應難陀難陀不肯行時難陀亦在座上時世尊告難陀汝可往為比丘尼說法何以故我之說法汝之說法有何等異難陀聞佛教默然而受時尊者難陀平旦著衣持鉢入舍衛分衛分衛已還出城舉衣鉢舉座布著肩上入房坐禪時比丘尼衆聞難陀次來說法自相謂言難陀於夏四月讀一偈不能得欲云何與比丘尼說法難陀出靜室在堂前敷座具結跏趺坐時大愛道及五百比丘尼詣難陀所頭面禮足在一面坐時尊者難陀則入三昧以三昧力東沒西踊西沒東踊坐臥虛空身放種種光青黃赤白或琉璃色身下出火身上出水身上出火身下出水如是變化不可稱數還於本座上結跏趺坐難陀告諸比丘尼與汝說法善思念之云何諸妹眼有常無常耶答曰無常也難陀若無常者為苦不苦耶答曰苦也難陀若無常苦為變易法彼見諦人作是求言是我所非我所不耶不也難陀云何諸姓耳鼻舌身心有常無常耶無常也難陀若無常者苦不苦耶苦也難陀若無常苦變易之法彼見諦人作是求言是我所非我所不不也難陀何以故今如諦等智見眼無常眼識苦樂亦復無常如是耳鼻舌身心無常意識起想苦樂不苦不樂亦復無常善哉善哉諸妹如汝所言眼無常眼所識苦樂亦復無常如是耳鼻舌身心無常意識起想苦樂不苦不樂亦復無常云何諸妹眼因緣有識彼眼識者有常無常無常也難陀若無常者苦不苦耶苦也難陀若無常苦變易之法彼見諦人作是求言是我所非我所不不也難陀如是耳鼻舌身心心因緣有識生心識者有常無常無常也難陀若無常者苦不苦耶苦也難陀若無常苦變易之法彼見諦人作是求言是我所非我所不不也難陀何以故如諦等智見眼無常眼色識無常眼識起想苦樂亦復無常如是耳鼻舌身心法心識無常心識因緣生想苦樂不苦不樂亦復無常善哉善哉諸妹如汝所言眼無常色眼識無常眼識因緣起想苦樂不苦不樂亦復無常如是耳鼻舌身心法心識無常心識因緣起想苦樂不苦不樂亦復無常諸妹眼因緣色色因緣識三事共會有更云何諸妹更者有常無常無常也難陀若無常者苦不苦耶苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀如是耳鼻舌身心法心識心更心更者有常無常無常也難陀若無常者苦不苦苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀何以故如諦等智觀眼無常色眼識眼更眼更因緣起想苦樂不苦不樂亦復無常如是耳鼻舌身心法心識心更心更因緣起想苦樂不苦不樂亦復無常善哉善哉諸妹如汝所言眼無常色眼識眼更因緣起想苦樂不苦不樂亦復無常如是耳鼻舌身心法心識心更心更因緣起想苦樂不苦不樂亦復無常云何諸妹眼因緣色色因緣識三事合為更更因緣痛彼更痛有常無常無常也難陀若無常者苦不苦苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀如是耳鼻舌身心法心識心更心更所生痛有常無常無常也難陀若無常者苦不苦苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀何以故如諦等智觀眼無常色眼識眼更痛眼更痛因緣起想苦樂不苦不樂亦復無常如是耳鼻舌身心法心識心更心更痛無常痛因緣起想苦樂不苦不樂亦復無常善哉善哉諸妹如汝所言眼無常色眼識眼更眼更痛因緣起想苦樂不苦不樂亦復無常如是耳鼻舌身心法心識心更心更痛因緣起想苦樂不苦不樂亦復無常云何諸妹眼因緣色色因緣識識因緣更更因緣痛痛因緣愛彼眼愛者有常無常無常也難陀若無常者苦不苦苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀如是耳鼻舌身心法心識心更心更痛愛彼痛愛者有常無常無常也難陀若無常者苦不苦苦也難陀若無常苦變易法者彼見諦人作是求言是我所非我所不不也難陀何以故如諦等智觀彼法法自生法法自滅善哉善哉諸妹彼法法自生法法自滅如是諸妹六情因緣起想苦樂不苦不樂亦復無常諸妹譬如屠牛人若屠牛弟子執利刀殺牛剝皮取筋肉假假置著一處還以其皮覆上云何諸妹還得成牛不比丘尼答不也難陀何以故牛以分離實不像本所以引斯喻者當解此義如是諸妹牛者六情相因起想苦樂不苦不樂常住不滅無變易法作是等求者為可得道何以故如諦等智觀不見彼法法生不見彼法法滅所以引喻者觀意不聚如牛者六情無異如彼筋肉六塵是彼利刀者等智是何以故諸妹等智刀盡斷一切生死結不復生彼此界斷等斷善哉諸妹當作是學於染著法心不染著欲得息於牽連法心不隨瞋恚愚癡息次當學四意止七覺意八聖道八解脫門是故當學諸妹如是學者諸多陀竭阿羅訶三耶三佛皆從中出無數善法皆從三十七品中出常等心身無令中絶說是法時五百比丘尼得阿羅漢道見始變化時二百五十比丘尼得阿羅漢道其二百五十比丘尼迦葉佛時曾聞此法故今聞法得果難陀語諸妹今正是時各還所在時大愛道及五百比丘尼頭靣禮足而去明日大愛道及五百比丘尼平旦著衣持鉢詣如來所頭靣禮足却住一靣世尊觀諸比丘尼盡得道須佛告諸比丘尼今正是時各還所在諸比丘尼作禮已還去世尊告曰難陀明日復次與比丘尼說法時難陀默然受教難陀明日著衣持鉢入舍衛分衛分衛已還出城舉衣鉢洗手足以尼師檀著肩上入室坐禪出室於堂前敷座具結跏趺座瞿曇彌大愛道將五百比丘尼詣難陀所頭面作禮在一靣坐尊者難陀與說種種微妙法說法已竟今正是時各還所在諸比丘尼禮足而去時日入城門已閉或依樹下宿或住阜邊宿或依池水宿或依流水宿或依城池宿明日門開諸比丘尼入城其守門者自相謂言諸比丘尼是沙門婦城外共宿清旦來入其十二法比丘聞以是語往白世尊世尊告曰比丘僧次第與比丘尼說法不得至暮還至暮者墮佛遊舍衛國祇樹給孤獨園時六群比丘次應為比丘尼說法六群比丘作是自相謂言諸比丘所以為比丘尼說法者得好飲食故若不得者不與說法十二法比丘聞往白世尊世尊告曰若比丘作是語以飲食故比丘與比丘尼說法者墮佛在舍衛國祇樹給孤獨園時六群比丘與比丘尼同道行諸長者見自相謂言此沙門釋子與諸比丘尼同道行是沙門婦若非婦者何由同道行其十二法比丘聞往白世尊世尊告曰若比丘共比丘尼同道行從一村至村落內者墮或應共行者若有賈客前有虎狼賊得共行佛遊舍衛國祇樹給孤獨園時六群比丘從拘薩羅國來至舍衛時阿脂羅江須船爾乃得渡六群比丘與比丘尼同船或逆水上或隨水下經時日已沒便渡水各散去時比丘尼為賊所劫以此事具白世尊世尊告曰若比丘與比丘尼同船或逆水上或隨水下除直渡墮佛世尊遊舍衛國祇樹給孤獨園時迦留陀夷與崛多比丘尼衣著諸比丘尼問所由得此衣答迦留陀夷見施諸比丘尼往白世尊世尊告曰若比丘非親里比丘尼持衣施者墮佛世尊遊舍衛國祇樹給孤獨園時迦留陀夷使崛多比丘尼作衣諸比丘尼問與誰作衣答言迦留陀夷作衣諸比丘尼不知當云何往白世尊世尊告曰若比丘非親里比丘尼使作衣者墮佛世尊遊舍衛國祇樹給孤獨園時迦留陀夷與崛多比丘尼屏處坐諸比丘尼見往白世尊世尊告曰若比丘獨與比丘尼屏處坐者墮佛世尊遊舍衛國祇樹給孤獨園時迦留陀夷與佛陀優婆夷露處坐諸長者見自相謂言此沙門釋子云何與婦人露處坐十二法比丘聞往白世尊世尊告曰若比丘獨與婦人露處坐者墮上比丘尼妹佛世尊遊舍衛國祇樹給孤獨園有一優婆夷請摩訶迦葉舍利弗目揵連阿那律時長者婦饌具種種飲食敷好坐具時鍮羅難陀比丘尼先與長者婦善知識平旦著衣持鉢來詣此家見饌具種種飲食敷好坐具即問長者婦欲請阿誰作是好飲食敷好坐具長者婦答請摩訶迦葉舍利弗目揵連阿那律比丘尼語捨龍象而請騾驢長者婦問誰是龍象比丘尼答尊者調達騫陀達婆迦留羅提施三文陀糸頭此上人是迦葉最大先前入舍鍮羅比丘尼見來入語長者婦善哉優婆夷所謂龍象以至時長者俱聞此語便作是言惡比丘尼先言騾驢今言龍象耶去惡比丘尼莫復入此舍時長者見賢嚴坐定自行澡水布種種飲食飲食已竟重行澡水已在一靣坐聽達嚫摩訶迦葉說達嚫已即從坐起去詣如來所頭靣作禮在一靣坐以此事具白世尊世尊因此事集和合僧備十功德佛為沙門結戒若比丘知比丘尼譽一比丘僧毀一比丘僧往彼飯者調達婆兒阿難妹也波逸提佛世尊遊王舍城迦蘭陀竹園所當於爾時人民飢饉乞求難得諸長者或請一比丘或請兩比丘其不請往者或四或五諸長者見自相謂言此沙門釋子不知猒足無有慙愧其請一者五三自往十二法比丘聞往白世尊世尊告曰若比丘不請強往者墮或時應往或病或執僧事作衣此應食佛遊舍衛國祇樹給孤獨園拘薩羅界有一長者起招提僧舍其有客比丘得一日食時尊者舍利弗遇病從拘薩羅至舍衛國過此僧舍住三宿食時舍利弗便發去至舍衛國祇樹給孤獨園便懷狐疑我不過食招提僧食耶往白世尊世尊告曰若比丘無病得一宿住食若過食者墮佛世尊遊舍衛國祇樹給孤獨園有多比丘從拘薩羅詣舍衛國有長者中道請飯豐饒酥酪時六群比丘兩三鉢盛下行比丘不得諸長者見自相謂言此沙門釋子重疊兩三鉢盛下行比丘不得往白世尊世尊告曰若比丘請入舍長者設好食酥酪豐饒不得兩三鉢盛犯者墮若兩三鉢取出外當等分與不得比丘佛世尊遊舍衛國祇樹給孤獨園時舍衛國有一長者居門衰喪唯有一少男兒在後此少兒聞其飯佛及比丘僧者得生三十三天第二天我當往行出筋力作所得錢財當飯佛及比丘僧即往詣比舍語一長者作是語我欲客作為可爾不長者答須幾許物少兒言與我五百兩金自當竭力作使長者便思惟如今人飢饉乞求難得乞一食者尚不可得況爾所兩金長者問少兒能何等作為少兒答能坐金銀銅鐵綿絲肆要不取價竟十月已長者便作是念或有人先索價却作使今此少兒先與人使却乃索直即使知金銀肆是少兒宿有福德常人坐肆得一倍利此少兒得八倍十倍長者便作是念得此少兒是我之幸常人坐肆得一倍利此少兒坐肆得八倍十倍利次使知銅鐵綿絲肆皆爾獲利次使知田業常人耕種得一倍利此少兒得八倍十倍利十月期盡即從長者索直時長者不為不欲與正欲與恐少兒去復重再三索為欲與我不長者問得此金用作何等少兒答我聞飯佛及比丘僧得生三十三天所以客作欲飯佛及比丘僧願見時與長者便作是念怪此少兒為佛及比丘僧執此勤勞即問少兒汝欲飯佛耶答言飯佛奈得薪草釜竈器皿及人力可即於此閒飯佛及比丘僧二人俱時得福少兒答亦可爾耳長者語汝自往請佛及比丘僧即詣世尊所頭靣禮足在一靣坐世尊與說法說法已默然時少兒即從坐起偏袒右肩右膝著地叉手向佛白世尊言欲設微供願佛及比丘僧臨顧須時世尊默然受請少兒見如來默然可之即起頭靣禮足而去即夜具種種飯食敷好座具往白世尊飲食已辦今正是時比丘僧往世尊住別送食來僧詣長者家各次第坐坐定少兒自手行水布種種食時是月八日國俗此日食先亡者以殘食施諸比丘僧諸比丘僧食已至少兒家略不食諸比丘同聲語行食人稍下少兒見飲食不減便作是念比丘僧不食者我必不生三十三天涕泣詣如來所白世尊言比丘僧食少不多比丘不食者我必不生三十三天世尊告曰汝往稍益食必生三十三天無疑少兒復作是念如來廣長舌言必得生三十三天歡喜踊躍不能自勝即頭面禮足繞佛三匝而去往詣比丘僧所比丘僧食竟行澡水已在前長跪受呪願上坐呪願已便去即日有五百賈客入海還歸最大導師入城求食問行路人誰家有食賣行人答言某長者家今日飯佛及比丘僧必有飲食導師即詣此舍語守門者言汝往白長者外有入海導師欲得相見守門者即為白長者出迎共相問訊𢯇引入坐須起語長者言承有飲食賣當送直時少兒在一靣坐長者答此非我食指言此檀越食也復問少兒有食見與當送直答言我食不賣若須者便相呼入坐當相供給不須直即往呼伴入坐少兒自手行水布種種食賈客食訖少兒還就牀坐去少兒不遠有拘薩羅碼瑙揵茨拘薩羅國大故稱丁未歲高麗國大藏都監奉𠡠雕造
