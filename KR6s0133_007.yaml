body:
  text: 沙門守其等奉勑挍勘蘇悉地羯囉經卷中大唐中天笁三藏輸波迦羅譯扇底迦法品第十三扇底迦法補瑟徵迦法阿毗遮嚕迦法前雖通說猶未能周今更重宣廣其義理此三種法速成者應當如法次第行之若扇底迦念誦及作除災護摩法者歸命三寶深起慈心於白月一日黃昏之時起首念持成扇底迦法於此之時淨居天下遊歷人間以天福祐速得𢘡地身著白衣坐俱尸草以面向北身心寂靜作扇底迦先取未經墮地牛糞三時塗地普散白花若作護摩先辦小麥乳酪稻穀花油麻青舉慮草鉢孕瞿花粳米飯以乾白花及乾花蘂用閃木或用諸樹膠香或用夜一爾迦木或用諸乳樹木應取樹梢枝不應弃應量截之或用酥蜜此護摩具遍通諸部若於本法有所說者應當依之作扇底迦取乳樹木相揩取火或應取處取來護摩作扇底迦當速成就以一搩手截乳樹枝酥蜜乳等器內相和乾乳木著火護摩或於蘭若淨處有乾牛糞生火勝上或閃木或諸香木作扇底迦薪如一肘量團作爐其地上白處淨坑深十二指以大母指量之坑上作椽皆四指量坑中四寸量作輪輪高一指量持誦之人結加趺坐所緣事如其本部法如依供養作供養佛慈復怛他多嗗㗚囊引勝真言妃波若波羅蜜佛眼次獻辟支佛阿羅漢衆次供淨居天次難陀烏波難陀龍王等本真言主當中佛坐左佛慈佛母普賢勒虛空地藏除蓋障等菩薩即次安坐辟支佛等及淨居天等乃至門西難陀龍王其右相如來毫般若大佛頂若也佛頂微若也佛頂帝殊囉施蘇悉地羯囉經補瑟徵迦法品第十四補瑟徵迦法時心懷踊躍或誦持護摩應依本部從白月十五日起首至後白月十五日為終仍依當部而作補瑟徵迦復從寅時起首終日中止一隨本情於此時起首者當爾之時諸尊天衆遊觀於世復有帝釋等天及諸法天於彼之時降臨察世見興善者心懷歡喜能滿其願持誦之人至於此時應當至誠不應懈怠身著白衣以面向東半加而坐作補瑟徵迦以諸美香三時塗地於其地上遍散雜色花若作護摩應依此作以稠乳粥或酥乳蜜或酥蜜酪并苣蕂四物和作或用單酥或用空酪或用沒多補澀波或用尾螺果或用粳米或用囊伽汁薩花或用蓮花或用揭㗚𡰱上迦花隨各取一搵蘇護摩或用酪飯或諸種子隨取其一諸乳樹枝如前等物如本法作補瑟徵迦取剎帝利家火或於王宮取林木相揩出火或取大火得此火者皆悉吉祥木一握長一肘量搵酥乳酪而作護摩先取乳木生火令著或用花果樹木作生火薪於黑土地如無此地外處取黑土填坑於上穿爐須方二肘深一肘量坑中作一蓮花量如兩指折高四指量椽闊一搩手於其內外塗以黑土依於本部如法作之諦想本緣時無閒忘作補瑟徵迦當前置觀世音菩薩右邊大勢至於此左邊置觀世音持明王等右邊悉達他持明王仙於此左邊置菩薩於此又置七吉祥等天次持明王次置梵天與梵天衆圍繞為求願故亦任供養藥叉阿利底大仙蓮花部中諸天仙衆各依法作先自灌頂然後念誦作補瑟徵迦求覓長年或求齒落令生髮白更黑或求身支肥悅福力增加或求種種諸德心所希求作如是願者名補瑟徵迦蘇悉地羯囉經阿毗遮嚕迦品第十五阿毗遮嚕迦者心懷瞋怒瞋彼所治自無恐怖應作此法以忿怒真言而念誦之或作護摩不擇時日亦不作齊忿怒之時應當起首若看時日以黑月八日或十五日於日中時或於時日毗舍諸鬼及與部多羅剎等衆集會一處或遊歷於方所於此之時作阿毗遮嚕迦者忿怒心生易得成就諸餘鬼類助持誦者使忿怒增所作之事速得成就身著赤衣或青色服水灑令濕而以著之作極忿事以自血灑令濕之以右腳踏左腳上面向南住怒目不齊精眉閒瞋囓其牙齒作大聲音自想己身此部之主身意勞苦堪能忍之如依此法次第作阿毗遮嚕迦日別三時取於黑土塗漫茶羅或用驢糞或駝羊豬狗糞或燒死尸灰獻以赤色香之花或獻臭花或青色者或獻諸穀麥豆之糠護摩之時用白芥子或芥子油或自身血或復用鹽或用芥子或苦楝或復用灰或足底塵或用驢糞或駝狗䐗羊糞或人糞等或用毛髮搗碎用之或用烏𣬹或𩿒鵰鷲鸛鵲鳥等或用其𣬹或用毛羽或用如上禽獸脂等或用𣗥㓨或破瓦器或諸骨散或用犬肉或猪肉等或俱尾那木或苦楝木或燒尸木或燒尸殘木或有㓨木或佉陀羅木仍依法截而用護摩如上等類隨所用者皆應和以毒藥及自身血鹽等三種或所作諸事應稱彼名取焚尸火或旃茶羅舍火或敲骨石取火前所說樹取彼根木十指量截皆須擘破其兩頭使令尖塗其毒藥并芥子油著火之時用乾臭辛樹木或擎尸木或燒尸殘木先用著火於黑土地穿三角爐一角向外三角中閒各長二十指深十指量椽闊三指以焚尸灰塗之爐底作八指量拔折羅高三指量以焚尸灰作或用諸糠或用炭作或取護摩物作謂毒藥諸糞芥子及鹽等作彼怨形片割彼形而作護摩或用左腳踏形心上而作護摩護摩既爾念誦亦同或以刀割分支或用杖鞭打或用皂莢㓨或佉達羅木作杖打之遍通諸部並法如前本法自宣應當依用如前廣說依法護摩所作事緣心不應忘作是法時先供養大忿怒金剛并諸眷屬皆供養之先置折羅央俱尸持明妃次置俱里舍沒寧此云食金剛者持明王次摩訶麼哩此云大死持明王次設多乞使答此云百眼持明王次龍鳩盤茶羅剎娑等應用扇底迦真言先護自身如法辦供作阿毗遮嚕迦於諸怨處令彼支分相離或徙移本處或親者相憎或令彼重病或令眷屬離散或令彼頑愚或作種種諸餘𢙣事作如此法號阿毗遮嚕迦行此𢙣事懲罰𢙣人於三寶所懷起𢙣心或求其過欲令彼等現世微苦免地獄難見諸衆生造種種罪或犯菩薩清淨律儀或謗三寶或於師長作違逆事為愍彼故作阿毗遮嚕迦作此法時須依本部不得擅意用忿怒真言或用諸𢙣羅剎等真言或用鉢史使真言作此阿毗遮嚕迦作此法已懲罰人𢙣所願既畢盛其怒目視而加困篤者將死不久者速應作扇底迦然後徐作補瑟徵迦此法不應作之若欲作時應用羅剎等真言為佳或依本法縱是佛部真言亦無所畏若作此法治行𢙣人心無恚恨具大慈悲慮彼𢙣業因緣長時受苦尓若常行是𢙣唯長苦因欲與彼永世安樂故應作此法須發瞋心行𢙣之人應墮地獄為欲除去地獄苦故諸真言主作是方便而救護之觀彼𢙣行業有輕重隨對治之不應輕罪致令至死以治彼故令他苦痛過分為令彼歡喜故應作扇底迦法當爾之時或就彼爐或更別作以乳護摩成扇底迦用阿毗遮嚕迦真言去彼訶那訶那波者波者麼囉麼囉等名字安扇底矩嚕名即成扇底迦法既回心已思念菩提心發菩提心於諸衆生常懷饒益豈可合行如此法耶如佛經教若人懷瞋作地獄業智者速應起慈善心若欲速成作扇底迦法應就舍利塔前作補瑟徵迦法於池側作阿毗遮嚕迦法於寒林中如是之處當速成就蘇悉地羯囉經分別成就法品第十六亦名悉地相品復次悉地成就乘空而進此為最上藏形隱跡為中成就世閒諸事為下悉地上中下成有此三種乘空隱形世閒事等三種成就隨上中下更分別之三部上成我今重演持明仙乘空成就五通及有多種或得諸漏盡或辟支佛或證菩薩位地或知解一切事或辨才多聞或成就吠多去羅尸或成就藥叉尼或得真陀摩𡰱或得無盡伏藏具如上等事為上中上成就次說三部之內中成就法隱形藏跡身得大力先來懈怠而得精勤入修羅宮得長壽藥成鉢史迦天使或能使鬼或能成就娑羅坌爾迦樹神或成多聞未經所聞深知義理或合藥成才塗足頂縱遠所涉無有疲乏如上所說悉地名中上成就次說下中成就法以真言力所令衆喜見或攝伏衆人或能懲罰𢙣人降諸衆怨及餘下事為上中下若欲成就藥拘等者有三種成光焰生為上煙氣為中熅暖為下復次聖者真言為上成就諸天所說名為中成就世天真言為下成就復次佛部真言為上悉地蓮花部真言為中悉地金剛部為下悉地若欲以上真言欲求下者得下成就或以下真言欲求上者得上成就或以用中真言成上下者亦等真言之中具此四德當知真言上中下分能成大果報謂滿辟支佛位滿足菩薩十地乃至成佛為大果報復成大德行謂多諸眷屬前後圍繞滿如是願者為大德行復能久住位謂得勝處轉輪處長壽之仙滿如是願者為久能住位復形儀廣大謂威光遠照為形廣大具此四德者雖是下品真言能成上品上品之中其不具此德雖是上品真言者下品用也諸佛菩薩所說真言如是轉次多佛菩薩所說之者雖是屬下品亦能成就上品等事或尊等所說真言之中唯具一事者謂扇底迦法補瑟徵迦法阿毗遮嚕迦法雖具一事於中各有上中下品豈有下品真言能成上事猶青泥中出妙蓮花固無疑也豈有上品慈善真言能成忿怒下品成就如白檀木其性清涼若風擊相揩自然火起非無因緣也如是差㸦雖非次第諸餘悉地皆勿疑慮也身分悉地為上品成諸藥悉地為中品成富饒悉地為下品成若復有人久來持誦下品真言雖縱自無力於本尊邊轉求上品而相惠之若於上品真言之中心懷猶豫念持供養復不精誠雖是上品真言由彼念誦心輕感招下品成就故知持誦皆由心意且如諸天之中亦有貧者諸鬼部內亦有富強此彼如然真言亦爾一一真言皆具三悉地謂上中下誠心念誦皆獲悉地蘇悉地羯囉經奉請本尊品第十七復次若欲入本尊室先覩尊顏合十指爪當小低頭復以器盛淨水隨所作事置本獻花復置塗香依於本法而作閼伽燒香熏之應誦真言七遍而加持之取此奉請既奉請已後當依法供養盛閼伽器當用銀或用熟銅或以石作或以土木或取螺作或用束底或用荷以綴作器或乳樹如上所說閼伽器等當用之時須知次第若扇底迦當用白器補瑟徵迦當用黃器阿毗遮嚕迦當用黑器作上中下悉地成就類前所說應可用之作扇底迦所用閼伽置少小麥補瑟徵迦應著胡麻阿毗遮嚕迦當置粟米又扇底迦置乳補瑟徵迦著酪阿毗遮嚕迦應置牛尿或著自血遍通用者應著稻花塗香及花胡麻茅草環用熟銅器盛以閼伽若無此器隨所得者亦遍通用請召之時應用當部明王真言及慕捺囉若有本法已說召請真言應當取用無煩別者先請當部尊次請明王妃三部之中皆應如是本法若無請召真言應用明王等真言而請召之本法雖說請召真言既是下劣豈合請於部主若以本法真言請召當速成就不應生難也本法若有請召真言及發遣者當請之時此真言主至部主所請云今有某甲為某事奉請若發遣時亦復如是所作事已願尊證知隨意而去明王妃真言用請女仙等明王真言請諸真言主或有真言主不受明王真言所請要以明王及明王妃真言然可依請如別部說置閼伽時應誦真言大者一遍中者三遍下者七遍極小者聽誦二十一遍如上所說閼伽法則先兩膝著地應須手著淨茅草環如前已說手持閼伽燒香熏之作如是請仰唯尊者以本願故降赴道場願垂哀愍受此閼伽及微獻供有真言主名曰獨勝奇加忿怒不受諸餘真言召請用彼所說真言然降所請彼請眷屬亦不受於餘真言請亦應用彼眷屬真言而請召之但緣請召用心真言或說根本或明王妃所說真言而用請召部心真言遍通三部用彼請召當應降赴加翳䤈字此更祕密速滿其願當此之時誠心作禮再三啓白大慈悲者請依本願來降道場若不誠心徒多念誦乃至真言亦皆殷重以用兩手捧閼伽器頂戴供養為上悉地置於心閒為中悉地置於臍閒為下悉地先觀本尊彼所畫像其像若立持誦之人亦應立請㡧像若坐亦應坐請又觀彼像曲躬立勢亦應效之而奉請之當請之時先觀本尊所止之方而向彼請然便回身置閼伽器於尊像前復有祕密復觀所作扇底迦等諸餘方所而請召之或於餘時得諸花果稱本尊意應須奉請然可獻之當請之時合手爪指隨於本方但至誠心奉請或以兩手而捧請或閼伽器而請召之然後應獻所得之物若欲成就上中下事及扇底迦等皆須加以真言及慕捺羅而作請召作成就諸餘事等或有障起或有魔興或病者加苦當爾之時事緣既速不可當時辦閼伽器便用心啓請本尊作除遣法如上所說隨其大小擬欲成就閼伽請之急難等事誠心請之若復有人欲得歸仰諸部尊者應當作召請法則持誦之人速得成就蘇悉地羯囉經供養次第法品第十八亦名念誦法復次奉請尊已次依部類或諸事業觀其大小依於法則而供養之既說奉請已作如是言善來尊者愍我等故降臨道場復垂哀愍當就此座坐受微獻供復起誠心頻興作禮而白尊言大悲垂愍以本願故而見降臨非我所能請本尊者如是三時皆應依此如前已說應須辦供先獻塗香次施花等後獻燒香次供飲食次乃然燈如其次第用忿怒王真言此等物清淨善恱人心各用本色真言而真言之獻塗香已各列其名如依前說即奉閼伽如是花香及飲食等皆亦准此塗香燒香花及飲食無可獻者但誦本色真言及作手印以此獻之表云無可求得但納真心後作閼伽以真心故速滿其願離此之外有四供養遍通諸部一切處用一謂合掌二以閼伽三用真言及慕捺囉四但運心此善品中隨方應作或復長時供養中最無過運心如世尊說諸法行中心為其首若能標心而供養者滿一切願若欲成就諸餘事者應當發遣諸為障者若不遣除後恐傷及所以先須作遣除法誦忿怒真言或用當部成辦諸事真言誦此遣除先次應誦本部尊真言而加持水遍請護摩及作手印等佛部真言曰唵怛他去妒挪婆二合嚩引也莎去訶蓮花部尊真言曰唵鉢挪謨二合挪婆二合嚩引也莎訶去金剛部尊真言曰唵嚩日嚕挪婆二合嚩也莎訶或用部心真言佛部心真言曰尓囊上邇迦輕呼蓮花部心真言曰阿𡀔力迦輕金剛部心真言曰嚩日囉二合特嘞二合迦輕或用此真言或用部尊遍灑花等復用吉利枳羅忿怒真言及印口誦真言左手作印遍印塗香燒香飲食花等方始得淨除穢為自身淨故以其右手盛掬香水眼觀香水而誦心真言灌自身頂自身清淨除穢復用一切事真言并忿怒真言此為淨座故真言香水而用灑之又誦七遍普灑地方能除諸穢而得清淨吉利枳羅真言曰唵枳里枳里嚩日囉二合嚩日里二合部囉滿二合䭾嚩𤙖泮吒二合此上真言護地方訖結虛空界應用次下蘇悉地真言燒香手執口誦真言熏馥空中穢𢙣能除便得清淨蘇悉地真言曰唵蘇悉地羯哩若嚩二合里多去難慕輕囉多上二合曳若嚩攞若嚩攞滿䭾滿䭾賀囊上賀曩上𤙖泮吒此上金剛部蘇悉地真言遍通諸事結空界用次說佛部結空虛真言曰若嚩二合羅𤙖此上佛部結空界真言唯通當部次說蓮花部結空界真言曰唵鉢特弭二合寧上薄伽輕嚩底丁以反謨賀也謨賀也若怛謨賀寧上莎去訶去此上蓮花部結空界真言唯通當部次應當用部心真言呪香水散灑諸方復以明王根本真言或心真言或真言主使者心真言隨取其一用結方界以此諸心真言而作結界所結之處如置垣牆當部仙天常當護衛無能作障諸部諸事有為障者應依甘露軍茶利法而遣除之有五種護衛法常於道場室內恆須作之謂金剛牆金剛梁金剛橛忿怒吉利枳羅忿怒甘露軍茶利金剛牆真言曰唵薩囉薩囉嚩日囉二合鉢囉引二合迦引㘕𤙖泮吒金剛梁真言曰唵微娑普二合囉囉乞沙二合嚩日囉二合半若囉𤙖泮吒二合金剛橛真言曰唵枳里枳里嚩日囉二合嚩日利二合部囉滿䭾滿䭾𤙖泮吒忿怒吉利枳羅真言曰唵枳里枳里句𡀔二合䭾𤙖泮吒忿怒甘露軍茶利真言曰囊謨囉怛囊上怛囉二合夜也囊上莽室戰拏嚩日囉二合簸儜曳囊謨上嚩日囉二合句𡀔二合䭾引也能去瑟吒嘮三合得羯吒婆去也珮囉縛引也阿徙母薩羅鉢囉戍簸捨賀娑多去二合唵暗沒㗚二合多軍去拏里佉佉却引䤈却䤈底丁以反瑟咤底丁以反瑟吒滿䭾滿䭾賀囊上賀囊上囉若二合微娑鋪二合吒也微娑鋪二合吒也薩囉嚩二合尾近囊上二合尾囊亦劒莽阿去言上儜上鉢底餌尾旦引多迦囉引也𤙖泮吒二合莎訶去或若於本法之中有如是等金剛牆真言重應結之諸事既了次應持誦持誦之時先誦當部母真言佛部母真言曰囊上謨上薄伽嚩帝烏瑟𡰱去二合沙去也唵嚕嚕娑普二合嚕苦嚩二合羅底瑟咤二合悉䭾路者寧去薩囉嚩引二合囉他二合娑去達寧上莎訶去蓮花部母真言曰囊上謨囉怛囊上怛囉二合夜也囊上莽阿去哩也二合縛路枳帝濕嚩二合囉引也菩地薩怛嚩引二合也莽訶去薩怛嚩二合也莽訶去迦引嚕𡰱上迦引那囉舍二合囊上娑莽㗚三合囉舍二合囊便室囉二合嚩娑莽二合囉囊上者瀉莽含薩囉嚩二合薩怛嚩難去薩囉嚩微也二合地指枳瑳上迦怛你也二合他唵迦𪘨微迦𪘨迦吒微迦吒迦揁吒痛反迦𪘨婆伽輕嚩底丁以反微若曳莎去訶去金剛部母真言曰囊上謨上囉怛囊上一合怛囉二合夜也囊上莽室戰拏嚩日囉二合簸儜上曳莽訶上藥乞沙一合細囊鉢多上曳唵俱上蘭達哩滿䭾滿䭾𠵵泮吒二合先誦此母真言故能衛本尊復令罪滅能除諸障與悉地門相應但誦忙麼雞真言亦通於二部初後持誦諸天增衛若於本法而已說者持誦之時先念此者應隨本法而念誦之或於本法有獨勝真言亦應先誦無煩別者如上所說供養次第乃至除穢護淨結界等事初持誦時及作法時扇底迦等所作事時皆應作之若以部尊主真言或以部心真言或以一切真言王真言或以蘇悉地法王真言或以一切事真言此五種真言三部遍有隨作諸事各於本部應取其一而用作之所謂護己及請召灑水作淨結諸方界以法相治真言不真為增力故為治罰真言故為發覺故及餘諸事所不述者亦以當部五真言中隨取其一而以用之當速悉地部心真言能護本尊及護己身護身之時應誦三遍或經七遍結其頂髮而作一結若出家人結袈裟角或結護身線或直呪頭七遍點五處亦成護身所謂頂兩肩膊咽下心上或用牛黃或白芥子或閼伽水隨取其一而用護身若作阿毗遮嚕迦法應用部尊主真言而護自身若作扇底迦法應用忿怒金剛真言護之若作補瑟徵迦法應用部尊主真言及忿怒金剛二真言兼而護之若真言主現時持誦人怖者應用部尊主真言用護自身但作諸事之時常以二真言而護自身謂部尊主及忿怒真言念誦了時應當發遣發遣之時護彼真言主或部尊主真言或用部母或以部心亦護自身而作隨意若於穢處不淨等處緣事須往先誦烏樞澀摩真言作印印其五處任意而往仍須常誦其真言不得廢忘澡浴之時先誦伏障真言護身乃至浴了已來不應廢忘伏障真言者軍茶利也喫食之時用部尊主真言護身念持欲臥之時用部母真言護身若作諸法遂乃忘作護持法則令使魔興欲除魔故速應誦持當部明王真言將護自身一切魔障不得其便如上所說護身結界及餘法等已然後攝心安詳念誦念誦之人所須之座以青茅草而作其座座高四指闊一搩手長十六指如此之座初念誦時及持誦時皆應受用或用迦去聲勢草或餘青草等或隨部法而取乳樹以用其木最為要妙用作床座量如前說而淨剗治或用諸或以枝莖如上而制隨觀事法取枝用為座於彼座上結跏趺坐作扇底迦及上成就半跏趺坐作補瑟徵迦及中成就垂兩足坐作阿毗遮嚕迦及下成就供養既了應起誠心讚歎於佛次歎法僧次觀自在次歎明王大威金剛亦如是讚大悲救衆生善導一切智福持功德海我今頂禮佛能淨貪瞋毒善除諸𢙣趣一向真如理我今禮彼法得彼解脫門善住諸學處勝上福田德我今禮彼僧諸佛同讚歎能生種種福號為觀自在我今稽首禮大力忿怒身善哉持明主降伏難降者我今稽首禮如是虔誠讚歎佛菩薩已復合指掌起殷重心讚諸佛德及餘菩薩其讚歎文應用諸佛菩薩衆等所說歎文不應自作讚歎既已起至誠心懺悔諸罪我今歸命十方世界諸佛世尊羅漢聖僧及諸菩薩證知我等自從過去及以今生煩𢙉覆心久流生死及以餘生貪瞋癡覆造諸𢙣業或於佛法及以聖僧或於羅漢菩薩聖衆或於父母及尊者處及餘衆生有德無德於如上處造諸𢙣業自作教他見作隨喜身口意業廣聚諸罪對諸佛菩薩前合掌誠心頂禮如是頻懺以不善業所造衆罪如法佛知並皆懺悔起至誠心盡形歸命佛法僧寶涅盤正路為除衆生生死苦故歸命三寶起重心如是歸依頭面作禮次復起誠心求勝上子解脫甘露果應懷踊躍發菩提心求悉地果世界衆生無量法苦我當除滅復度令離一切𢙣趣於諸煩𢙉令得解脫所有衆苦種種煎迫而起大悲發菩提心苦𢙉衆生中為作歸依無主衆生我當為主失路衆生為作導師恐怖衆生為作無畏苦𢙉衆生令得安樂衆生諸煩𢙉逼我為除滅之我今所作諸餘善業及發勝心所生功德回施一切衆生歸於正路所造六波羅蜜門及餘所造諸福回與衆生同歸勝果自從過去現在未來略而言之所作勝福盡皆回施一切衆生速成佛道乃至菩提不生懈怠而起發菩提心悲念諸衆生起大慈心彼有衆苦何時除滅為淨心故常持六念念六念時專注一境而不散亂不應我執又如過去諸佛發願應如是發願所生諸淨業回施衆生成就諸德復願我所生功德願一切衆生獲無盡財復能捨施增益智慧成大忍辱常修善品常宿命智常懷大悲諸衆生類所生之處具如上事次應合掌頂禮部尊主憶念明王次依法則作諸事業先以右手而取數珠置左手中合掌捧之思念明王為用數珠故而誦真言金剛部真言曰囊上謨上囉怛囊上二合怛囉二合夜也囊上莽室戰二合拏嚩日囉二合𥳽儜上曳莽訶去藥乞沙二合細囊鉢多上曳唵枳里枳里嘮捺哩二合𡰱上莎去訶去佛部真言曰囊上謨上囉怛囊上二合怛囉二合夜也唵閼那輕部二合帝微若而也反曳悉䭾引囉替二合莎訶丁未歲高麗國大藏都監奉勑彫造
