body:
  text: 沙門守其等奉勑挍勘籍函本事經第三卷此一卷經國宋則同同有四十三假丹本唯有十八假耳多少如是不同文義始終逈異如何去取今撿國宋本經有四大錯丹有二事以知其正何則此卷品名既是二法則應始終唯説二法而國宋本經四十三假皆是一法則名義不相當是一錯也又國宋本卷初二假及第三假前六行文即是諸本初卷三幅心意經一假十二行耳國宋於此三重重寫是二錯也第三假中一類有情已下即是諸本初卷七幅破僧經一假十七行耳國本於此重重寫之其乃至於四十一重是三錯也其卷末頌云貪欲瞋恚癡覆藏及惱忿不恨嫉與慳耽嗜慢將害者即是諸本第二卷九幅結經頌正云貪恚及愚癡覆藏惱忿恨嫉慳與貪嗜慢害將一切之小訛變耳宋本於此間重寫之是四錯也故知大錯耳今此丹本十八假經始終成就二分終至二果二緾皆是二法即與品目名義相當是一正也又按諸本第四卷中七幅有結頌云為通達律儀猒知不淨果緾覺悟宴坐愧所作尋求者則結十二經為一頌其覺悟已下五經即是諸本第四卷卷初五經其緾經果經已上七經即是丹本此卷卷末七經耳則列結相應是二正也餘本則非故今取此丹本為正又為看舊國宋藏者具録正經于左本事經卷第三籍大唐三藏法師玄奘奉詔譯二法品第二之一吾從世尊聞如是語苾芻當知若有苾芻成就二分於現法中多諸憂苦無喜樂住有災有患有惱有燒有罪有責為諸有情同梵行者之所訶毀身壞命終生諸𢙣趣云何為二一於根門不能守護二於飲食不善知量諸有苾芻成就此二於現法中多諸憂苦無喜樂住有災有患有惱有燒有罪有責為諸有智同梵行者之所訶毀身壞命終生諸𢙣趣爾時世尊重攝此義而説頌曰若不能守護眼等六根門飲食不知量成不信懈怠彼於現法中身心多受苦及有災有患有惱有燒然行住與坐臥若覺若夢中由彼二因緣恆有罪有責居聚落空間衆中及靜處有智常訶責當生𢙣趣中吾從世尊聞如是語苾芻當知若有苾芻成就二分於現法中多諸喜樂無憂苦住無災無患無惱無燒無罪無責為諸有智同梵行者之所稱讚身壞命終生諸善趣云何為二一於根門能自守護二於飲食能善知量諸有苾芻成就此二於現法中多諸喜樂無憂苦住無災無患無惱無燒無罪無責為諸有智同梵行者之所稱讚身壞命終生諸善趣爾時世尊重攝此義而説頌曰若自能守護眼等六根門飲食善知量成就信精進彼於現法中身心多受樂及無災無患無惱無燒然行住與坐臥若覺若夢中由彼二因緣恆無罪無責居聚落空間衆中及靜處有智常稱讚當生善趣中吾從世尊聞如是語苾芻當知有二種法能生焦惱云何為二謂有一類補特伽羅唯造衆𢙣唯作凶狂唯起雜穢不修衆善不習調柔不救怖畏彼於後時身嬰重疾遍體發生增上猛利嚴切苦受楚毒垂終不可醫療受此苦時呻吟怨歎作是念言我從昔來唯造衆𢙣唯作凶狂唯起雜穢不修衆善不習調柔不救怖畏若諸有情唯造衆𢙣唯作凶狂唯起雜穢不修衆善不習調柔不救怖畏彼之所趣我定當往彼由唯造衆𢙣等故心生焦惱及以不修衆善等故心生焦惱如是名為有二種法能生焦惱爾時世尊重攝此義而説頌曰有二法能生愚者心焦惱謂唯作罪業及不修福因後遭病苦時呻吟而怨歎恨有罪無福心悔惱焦然有罪無福人所生諸𢙣趣我亦當隨往決定無有疑吾從世尊聞如是語苾芻當知有二種法心不焦惱云何為二謂有一類補特伽羅唯修衆善唯習調柔唯救怖畏不造衆𢙣不作凶狂不起雜穢彼於後時身嬰重疾遍體發生增上猛利嚴切苦受楚毒垂終不可醫療受此苦時雖有呻吟而無怨歎作是念言我從昔來唯修衆善唯習調柔唯救怖畏不造衆𢙣不作凶狂不起雜穢若諸有情唯修衆善唯習調柔唯救怖畏不造衆𢙣不作凶狂不起雜穢彼之所趣我定當往彼由唯修衆善等故心不焦惱及以不造衆𢙣等故心不焦惱如是名為有二種法心不焦惱爾時世尊重攝此義而説頌曰有二法能生智者心歡喜謂唯修福業及不作罪因後遭病苦時呻吟無怨歎慶有福無罪不悔惱焦然有福無罪人所生諸善趣我亦當隨往決定無有疑吾從世尊聞如是語苾當知為汝略説二速通行云何為二一者樂行二者苦行謂由樂行證彼速通及由苦行證彼速通所修加行無歰難故所得諸根皆猛利故是則名為樂速通行所修加行有歰難故所得諸根皆猛利故是則名為苦速通行是名略説二速通行爾時世尊重攝此義而説頌曰今為汝略説二種速通行謂樂行苦行因斯證速通無歰難加行有猛利諸根由是大仙尊名樂速通行有歰難加行有猛利諸根由是大仙尊名苦速通行吾從世尊聞如是語苾芻當知為汝略説二通行云何為二一者樂行二者苦行謂由樂行證彼通及由苦行證彼通所修加行無歰難故所得諸根皆羸鈍故是則名為樂通行所修加行有歰難故所得諸根皆羸鈍故是則名為苦通行是名略説二通行爾時世尊重攝此義而説頌曰今為汝略説二種通行謂樂行苦行因此證遲通無歰難加行有羸鈍諸根由是大仙尊名樂遲通行有歰難加行有羸鈍諸根由是大仙尊名苦遲通行吾從世尊聞如是語苾芻當知若有一類補特伽羅成就二法不能發生白淨善法設已發生不能決定設已決定不能圓滿彼於如是白淨善法能為障礙能作𮕱能生憂悔身壞命終如棄重擔墮於地獄受諸劇苦云何為二一者𢙣戒二者𢙣見諸有一類補特伽羅成就如是所説二法定不能生白淨善法設復已生不能決定廣説乃至身壞命終如棄重擔墮於地獄受諸劇苦爾時世尊重攝此義而説頌曰若成就二法謂𢙣戒𢙣見彼人終不能生白淨善法雖生而不定設定不圓滿於白淨善法能𮕱障礙彼臨命終時有憂悔悲惱如棄捨重擔定生地獄中吾從世尊聞如是語苾芻當知若有一類補特伽羅成就二法定能發生白淨善法若先已生能令決定若先已定能令圓滿彼於如是白淨善法不為障礙不作衰不生憂悔身壞命終如棄重擔生天趣中受諸快樂云何為二一者善戒二者善見諸有一類補特伽羅成就如是所説二法決定能生白淨善法若先已生能令決定廣説乃至身壞命終如棄重擔生天趣中受諸快樂爾時世尊重攝此義而説頌曰若成就二法謂善戒善見彼人終定能生白淨善法若生而決定決定必圓滿於白淨善法不衰障礙彼臨命終時無憂悔悲惱如棄捨重擔定生天趣中吾從世尊聞如是語苾芻當知若有一類補特伽羅成就二法臨命終時能生憂悔身壞命終墮諸𢙣趣生地獄中云何為二謂作不作云何為作謂身𢙣行語𢙣行意𢙣行是名為作云何不作謂身妙行語妙行意妙行是名不作諸有一類補特伽羅成就如是所説二法臨命終時能生憂悔身壞命終墮諸𢙣趣生地獄中爾時世尊重攝此義而説頌曰諸有愚癡人作三種𢙣行不作三妙行引餘過令生彼臨命終時決定有憂悔死墮諸𢙣趣生於地獄中吾從世尊聞如是語苾芻當知若有一類補特伽羅成就二法臨命終時不生憂悔身壞命終升於善趣生天界中云何為二謂作不作云何為作謂身妙行語妙行意妙行是名為作云何不作謂身𢙣行語𢙣行意𢙣行是名不作諸有一類補特伽羅成就如是所説二法臨命終時不生憂悔身壞命終升於善趣生天界中爾時世尊重攝此義而説頌曰諸有智慧人作三種妙行不作三𢙣行引餘德令生彼臨命終時決定無憂悔死升諸善趣生於天界中吾從世尊聞如是語苾芻當知有二妙智應修令生能得未得能觸未觸能證未證能超愁歎能滅憂苦能會正理能獲甘露能證涅槃云何為二一者法智二者類智法智生時便能無倒遍知有為於有為法既遍知已便能令彼感後有因不得生起增長廣大類智生時便能如實斷滅無明滅無明故便無戲論無戲論故便無尋伺無尋伺故便無樂欲無樂欲故便無愛憎無愛憎故便無慳嫉無慳嫉故便無種種執持刀杖違害鬪諍㸦相罵辱不真實語相離間語諸雜穢語及餘無量𢙣不善法無彼諸𢙣不善法故感後有業便不增長感後有業不增長故諸業滅盡業滅盡故衆苦滅盡苦滅盡故生死路絶此路絶已便自了知我生已盡梵行已立所作已辦不受後有如是名為有二妙智應修令生能得未得能觸未觸能證未證能超愁歎能滅憂苦能會正理能獲甘露能證涅槃爾時世尊重攝此義而説頌曰有二種妙智應修習令生能得未得等謂法智類智若法智生時遍知有為法便能令後有因不生不增若類智生時無明便斷滅由此展轉法絶生死輪回自知我生盡及梵行已立所作皆已辦更不受後有吾從世尊聞如是語苾芻當知有二妙智應正尋思應善稱量應審觀察能得未得能觸未觸能證未證能超愁歎能滅憂苦能會正理能獲甘露能證涅槃云何為二謂世間智及出世智世間智者謂於色蘊能正了知此為色蘊於受想行及識蘊中亦復如是於其地界能正了知此為地界於水火風及空識界亦復如是於其眼界能正了知此為眼界於其色界及眼識界亦復如是於其耳界能正了知此為耳界於其聲界及耳識界亦復如是於其鼻界能正了知此為鼻界於其香界及鼻識界亦復如是於其舌界能正了知此為舌界於其味界及舌識界亦復如是於其身界能正了知此為身界於其觸界及身識界亦復如是於其意界能正了知此為意界於其法界及意識界亦復如是於如此等世俗法中如是如是如實了知智見通慧現觀等覺周遍照了名世間智諸聖弟子於此所説世間智中應正尋思應善稱量應審觀察此世間智正修習時為能令彼生法有情永脫生不為能令彼老法有情永脫老不病法死法愁法歎法憂法苦法不安隱法亦復如是既審察已能正了知此世間智正修習時不能令彼生法有情永脫於生不能令彼老法有情永脫於老病法死法愁法歎法憂法苦法不安隱法亦復如是所以者何此世間智非賢聖法非能永出非趣涅盤非能永猒非能永離非能永滅非能永寂非真通慧非正等覺不證涅槃是感生法是感老法病法死法愁法歎法憂法苦法不安隱法彼於如是尋思稱量審觀察時於世間法住怖畏想於出世法住安靜想以於世間生怖畏故都無執受無執受故不生渴愛不渴愛故便自內證究竟涅槃證涅槃已便自了知我生已盡梵行已立所作已辦不受後有是名於此世間智中應正尋思應善稱量應審觀察出世智者謂於一切蘊界處中能正了知如是諸法是無常性苦性病性癰性箭性惱性害性怖性熱性壞性滅性災性橫性有疫癘性虛性偽性空性妄性無實我性難保信性於如是等諸法性中如實了知智見通慧現觀等覺周遍照了名出世智諸聖弟子於此所説出世智中應正尋思應善稱量應審觀察此出世智正修習時為能令被生法有情永脫生不為能令彼老法有情永脫老不病法死法愁法歎法憂法苦法不安隱法亦復如是既審察已能正了知此出世智正修習時定能令彼生法有情永脫於生定能令彼老法有情永脫於老病法死法愁法歎法憂法苦法不安隱法亦復如是所以者何此出世智是賢聖法是能永出是趣涅槃是能永猒是能永離是能永滅是能永寂是真通慧是正等覺能證涅盤非感生法非感老法病法死法愁法歎法憂法苦法不安隱法彼於如是尋思稱量審觀察時於出世法生寶想於世間法生下賤想以於出世生寶故便生歡喜生歡喜故其心安適心安適故身得輕安身輕安故便受恱樂受恱樂故心得寂定心寂定故能實知見實知見故能深猒背深猒背故能正離欲正離欲故能得解脫得解脫已便自了知我生已盡梵行已立所作已辦不受後有是名於此出世智中應正尋思應善稱量應審觀察如是名為有二妙智應正尋思應善稱量應審觀察能得未得能觸未觸能證未證能超愁歎能滅憂苦能會正理能獲甘露能證涅槃爾時世尊重攝此義而説頌曰有二種妙智知者應尋思謂世出世間能正盡衆苦應觀世間智發生怖畏想都無有執受展轉證涅槃應觀出世智發生寶想由此生歡喜便得身輕安輕安故恱樂恱樂故心定由心得定故便能生覺支覺支觀聖諦永斷諸疑無疑無所取永脫衆苦邊重攝前經嗢柁南曰二根二焦惱二行二戒見二作及不作二智有二種吾從世尊聞如是語苾芻當知若有苾芻為欲矯誑諸衆生故為求名譽遠所聞故為求利養及恭敬故而出家者不名真實於如來所修行梵行若有苾芻為通達故為遍知故而出家者是名真實於如來所修行梵行所以者何是諸苾芻為通達故為遍知故而出家已便能如實通所通達知所遍知既能如實通所通達知所遍知便能如實斷所應斷修所應修證所應證既能如實斷修證已便自了知我生已盡梵行已立所作已辦不受後有如是若有為通達故為遍知故而出家者是名真實於如來所修行梵行爾時世尊重攝此義而説頌曰為矯誑名譽利養及恭敬非真修梵行是虛妄出家為通達遍知速證最上義是真修梵行非虛妄出家吾從世尊聞如是語苾芻當知若有苾芻為欲矯誑諸衆生故為求名譽遠所聞故為求利養及恭敬故而出家者不名真實於如來所修行梵行若有苾芻為律儀故為正斷故而出家者是名真實於如來所修行梵行所以者何是諸苾芻為律儀故為正斷故而出家已便能如實守護六根不虧禁戒及能速證最上正斷既能如實守護六根不虧禁戒及能速證最上正斷便能如實斷所應斷修所應修證所應證既能如實斷修證已便自了知我生已盡梵行已立所作已辦不受後有如是若有為律儀故為正斷故而出家者是名真實於如來所修行梵行爾時世尊重攝此義而説頌曰為矯誑名譽利養及恭敬非真修梵行是虛妄出家為正斷律儀速證最上義是真修梵行非虛妄出家吾從世尊聞如是語苾芻當知若有苾芻為欲矯誑諸衆生故為求名譽遠所聞故為求利養及恭敬故而出家者不名真實於如來所修行梵行若有苾芻為求猒背為求離欲而出家者是名真實於如來所修行梵行所以者何是諸苾芻為猒背故為離欲故而出家已便能如實猒背離欲既離欲已便得解脫既解脫已便自了知我生已盡梵行已立所作已辦不受後有如是若有為猒背故為離欲故而出家者是名真實於如來所修行梵行爾時世尊重攝此義而説頌曰為矯誑名譽利養及恭敬非真修梵行是虛妄出家為猒背離欲速證最上義是真修梵行非虛妄出家吾從世尊聞如是語苾芻當知一切如來應正等覺所説法門略有二種云何為二一者於𢙣應正了知二者於𢙣應深猒背一切如來應正等覺略説如是二種法門所以者何諸修行者於諸𢙣法應正了知既於𢙣法正了知已便能猒背既猒背已便能離欲既離欲已便得解脫得解脫已便自了知我生已盡梵行已立所作已辦不受後有如是行者永斷諸愛及衆結縛無倒現觀正盡苦邊爾時世尊重攝此義而説頌曰當知諸如來應正等覺者哀愍衆生故説二種法門於衆𢙣正知及猒背離欲心解脫自在正盡衆苦邊吾從世尊聞如是語苾芻當知有二種法若修若習若多修習能斷二法云何二法若修若習若多修習能斷二法謂不淨觀及慈悲觀能斷貪欲及與瞋恚所以者何一切已貪現貪當貪皆由作意思惟淨相一切已瞋現瞋當瞋皆由作意思惟怨相一切已斷現斷當斷所有貪欲皆由作意修不淨觀一切已斷現斷當斷所有瞋恚皆由作意修慈悲觀於不淨觀若修若習若多修習決定能斷一切貪欲於慈悲觀若修若習若多修習決定能斷一切瞋恚若欲決定斷貪欲者當勤精進修不淨觀若欲決定斷瞋恚者當勤精進修慈悲觀修不淨觀無有貪欲而不能斷修慈悲觀無有瞋恚而不能斷如是名為有二種法若修若習若多修習能斷二法爾時世尊重攝此義而説頌曰修習多修習二法斷二法謂不淨慈悲斷貪欲瞋恚是故有智者當觀自饒益修不淨慈悲斷貪欲瞋恚吾從世尊聞如是語苾芻當知其涅槃界略有二種云何為二一者有餘依涅盤界二者無餘依涅盤界云何名為有餘依涅盤界謂諸苾芻得阿羅漢諸漏已盡梵行已立所作已辦已捨重擔已證自義已盡有結已正解了心善解脫已得遍知宿行為緣所感諸根猶相續住雖成諸根現觸種種好醜境界而能猒捨無所執著不為愛恚緾繞其心愛恚等結皆永斷故彼於諸色求欲見時雖復以眼觀於諸色而不發起貪瞋癡等雖復有眼及好醜色而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故彼於諸聲求欲聞時雖復以耳聽於諸聲而不發起貪瞋癡等雖復有耳及好醜聲而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故彼於諸香求欲時雖復以鼻嗅於諸香而不發起貪瞋癡等雖復有鼻及好醜香而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故彼於諸味求欲嘗時雖復以舌嘗於諸味而不發起貪瞋癡等雖復有舌及好醜味而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故彼於諸觸求欲覺時雖復以身覺於諸觸而不發起貪瞋癡等雖復以身及好醜觸而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故彼於諸法求欲知時雖復以意知於諸法而不發起貪瞋癡等雖復有意及好醜法而無貪欲亦無瞋恚所以者何愛恚等結皆永斷故乃至其身相續住世未般涅盤常為天人瞻仰禮拜恭敬供養是名有餘依涅盤界云何名為無餘依涅盤界謂諸苾芻得阿羅漢諸漏已盡梵行已立所作已辦已捨重擔已證自義已盡有結已正解了已善解脫已得遍知彼於今時一切所受無引因故不復希望皆永盡滅畢竟寂靜究竟清涼隱沒不現唯由清淨無戲論體如是清淨無戲論體不可謂有不可謂無不可謂彼亦有亦無不可謂彼非有非無唯可説為不可施設究竟涅盤是名無餘依涅盤界苾芻當知如是名為略有二種涅盤之界爾時世尊重攝此義而説頌曰漏盡心解脫任持最後身名有餘涅盤諸行猶相續諸所受皆滅寂靜永清涼名無餘涅盤衆戲論皆息此二涅盤界最上無等倫謂現法當來寂靜常安樂吾從世尊聞如是語苾芻當知由二纏故令諸天人一類怯劣一類勇猛有慧眼者能正觀察云何二緾謂有見緾無有見緾云何天人一類怯劣謂有天人愛有樂有欣有喜有為滅有故説正法時不能恭敬攝耳聽受亦復不能住奉教心不能隨順修如實見唯生怯劣退轉驚怖我等爾時當何所有我等爾時當如何有如是天人一類怯劣云何天人一類勇猛謂有天人怖有猒有欣求無有彼彼苦法所逼切故攝受執著如是如是諸𢙣見趣作是念言我若斷壞隱沒不現爾時乃名寂靜微妙如是天人一類勇猛云何名為有慧眼者能正觀察謂聖聲聞如實觀察既觀察已不於如實而生憍慢不依如實而生憍慢不因如實而生憍慢不恃如實而生憍慢如實見已便生猒背既猒背已便能離欲既離欲已便得解脫得解脫已便自了知我生已盡梵行已立所作已辦不受後有作是思惟世尊為彼喜樂諸有阿賴耶者恆為常見所繫縛者令滅有故所説正法微細甚深難見難悟寂靜勝妙非諸尋思所行境界是諸審諦慧者所證一切世間真實對治謂能除滅憍慢渴愛害阿賴耶斷諸徑路證其空性離諸貪欲證得究竟寂滅涅盤作是思惟世尊為彼怖畏諸有阿賴耶者恆為斷見所繫縛者令知業果無失壞故所説正法現見應時易見饒益智者內證一切世間真實對治謂能除滅憍慢渴愛害阿賴耶斷諸徑路證真空性離諸貪欲證得究竟寂滅涅盤如是名為有慧眼者能正觀察如是名為由二緾故令諸天人一類怯劣一類勇猛有慧眼者能正觀察爾時世尊重攝此義而説頌曰由二緾所緾令諸天人衆一類有怯劣一類有勇猛有慧眼聲聞能如實觀察能除慢猒離究竟證涅盤復如實了知佛所説正法能滅斷常見及二愛無餘有慧眼龍王能普雨法雨滅諸煩惱熖令證大清涼本事經卷第三
