body:
  text: 沙門守其等奉勑挍勘蘇悉地羯囉經卷上之二蘇悉地羯囉經供養花品第八復次分別說三品事業所謂三品者即扇底迦法補瑟徵迦法阿毗遮嚕迦法是為三品三部之中有三等真言所謂聖者所說諸天所說地居天說是為三部聖者所說者佛菩薩聲聞緣覺所說是為聖者真言諸天所說者從淨居天乃至三十三天中閒諸天所說是為諸天真言地居天說者諸龍夜叉羅剎阿修羅迦樓羅乹闥婆緊那羅摩護羅部多卑舍遮鳩盤茶等所說為地居天真言作扇底迦法應用聖者說真言作補瑟徵迦法應用諸天說真言作阿毗遮嚕迦法應用地居天說真言若求上成就應用聖者真言若求中成就應用諸天真言若求下成就應用地居天真言如前三部中及求三等成就并作三種等法應用水陸所生種種諸花當湏各依本部善分別之以真言加持應當奉獻奉獻之時發如是願此花清淨生處復淨我今奉獻願垂納受當賜成就獻花真言曰阿上賀囉阿賀囉薩囉嚩二合尾你夜二合達囉布尒帝莎去訶去當用此真言持花供養通及三部若獻佛花取白花香氣者供養之若供獻觀音應取水中所生白花而供養之若獻金剛應用種種妙花而以供養若獻地居天隨時所有種種諸花隨取而獻忙攞底丁異反花簸吒羅花蓮花瞻蔔花龍蘂花似牡丹花嚩無可反句藍花俱物頭花娑羅樹花末利花舉亦迦花喻底廳以反迦花勢破理迦花句嚕嚩同前釰花迦淡聞華未度𢷤尼上迦花怛㗚二合拏花彥陁補澀波花本囊去言花那嚩無可反忙里迦花阿輸去劒花母注捃難花那莽難花注多曼折利花勿嘞烏鉢羅花迦咤㘕花建折那上聲藍花娑𢷤尼上劒花憂鉢羅花得㘕花捃陁難花迦囉末花等於林邑蘭若所生者及水陸生如上等花應須善知三部所用及以三品三等供獻用忙攞底丁以反花得㘕花捃難花末理迦花喻底聽以反迦花那龍絮花如上等花佛部獻用憂鉢羅花俱物頭花蓮花娑羅樹花勢破理羅闍底丁以反迦花本那言花得㘕花此上等花觀音部中供養為勝青蓮花鉢孕衢花花枝條餘不說者並皆通獻金剛部中如上花中白色者當作扇底迦法黃色者作補瑟徵迦法紫色者作阿毗遮嚕迦法如是花中甘味者作扇底迦法辛味者作阿毗遮嚕迦法淡味作補瑟徵迦法或於淨處所生枝蔓花條始生芽茅草或小草花或中樹花大樹花種種諸花隨類應用闍底花蘇末那花單通獻佛蓮花單獻通供養觀音青蓮花奉獻金剛各為勝上佛部之中作扇底迦法用闍底蘇末那花作補瑟徵迦法用蓮花作阿毗遮嚕迦法用青蓮花餘二部類此作之上色妙香花中色香花下色香花隨事分用或用取花條或用花朵以獻妃天等用說為上勝紫白二色羯囉末囉花應用奉獻忿怒尊主及諸使者說為上勝句吒惹而也反花底落迦花娑羅花迦㗚尼上二合迦引囉引花阿娑囊去努嚕莽二合花尾螺花迦咤㘕花等隨取其一而供養之遍通三部及上中下除災等三復有種種諸花合成為鬘或種種花聚持以供養遍通九種種種花中不用臭花或㓨樹所生或苦辛味或前廣列花名之中無名之者亦不應用木堇花計得劒花阿地目得迦花瞢句藍花寧去簸花等亦不應用長時供養通九種者紅花閃弭花鉢囉孕句花及骨路草并此等類稻穀花油麻相和如上所說種種花等供養最為勝上如無此類種種諸花但用白粳米擇碎者而供養之亦通九種不得㸦用其花如作法之時求不得者隨所得花應誦當部花真言而加持之若無花獻應用蘇囉三枝或莽嚕聞灘敦耽忙去聲羅葉訖㗚二合瑟拏二合末利迦葉忙都抃伽葉閼囉惹而也反二合迦葉及蘭香等類而替獻之如無此等枝應用嚩無可反落迦根甘松香根卷栢根牛膝根及餘香藥根香果亦通供養所謂丁香荳蔻肉荳蔻甘橘及一切香果等通替花供養若無如上花根果獻者先曾見獻供或曾聞說或自曾獻花隨其所知應令自運心想而供養之最為勝上供養雖有如前花果等獻若能至心虔誠合掌頂奉供養本尊花等如是心意供養最上更無過者致作之常應如是供養不得懷疑蘇悉地羯囉經塗香藥品第九次復我今說塗香藥法隨諸真言應合供養能成眾福其名曰香附子句吒囊上吒青木香嚩落迦烏施囉舍哩嚩煎香沉香鬱金香白檀香紫檀香嚩囉拏二合那嚕鉢囉或粉忙羅鉢怛羅拏二合劒娑囉藍云松木是娑比嘞二合迦鉢持莽二合劒云栢木是帶囉鉢㗚尼上二合迦引利也劒或曰云黑柫刷子黑丁香婆羅門桂皮天木香鉢孕瞿閼乳難燥囉盆泥去崩細攞嚩嚕劒迦畢貪咾達囉訖囉二合劒頗里迦寧上囊里迦始嚩引瞻去臂蘇嚩㗚拏二合迦㘕忙覩抃伽并皮多利三薄娑怚㗚三合拏忙去斯甘松香是那莽難莽嚕崩梵囉計施耽云水蘇忙去羅本囊去言醫羅未夜二合傑囉二合囊上却沒癡囉嚩利嚩引澁比二合迦怚你閻二合胡萎設多補澁波二合迴香訶蔬蹄草拏迦云蔬蹄草脚句藍白荳蔻惹而夜反底都以反頗羅諸囉劒刼伴藍娑縚二合閻地夜二合莽劒戰茶都嚕瑟劒二合蘇合香鉢囉二合娑怚二合婆嚩二合計薩㘕等類及膠汁所謂龍腦言陁羅娑娑遮囉娑安悉香薰陸香設落翅勢嚩引娑迦等及餘有膠樹香者並通隨其本部善須合和用諸草香根汁香花等三物和為塗香佛部供養諸香樹皮及堅香木所謂栴檀沉水天木等類并以香果如前分別和為塗香蓮花部用諸香草根花果等和為塗香金剛部用或有塗香具諸根菓先人所合成者香氣勝者通於三部或唯用沉水和少龍腦以為塗香佛部供養唯用白檀和少龍腦以為塗香蓮花部用唯用鬱金和少龍腦以為塗香金剛部用紫檀塗香通於一切金剛等用肉豆蔻脚句羅惹而也反底都以反蘇末那或濕沙蜜蘇澁咩羅鉢孕瞿等通於一切女使者天塗香供養甘松濕沙蜜肉豆蔻用為塗香獻明王妃白檀沉水鬱金用為塗香供獻明王用諸香樹皮用為塗香獻諸使者隨所得香用為塗香獻地居天唯用沉水以為塗香通於三部九種法等及明王妃一切處用或有別作扇底迦法用白色香補瑟徵迦法用黃色香阿毗遮嚕迦法用以紫色無氣之香若欲成就大悉地者用前汁香及以香菓若中悉地用堅木香及以香花若下悉地根皮花菓用為塗香而供養之和合香時不應用於依有情香謂甲香麝香紫釤等類及以酒酢或過分香世不樂者皆不應用供養之時有四種香謂塗香末香香丸香水隨用一類盡以為花欲獻之時作如是言此香天妙清淨護持我今奉獻唯垂納受令願圓滿香真言曰阿去以賀囉賀囉薩囉嚩尾你夜二合達囉布尓帝莎去訶去先誦此真言而真言之後誦所持真言淨持如法奉獻於尊若求諸香而不能得隨取塗香用前真言持誦供養復用本部塗香真言而持誦已奉獻本尊蘇悉地羯囉經分別燒香品第十次復我今說燒香法通於三部沉水白檀鬱金香等隨其次第取一供養或三種香和通三部或取一香隨通其部目諸香名室唎二合吠瑟吒二合劒汁娑折囉娑云娑羅樹膠𠃵陁囉素安悉香娑落翅龍腦香薰陸香語苫地夜二合目劒祇哩若西可反蜜訶梨勒砂糖香附子酥合香沉水嚩引落劒白檀紫檀五松木天木囊里迦鉢哩閇攞嚩烏施藍石蜜甘松香及菓等若欲成就真言法應合和香室唎二合吠瑟吒迦樹汁香遍通三部及通諸天安悉香通獻藥叉薰陸香通諸天女娑折囉娑香獻地居天娑落翅香獻女使者𠃵陁囉娑香獻男使者龍腦乾陁囉娑娑折囉娑薰陸安悉薩落翅室利二合吠瑟吒二合迦此七膠香和以燒之遍通九種復此七香最為勝上膠香為上堅木香為中餘花根等為下蘇合沉水鬱金等香和為第一香加以白檀復置砂糖為第二香又加安悉及以薰陸為第三香如是三種和香隨用其一遍通諸事地居天等及以衛護應用薩折囉娑砂糖訶梨勒以和為香供養彼等復有五香所謂砂糖勢麗翼迦薩折囉娑訶梨勒石蜜和合為香通於三部一切事用或有一香遍通諸事無上好者眾人所貴上妙和香如無是香隨所得者亦通三部諸餘事用如前所說合和香法善湏分別應其所用根花菓合之而獻有四種香應須知之所謂自性擣丸香塵末香作丸香亦須要知應用之處扇底迦法用擣丸香阿毗遮嚕迦用塵末香補瑟徵迦用作丸香攝通一切用自性合擣丸香置以砂糖和塵末香安樹膠香令作丸香應用好蜜酥乳砂糖亦通替蜜自性香上應灑少酥如求當部所燒香若不得者隨所有香先誦當部香真言而持誦後然誦此真言合和香法不置甲麝及紫釤香亦不應用未你也等而和香亦不過分致使𢙣氣及以無香以此林野樹香膠能稱一切諸人意願諸天常為食我今將奉獻哀愍故垂受阿去賀囉賀囉薩囉嚩二合尾你夜二合達囉布尒帝莎去訶去先用此真言而持誦之後用所持真言取彼香真言如法用之蘇悉地羯囉經分別然燈法品第十一復次今說然燈法以依法故令諸天仙懽喜成就以金為盞或用銀作或用熟銅或用泥瓦此五種中隨取一用本尊喜歡作燈炷法用白㲲花作之或新㲲布作之或耨句羅樹皮絲作之或新淨布而作炷用取月諸香油眾所樂者或以諸香酥油扇底迦法用上香油補瑟徵迦法用次香油阿毗遮嚕迦法用下香油諸香木油扇底迦用以油麻油補瑟徵迦用以白苶子油阿毗遮嚕迦用阿去怚娑菓油真言妃用及餘女仙諸餘菓油真言主用苦樹菓油諸天神用謂摩訶迦羅等魚脂鬼用諸畜生脂藥叉用之拔羅得鷄油及麻子油下類天用謂四姊妹遮門茶等於寒林中起吠侈羅等用犬肉脂諸油之中黧牛酥上遍通三部或白牛酥扇底迦用黃牛酥補瑟徵迦用烏牛酥阿毗遮嚕迦用或本部分別依彼而用諸藥之中所生油補瑟徵迦用諸香出油扇底迦用𢙣香氣油阿毗遮嚕迦用如上所略說燈然次第善自觀之縱此不說而審用之雖有燈油而不依本部者以本部真言而真言之供養此燈能却障能淨及除昏我今持奉獻哀愍故垂受真言曰阿路迦也阿路迦也薩囉嚩二合尾你也二合達囉布尒帝莎訶誦此真言已復誦本尊真言而真言已復作淨法除諸過故如前已說蘇悉地羯囉經獻食品第十二復次我今說獻食法令諸天仙悉皆喜歡速得成就略說食獻應用圓根及長根菓酥油餅等非酥油餅諸餘羹𩟯等味或種種粥及諸飲如此四種飲食通於諸部獻未惹而也反布囉迦菓遍通三部或以石榴或注躭菓亦通三部以其次第各通一部甘味扇底迦用甘酢味補瑟徵迦用苦辛淡味阿毗遮嚕迦多羅樹菓椰子菓尾羅菓你跛菓及餘臭菓眾所不樂亦不應獻或有上味菓也復多饒而復最貴獻如此菓獲上成就或有諸菓其味次羙世復易求價無苦貴如此菓獲中成就或有諸菓其味苦辛淡也復豐足價復最賤獻如此菓獲下成就復欲加意奉獻應取女名菓所謂柿子杏桃等而獻女天諸樹生菓無苦味者獻真言妃室利泮羅菓通三部一切忿怒嚩拏菓通求一切藥叉刼比貪菓室利天用鉢夜攞樹生菓鉢曬使迦用如是類前諸菓更有多種異名隨觀其味而用獻之或於村側或蘭若中清淨之處有諸草根其味甘羙取之奉獻速得成就微迦那唎根通一切用復有奇羙味亦通一切奉獻非直天神人中復用山中所生根美味者佛部獻熟芋根亦通佛部迦契嚕劒根徵那唎根嚩也賜根舉知根及餘圓根從水生者蓮花部用一切藥圓根苦辛味花及多種生芋金剛部用色香白香極甘美足味如是圓根佛部奉獻色黃中香中美不大酸不太甛味如是圓根蓮花部用赤色苦辛淡味臭氣不甘如是圓根金剛部用如是三部扇底迦等及上中下並同通用略說圓根善隨其部上中下等而用獻之如是別分速得成就前說圓根長根生長及所用之如圓根類等䓗䔉韮根及餘極臭辛苦味等不應供養莎悉底食烏路比迦食布波食嚩拏迦等食及餘粉食或作種種胡麻團復有種種白糖所作食歡喜團食莽度失食毗拏迦食賔去𡰱拏句釋迦食阿輸去迦嚩侈也食指室羅食餅食過囉比瑟吒迦食句離也食鉢鉢吒食布波食莽沙布波食微諾鐸迦食補沙嚩多食羅嚩𡰱去迦引食部迦引囉迦食俱舉知食囉莽迦引食桁沙食昔底迦食鉢㗚香指里迦食室利布囉迦食吠瑟徵迦食瞋諾迦食吒那囉迦食遇拏補囉迦食質但囉布波食却若囉食遇拏鉢鉢吒失䔖伽吒食竭多食種種避侈儐拏布波食囉若桁娑食娑若迦食竭㗚多布囉迦食刧謨徵迦食句娑里迦食三補吒食捨拏嚩食訶哩儜食釋句囊食弭囊食種種鉢囉𡰱上悖㗚瑟吒迦食地比迦食若羅訶悉底你閻食羯羯囉儐拏迦食嚩羅伽去多食嚩底徵迦食乞澁二合底迦食迦若羯哩𡰱上迦食等如上等食或用砂糖作或以酥油或以油麻和作如前其本部隨取而用獻依法奉獻速得成就米粉等食佛部扇底迦及上成就一切麥麵食蓮花部補瑟徵迦及中成就油麻豆子所作食金剛部阿毗遮嚕迦及下成就等用一切諸味中以白糖而所莊者佛部供獻之中常當奉獻室利吠瑟吒迦食蓮花部用歡喜團食金剛部用布波迦引食求藥叉用女名食真言妃用女名食者劒謨里食鉢鉢徵食等諸食中最貴而復美味者求上成就而獻如其次味餘二部中此中不具隨所作者八部等用獻食之時先敷巾等為莊嚴故先置莎悉底迦食烏路比迦食布波食如是先作三部共同復如本部所須飲食隨力獻之粳米飯六十日熟粳米飯大麥乳煑飯不種自生粳米飯粟米飯應須獻者依法獻之具諸香味奇美羹臛及諸豆臛等而奉獻之乳煑大麥飯及成不種自生粳米飯求上成就粳米及飯六十日熟粳米飯求中成就粟米飯及飯等下成就用扇底迦法為上成就補瑟徵迦法為中成就阿毗遮嚕迦法為下成就供獻飯食根菓飯粥依上中下而奉獻之扇底迦法最上佛部補瑟徵迦法中蓮花部阿毗遮嚕迦法下金剛部最上悉地及與中下善須依法隨類應知羹臛之中甘美者扇底迦用酢甜之者補瑟徵迦用苦辛淡者阿毗遮嚕迦用乳粥扇底迦用石榴粥酪粥等補瑟徵迦用訖娑囉粥謂胡麻粳米豆子等是阿毗遮嚕迦用如前略說諸食味等或隨方所種種有異觀上中下而奉獻之或有諸味眾所稱讚或自愛者應持獻佛或有本部真言所說獻食次第冝當依之若異彼者不得成就食中顯者及以𢙣香者金剛部中用前說塗香及與香燈食等先依本部扇底迦等亦當依之觀真言性為喜為怒次復觀之能成何事復細尋察滿何等願既觀知已前所獻食隨力獻之於供獻法中見有用迦引弭迦食者應獻莎悉底食烏路比迦食及餘力所辦食砂糖酪飯根菓乳粥等是也此迦引弭迦食遍通獻一切唯除阿毗遮嚕迦於供獻法中見有用徵質覩𡀔食者應以迦引弭迦食中加三兩種上異飲食即是也於供獻法中見有用烏那嚕食者以前迦引弭迦食倍加多置即是也於獻法中見有用三白食者應以乳酪酥飯是也復見有三甜食者酥蜜乳飯是也於獻法中見有薩嚩薄底迦食者娑也里迦食陵祗里迦食薝沒梨耶食底羅比瑟吒劒食酪飯根菓或於前所說食中隨取一兩味置之稻穀花諸花及盛以大器置水滿中遠於持誦之處而弃之即是也於獻法中見有扇底迦食者用莎悉底乳粥稻穀花酥蜜乳及乳煑大麥飯微惹布囉决能除災無致懷疑也於獻法中見有補瑟徵迦食者應用酪粥歡喜團烏路比迦砂糖室唎吠瑟吒迦引等食决能滿願無懷疑也於獻法中見有阿毗嚕迦食者應用赤粳米飯或用勾捺囉嚩子或染作赤色飯或油麻餅娑布跛迦薝沒梨也二合訖娑囉粥等决能降怨無懷疑也若持藥叉真言無獻食法者應依此法而奉獻之以用赤粳米飯根菓蜜水及蜜并粆糖米粉餅等是也持女天真言等應獻羹飯豆子臛等諸甜水漿鉢囉拏鉢㗚瑟吒迦引缹味等及諸菓子一切女天應獻是食也欲求上成本部獻法者依此獻有諸飲食根菓香等眾所共啖其味美者多而復貴如此上味求上成就而奉獻之如上略說諸獻食法各隨本部所求事法皆已略陳或於餘方飲食味異觀其色味隨類獻之欲獻食時先淨塗地香水遍灑淨洗諸蓮鉢羅勢諸乳樹或新㲲布等敷設其上後下諸餚膳依用此扇底迦用水生諸及餘奇樹或芭蕉作補瑟徵迦用拔羅計樹閼伽樹及苦樹或隨時得者阿毗遮嚕迦用以雌樹名謂芭蕉始生蓮等女仙真言處用鉢迦使乾樹用地居天等以草用之求上中下法善須知先塗灑地後敷諸淨洗手及數漱口嚥水次須下食先下莎悉底迦食次下圓根長根菓復下諸粥次下諸食次下羹臛飯次下乳酪各隨法本依此下之若作曼茶羅及擬成就諸事得諸境界已者應當倍加奉獻清淨飲食花菓等類初持誦時隨其所辦隨所得味依彼本法而奉獻之若黑白二月八日十四日十五日日月蝕時地動時即廣加供養護摩之時所須之物先辦置於本尊前持誦人食時先出一分食亦同置尊前如先作護摩而後食者應預作食而出置之先設供養所辦食已然後應當起首念誦獻諸花菓及諸飲食常須念之不應廢忘仍依本法若欲一時念誦一時供養諸根菓食若欲二時念誦二時供養若言三時念誦三時供養如是依法當速成就持誦之人不獻飲食違本部者其人乃著魔障身無精光所饒風飢渴恒𢙣思想不能成就本尊真言皆由不獻本尊菓食應當於前黑白二月等日廣設供養奉獻本尊并諸眷属初持誦時於前等日作薄底迦食遠持誦處四方弃之於此不說或本部不通縱有所通以諸下味而求上成及所制食臰𢙣之類皆不應用常獻酪飯於諸部中求上中下扇底迦等并通諸天真言等者應當如是供養若無本所制食隨其所得以本部真言而持誦之此藥奇香美唯堪奉於尊我今持奉獻哀愍故垂受阿去賀囉阿賀囉薩囉嚩二合尾比夜二合達囉布尒帝莎訶此真言遍通三部後誦一持真言而持誦之上卷竟丁未歲高麗國大藏都監奉𠡠雕造
