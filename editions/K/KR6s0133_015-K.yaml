body:
  text: 沙門守其等奉勑校勘薄凾中阿含經卷第十一此經此卷國宋二本皆直以三十二相經第二為卷初首遂令第二之言無所對第一又於三十二相經中直以得如來無所著等正覺之言為經初首而闕其我聞如是已下證信發起二序之文遂令一經正宗起無由序今於丹藏經中得七寶經第一㹅一百九十字為卷初首又於三十二相經初得我聞如是乃至無家學道者必等凡一百八十二字為經初首補其闕焉其所補者具列于後中阿含經王相應品第六有七經王相應品本有十四經分後七經屬第二誦初一日誦七寶相四洲牛糞摩竭王鞞婆麗陵耆天使最在後中阿含經王相應品七寶經第一我聞如是一時佛遊舍衛國在勝林給孤獨園尒時世尊告諸比丘若轉輪王出於世時當知便有七寶出世云何為七輪寶象寶馬寶珠寶女寶居士寶主兵臣寶是謂為七若轉輪王出於世時當知有此七寶出世如是如來無所著等正覺出於世時當知亦有七覺支寶出於世閒云何為七念覺支寶擇法覺支精進覺支喜覺支息覺支定覺支捨覺支寶是謂為七如來無所著等正覺出於世時當知有此七覺支寶出於世閒佛說如是彼諸比丘聞佛所說歡喜奉行七寶經第一竟中阿含經王相應品三十二相經第二初一日誦我聞如是一時佛遊舍衛國在勝林給孤獨園尒時諸比丘於中食後集坐講堂共論此事諸賢甚奇甚特大人成就三十二相必有二處真諦不虛若在家者必為轉輪王聦明智慧有四種軍整御天下由已自在如法法王成就七寶彼七寶者輪寶象寶馬寶珠寶女寶居士寶主兵臣寶是為七千子具足顏㒵端正勇猛無畏能伏他眾彼必統領此一切地乃至大海不以刀仗以法教令令得安樂若剃除鬚髮著袈裟衣至信捨家無家學道者必已上薄凾中阿含經卷第十五此卷初三十喻經丹藏作世喻經者但卅字之訛變也三十為正國宋經初直以比丘比丘尼以護六根為守閣人為經初首而闕我聞如是等證信發起二序之文今於丹藏經中得我聞如是已下乃至猶如王及大臣有守閣人舍利子如是等凡三十五行揔四百九十字補其闕焉其所補文今錄于左我聞如是一時佛遊王舍城在竹林加蘭哆園與大比丘眾俱共受夏坐尒時世尊於十五日說從解脫時在比丘眾前敷座而坐世尊坐已便入定意觀諸比丘心於是世尊見比丘眾靜坐默然極默然無有睡眠除陰盖故比丘眾坐甚深極甚深息極息妙極妙是時尊者舍梨子亦在眾中於是世尊告曰舍梨子比丘眾靜坐默然極默然無有睡眠除陰蓋故比丘眾坐甚深極甚深息極息妙極妙舍梨子誰能敬重奉事比丘眾者於是尊者舍梨子即從坐起偏袒著衣叉手向佛白曰世尊如是比丘眾靜坐默然極默然無有睡眠除陰蓋故比丘眾坐甚深極甚深息極息妙極妙世尊無能敬重奉事比丘眾者唯有世尊能敬重奉事法及比丘眾戒不放逸布施及定唯有世尊能敬重奉事世尊告曰舍梨子如是如是無能敬重奉事比丘眾者唯有世尊能敬重奉事法及比丘眾戒不放逸布施及定唯有世尊能敬重奉事舍梨子猶如王及大臣有種種嚴飾具繒綵錦𦋺指環臂釧肘瓔咽鉗生色珠鬘舍梨子如是比丘比丘尼以戒德為嚴飾具舍梨子若比丘比丘尼成就戒德為嚴飾具者便能捨惡修習於善舍梨子猶如王及大臣有五儀式劒蓋天冠珠柄之拂及嚴飾屣守衛其身令得安隱舍梨子如是比丘比丘尼以持禁戒為衛梵行舍梨子若比丘比丘尼成就禁戒為衛梵行者便能捨惡修習於善舍梨子猶如王及大臣有守閣人舍梨子如是松凾雜阿含經第四卷此經此卷國宋二本文義全同皆有十九經㹅二十五紙丹本有十五經若依宋藏式寫之可成二十七紙又其文義與國宋二本全別未知去取今撿國宋本經則下流凾中此經第四十二卷耳宋藏錯將彼卷重刊于此為初四卷國亦仍之者錯也故今去彼取此丹本經焉又為看舊國宋藏者具錄正經于左雜阿含經卷第四宋天笁三藏求那跋陁羅譯如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名欝多羅來詣佛所與世尊面相問訊慰勞已退坐一靣白佛言世尊我常如法行乞持用供養父母令得樂離苦世尊我作如是為多福不佛告欝多羅實有多福所以者何若有如法乞求供養父母令其安樂除苦惱者實有大福尒時世尊即說偈言如汝於父母恭敬修供養現世名稱流命終生天上佛說此經已年少欝多羅歡喜隨喜作禮而去如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名優波迦來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇諸婆羅門常稱歎邪盛大會沙門瞿曇亦復稱歎邪盛大會不佛告優波迦我不一向稱歎或有邪盛大會可稱歎或有邪盛大會不可稱歎優波迦白佛何等邪盛大會可稱歎何等邪盛大會不可稱歎佛告優波迦若邪盛大會繫羣少特牛水特水牸及諸羊犢小小眾生悉皆傷殺逼迫苦切僕使作人鞭笞恐怛悲泣號呼不喜不樂眾苦作伇如是等邪盛大會我不稱歎以造大難故若復大會不繫縛羣牛乃至不令眾生辛苦作伇者如是邪盛大會我所稱歎以不造大難故尒時世尊即說偈言馬祀等大會造諸大難事如是等邪盛大仙不稱歎繫縛諸眾生殺害微細䖝是非為正會大仙不隨順若不害眾生造作眾難者是等名正會大仙隨稱歎惠施修供養為應法邪盛施者清淨心梵行良福田如是大會者是則羅漢會是會得大果諸天皆歡喜自行恭敬請自手而施與彼我悉清淨是施得大果慧者如是施信心應解脫無罪樂世閒智者徃生彼佛說此經已優波迦婆羅門聞佛所說歡喜隨喜作禮而去如是我聞一時佛住舍衛國祇樹給孤獨園廣說如上差別者謂隨說異偈言無為無諸難邪盛時清淨如法隨順行攝護諸梵行馨香歸世界超過諸凡鄙佛於邪盛善稱歎此邪盛惠施修供養邪盛隨所應淨信平等施梵行良福田彼作如是施是施羅漢田如是廣大施諸天所稱歎自行恭敬請自手而供養等攝自他故邪盛得大果慧者如是施淨信心解脫於無罪世界智者往生彼佛說此經已優波迦婆羅門聞佛所說歡喜作禮而去如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名欝闍迦來詣佛所稽首佛足退坐一面白佛言世尊俗人在家當行幾法得現法安及現法樂佛告婆羅門有四法俗人在家得現法安現法樂何等為四謂方便具足守護具足善知識具足正命具足何等為方便具足謂善男子種種工巧業處以自營生謂種田商賈或以王事或以書䟽筭畫於彼彼工巧業處精勤修行是名方便具足何等為守護具足謂善男子所有錢穀方便所得自手執作如法而得能極守護不令王賊水火劫奪漂沒令失不善守護者亡失不愛念者輙取及諸災患所壞是名善男子善守護何等為善知識具足若有善男子不落度不放逸不虛妄不凶險如是知識能善安慰未生憂苦能令不生已生憂苦能令開覺未生喜樂能令速生已生喜樂護令不失是名善男子善知識具足云何為正命具足謂善男子所有錢財出內稱量周圓掌護不令多入少出也多出少入也如執秤者少則增之多則減之知平而捨如是善男子稱量財物等入等出莫令入多出少出多入少若善男子無有錢財而廣散用以此生活人皆名為優曇鉢果無有種子愚癡貪欲不顧其後或有善男子財物豐多不能食用傍人皆言是愚癡人如餓死狗是故善男子所有錢財能自稱量等入等出是名正命具足如是婆羅門四法成就現法安現法樂婆羅門白佛言世尊在家之人有幾法能令後世安後世樂佛告婆羅門在家之人有四法能令後世安後世樂何等為四謂信具足戒具足施具足慧具定何等為信具足謂善男子於如來所得信敬心建立信本非諸天魔梵反餘世人同法所壞是名善男子信具足何等戒具足謂善男子不殺生不偷盜不邪婬不妄語不飲酒是名戒具足云何施具足謂善男子離慳垢心在於居家行解脫施常自手與樂修行捨等心行施是名善男子施具足云何為慧具足謂善男子苦聖諦如實知習滅道聖諦如實知是名善男子慧具足若善男子在家行此四法者能得後世安後世樂尒時世尊復說偈言方便建諸業積集能守護知識善男子正命以自活淨信戒具足惠施離慳垢淨除於速道得後世安樂若處於居家成就於八法審諦尊所說等正覺所知現法得安隱現法喜樂住後世喜樂住佛說此經已欝闍迦聞佛所說歡喜隨喜作禮而去如是我聞一時佛在拘薩羅人閒遊行至舍衛國祇樹給孤獨園尒時舍衛國有憍慢婆羅門止住父母種姓俱淨無瑕點能說者七世相承悉皆清淨為婆羅門師言論通達諸論記典悉了萬名解法優劣分明諸句句記說容貌端正或生志高族姓志高容色志高𦖟明志高財富志高不敬父母諸尊師長聞沙門瞿曇在拘薩羅國人閒遊行至舍衛國祇樹給孤獨園聞已作是念我當往彼沙門瞿曇所若有所說我當共論無所說者默然而還時憍慢婆羅門乘白馬車諸年少婆羅門前後導從持金柄傘蓋手執金瓶往見世尊至於園門下車步進尒時世尊與諸大眾圍繞說法不時顧念憍慢婆羅門時憍慢婆羅門作是念沙門瞿曇不顧念我且當還去尒時世尊知憍慢婆羅門心念而說偈言憍慢既來此不善更增慢向以義故來應轉增其義時憍慢婆羅門作是念沙門瞿曇已知我心欲修敬禮尒時世尊告憍慢婆羅門止止不須作禮心淨已足時諸大眾咸各高聲唱言奇哉世尊大德大力今此憍慢婆羅門恃生憍慢族姓憍慢容色憍慢聦明憍慢財富憍慢不敬父母諸尊師長今於沙門瞿曇所謙卑下下欲接足禮時憍慢婆羅門於大眾前唱令靜默而說偈言云何不起慢云何起恭敬云何善慰諭云何善供養尒時世尊說偈荅言父母及長兄和尚諸師長及諸尊重者所不應生慢應當善恭敬謙下而問訊盡心而奉事兼設諸供養離貪恚癡心漏盡阿羅漢正智善解脫伏諸憍慢心於此賢聖等合掌稽首禮尒時世尊為憍慢婆羅門種種說法示教照喜如佛世尊次第說法說布施持戒生天功德愛欲味患煩惱清淨出要遠離諸清淨分如是廣說如白淨衣無諸黑𢙣速受染色憍慢婆羅門即於座上解四聖諦苦習滅道得無閒等時憍慢婆羅門見法得法知法入法度諸疑惑不由他度於正法中得無所畏即從座起整衣服為佛作禮合掌白佛我今可得於正法中出家受具足不佛告憍慢婆羅門汝今可得於正法中出家受具足彼即出家獨正思惟所以善男子剃除鬚髮著袈裟衣正信非家出家學道得阿羅漢心善解脫如是我聞一時佛在拘薩羅人閒遊行至舍衛國祇樹給孤獨園時有長身婆羅門作如是邪盛大會以七百特牛行列繫柱特牸水牛及諸羊犢種種小䖝悉皆繫縛辦諸飲食廣行布施種種外道從諸國國皆悉來集邪盛會所時長身婆羅門聞沙門瞿曇從拘薩羅人閒遊行至舍衛國祇樹給孤獨園作是念我今辦邪盛大會所以七百特牛行列繫柱乃至小小諸䖝皆悉繫縛為邪盛大會故種種異道從諸國國來至會所我今當往沙門瞿曇所問邪盛法莫令我作邪盛大會分數中有所短少作是念已乘白馬車諸年少婆羅門前後導從持金柄傘蓋執金澡瓶出舍衛城詣世尊所恭敬承事至精舍門下車步進至於佛前面相問訊慰勞已退坐一面白佛言瞿曇我今欲作邪盛大會以七百特牛行列繫柱乃至小小諸䖝皆悉繫縛為邪盛大會故種種異道從諸國國皆悉來至邪盛會所又聞瞿曇從拘薩羅人閒遊行至舍衛國祇樹給孤獨園我今故來請問瞿曇邪盛大會法諸物分數莫令我所作邪盛大會諸分數之中有所短少佛告婆羅門或有一邪盛大會主行施作福而生於罪為三刀劒之所刻削得不善果報何等三謂身刀劒口刀劒意刀劒何等為意刀劒生諸苦報如一會主造作大會作是思惟我作邪盛大會當殺尒所少壯特牛尒所水特水牸尒所羊犢及種種諸䖝是名意刀劒生諸苦報如是施主雖念作種種布施種種供養實生於罪云何為口刀劒生諸苦報有一會主造作大會作如是教我今作邪盛大會汝等當殺尒所少壯特牛乃至殺害尒所微細䖝是名口刀劒生諸苦報大會主雖作是布施供養實生於罪云何為身刀劒生諸苦報謂有一大會主造作大會自手傷殺尒所特牛乃至殺害種種細䖝是名身刀劒生諸苦報彼大會主雖作是念種種布施種種供養實生於罪然婆羅門當勤供養三火隨時恭敬禮拜奉事施其安樂何等為三一者根本二者居家三者福田何者為根本火隨時恭敬奉事供養施其安樂謂善男子方便得財手足勤苦如法所得供養父母令得安樂是名根本火何故名為根本若善男子從彼而生所謂父母故名根本善男子以崇本故隨時恭敬奉事供養施以安樂何等為居家火善男子隨時育養施以安樂謂善男子方便得財手足勤苦如法所得供給妻子宗親眷屬僕使傭客隨時給與恭敬施安是名家火何故名家其善男子處於居家樂則同樂苦則同苦在所為作皆相順從故名為家是故善男子隨時供給施與安樂何等名田火善男子隨時恭敬尊重供養施其安樂謂善男子方便得財手足勤勞如法所得奉事供養諸沙門婆羅門善能調伏貪恚癡者如是等沙門婆羅門建立福田崇向增進樂分樂報未來生天是名田火何故名田為世福田謂為應供是故名田是善男子隨時恭敬奉事供養施其安樂尒時世尊復說偈言根本及居家應供福田火是火增供養充足安隱樂無罪樂世閒慧者往生彼如法財復會供養所應養供養應養故生天得名稱然婆羅門今善男子先所供養三火應断令滅何等為三謂貪欲火瞋恚火愚癡火所以者何若貪火不断不滅者自害害他自他俱害現法得罪後世得罪現法後世得罪緣彼而生心法憂苦恚火癡火亦復如是婆羅門若善男子事積薪火隨時辛苦隨時然隨時滅火因緣受苦尒時長身婆羅門默然而住時有婆羅門子名欝多羅於會中坐長身婆羅門須默然思惟已告欝多羅汝能往至邪盛會所放彼繫柱特牛及諸眾生受繫縛者悉皆放不而告之言長身婆羅門語汝隨意自在山澤曠野食不断草飲淨流水四方風中受諸快樂欝多羅白言隨大師教即往彼邪盛會所放諸眾生而告之言長身婆羅門語汝隨其所樂山澤曠野飲水食草四風自適尒時世尊知欝多羅知已為長身婆羅門種種說法示教照喜如律世尊說法先後說戒說施及生天功德愛欲味患出要清淨煩惱清淨開示現顯譬如鮮淨白㲲易受染色長身婆羅門亦復如是即於座上見四真諦得無閒等時長身婆羅門見法得法知法入法度諸疑惑不由他度於正法中得無所畏即從座起整衣服偏袒右肩合掌白佛已度世尊我從今日盡其壽命歸佛歸法歸比丘僧為優婆塞證知我惟願世尊與諸大眾受我飯食尒時世尊默然而許時長身婆羅門知佛受請已為佛作禮右繞三帀而去長身婆羅門還邪盛處所諸供辦淨羙好者布置牀座遣使請佛白言時到惟聖知時尒時世尊著衣持鉢大眾圍繞往到長身婆羅門會所大眾前坐時長身婆羅門知世尊坐定已手自供養種種飲食食已澡漱洗鉢畢別敷卑牀於大眾前端坐聽法尒時世尊為長身婆羅門說種種法示教照喜已從座起而去
