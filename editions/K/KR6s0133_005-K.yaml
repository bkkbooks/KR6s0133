body:
  text: 沙門守其等奉勑挍勘詩凾蘇悉地羯羅供養法三卷輸波迦羅唐言善無畏譯丹藏即云蘇悉地羯羅經名既不同文亦大異譯人一也今撿丹藏之經國宋藏中始終皆無供養法者丹藏亦於感凾有之委尋開元貞元二錄善無畏譯只有三經一法而無此供養法今以目錄雖無詳其文義非是後人偽妄集者故依丹藏兩俱存焉蘇悉地羯囉經卷上大唐中天笁三藏輸波迦羅譯請問品第一尒時忿怒軍茶利菩薩合掌恭敬頂禮尊者執金剛足發如是問我曾往昔於尊者所聞一切明王曼茶羅法及以次第復聞明王并諸眷属神驗之德願為未來諸有情故唯願尊者廣為解說以何法則持誦真言速得成就其真言字雖有一體所成就法其數無量以頌偈問云何真言相及阿闍梨相云何成就者并說伴侶相方所何為勝何處速易成云何調伏相及應不應作云何誦真言方便及次第何花得易成云何用塗香云何供養食復燒何等香云何然燈相云何扇底迦云何增益相云何降伏怨於此三種中各成何等事云何上中下次第成就相以何法請召云何供養之云何作護身云何廣持誦何相誦真言云何作灌頂真言試何相云何當受持云何字得圓云何得增益云何作護摩及以次第法復用何等物能令速成就云何成就諸藥相云何而受諸藥相云何能淨諸藥法云何藥量及多少彼諸藥等并相貌唯願尊者具慈悲一一分明為我說云何護諸成就物及以分別為分數云何受用成就物唯垂分別說彼相云何失物令却得云何被破令著彼云何先知作㝵相云何成就曼茶羅云何辦事曼茶羅云何灌頂曼茶羅如上諸所問及以隨要者為諸眾生故唯願廣分別蘇悉地羯囉經真言相品第二尒時吉祥莊嚴一切持明應供養手執金剛大悲菩薩告彼金剛大精進忿怒軍茶利言善哉善哉大忿怒能於我所發如斯問應當一心諦聽是勝上微妙法則此蘇悉地羯囉有五種莊嚴一謂大精進二謂明王三能除障四能成就一切勇猛事五能成就一切真言此蘇悉地經若持餘真言法不成就者能兼持此經本真言當速成就於三部中此經為王亦能成辦一切等事所為護身結界召請等事供養相助决罰教授等事一切真言能得成就復次或有心真言中有三𤙖字者亦能成辦如上所說一切法事三𤙖心真言曩上謨上囉怚囊上二合怚囉二合夜也囊上莽室戰二合拏嚩日囉二合簸儜上曳莽訶上也乞沙二合細囊鉢多上曳唵蘇悉地也二合悉地也娑去大也蘇悉地羯羅𤙖𤙖𤙖泮吒二合泮吒復次上中下成就法如別經中說欲求成就者須解真言上中下法此經通攝三部所作曼茶羅法佛部真言扇底迦觀音真言補瑟徵迦金剛真言阿毗遮嚕迦從腋至頂為上品從臍至腋為中品從足至臍為下品於真言中亦應分別三種成就於此三部各分為三善須了解於三部中真言明王是上成就諸餘使者制吒制徵等真言是下成就諸餘尊者所說真言是三種事法者一扇底迦法二補瑟迦法三阿毗遮嚕迦法凡是三事於三部中各各皆有應須善知分別次第佛部之中用佛眼号為佛母用此真言為扇底迦佛母真言曰曩謨婆去伽嚩姤烏瑟膩二合沙去也唵一嚕嚕娑普二合嚕二什嚩二合囉三底瑟吒二合四悉䭾去路者寧五薩囉嚩引二合囉他二合娑引䭾寧六娑嚩二合訶誦三遍蓮花部中用觀音母号為半拏羅縛悉寧用此真言為扇底迦觀音母真言曰那囉舍二合曩婆縛二合囉舍囊引弊毗也反嚩平室囉二合嚩娑莽二合囉囊者瀉莽上舍薩囉嚩二合薩怛嚩引二合難去薩囉嚩二合微也二合地指枳怛瑳上迦怛姪他唵迦𪘨微迦𪘨迦吒微迦吒迦楨吒應反迦𪘨婆去伽輕呼嚩底丁以反微惹而也反曳娑嚩訶三遍金剛部中用執金剛母号為忙莽雞用此真言為扇底迦金剛母真言曰曩謨引囉怛曩二合怛囉二合夜也曩莽室戰二合拏嚩日囉二合簸儜上曳摩訶去藥乞沙二合細囊鉢多上曳唵俱上蘭達哩滿䭾滿䭾𤙖大聲泮吒三遍又佛部中用明王真言明王号曰最勝佛頂用此真言為補瑟徵迦明王真言曰曩莽三漫多沒䭾難去唵悖𡃝引二合曩莽蓮花部中亦用明王号曰訶野釳利嚩用此真言為補瑟徵迦明王真言曰唵闇沒栗二合姤椰婆上二合嚩曩莽莎去訶金剛部中亦用明王号曰蘇嚩用此真言為補瑟徵迦真言曰曩謨囉怛曩二合怛囉二合夜也曩莽室戰二合拏嚩日囉二合簸儜上曳莽訶去藥乞沙二合細囊鉢多上曳唵素唵二合婆寧上素唵二合婆𤙖釳㗚二合恨儜釳㗚恨儜𤙖阿去囊也𤙖薄伽輕𭊃尾你夜二合囉引惹𤙖泮吒二合曩莽又佛部中用大忿怒号曰阿鉢囉氏多用此真言為阿毗遮嚕迦真言曰𤙖泮吒二合縛迦輕縛迦輕指囊悉指迦輕二合𤙖泮吒二合蓮花部中大忿怒号曰施嚩去嚩平訶用此真言為阿毗遮嚕迦真言曰𤙖泮吒二合嘻唎二合𤙖泮吒二合金剛部中大忿怒号曰軍茶利用此真言為阿毗遮嚕迦真言曰曩謨囉怛曩怛囉二合夜也曩莽室戰拏嚩日囉二合簸儜上曳莽訶藥乞沙二合細囊鉢多曳唵闇沒㗚二合多軍茶里佉佉佉佉却引醢却醢底瑟咤底瑟咤滿䭾滿䭾賀囊賀囊釳囉若微丑疑反釳囉若徵娑鋪吒也娑鋪吒也薩囉嚩二合尾近囊上微囊也迦引莽訶去儜上鉢底丁以反餌尾旦多羯囉引也𤙖泮吒二合復次或有真言不入三部隨彼真言文字而辦扇底迦等三種法事其真言中若有扇底句嚕字令吉祥也閦莽字除也鉢囉二合閦莽字極淨也烏波閦莽字更除也莎去訶去字者當知即是扇底迦真言若有補瑟徵字增益也落乞澁民三合具相也那那與也謂烏去乳字威德也麼羅力也嚩㗚二合地增也露波咩䭾聰也但囊財也但寧上也藏也二合䤈里寧上也金也囉引莽村邑也囊上囉城也囉引瑟吒二合堡也囉引尒閻主也二合那那字也者當知即是補瑟徵迦真言若有𤙖字賀曩擊也泮吒二合破也莽他二合摧也畔若打破也烏柘吒也楚切也烏槎去𦘺也用力勿放也戍沙也消枯也忙囉也也却引那也食也枳攞也釘也齒曳二合挪也断壞也婆去悉咩二合砵也句嚕字者當知即是阿毗遮嚕迦真言復有真言句義慈善當知即入扇底迦用若有真言句義猛怒當知即入阿毗遮嚕迦用若有真言非慈非猛當知即入補瑟徵迦用復次若欲速成扇底迦者當用佛部真言若欲速成補瑟徵迦者當用蓮花部真言若欲速成阿毗遮嚕迦者當用金剛部真言復次此經深妙如天中天亦有真言上中之上若依此法一切諸事無不成就此經雖属金剛下分以奉佛教勑許通成故亦能成就上二部法譬如國王勑許依行此法亦尒准義應知若有真言字數雖少初有唵字後有莎去訶字當知真言速能成就扇底迦法或有真言初有𤙖字後有泮吒字或有普字此是訶聲有如上字真言速得成就阿毗遮嚕迦法或有真言初無唵字復無莎訶字又無𤙖字亦無泮吒字及無普等字者當知此等真言速能成就補瑟徵迦法若復有人欲求攝伏諸餘鬼魅及阿毗舍當用使者及制吒迦等所說真言速得成就若復有異部真言云能成就一切事者但能成就本部所說不通餘部猶有經演彼有真言為除毒病故說亦能除餘諸苦當即知其通一切用善知其部善識真言所應用處亦須知其真言功力復須善解修真言法隨所求隨稱彼法真言言相誦彼真言即得成就蘇悉地羯囉經分別阿闍梨相品第三復次我今當說阿闍梨相一切真言由彼而得故知闍梨最為相本其相者何謂支分圓滿福德莊嚴善須知解世出世法恒依法住不行非法具大慈悲怜愍眾生貴族生長性調柔耎隨所共住皆獲安樂聡明智慧辯才無㝵能懷忍辱亦無我慢常樂大乘及解妙義深信秘密之門縱有小罪猶懷大怖身口意業善須調柔常樂轉讀大乘經典復依法教勤誦真言而不閒断所作悉地皆悉成者復須善解𦘕曼茶羅常具四攝為求大故不樂小緣永離慳曾入大曼茶羅而受灌頂復為先師而歎德者汝從今往堪授灌頂為阿闍梨獲斯印可方合自手造曼茶羅須依次第亦合授與弟子真言若依此者所受真言速得成就不可懷疑不於和上阿闍梨處擅誦真言徒用功勞終不獲果弟子之法視阿闍梨猶如三寶及菩薩等為能授與歸依之處於諸善事而為因首現世安樂當來獲果為依阿闍梨故不久而得無上勝事所謂菩提以是義故比之如佛以為弟子承事闍梨無有懈怠勤持不闕所授明王及明王妃當得悉地必無疑也蘇悉地羯囉經分別持誦真言相品第四復次我今演說持誦真言速獲成就修行法相三業清淨心不散亂曾無閒断常修智慧能行一法成就眾事復離慳恡所出言辝無有滯㝵處眾無畏所作速辦常行忍辱離諸諂倿無諸𤵜病常行實語善解法事年歲少壯諸根身分皆悉圓滿於三寶處常起信心修習大乘微妙經典諸善功德無懷退心如此之人速得成就於諸菩薩及以真言常起恭敬於諸有情起大慈悲如此之人速得成就常樂寂靜不欲眾𠆴恒行實語作意護淨如此之人速得成就若聞執金剛菩薩威力自在聞已諦信心生歡喜如此之人速得成就若人少欲及以知足誦持真言念所求事日夜不絕如此之人速得成就若人初聞真言法則身毛皆竪心懷踊躍歡喜如此之人成就法器若人夢中自見悉地如經所說心樂寂靜不與眾居如此之人速得成就若人復有於阿闍梨所敬重如佛如此之人速得成就若人持誦真言久無効驗亦不弃捨倍增廣願轉加精進以成為限如此之人速得成就蘇悉地羯囉經分別同伴品第五復次當說其同伴相福德莊嚴貴族生者常樂正法不行非法復懷深信離諸恐怖精進不退奉行尊教常作實語諸根支分皆悉圓滿身無疾病不過大長復不大短不大𦘺亦不瘦小不用大黑亦不極白離此諸過福德同伴能忍諸苦善解真言及曼茶羅供養次第諸餘法則常修梵行忍順諸事出言柔耎令人樂聞離諸我慢強記不忘有教奉行不相推託多聞智慧慈心不瞋常念布施善解分別明王真言常須念誦所持真言與尊行同兼明結界護身等法得如是伴當速成就三業調善曾於師所入曼茶羅歸依佛教不習邪法善知尊者所須次第不待言教隨有所求知時即送具如此者為勝同伴身意賢善心無憂𢙉决定堅固終不退心得如是伴當速成就於多財利不生貪著具如是德說為勝伴復於行者心無捨離若欲成就諸餘藥等為作強緣不應捨離自然聖戒具如是德說為勝伴於行者處無所規求未得悉地成就以來終不捨離縱淹年歲復無悉地終不懷於捨離之心假有大苦及餘難事逼切身心亦不應捨具如是德說為勝伴若有如前種種德行堪能成就最上勝事縱無前德但明真言成就法則并須善解諸曼茶羅智慧高明復加福德勝持誦者如是之伴亦能成就最上勝事為欲成就最上勝事故其福德伴半月半月與持誦者而作灌頂及以護摩隨時所辦香花然燈諸餘次第擁護揀擇隨所有為並須助作非直助修如前等事若持誦者有所虧失其福德伴依於經法以理教誨勿令有闕及至廣為開示因緣具如是者最為勝伴行者每日持誦之時及所行事有時忘失其福德伴隨所見處相助作之使令周備若欲成就藥法之時須常以手按其藥或以草幹而用按之念誦作法事務雖多終不廢忘行者持誦欲了之時其伴當須側近而立看彼行者念誦既勞或恐忘作發遣尊法置數珠法及餘法等見彼忘處應助作之其伴常須持誦供養所作諸事而生福德並皆迴向持真言者滿所求願有所指授唯共伴語既欲成就最勝事故更許一伴展轉令語不得叅差其伴所食與行者同行者所食如依法制具如是者堪為最上勝事同伴第三同伴福德亦然一如前說蘇悉地羯囉經揀擇處所品第六復次演說持誦真言成就處所者於住何方速得成就佛所得道降四魔軍如是之處最為勝上速得成就𡰱連禪河於彼岸側無諸難故其地方所速得悉地縱有眾魔不能為障所求之事無不成就如是之處速得悉地或於佛所轉法輪處或於拘尸那城佛涅盤處或於迦毗羅城佛所生處如上四處最為勝上無障嬈故三種悉地决定得成又於諸佛所說勝處復有菩薩所說勝處佛八大塔或於名山多諸林木復多果實泉水交流如是之處說為勝處或於蘭若多諸花果復有水流人所愛樂如是之處說為勝處復有蘭若多諸麋鹿無人採捕復無羆熊虎狼等獸如是之處說為勝處或無大寒復無大熱其處冝人心所樂者如是之處說為勝處或於山傍或山峯頂或獨高臺或於山腹中彼復有水如是之處說為勝處復有勝處青草遍地樹多諸花中有其木堪作護摩如是之處說為勝處或於安置舍利塔前或於山中安舍利處或四河邊或有蘭若種種林木而飾嚴之無多人處或於寒林煙不絕處或大河岸或大池邊或於曾有多牛居處或於逈獨大樹之下神靈所依日影不轉或多聚落一神祠處或於十字大路之邊或龍池邊如是之處說為勝處或佛經行所至之國如是之方速得成就但有國土諸人四軰深信三寶𪪺揚正法如是之處速得成就復有國土多諸仁眾并具慈悲如是之處速得成就既得如是上妙處所應須揀擇地中穢𢙣瓦礫等物曼茶羅品一一廣明如悉地法善須分別三部處所復須分別扇底迦法補瑟徵迦阿毗遮嚕迦如是三法復須分別上中下成即於是處隨心所冝應塗灑掃作諸事業速得成就悉地之法蘇悉地羯囉經持戒品第七復次廣說制持真言法則若依此戒不久當獲成就若有智者持諸真言先断於瞋乃至邪神不應生忿復於餘類持真言者亦不懷瞋於諸真言不應擅意乃至功德及諸法則而分別之應於諸真言及以法則深生敬重於諸𢙣人善須將護何以故能障大事及壞彼故於阿闍梨所縱見愆過三業猶不生於憍慢之心口不談說種種是非心意終不分別愆過之想縱有愆過尚不談說况依法耶縱他懷𢙣終不加報又復不得以自所持真言縛他明王及生害并苦治罰亦復不應作降怨法未曾經於阿闍梨處而受真言者不應與彼受持又於三寶處不生恭敬者及是外道雖於阿闍梨所受得真言後退本心亦不可與乃至手印及以真言并功能法及普行法並不應與未曾經入曼茶羅者亦不授與不應跳驀一切有情兩足之類乃至多足亦復如是又不應驀諸地印過所謂鎚輪棒杵螺拔折羅等及以索成並不應驀諸餘藥草根莖枝及以子實亦不應驀亦不弃於不淨之中若樂成就真言法者應須依制不應詰難大乘正義若聞菩薩甚深希有不思議行應生諦信不懷疑心持真言人不應與彼別持誦人更相施驗若緣小過不應作降伏法樂成就人不應歌詠調戲又為嚴身故不應塗飾及帶花鬘亦不跳躑而行亦不河中浮戲略而言之身諸調笑皆不應作口業不善皆不應作所謂作虛誑語染汙心語離閒和合𢙣口罵詈所作對荅不假多言無益言談終不習學亦復不與外道共住及以難詰旃茶羅類皆不與語不應與於諸人談話唯除同伴當念誦時縱是同伴亦不與語持誦餘時自非所須不與伴語亦不以油塗身又不應喫五辛䓗䔉蘿蔔油麻并酢及餘一切諸菜茹米粉豆餅并𮩈畢豆及油麻餅并作團食皆不應喫一切毗那夜迦所愛之食及供養殘食油麻粳豆粥及以乳粥皆不應食一切車乘及以鞍乘皆不乘騎及所被驀食并被觸食並不得食又一切嚴身之具所謂鏡花并以粉藥傘蓋非因緣事不應以手揩手以脚揩脚不於一切水中及側近水大小便不應以手承食而食亦不用鎚銅器食其諸中不翻盛食不臥大小床榻亦不與人同臥欲臥之時安心寂靜清淨而臥尋思智慧不覆面而臥亦不仰臥如師子王右脅而臥當臥之時不得張目而睡曰不應再食不應断食不應多食不應全少於食有疑不須食之一切調戲及多人叢聚乃至女人皆不觀看身口意等所受好房舍及好飲食皆不應著應受𢙣房舍及𢙣飲食皆不應弃不應著紫衣裳及不著故破之衣垢穢之衣念誦之時應著內衣亦不自卑下云多愆犯無由得成悉地復為宿世之業身嬰諸疾終不應違闕念誦於阿闍梨邊所受真言終不捨弃於其夢中或於虛空又聲告言汝不應持是真言如是頻聞亦不捨弃復不瞋彼何以故並是魔故唯須精進不應退止心不𢙣思攀緣諸境縱放諸根恒常護淨而念誦之若求大成就自所持真言不應攝伏魍魎亦不擁護自他亦不救難及禁諸毒非持所持真言諸餘真言亦不應作所有隨用一切真言皆不應頻頻而作亦不與人㸦諍驗力若欲求悉地當須三時持誦三時洗淨洗淨淨時非但空水和真言水而洗淨之水真言曰唵𤙖賀曩嚩日哩二合嚩日𭋤儜上賀上驚聲澡浴之時應用淨土遍身塗洗用真言土誦經七遍土真言曰唵嚩日囉二合賀囉𤙖水土之中多有行障毗那夜迦先須發遣然後用之誦此真言而遣逐之於水土中遣障真言曰曩謨嚩日囉引也𤙖賀曩度曩莽他尾特瞢二合娑瑜瑳去囉也泮吒又先取水以手和攪誦真言訖而用澡浴澡浴真言曰曩謨囉怛曩二合怛囉二合夜也娜莽室戰二合拏嚩日囉二合簸儜上曳摩訶法藥乞沙二合細囊鉢多上曳娜謨上能去用此真言水隨意澡浴澡浴之時不應談話澡浴未了已來常須心念次下心真言浴時心真言曰唵闇沒二合帝𤙖泮吒二合澡浴既了應以兩手掬水一掬用前心真言加之經誦七遍用灌其頂如是三度應結頂髮誦真言之經七遍當頂作髻若是出家應以右手為拳置於頂上如前遍數同結頂髮頂髮真言曰唵蘇悉地羯哩莎去訶次應洗手取水三度漱口然後浴自本尊用本真言誦經七遍誦漱口真言遍身五處唵枳里枳里嚩日囉𤙖泮吒二合澡浴都了想浴本尊復於其處當誦所持真言任誦多少然始可往常念誦處乃至未到彼所已來不懷貪瞋隨順諸境身心清淨敬想本尊而徐徐往堅持禁戒如前所制當持不忘既到彼所即應如法作諸事業而念誦之當湏作曼茶羅常念誦既疲當須轉讀大乘經典或作制多諸餘善事常不廢忘應須三時歸依三寶三度懺悔諸餘罪業三時發菩提心若如是者當得成就三時發願願成所勝事為除罪故應當依教作諸善業常行惠施具大慈悲於諸法教不生慳恡常懷忍辱精進不退深懷歸信六念在心所聞經典諦思其義常須轉讀真言功德當須供養真言法經依善畫妙曼茶羅應須入發之初令諦信比丘入之比丘𡰱優婆塞優婆夷隨次入之並皆堅固發菩提心决定心正見入曼茶羅了應當授與結手印法及真言并以法則亦應正說廣為宣說一切真言法則或十四日或月八日及以月盡日或十一日十五日如是之日倍加供養及以持誦并作護摩加持禁戒常須憶念倍加諸事真言速成作護摩時常須以手持拔折羅誦真言之經餘千遍或一百遍辦事金剛真言曰唵度曩嚩日囉二合賀諸事金剛應用天火所燒之木或苦練木或取燒屍殘火糟木或用白檀或紫檀木隨取一木作拔折羅應施三股護摩之時及念誦時常以左手而執持之能成諸事故号拔折羅若持此金剛者一切毗那夜迦及餘作障者並皆恐怖馳散而去以紫檀香塗是金剛置本尊前當用如前所說真言持誦花香而供養之其諸事業金剛秘密微細能成就諸餘事等作諸事時常須右手帶持珠索以香塗之誦真言之一百遍或一千珠索真言曰唵句蘭達哩滿䭾滿䭾𤙖泮吒二合此明王大印名忙莽雞能成一切明王真言亦能增益及能滿足真言字句亦能成就諸餘法乃至護身等事非直但是諸明王母亦是金剛之母若金剛部珠索著一嗚嚕捺囉叉穿於線中後繫為結金剛部中既尒餘二隨可知佛部珠索應用佛母真言若蓮花部珠索應用半拏囉嚩斯泥真言金剛部珠索應用忙莽雞真言三部母真言准前說之帶持此珠索者毗那夜迦不能為障身得清淨當速成就滿所求願又作法之時當用茅草作鐶置於右手無名指上應誦當部三字半心真言經百遍或經千遍後安指上佛部心真言曰尒曩尒迦輕蓮花部心真言曰阿去𡀔力迦輕金剛部心真言曰嚩日囉地嘞二合迦輕供養之時持誦之時護摩等時應著草鐶以著此草鐶故罪障除滅手得清淨所作皆成復取白㲲絲及以麻縷令童女染作紅色或作欝金色合作線結為真言索一結應誦七遍真言經餘七結置本尊前以真言持經一千遍念誦之時及護摩時并以臥時臥時者暮時也應用繫腰夜臥之時不失精穢故常須作加持索真言曰唵賀囉賀囉滿馱寧上束訖囉二合䭾囉𡰱上悉馱囉替二合莎去訶去念誦之時及護摩時應須上下著衣偏袒右肩若以臥時洗淨及浴之時不在此制所著上衣應真言之若大小便應著木履若於本尊前及和上阿闍梨前并餘尊宿前不應著之於諸尊處用身口意而供養之若樂悉地速得成者若見制多及以比丘常應禮敬若遇外天形像但應合掌或誦伽陁若見尊者亦應致禮若聞妙法深生敬信若聞菩薩不思議相或聞真言所成諸事皆應歡喜心懷踊躍若樂速成者常應勇進不生懈怠如前所制常須思念若不如是者當違制戒獲大重罪悉地不成身等諸根恒常憶念不應貪著諸欲復須常行如前所制不可廢忘若晨朝時造諸𢙣業至於暮閒即懺悔若於夜中縱造諸業至晨朝時誠心懺悔復須清淨念誦及以護摩供養等如依本戒應須如是遣度時日當於明王戒中常須作意不久住於悉地之中
