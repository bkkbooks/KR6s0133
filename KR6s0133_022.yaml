body:
  text: 沙門守其等奉勑挍勘隨函摩訶僧祇比丘尼戒本東晉法顯共覺賢譯按此戒者宋本與國本多同丹本與二本大異今對同譯本律尼部及比丘同戒撿之丹本乃正其國宋二本亦非異譯但文句多涉四分之言故有異耳未詳厥由今取丹本對律挍正入藏而衆學初有十三戒丹本所無者今勘諸律及五部戒本㸦有一二或並無者既未詳故不忍刪去并取入之直注其下云外函沙彌尼離戒文失譯附東晉録按此戒名國本宋本及開元録皆云沙彌尼離戒文丹本即云沙彌尼雜戒文今撿正文諸本皆非何則按此譯之離字與他譯之尼字但梵音楚夏耳曾不是沙彌尼之離戒文亦不是沙彌尼之雜戒文並乖正文故今可直云沙彌離戒文方乃正耳然三本皆無不敢擅改直書其意以待雅正君子焉傳函四分比丘尼羯磨一卷丹本云宋求那跋摩譯宋本但云女人出家事按此羯磨一卷宋本與國本則同丹本將二本獨異何耶今撿丹本與懷素所集文義大同又其起盡有倫敘可觀知是跋摩所譯正本故取之入藏彼國宋二本甚是錯亂凡尼出家始終之例初求出家次受十戒學法二歲受具足戒久後方𠧒畜衆羯磨度人受戒乃其序也二本於受六法請和尚文重用沙彌請十戒文此一亂也以𠧒畜衆文繫乎受大戒前二亂也凡尼受戒先於尼僧中受後至大僧而受二本即云二部僧聽不分先後三亂也其學戒六法中四分即以非時食與飲酒為第五六而二本乃以摩觸八事為五為六四亂也首題既云尼羯磨二本即有比丘度沙彌法沙彌受十戒法大僧受具戒法等五亂也開元録云宋求那跋摩譯二本但云女人出家法六亂也故知二本是乃後代無稽之人臆度亂鈔耳不可依用今故遆之四分比丘尼羯磨法宋𦋺賓三藏求那跋摩譯結界法第一其諸結界羯磨作法與上大僧同唯稱尼大姊為異受戒法第二比丘尼乞畜衆羯磨文若比丘尼欲度人者當往比丘尼僧中偏露右肩脫革屣禮僧足已右膝著地合掌乞畜衆羯磨作如是白大姊僧聽我比丘尼某甲今從僧𠧒度人授具足戒願僧聽我度人授具足戒如是三說與畜衆羯磨文大姊僧聽此比丘尼某甲今從僧𠧒度人授人具足戒若僧時到僧忍聽僧今聽比丘尼某甲度人授人具足戒白如是大姊僧聽此比丘尼某甲今從僧乞度人授人具足戒僧今聽比丘尼某甲度人授人具足戒誰諸大姊忍僧聽比丘尼某甲度人授人具足戒者默然誰不忍者說僧已忍聽比丘尼某甲度人授人具足戒竟僧忍默然故是事如是持度沙彌尼文若欲在寺內剃髮者應白一切僧若不和合應房房語令知若和合應作白然後與剃髮應作如是白大姊僧聽此某甲欲從某甲求剃髮若僧時到僧忍聽為某甲剃髮白如是白已為剃髮欲在寺內出家者應白一切僧若不和合應房房語令知若和合應作白然後與出家應作如是白大姊僧聽此某甲欲從某甲求出家若僧時到僧忍聽與某甲出家白如是應作如是出家教出家者著袈裟已偏露右肩脫革屣右膝著地合掌教作如是白我阿夷某甲歸依佛歸依法歸依僧我今隨佛出家和尚尼某甲如來無所著等正覺是我世尊如是三說我阿夷某甲歸依佛竟歸依法竟歸依僧竟我今隨佛出家竟和尚尼某甲如來無所著等正覺是我世尊亦如是三說已應與受戒盡形壽不得殺生是沙彌尼戒能持不答言能盡形壽不得盜是沙彌尼戒能持不答言能盡形壽不得淫是沙彌尼戒能持不答言能盡形壽不得妄語是沙彌尼戒能持不答言能盡形壽不得飲酒是沙彌尼戒能持不答言能盡形壽不得著花鬘香油塗身是沙彌尼戒能持不答言能盡形壽不得歌舞倡伎亦不觀聽是沙彌尼戒能持不答言能盡形壽不得高廣大牀上坐是沙彌尼戒能持不答言能盡形壽不得捉持生像金銀寶物是沙彌尼戒能持不答言能盡形壽不得非時食是沙彌尼戒能持不答言能如是沙彌尼十戒盡形壽不得犯能持不答言能汝已受戒竟當供養三寶佛寶法寶僧寶當修三業坐禪誦經勸助衆事聽童女十八者二歲學戒年滿二十二部僧中受大戒若年十歲曾出適者聽二歲學戒年滿十二與受大戒應如是與二歲學戒式叉摩那受六法文沙彌尼應往比丘尼衆中偏露右肩脫革屣禮比丘尼僧足已右膝著地合掌白如是言大姊僧聽我沙彌尼某甲今從僧𠧒二歲學戒和尚尼某甲願僧濟度我慈愍故如是三說應將沙彌尼至離聞處著見處已衆中應差堪作羯磨者如上應作白言大姊僧聽此某甲沙彌尼今從僧𠧒二歲學戒和尚尼某甲若僧時到僧忍聽僧今與某甲沙彌尼二歲學戒和尚尼某甲白如是大姊僧聽此某甲沙彌尼今從僧𠧒二歲學戒和尚尼某甲僧今與某甲沙彌尼二歲學戒和尚尼某甲誰諸大姊忍僧與某甲沙彌尼二歲學戒和尚尼某甲者默然誰不忍者說是初羯磨如是三說僧已忍與某甲沙彌尼二歲學戒和尚尼某甲竟僧忍默然故是事如是持應如是與六法某甲諦聽如來無所著等正覺說六法不得犯不得行淫欲法若式叉摩那行淫欲法非式叉摩那非釋種女與染汙心男子共身相摩觸鈌戒應更與受戒是中盡形壽不得犯能持不答言能不得偷盜乃至草若式叉摩那取人五錢若過五錢若自取教人取若自斫教人斫若自破教人破若燒若埋若壞色非式叉摩那非釋種女若取減五錢戒應更與受戒是中盡形壽不得犯能持不答言能不得故斷衆生命乃至蟻子若式叉摩那故自手斷人命求刀授與人教死勸死讚死若與非藥若墮胎厭禱呪術自作教人作者非式叉摩那非釋種女若斷畜生不能變化者命戒應更與受戒是中盡形壽不得犯能持不答言能不得妄語乃至戲笑若式叉摩那不真實非己有自稱言得上人法言得禪得解脫得三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍鬼神來供養我此非式叉摩那非釋種女若於衆中故作妄語戒應更與戒是中盡形壽不得犯能持不答言能不得非時食若式叉摩那非時食犯戒應更與戒是中盡形壽不得犯能持不答言能不得飲酒若式叉摩那飲酒犯戒應更與受戒是中盡形壽不得犯能持不答言能式叉摩那於一切尼戒中應學除為比丘尼過食自受食食式叉摩那受大戒法若式叉摩那學戒已年滿二十若滿十二應與受大戒先至比丘尼僧中請和尚應如是言大姊一心念我某甲求阿姨為和尚願阿姨為我作和尚我依阿姨故得受大戒如是三說和尚尼應答言爾應如是受持受戒人離聞處著見處應差教授師是中戒師應如是問言此衆中誰能為某甲作教授師若有者答言我能爾時戒師即應作白大姊僧聽此某甲從和尚尼某甲求受大戒若僧時到僧忍聽某甲為教授師白如是教授師應往至受戒人所語言此安陀會鬱多羅僧僧伽梨此僧祇支覆肩衣此衣鉢是汝有不答言已有善女人諦聽今是真誠時我今問汝有便言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不殺父不汝不殺母不汝不殺真人阿羅漢不汝不破僧不汝不惡心出佛身血不汝非非人不汝非畜生不汝非二根不汝字何等和尚尼字誰年歲滿不衣鉢具足不父母夫主聽汝不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩乾痟癲狂二根一道合道小大小便常漏涕唾常出汝有如是諸病不答言無者應語言如我向問汝僧中亦當如是問如汝向者答我僧中亦當如是答教授師問已應至僧中如常威儀至舒手及處立應作白大姊僧聽此某甲從和尚尼某甲求受大戒若僧時到僧忍聽我已教授竟聽使來白如是彼應語言來來已應與捉衣鉢教禮僧足已在戒師前䠒跪合掌作如是乞大姊僧聽我某甲從和尚尼某甲求受大戒我某甲今從僧乞受大戒和尚尼某甲願僧濟度我慈愍故如是三說是中戒師應作白大姊僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲若僧時到僧忍聽我問諸難事白如是汝諦聽今是真誠時我今問汝有當言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不殺父不汝不殺母不汝不殺真人阿羅漢不汝不破僧不汝不惡心出佛身血不汝非非人不汝非畜生不汝不二根不汝字何等和尚尼字誰年歲滿不衣鉢具足不父母夫主聽汝不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩乾痟癲狂二根二道合道小大小便常漏汝有如是諸病不答言無應作白大姊僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲某甲自說清淨無諸難事年滿二十衣鉢具足若僧時到僧忍聽僧今為某甲受大戒和尚尼某甲白如是大姊僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲某甲自說清淨無諸難事年歲已滿衣鉢具足僧今為某甲受大戒和尚尼某甲誰諸大姊忍僧今為某甲受大戒和尚尼某甲者默然誰不忍者說是初羯磨第二第三亦如是說僧已忍與某甲受大戒竟和尚尼某甲僧忍默然故是事如是持尼往比丘僧中受大戒法彼受戒者與比丘尼僧俱至比丘僧中禮僧足已右膝著地合掌作如是言大德僧聽我某甲從和尚尼某甲求受大戒我某甲今從僧乞受大戒和尚尼某甲願僧救濟我慈愍故如是三說此中戒師應問諸難事作白大德僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲若僧時到僧忍聽我問諸難事白如是善女人諦聽今是真誠時實語時我今問汝有當言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不殺父不汝不殺母不汝不殺真人阿羅漢不汝不破僧不汝不惡心出佛身血不汝非非人不汝非畜生不汝不二根不汝字何等和尚尼字誰年滿二十未衣鉢具足不父母夫主聽汝不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩乾痟癲狂二根二道合道小大小便常漏涕唾常出汝有如是諸病不答言無者應問言汝學戒未清淨不答言學戒清淨應問餘比丘尼某甲學戒未清淨不答言已學戒清淨大德僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲某甲自說清淨無諸難事年歲已滿衣鉢具足已學戒清淨若僧時到僧忍聽僧今為某甲受大戒和尚尼某甲白如是大德僧聽此某甲從和尚尼某甲求受大戒此某甲今從僧乞受大戒和尚尼某甲某甲自說清淨無諸難事年歲已滿衣鉢具足已學戒清淨僧今為某甲受大戒和尚尼某甲誰諸長老忍僧為某甲受大戒和尚尼某甲者默然誰不忍者說是初羯磨如是三說僧已忍為某甲受大戒竟和尚尼某甲僧忍默然故是事如是持善女人諦聽如來無所著等正覺說八波羅夷法若比丘尼犯者非比丘尼非釋種女不得犯不淨行行淫欲法若比丘尼作不淨行行淫欲法乃至共畜生此非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得偷盜乃至草若比丘尼盜人五錢若過五錢若自取教人取若自斫教人斫若自破教人破若燒若埋若壞色非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得斷衆生命乃至蟻子若比丘尼若自手斷人命持刀授與人教死讚死勸死與人非藥墮胎厭禱呪術若作方便教人作方便彼非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得妄語乃至戲笑若比丘尼不真實非己有自稱言得上人法得禪得解脫三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養我彼非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得身相觸乃至共畜生若比丘尼有染汙心與染汙心男子身相觸腋已下膝已上若摩若逆摩若順摩若牽若推若舉若下若捉若急捺彼非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得犯八事乃至共畜生若比丘尼有染汙心與染汙心男子受捉手捉衣至屏處屏處立屏處語若共行若身相近若共期行犯此八事彼非比丘尼非釋種女是中盡形壽不得犯能持不答言能不應覆藏他罪乃至突吉羅惡說若比丘尼知比丘尼犯波羅夷不自舉亦不白僧不語人令知後於異時此比丘尼若休道若滅𢷤若作不共住若入外道後作如是言我先知此人如是如是彼非比丘尼非釋種女覆藏重罪故是中盡形壽不得犯能知不答言能不得隨被舉比丘語乃至沙彌若比丘尼知比丘為僧所舉如法如毗尼如佛所教犯威儀未懺悔不作共住便隨順彼比丘彼比丘尼諫此比丘尼言大姊彼比丘為僧所舉如法如毗尼如佛所教犯威儀未懺悔不共住莫隨順彼比丘彼比丘尼諫此比丘尼時堅持不捨彼比丘尼應乃至三諫捨此事故乃至三諫捨者善若不捨者彼非比丘尼非釋種女犯隨舉是中盡形壽不得犯能持不答言能善女人諦聽如來無所著等正覺說四依法比丘尼依此出家受大戒是比丘尼法依糞掃衣出家受大戒是比丘尼法是中盡形壽能持不答言能若得長利若檀越施衣若得輕衣若得割截衣應受依乞食出家受大戒是比丘尼法是中盡形壽能持不答言能若得長利僧差食若檀越送食月八日食十五日食月初日食衆僧常食檀越請食得受依樹下坐出家受大戒是比丘尼法是中盡形壽能持不答言能若得長利若別房樓閣小房石室兩房一戶應受依腐爛藥出家受大戒是比丘尼法是中盡形壽能持不答言能若得長利酥油生酥蜜石蜜應受汝已受戒竟白四羯磨如法成就得處所和尚如法阿闍梨如法二部僧具足滿當善受教法當勤供養佛法僧和尚阿闍梨一切如法教勑不得違逆當學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不絶餘所未知者當問和尚阿闍梨使受戒人在前而去除罪法第三尼懺僧殘罪法尼以女弱事須相假以肅其懷如若私己容惡則自壞彼犯在不輕故尼覆僧殘但增罪治半月行摩那埵無別覆藏調伏法故尼懺僧殘要在二部僧中作摩那埵羯磨大僧與尼二部各滿四人若作出罪羯磨大僧與尼二部各滿二十人不得減乞摩那埵羯磨文比丘尼犯僧殘罪應一部僧中半月行摩那埵行摩那埵非應至二部僧中偏露右肩脫革屣禮僧足右膝著地合掌作如是乞大德僧聽我比丘尼某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵願僧與我半月摩那埵慈愍故如是三說與摩那埵羯磨文大德僧聽此比丘尼某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵若僧時到僧忍聽僧今與比丘尼某甲半月摩那埵白如是大德僧聽此比丘尼某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵僧今與比丘尼某甲半月摩那埵誰諸長老忍僧與比丘尼某甲半月摩那埵者默然誰不忍者說是初羯磨如是三說僧已忍與比丘尼某甲半月摩那埵竟僧忍默然故是事如是持比丘尼行摩那埵法與上大僧同唯應二部僧中日日白應作如是白大德僧聽我比丘尼某甲犯某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與我半月摩那埵我比丘尼某甲已行若干日過餘有若干日在白大德僧令知我行摩那埵乞出罪羯磨文比丘尼半月行摩那埵竟應至二部僧中作如是乞大德僧聽我比丘尼某甲犯某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與我半月摩那埵我已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨願僧與我出罪羯磨慈愍故如是三說與出罪羯磨文大德僧聽此比丘尼某甲犯某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與比丘尼某甲半月摩那埵此比丘尼某甲已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨若僧時到僧忍聽僧今與比丘尼某甲出罪羯磨白如是大德僧聽此比丘尼某甲犯某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與比丘尼某甲半月摩那埵此比丘尼某甲已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨僧今與比丘尼某甲出罪羯磨誰諸長老忍僧今與比丘尼某甲出罪羯磨者默然誰不忍者說是初羯磨如是三說僧已忍與比丘尼某甲出罪羯磨竟僧忍默然故是事如是持說戒法第四其說戒法一與上大僧同尼僧差請教授人羯磨文尼僧應半月半月至大僧請教誡故今須差此使為尼僧請教誡應如是差大姊僧聽若僧時到僧忍聽僧今差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授白如是大姊僧聽僧今差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授誰諸大姊忍僧差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授者默然誰不忍者說僧已忍差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授竟僧忍默然故是事如是持更差一人為伴往大僧中至舊住比丘所禮足曲身低頭合掌白如是言大德一心念比丘尼僧某甲等和合禮比丘僧足求教授如是三說受囑比丘說戒時應作如是白比丘尼僧某甲衆和合禮大德僧足求教授如是三說比丘尼明日應問可否比丘教授師應期往比丘尼應期迎比丘期往不往者突吉羅比丘尼僧期迎而不迎者突吉羅若比丘尼聞教授師來當半由旬迎至寺內供給所須洗浴具羹粥飲食果蓏以此供養若不者突吉羅若比丘僧盡病若衆不和合若衆不滿遣信往禮拜問訊若比丘尼僧盡病不和合衆不滿亦當遣信往禮拜問訊若不往者突吉羅安居法第五其安居法皆與大僧同自恣法第六尼僧差往大僧中受自恣人羯磨文比丘尼僧夏安居竟應往大僧中受自恣故今須差此使為尼僧詣大僧中求受自恣應如是差大姊僧聽若僧時到僧忍聽僧今差比丘尼某甲為比丘尼僧故往大僧中說三事自恣見聞疑白如是大姊僧聽僧今差比丘尼某甲為比丘尼僧故往大僧中說三事自恣見聞疑誰諸大姊忍僧差比丘尼某甲為比丘尼僧故往大僧中說三事自恣見聞疑者默然誰不忍者說僧已忍差比丘尼某甲為比丘尼僧故往大僧中說三事自恣竟僧忍默然故是事如是持往大僧中受自恣文差人為伴往大僧中禮僧足已曲身頭合掌作如是說比丘尼僧夏安居竟比丘僧夏安居竟比丘尼僧說三事自恣見聞疑大德慈愍故語我我若見罪當如法懺悔如是三說彼即比丘僧自恣日便自恣而皆疲極佛言不應爾若比丘僧十四日自恣比丘尼僧十五日自恣若大僧病若衆不和合若衆不滿比丘尼應遣信禮拜問訊不者突吉羅若比丘尼僧病若衆不和合若衆不滿比丘僧亦當遣信禮拜問訊不者突吉羅其至大僧中受自恣人還共尼僧作自恣其自恣一與上大僧同分衣法第七與上大僧同衣食淨法第八尼無作餘食法除此已餘皆與大僧同雜法第九尼無乞處分作房法自餘皆與上大僧同
