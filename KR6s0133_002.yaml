body:
  text: 沙門守其等奉勑挍勘王凾普耀經八卷第二卷法護譯宋本第一卷末有現相品第三第二卷初便有欲生時三十二瑞品第五其第四品本闕今於國丹本第二卷初得降神處胎品第四凡十三紙而補其闕焉又為看舊宋藏經者具錄其文于左普曜經降神處胎品第四於是四天王天帝釋焰天子兜術天子無慢天子善化天子魔子導師梵忍跡天梵滿天善梵天光淨天光音天大神妙天淨居天竟往天阿迦膩吒天及餘無數百千天人皆共集會轉相謂言今仁君等假使菩薩獨往降神處於母胎我等諸天不往侍從墮無反復不識恩養誰能堪任侍衛菩薩降神入胎不離其側如影隨形乃至成佛降伏魔官而轉法輪和慈四等至大滅度以懷慈心歡忻恱心調和其心而奉事焉未曾遠離不違約誓於是頌曰今誰能堪任進侍常恱心誰得名稱力自發長往侍忉利天誰意捨安不樂天住在玉女眾侍離垢月顏諸微妙最樹雖貪天宮宅屋宅化金色當侍離垢威心念若干品不慕其諍訟少欲如妙華大男子所好言寂兜術天諸天求大威所生常見敬常樂無量稱慕應化妙本自在諸天宮心吉皆奉行當好是功勳魔王懷毒心越度一切尊及愛此經法自在度欲尊亦度於欲界亦及梵所居修行四等心在諸仙中上遊諸天殊特如轉輪聖王室宅常安隱侍離欲威尊欲得國君安大財無極富眷屬無怨仇往送可敬順致財色豪位名稱力功勳見歎及仁君往侍送梵音欲得天人樂及致三界安處安及法安當侍大仙安若除淫怒癡欲棄眾冥塵寂然心憺怕侍從調定意學不學緣覺常逮一切智十力師子吼常侍從江海意勝閉𢙣趣致安住甘露得成八正道侍從降五趣其欲得見佛欲聽大哀法慕致眾福祚往侍自在聖盡生老死苦欲解宛轉縛清淨如虛空侍清明真人欲致一切敬相好殊異德常欲濟彼已當侍可愛敬戒定及智慧此及無量稱究竟所生安當侍彼大聖欲達深難解玄絕難逮義欲得慧疾解當侍大醫王尒時諸天聞歎此偈其四天王四萬人俱百千忉利天焰天兜術天無憍樂天化自在天各與百千諸天子俱六萬魔天前世積德修清淨行梵迦夷天六萬六千乃至阿迦膩吒天與無央數百千眷屬又有四方無數百千皆來集會是諸天子各各嗟歎歌誦妙偈聽我無限言意審至三乘棄欲樂安住所慕此最淨大聖度降神眾奉可重敬守德神仙護微妙無害意執樂鼓和音歎德海功勳歸命天人尊聞菩薩上慧散花供養聖奉仁名華香恱心天人尊離欲安無患意妙清淨華善願演光明迦夷散眾華等供福清淨處胎無垢著覺悟老病死恱心侍究竟志懷奉恭敬天人獲善利見舉足七步釋梵咸稽受香水洗淨意屈意隨世俗天宮處塵欲普捨釋尊位咸恱意侍之取草坐道塲得佛降眾魔梵勸轉法輪僉共奉安住三界作佛事甘露億載眾權化眾清涼皆棄渴名稱於是欲行天人媵室覩見菩薩姿色殊妙心自念言今此真人清淨殊邈其妃如類耶尊人所厚咸皆羨之各執華香抱愛敬心志功福報願立神足適作是念即時尋沒天人宮殿在迦維羅衛大園觀中寂然莊飾其白淨王所可愛樂難及大殿後宮苑囿其處巍巍汙塗香熏清淨無垢光明福祚威神成就天人瓔珞一時并至尋從地起見王妙后舉身一指現在虛空各各相和而說偈言天玉女遊行覩菩薩妙顏心中發是念菩薩母何𩔗手各執眾華往聞生愛意既受持華香叉十指作禮微妙氣雜香投身自歸念吾覩名稱迹善見人顏色亦欲覩殊異玉女色最恱觀尊見其形天眼自覩身是顏第一殊至德生尊人明珠著好器是器天中天手脚如甘露來樂勝夫人觀像無猒足其心益踊恱威首照虛空其明曜諸天離垢眾雜香身演暉如是其色如紫金威神曜諸天如蜂王成蜜演淨塗香熏眼明如真金光淨曜虛空所沒至清淨而等於有無髀踵猶如象其膝微平正手脚平等淨玉女歎决疑如是多所觀散華右繞之歎名稱佛母還入其天宮尒時四天王天帝釋炎天及無慢天天龍猒鬼及害人鬼阿須倫揵陁羅真陁羅摩休勒咸皆來至歸人中上而在前導衛護至尊將無𢙣物害意向之若世俗人勿造危難詣其王后所居宇宅皆共清和眷属圍遶遊行虛空一切吉祥令無違嬈眾共宿衛諸天子知悉欲往侍恱心敬后執持華香叉手為禮見淨尊人當降神故師子大哀欲來生故用道法故皆當勸助護一切故於是菩薩欲遷神時東方極遠無數菩薩住兜術天皆共來至於斯佛土供養菩薩南西北方四維上下十方無限諸佛世界無數菩薩一生補處住兜術宮皆來詣此供養菩薩其四天王八萬四千諸玉女眾忉利天炎天兜術天無憍樂天化自在天各各將從八萬四千玉女鼓樂絃歌來詣此土供養菩薩於時菩薩即坐首藏普德等集三昧定意一切現大棚閣并諸菩薩億百千載諸天圍遶動兜術天適震動已從身放光具足廣普照此三千大千佛國土靡不周遍曜幽處令覩大明日月之光所不逮及照於地獄餓鬼畜生八難中人蒙斯尊光普獲安隱所蒙光處令其眾生消淫怒癡不懷自大無有惱熱亦無貪嫉皆懷慈心相視如子如父如母如兄如弟天人伎樂不鼓自鳴百千億載音聲相和無數天人念善思惟彼大天宮無能毀壞玉女百千各鼓琴箏在後侍從以伎樂音聲嗟歎菩薩前世積德而說偈曰前世積功德長夜來善本布施得真正故今致奉敬尊本無數劫惠施愛男女以斯施果報雨天諸華香割身肉稱之用哀愍鳥故由此布施果餓鬼蒙食漿尊本無數劫護戒無所犯由禁獲果報消盡𢙣道難本無數億劫志道行忍辱忍行致此果慈心愍天人本無數億劫上進無怯劣以是精進果身好如須弥本無數億劫禪思消眾塵以是一心果不樂眾塵欲本無數億劫行智斷貪欲以是智慧果光明最清淨被鎧善伏塵普愍念眾生仁德度彼岸禮清淨安住光曜悉普照皆除眾塵為三千目導禮最勝現道曉了神通飛顯示學究竟化度以種𩔗稽首善舩師皆學清淨辤示現沒終始未曾捨俗法於俗無所著其見求愽聞弘利具無限沒復聽受法得信受樂者兜術天忽閻浮利日出無思議億姟樂道消眾塵安隱豐盛無數諸天俱玉女鼓音樂王舍聞悲和德威普滋茂覩母最妙顏子巍巍如此三界最吉祥不復失本誓無有貪恚諍恭敬普慈心於人中威神王國遂增益成轉輪王種迦維當豐茂寶藏又豐滿鬼叉猒鬼諸天龍鬼神住護人中尊不久得解脫讚佛積功德愛敬而奉事悉用勸其道速疾成導師佛語諸比丘于時菩薩過冬盛寒至始春之初修舍星宿春末夏初樹木凋落初始華茂不寒不暑時三界尊觀察十方適在時冝佛星應下菩薩便從兜術天上垂降威靈化作白象口有六牙諸根寂定頭首奮曜光色巍巍眼鼻晃昱現從日光降神于胎趣於右脅菩薩所以處於右者所行不左王后潔妙時晏然𥧌忽然即覺見白象王光色如此來處于胎其身安和從始至今未曾見聞身心安隱猶如還禪致正受矣於時妙后衣毛為竪枚拭衣服及塗香薰身心欣喜尋從坐起與婇女俱前後圍繞從後宮出詣無憂樹即時安坐無憂樹下便遣侍女以此意旨唘白淨王曰天王自屈來覩所樂王聞踊躍即勑嚴駕群臣翼從到無憂樹不得入門王自起想乘高象車思惟須即說偈言念曾處象車身重不如今光明入吾室問誰是何變於時有天在虛空中化現半身為白淨王說此偈言德行三界尊慈哀成福祚菩薩遷兜術大聖降妙后當叉手禮足至神入彼室妙后觀其意若干種微妙今以用是故而有是變應亦現於宮殿未曾有虛妄淨如雪山王其明超日月身形甚分明大象強殊勝堅固猶金剛思念行殊特而降神入胎是故受我言覩三界迷億載天歎詠不猒無瞋姤心寂等安定時夫人出為王說偈天王召梵志曉了能解夢為我別此義於國為吉凶大王受我言梵志學經術當使在我前聽說所夢意光踰日月明形大好六牙故勇入我胎當聽此意故時王請梵志問此意梵志為王說偈言梵志聞是言歡欣無不吉生子有相好在家為聖王假愍世出家成佛祐三界甘露普濟俗為决所疑受梵志好教心中無所畏以服羙飲食其身永安隱時白淨王心自念言何所屋舍安於妙后使無眾難時四大王詣白淨王而謂王言大王安意今我等身當為菩薩造立妙宅時天帝釋炎天兜術天無憍樂天化自在天往詣王所各上天宮王后處中兜術天王曰還持本宮奉上菩薩使處其中化自在天曰我有宮殿欲界最上光蔽諸天令如聚墨當令王后身處其中香華伎樂奇異之饌供養妙后如是比丘一切欲界天王俱來詣迦維羅衛貢上宮殿一心自歸供養菩薩時白淨王亦在其土興立宮宅嚴好如天於時菩薩承大淨定使其王后普見宮殿身處其中皆懷菩薩時諸天子所上宮殿各不相見各自念言今菩薩母在我宮殿不在餘所時佛即說偈言住大淨三昧所化不可稱普恱諸天意先現瑞所願佛語比丘於時菩薩坐於寶淨交露棚閣處妙后右脅所坐寶淨棚閣殊妙栴檀而香熏之其香遍熏三千世界巍巍奇異強若金剛䎡如天衣香氣芬馥徹於十方其菩薩交露宮殿欲界諸天嚴淨宮殿常皆現在菩薩宮殿其夜菩薩臨降神胎應時其夜下方水界六百六十萬由旬生大蓮華上徹梵天永無見者唯有梵天名音聞百萬諸佛土威神光曜普遍三千大千世界皆現目前獨見之耳又其梵天執金剛器百味食飲奉侍菩薩菩薩食之覩觀十方無能服食如是一滴之供堪任服消者獨有一生補處菩薩能消化耳又有宿世功福積德道慧所致諸尊天帝釋梵王咸來稽首歸命聽經於是菩薩舉一手指自然化現別異牀㯓釋梵四王各從本位而坐其上以見坐定為講說法開化其心咸皆恱豫菩薩覩之欲得還歸下其右手使不復現釋梵四王尋即知之菩薩遣證各繞菩薩便即還宮以是之故菩薩處其右脅東西南北四維上下十方無數百千菩薩咸來見之稽首作禮欲得聽經菩薩見來演身光明化清淨座即皆就牀各各唘問無極大乘廣為分別各不相見以是之故菩薩演寂光明照諸天人其菩薩母悉不知之亦無所礙唯覺己身輕便柔䎡安隱無穬無婬怒癡不想三毒亦無寒熱及諸𩚑渴不汙聖體及餘手指無有不可亦不遇惡色聲香味細滑法不見惡夢亦無𢙣露迦維羅衛及遠大國天龍鬼神乹沓和阿湏倫迦留羅真陁羅摩休勒男女大小歡欣踊躍不懷異心若有諸病風寒熱氣疾眼耳鼻口身心之疾唇齒咽痛塵勞狂病癲疾金痍瘢瘡詣菩薩母母舉右手而摩其頭病皆除愈各還其家於時王后取草作籌殊妙自然著於地上持與諸病即得安隱無復所患時菩薩母使眾疾患住其右邊皆得安隱無復眾病各歸其家諸可來者觀后右脅悉見菩薩降神母胎鮮潔清淨猶如明鏡照其面像歡喜踊躍皆蒙濟度菩薩在胎自然天樂而相和鳴雨天香華常以時節春秋冬夏自然降矣幢蓋繒綵展轉往來國土安隱豐熟熾盛無有溝坑荊𣗥之穢有諸幢蓋遍迦維羅衛城釋種諸姓及與萬民飲食娛樂鼓舞歌戲好喜布施積功累德皆共相樂周竟四月其白淨王淨修梵行棄捨國事不加刑罰行法為本不慕世榮於是菩薩在胎十月開化訓誨三十六載諸天人民使立聲聞及諸大乘於是頌曰菩薩處母胎牆壁屋宅地自然金色光天喜成法王莊嚴大宮殿見中跏趺坐導師處名香其香聞三千大千下方出大蓮華香淨乃徹至梵天取精授菩薩菩薩能消服餘人不能堪無數劫熟精服食身心淨釋梵四天王稽首供養佛奉事聽上法右繞皆還歸樂法菩薩眾妙光淨無礙轉聽尊法樂聞說皆歡喜四方男女來鬼嬈心迷惑見王后心解意安還歸家得風寒熱毒眼耳鼻口病及若干疾患后摩頭得安若取一籌滴與之病皆愈無疾安歸家處胎為醫王十方諸菩薩目自見王后如日月在空覩菩薩眷属無婬怒癡患無貪嫉恚想其心常歡喜無飢渴寒熱天樂不皷鳴天雨淨華香天人非人見未曾懷害心天人樂飲食無皷樂悲和時雨豐賤樂草藥華果茂王宮雨七日貧取食布施安貧樂稽首禮和眾如山白淨王常恱行法不領國入靜問皇后懷聖身安不鞠凾月燈三昧經一卷宋沙門先公譯今十三紙此是丹藏月燈三昧經先公譯者而與彼國宋二藏之經文義逈異未知孰是按開元錄此經有二別譯一於有譯無本中有後漢安世高譯一卷二於有譯有本中有宋沙門先公譯一卷皆云出大月燈經第七卷其先公譯目下注云一名文殊師利菩薩十事行經又指多小云一十紙今撿此丹本經始從六度乃至分衛凡歷十二法皆以十事說之又其多小是古之十紙有十二行即知真是先公所譯月燈經矣故今取之為正但錄云出大經第七卷而今撿之出自第六卷之前半斯為未叶疑古今分卷有異或書寫錯六為七耳今為看國宋藏者具錄正經于左佛說月燈三昧經一卷名文殊師利菩薩十事行經宋沙門先公譯聞如是一時佛在舍衛國遊於祇樹給孤獨園與大比丘眾五百人六萬菩薩俱及無央數諸天人尒時文殊師利菩薩在其眾會中坐時佛告文殊師利言童子菩薩行布施有十事何等為十一者諦除嫉妒意二者常清淨意布施三者無數百千人不能奪其財四者持上妙而終亡五者生大豪貴家六者所生處好布施七者為四部眾所愛念八者無所畏入眾會亦無㝵十方皆聞其名聲九者年少手足柔軟十者常樂善知識乃至坐佛樹下童子是為菩薩行布施十事佛於是說偈言已遠除於嫉妒意常好布施者持上妙而終亡生即於豪富家所生處意常樂而好憙於布施為眾生所愛念居家者及出學於眾會無所畏所至處無疑難其名聲遠而聞於郡國及縣邑其手足常柔䎡所欲得不復難即為得善知識諸佛及其弟子終不復生嫉妒意意常好樂欲布施以持上妙而終亡於是行事無嫉妒即生於大豪富家意常憙樂而布施為若干億人所愛好布施者有是行得善知識不復難常見諸佛及弟子見已即樂供養之其布施者有是行佛語童子菩薩持戒清淨有十事何等為十一者具足其願二者學佛道三者常尊樂於黠慧四者死不妄語五者見世不轉意六者生死七者求泥洹八者寂寞行九者得三昧十者無貧窮行童子是為菩薩十事清淨持戒佛於是說偈言即具足其所願學諸佛之道行常樂於尊智慧亦無有恐懼時不復轉其所願亦不轉慎諸行常遠於生死則求索泥洹道常在寂寞處行即便得於三昧而無有貧窮時即立於持戒品其人即具所可願是菩薩學諸佛道慧者於人不自稱其人如是戒清淨持願甚堅不復難終不復動所釆建以見生死無數𢙣便捐求泥洹道其意不復著所念其人如是立戒彊得正剎土無不可清淨戒者有是行佛語童子菩薩立忍辱有十事何等為十一者火不能燒二者刀不能害三者毒不能行四者水不能殺五者非人護之六者得莊嚴其身相七者閉塞諸𢙣道八者得生梵天不難九者晝夜得安隱十者安樂不移童子是為菩薩十事住忍辱佛於是說偈言火不能燒其人刀亦不能傷害其毒不能得行水亦不能漂殺諸非人悉護之即得三十二相便閉塞諸𢙣道忍辱者德如是求索諸梵及釋彼亦不而難致常得安隱之行悉覺於非常事刀及火亦不能傷行於毒中不能害諸天及人鬼神護其忍辱者有是行即身得三十二相其人不復畏𢙣道於是死即生梵天行慈心者有是道晝夜即得安隱行常好憙身得安定於一切有清淨意終無有瞋恚志行佛告童子菩薩精進有十事何等為十一者有威神二者為諸佛所護三者非人悉亦護之四者聞法終不轉忘五者所未聞法而得聞六者得高明智慧七者得種種三昧八者終無病時九者飯食得安隱十者得柔䎡如優鉢不剛童子是為精進行菩薩十事佛於是說偈曰常為得有威神終不轉犯諸𢙣諸非人悉護之即疾得成佛道聞經法亦不忘未聞者求得了其人即得高明精進者有是德得同諸三昧行終無有疾病時精進者智慧俱其人得佛道行所飯食得安隱即得為精進行譬如優鉢在水稍稍長而大成清白法亦如是令菩薩稍稍成終無有能當者得在天安樂處多陁竭精進行以進越無數劫諸菩薩勤力行所修奉悉說之其精進者有威神常為諸佛所擁護而皆奉受是道行其人得佛道不久所聞者終不復忘及復得餘眾法行其人智慧稍增益精進行者有是事種種三昧常自增彼終無有疾病時諸所可飯食之者一切得則為安隱晝夜成就清白行精進之者無有休其人不久疾得佛行精進者尊如是丁未歲高麗國大藏都監奉𠡠雕造
