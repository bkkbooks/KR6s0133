body:
  text: 沙門守其等奉勑挍勘弗函大毗婆沙論卷第六十五此卷十九幅第六行此四果位對治之下三結餘位不爾乃至九行及欲漏四十字國宋二本並錯重寫丹本中作四法餘位不爾謂預流果對治見瀑流軛見取戒禁取及後二身繫一來果對治欲瀑流軛取及初二身繫一分不還果對治欲瀑流軛取及前二身繫五十八字乃正文也廉函大毗婆沙論卷第一百九此卷十九幅第二十行他心智不相應之下苦字之上國本丹本皆有道無願相應法乃至及空不相應等凡七十二行文此宋本中無者脫之耳今依二本加之又為看舊宋藏論者具録其文于左他心智不相應道無願相應法此無願相應非他心智是他聚故有法他心智相應亦無願謂二相應法即無漏他心智俱生聚中除他心智及無願三摩地諸餘心心所法此法是何謂八大地法十大善地法尋伺及心有法非他心智相應亦非無願謂他心智不相應無願無願不相應他心智及諸餘心心所法色無為心不相應行此中他心智不相應無願者謂苦集無願及他心智不相應道無願此非他心智相應是他聚故亦非無願相應自性與自性不相應故無願不相應他心智者謂有漏他心智此非無願相應是他聚故亦非他心智相應自性與自性不相應故及諸餘心心所法者謂空無相俱生聚中心心所法及他心智不攝不相應有漏心心所法此俱不相應是也聚故色無為心不相應行者謂一切色無為心不相應行此俱不相應無所緣故對念精進喜輕安定捨覺支正思惟正精進正念正定亦爾者如他心智對無願有四句此對六覺支四道支亦爾諸法他心智相應彼法已知根相應耶答應作四句義不定故有法他心智相應非已知根謂已知根所不攝他心智相應法此法是何謂具知根所攝他心智相應及有漏他心智相應心心所法此法他心智相應非已知根是他聚故有法已知根相應非他心智謂已知根所攝他心智及他心智不攝不相應已知根相應法此中已知根所攝他心智者謂修道中無漏他心智此與已知根相應非他心智自性與自性不相應故及他心智不攝不相應已知根相應法者謂修道中苦集滅智俱生聚及他心智所不攝道智俱生聚中心心所法此與已知根相應非他心智是他聚故有法他心智相應亦已知根謂已知根所攝他心智相應法此法是何謂修道中無漏他心智相應法即此相應八無漏根及彼相應餘非根心所法有法非他心智相應亦非已知根謂已知根所不攝他心智及他心智已知根不攝不相應諸餘心心所法色無為心不相應行此中已知根所不攝他心智者謂具知根所攝他心智及有漏他心智此非他心智相應自性與自性不相應故亦非已知根相應是他聚故及他心智已知根不攝不相應諸餘心心所法者謂未知當知根俱生聚心心所法他心智不攝不相應具知根俱生聚心心所法他心智不攝不相應有漏心心所法此俱不相應是他聚故色無為心不相應行者謂一切色無為心不相應行俱不相應無所緣故對具知根亦爾者如他心智對已知根有四句此對具知根亦爾諸法世俗智相應彼法苦智乃至正定相應耶答不爾設法苦智乃至正定相應彼法世俗智相應耶答不爾所以者何非一心故苦智乃至正定皆無漏故諸法苦智相應彼法集智相應耶答不爾設法集智相應彼法苦智相應耶答不爾對滅道智無相三摩地亦爾所以者何非一心故行相異故或所緣異故諸法苦智相應彼法空三摩地相應耶答應作四句義不定故有法苦智相應非空謂苦智相應空及空不相應苦逸函大毗婆沙論卷第一百九十九此卷第二十三幅第十六行戒禁取問之下善及染汙乃至故説命根緣緣識三界四部隨眠隨增等一百四十六字者即是此論第八十七卷卷末文耳宋本錯寫焉此中二本即云此四寧是前際分別答此四皆於現在事轉待未來故立前際名或有説者此四皆緣先所聞教謂彼外道先聞自師所説至教要由如是答他所問生不死天彼不死天要由如是答問故得故此四種皆是前際分別見攝如是四種前際分別不死矯亂依怖妄語邪見無知愚鈍事起此一百九字乃正文也逸函大毗婆沙論卷第二百初三幅第七行有過失之下二本無故作是念此亦有色亦無色我死後有想乃至俱有過失等凡八十五字宋本錯重寫耳今依二本刪之十七幅第六行此二俱之下謗因等之上二本有入斷見品以執無故有説入二品由執我常等十七字宋本無者脫耳今依二本補之十八幅第二十一行皆常見攝之下五現法涅槃之上二本有故即常見品七斷滅論斷見攝故即斷見品十七字宋本無者脫耳今依二本足之十九幅初二行云一者有見之下一切見之上二本有二者無見如次攝入常斷見品師子吼經説十七字宋本無者脫耳今依二本補之二十二幅十二三行定有前心為因之下引後之上二本有引起將命終位無極緣緣正死時心定能等十六字宋本無者脫耳今依二本補之渭函分別功德論第五卷按此論丹藏為四卷開元録云四卷而注云或三卷或五卷者但分卷有異耳文無增減焉録有注敘云右此一論釋增一阿含經義從初序品至弟子品過半釋王比丘即止法上録云竺法護譯者不然此中牒經解釋文句並同本經似與增一阿含同一人譯而餘録並云失譯且依此定僧祐録云迦葉阿難撰者此亦不然如論第一卷中引外國師及薩婆多説故知非是二尊所撰渭函十八部論開元録云新為失譯附秦録按此論者宋藏中錯重寫彼部異執論名為十八部論故今取此國本為正開元録云右十八部論群録並云梁代三藏真諦所譯今詳真諦三藏已譯十八部論不合更譯部異執論其十八部論初首引文殊問經分別部品後次云羅什法師集後方是論若是羅什所翻秦時未有文殊問經不合引之置於初也或可準別録中文殊問經編為失譯秦時引證此亦無疑若是真諦再譯論中子注不合有秦言之字詳其文理多是秦時羅什譯出諸録脫編致有疑焉其真諦十八部疏即部異執疏是雖有斯理未敢指南後諸聞請求實録觀函菩薩本緣經卷上右經第三幅十四行鹿群威猛之下丹本有如我曾聞菩薩往昔以恚因緣墮於龍中乃至五穀臨熟遇天惡雹等凡二十六行四百四十二字國本宋本所無者今撿彼文則是此經下卷龍品第八之文丹藏錯亂妄置于茲耳故今不取驚函雜寶藏經卷第五右經此卷第二幅賈客造舍供養佛生天緣之下丹本有貧人以團施見獲報緣乃至乾陀衛國王治故塔寺得延命緣等六緣國本宋本並無者今撿此六緣則前第四卷初已有之丹本錯亂重寫于茲耳故今不取畫函金七十論三卷按開元録亦名僧伽論或為二卷云右一論外道迦毗羅仙人造明二十五諦所謂數論經中云迦毗羅論是也又長房內典二録真諦譯中有金七十論二卷復有僧伽論三卷二目俱存者誤也此論及勝宗十句義論者非是佛法而諸外道宗以此數勝二論為上欲令學而破邪現正之者先須委悉異道之宗故譯出之恐其失而不傳故編入藏中耳右函神州三寶感通録三卷此録上卷宋本與二本大異撿之宋本錯將宣律師感通録一卷為此上卷耳今依二本正之又為看舊宋藏者具録正文于左集神州三寶感通録卷上右唐麟德元年終南山釋道宣撰夫三寶利見其來久矣但以信毀相競故有感應之緣自漢洎唐年餘六百靈相盻嚮群録可尋而神化無方待機而扣光瑞出沒開信於一時景像垂容陳迹於萬代或見於既往或顯於將來昭彰於道俗生信於迷悟故撮舉其要三卷成部云初明舍利表塔次列靈像垂降後引聖寺瑞經神僧初明舍利表塔昔如來行乞有童子戲於路側以沙土為米麵逆請以土麵奉佛因為受之命侍者以為土漿塗佛住房足遍南靣記曰此童子者吾滅度後一百年王閻浮提空中地下四十里內所有鬼神並皆臣屬開前八塔所獲舍利於一日夜伇諸鬼神造八萬四千塔廣如衆經故不偹載此土即洲之東境故塔現不足以疑舍利西梵天言此云骨身也恐濫凡夫之骨故依本名而別之西𣈆會稽鄮塔緣一東𣈆金陵長干塔緣二石趙青州東城塔緣三姚秦河東蒲坂塔緣四周岐州岐山南塔緣五周瓜州城東古塔緣六周沙州城內大乘寺塔緣七周洛州故都西塔緣八周涼州姑臧縣塔緣九周甘州刪丹縣塔緣十周𣈆州霍山南塔緣十一齊代州城東古塔緣十二隋益州福感寺塔緣十三隋益州𣈆源縣塔緣十四雒縣塔附隋鄭州起化寺塔緣十五隋懷州妙樂寺塔緣十六隋并州淨明寺塔緣十七隋并州榆社縣塔緣十八隋魏州臨災縣塔緣十九雜明神州山川藏寶等緣二十初西𣈆會稽鄮塔者今在越州東三百七十里鄮縣界東去海四十里在縣東南七十里南去吳村二十五里案前傳云𣈆大康二年有并州離石人劉薩何者生在畋家弋獵為業得病死見一梵僧語何曰汝罪重應入地獄吾憫汝無識且放今洛下齊城丹陽會稽並有古塔及浮江石像悉阿育王所造可勤求禮懺得免此苦既醒之後改革前習出家學道更名慧達如言南行至會稽海畔山澤處處求覓莫識基緒達悲塞煩冤投告無地忽於中夜聞土下鍾聲即迂記其處剡木為剎三日間忽有寶塔及舍利從地踊出靈塔相狀青色似石而非石高一尺四寸方七寸五層露盤似西域于闐所造面開窗子四周天鈴中懸銅磬每有鍾聲疑此磬也繞塔身上並是諸佛菩薩金剛聖僧雜類等像狀極微細瞬目注睛乃有百千像現面目手足咸具備焉斯可謂神功聖迹非人智所及也今在大木塔內於八王日舁巡邑里見者莫不下拜念佛其舍利者在木塔底其塔左側多有古迹塔側諸暨縣越舊都之地以句章對鄮剡等四縣為之諸暨東北一百七里大部鄉有古越城周回三里地記云越之中葉在此為都離宮別館遺基尚在悉生豫章多在門階之側行伍相當森竦可愛風雨晦朔猶聞鍾磬之聲百姓至今多懷肅敬其迹繁矣諸暨西北百里新義鄉有許公巖地志云𣈆時高陽許詢字玄度與沙門支道林為友每相從歷覽山水至此乃栖焉𣈆辟度為司徒椽徵不就後詣建鄴見者傾都劉為丹陽尹有名當世日數造之歎曰今見許公使我遂為輕薄京尹於郡立齋以處之至于梁代此屋猶在許椽既反劉尹嘗至其齋曰清風朗月何嘗不恆思玄度矣句章縣西南一百三十里明鄉有四明天台赤城瀑布等山天下稱最東北百四十里有沙塘道廣數丈入海百餘里地記云是秦皇追安期先生於蓬萊至深而息故此塘道至今宛然鄮縣古城在句章東三百餘里昔閩越所都其靈塔即縣界孝義鄉也地志云阿育王造八万四千塔此其一也宋會稽內史孟顗修理之山有石坎方可三尺水味清淳冬溫夏冷輿地志云阿育王釋迦弟子能伇鬼神一日夜於天下造佛骨寶塔八万四千皆從地出案𣈆沙門笁慧遠云東方兩塔一在於此一在彭城今秣陵長干又是其一則有三矣今以經驗億家一塔計此東夏理多不疑且見楊越即有二塔廣九域故有之焉會稽記云東𣈆丞相王導云初過江時有道人神彩不凡言從海來相造昔與育王共遊鄮縣下真舍利起塔鎮之育王與諸真人捧塔飛行虛空入海諸弟子攀引一時俱墮化為烏石石猶人形其塔在鐵圍山也大守褚府君云海行者述島上有聚烏石作道人形頗有衣服褚令𮢶取將視之石文悉如袈裟之狀東海不遠島上是徐偃王避地之處宮郭古基宛然昔周穆西巡登崑崙山偃王乃有統焉穆王聞之馳還日行万里偃王避之於此𣈆孫恩作逆寄仙以惑衆築城自衛其處猶存梁祖普通三年重其古迹建木浮圖堂殿房廊周環備滿號阿育王寺四面山繞林竹蔥翆花卉間發飛走相娛實間放者之佳地也有碑頌之著作郎𮨇胤祖文寺東南三十五里山上有佛右足迹寺東北二里山頭有佛左足迹二所現于石上莫測其先寺北二里有聖井其實深池鰻魚俗號為魚菩薩也人至井所禮拜魚隨聲出來賊過偽禮魚出賊便以刀斫之因斷魚尾自爾潛隱魚不時出有至心邀請禮拜者但濆水而已初有一僧聞塔來禮處所荒涼持食為難有一老姥患腳來為造食便去如是𪫦之去後私尋乃入池內據量即魚所化也其塔靈異往往不一大略為瑞多現聖僧繞塔行道每夕然燈於光影中現形在壁旋轉而行且列數條多則詞費貞觀十九年敏法師者禹道勝歷覽聖迹依然動神領徒數百來寺一月敷講經論士俗咸會夜中有人見梵僧百餘繞塔行道以事告衆寺僧曰此事常有不足可怪自古至今四大良日遠近來寺建齋樹福然於夜中每見梵僧行道誦經讚頌等相永徽元年會稽處士張太玄於寺禮誦沙門智恱獨與太玄連牀而寢半夜聞誦金剛般若了了分明二人靜聽形心欣泰乃至誦訖然契其相者真尋視無形明知神授矣二東𣈆金陵長千塔者今在潤州江寧縣故楊都朱雀門東南古越城東廢長干寺內昔西𣈆未統江南是稱吳國於長千舊里有古塔地即育王所搆也依於邑里既崩子亮立孫琳執政五鳳中毀除佛寺此塔同湮而舍利潛地吳平之後諸僧頗依故處而居起塔三層既不得舊塔之基事迹蕪沒莫之或識至東𣈆咸安二年簡文立塔三層孝武上金相輪露盤祥記云簡文有意興搆未遂而崩即三層之塔疑是先立至孝武太元末有并州西河沙門劉慧達本名屑荷見於僧傳來尋古塔莫知其地乃登越城四望獨見長干有異氣便往禮拜而居焉時於昏夕每有光明迂記其處掘之入地丈許得三石碑長六尺中央一碑𮢶開方孔內有鐵銀金三函相重於金函內有三舍利光明映徹及爪甲一枚又有一髮申可數尺旋則成螺光彩照曜咸以為育王之所藏也即從就塔北更築一塔孝武加為三層故寺有兩塔西邊是育王古塔也丹陽尹王雅奉五斗米道常謂冝黜佛法除毀塔寺其日下詔令會稽王道子將雅觀焉時沙門正行舍利至雅撥翻其鉢而舍利附于器內終不墜落王更貯清水燔香咒曰王丹陽酷不信法世尊威靈願有以津示應聲光明煥然騰發雅自此後雖未能精至終身不復誣訾佛法梁大同中月犯五車老人星見改造長干寺阿育王塔出舍利髮爪天子幸寺設大無礙法會下詔曰天地盈虛與時消息万物不得齊其蠢生二儀不得恆其覆載故勞逸異年歡慘殊日去歲失稔斗粟貴騰民在困窮運臻斯濫原情察理或有可矜下車問罪聞諸往誥責歸元首實在朕躬若皆以法繩則自新無路書不云乎與其殺不𦍬寧失不經易曰隨時之義大矣哉今真形舍利復見於世逢希有之事起難遭之想今出阿育王寺設無得會耆年童齒莫不欣恱如積飢得食如久別見親幽顯歸心遠近顒仰士女霞布冠蓋雲集同時布德允叶人靈凡天下罪無輕重皆赦除之今潤州江寧故地但有甎基三層并剎佛殿餘則榛木荒藂非人所涉示是古基而已頻有大蟲發塔基者多自死而草深人希惟有𢙣獸於中産育或銜鹿而𮕜汙塔者尋被打撲號叫驚人今去永安坊張侯橋七八里余本住京師曲池日嚴寺寺即隋煬所造昔在𣈆蕃作鎮淮海京寺有塔未安舍利乃發長于寺塔下取之入京埋於日嚴塔下施銘於上于時江南大德五十餘人咸言京師塔下舍利非育王者育王者乃長干本寺而不測其是非也至武德七年日嚴寺廢僧徒散配房宇官收唯舍利塔無人守護寺墌屬官事須移徙余師徒十人配住崇義乃發掘塔下得舍利三枚白色光明大如𮮐米并爪一枚少有黃色并白髮數十餘有雜寶琉璃古器等捴以大銅函盛之撿無螺髮又疑爪黃而小如人者尋佛倍人爪赤銅色今則不爾乃將至崇義寺佛堂西南塔下依舊以大石函盛之本銘覆上埋于地府余問隋初南僧咸曰爪髮梁武帝者舍利則有疑焉埋之本銘置于其上據事以量則長干佛骨頗移於帝里然江南古塔猶有神異崇義所流蓋蔑如也故兩述之矣但年歲綿遠後人莫測略編斯紀以顯厥緣云三青州古城寺塔者代歷周秦莫知其地石趙時佛圖澄者在鄴勒虎敬重廣置寺塔而少露盤方欲作之澄曰臨災城中有阿余王寺猶有佛像露盤在深林巨樹下上有伏石可尋而取也虎使求之依言指授入地二十丈獲之至鄴阿余阿育聲之轉耳須訪故地處所故慧達在中告云雒陽臨災建鄴鄮縣成都此五處並育王塔禮者不入地獄故知此塔不虛名也四河東蒲坂古塔者後秦姚略叔父為晉王鎮於河東古老傳云蒲坂古塔即阿育王所立也疑之屢有光現依掘得佛骨於石函銀匣中照耀殊常送以上略略乃親迎覩於灞上今蒲州東坂有救苦寺僧住立大像極宏冠南古塔不樹云五扶風岐山南古塔者在平原上南下北高東去武亭州十里西去歧山縣二十里南去渭水三十里北去岐山二十里一名馬額山同岥山斯並在大山之北南有小山東西而列中間大谷南與北別故號岐山岐即分也西北二十餘里有鳳泉泉在岐山之陽極高顯即周文時鸑鷟鳴於岐山斯地是也飲此泉水故號鳳泉又南飛至終南之陰故渭南山下亦有鳳泉又西南飛越山至于河池今所謂鳳州古河池郡是也不可窮鳳之始末且論置塔之根原故隋高美其地泉仍就置塔俯臨目極誠為虛逈寺名久廢僧徒化往人物全稀塔將頺壞余往觀焉榛藂滿雖無黍離之實深切黍離之悲今平原上塔俗諺為阿育王寺鄉曰柳泉取其北山之舊號耳周魏以前寺名育王僧徒五百及周滅法廂宇外級唯有兩堂獨存隋朝置之名成實寺大業五年僧不滿五十人者廢之此寺從廢入京師寶昌寺其塔故地仍為寺莊唐運伊始義寧二年寶昌寺僧普賢慨寺被廢沒諸草莽具狀上請于時特蒙大丞相見識昔曾經往覽表攸然仍述本由可名法門寺自爾至今武德二年薛舉稱兵將事南及大宗率師薄伐初度八十僧未有住寺寶昌寺僧惠素掃灑鳳泉以僧未配遂奏請住法門蒙勑依奏便捴住焉年歲既久殂落略盡寺在孤城之中問其本起乃云大業末年四方賊起諸鄉在平原之上無以自安乃共築此城以防外𭁿唐初雜住未得出居延火焚之一切都盡二堂餘燼燋黑尚存貞觀五年岐州刺史張亮素有信向來寺禮拜但見古基曾無上覆奏勑望雲宮殿以蓋塔基下詔許之因搆塔上尊嚴相顯古老傳云此塔一閉經三十年一示人令生善亮聞之以貞觀年中請開剖出舍利以示人恐因聚衆不敢開塔有勑並許遂依開發深一丈餘獲二古碑並周魏之所樹也文不足觀故不載録光相照燭同諸舍利既出舍利通現道俗無數千人一時同觀有一盲人積年目急努眼直視忽然明淨京邑內外崩騰同赴聚塔所日有數千舍利高出衆人同見於方骨上見者不同或見如玉白光映徹或見緑色或不見者問衆人曰舍利何在時有一人以不見故感激懊惱捶而哭衆人愍之吊問曰汝是宿作努力懺悔何用捶此人見他燒指行供養者即以麻緾母指燒之繞塔而走火盛心急來舍利所欻然得見歡喜踊躍跳躑不覺指痛火滅心歇還復不見顯慶四年九月內山僧智琮弘靜見追入內語及育王塔事年歲久遠須假𪪺護上曰豈非童子施土之育王耶若近有之則八万四千之一塔矣琮曰未詳虛實古老傳云名育王寺言不應虛又傳云三十年一度出前貞觀初已曾出現大有感應今期已滿請更出之上曰能得舍利深是善因可前至塔所七日行道祈請有瑞乃可開發即給錢五千五十匹以充供養琮與給使王長信等十月五日從京旦發六日逼夜方到琮即入塔內專精苦到行道久之未有光現至十日三更乃上安炭就而燒香懍厲專注曾無異想忽聞塔內像下振裂之聲尋聲往觀乃見瑞光流溢霏霏上涌塔內三像足各放光赤白緑色緾繞而上至於衡桷合成帳蓋琮大喜踴將欲召僧乃覩塔內畟塞僧徒合掌而立謂是同寺須既久光蓋漸歇冉冉而下去地三尺不見群僧方知聖隱即召來使同覩瑞相既至塔所餘光薄地流輝布滿赫奕潤滂百千種光若有旋轉久方沒盡及旦看之獲舍利一枚殊大於粒光明鮮潔更細尋視又獲七枚捴置盤水一枚獨轉繞餘舍利各放光明炫耀人目琮等以所感瑞具狀上聞勑使常侍王君德等送三千匹令造朕等身阿育王像餘者修補故塔仍以像在塔可即開發出佛舍利以開福慧僧以舊材多雜朽故遂捴換以柏編石為基莊嚴輪奐製置殊麗又下勑僧智琮𪪺靜鴻臚給名住會昌寺初開塔日二十餘人同共下鑿及獲舍利諸人並見唯一不見其人懊惱自拔頭髮苦心邀請哀哭號叫聲駭人畜徒自咎責終不可見乃置舍利於掌雖覺其重不見如初由是諸來謁者恐不見骨不敢見其光瑞寺東云龍坊人勑使未至前數日望寺塔上有赤色光周照遠近或見如虹直上至天或見光照寺城丹赤如畫且具以聞寺僧歎訝曰舍利不久應開此瑞如貞觀不異其舍利形狀如小指初骨長寸二分內孔正方外楞亦爾下平上漸內外光淨餘內小指於孔中恰受便得勝戴以示大衆至於光相變現不可常準于時京邑內外道俗連接二百里間往來相慶皆稱佛德一代光華京師大慈恩寺僧惠滿在塔行道忽見綺井覆海下一雙眼精光明殊大通召道俗同視亦然皆懾然喪膽更不敢重視顯慶五年春三月下勑取舍利往東都入內供養時周人獻佛頂骨至京師人或見者高五寸闊四寸許黃紫色將往東都駕所時又追京師僧七人往東都入內行道勑以舍利及頂骨出示行道僧曰此佛真身僧等可頂戴供養經一宿還收入內皇后捨所寢衣帳直一千匹為舍利造金棺銀槨數有九重雕鏤窮奇以龍朔二年送還本塔至二月十五日奉勑令僧智琮𪪺靜京師諸僧與塔寺僧及官人等無數千人共藏舍利于石室掩之三十年後非余所知後有開瑞可續而廣也
