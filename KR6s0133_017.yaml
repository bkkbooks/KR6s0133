body:
  text: 沙門守其等奉勑挍勘別譯雜阿含經之餘如是我聞一時佛在舍衛國祇樹給孤獨園時梵主天於其中夜光明倍常來詣佛所禮佛足已在一靣坐梵主威光照於時會赫然大明即於座上而説偈言剎利二足尊種姓真正者明行已具足人天中最勝佛告梵主言誠如是言誠如是言剎利二足尊種姓真正者明行已具足天人中最勝時梵主天聞佛所説踊躍歡喜頂禮佛足於彼坐沒還於天宮如是我聞一時佛遊拘薩羅國時彼國中有一阿蘭若住處爾時世尊與諸大衆比丘僧俱在彼止宿於時世尊讚斯住處説阿蘭若住處法時梵主天知如來遊於拘薩羅與比丘衆止宿阿蘭若住處讚歎阿蘭若住處説阿蘭若住處法梵主天王作是念言我今當詣佛所讚歎隨喜時梵主天即於彼沒譬如壯士屈申臂頃來詣佛所頂禮佛足在一靣坐即説偈言處靜有敷具應斷於結縛若不能愛樂還應住僧中恆應正憶念調根行乞食具足禁戒者應至空靜處放捨於怖懼堅住於無畏斷除憍慢者堅心處中住如是我所聞不應懷疑惑一千阿羅漢於此斷生死學者二五百千一百須陀隨流修正道終不趣邪徑不能具宣説諸道得果者所以不能説畏懼不信敬時梵主天説是偈已頂禮佛足還於天宮如是我聞一時佛在釋翅迦毗羅衛林與五百大比丘衆俱皆是阿羅漢諸漏已盡所作已辦捨於重擔逮得己利盡於後有無復結使正智解脫復有十世界大威德諸天來至佛所問訊佛僧於時世尊説於隨順涅盤之法有四梵身天各作是念今佛在釋翅迦羅衛林與五百比丘僧俱皆是大阿羅漢諸漏己盡所作已辦捨於重擔逮得己利盡於後有無復結使正智解脫復有十世界大威德天來至佛所問訊佛僧世尊為其説於隨順涅盤之法我於今者當往於彼佛世尊所時梵身天作是念已即於彼沒譬如壯士屈申臂頃來至佛所頂禮佛足在一靣立時第一梵身天而説偈言今於此林中集會於大衆是故我等來正欲觀衆僧不以不善心壞僧破和合第二梵身天復説偈言比丘誠實心冝應務精勤猶如善御者制馬令調順比丘亦如是應制御諸根第三梵身天復説偈言譬如野馬被羇繫拔柱踏塹安隱出諸比丘等亦如是拔三毒柱斷欲塹世尊導師之所調能出是等大龍象第四梵身天復説偈言諸有歸依於佛者人中捨形得天身時四梵身天各説偈已在於僧中敬心戰栗作禮而去如是我聞一時佛在王舍城迦蘭陀竹林時梵主天於其中夜威光甚明來至佛所爾時世尊入火光三昧時梵主天作是心念今者如來入於三昧我來至此甚為非時當爾之時提婆達多親友瞿迦梨比丘謗舍利弗及大目連此梵主天即詣其所扣瞿迦梨門喚言瞿迦梨瞿迦梨汝於舍利弗目連當生淨信彼二尊者心淨柔耎梵行具足汝作是謗後於長夜受諸𮕱苦瞿迦梨即問之言汝為是誰答曰我是梵主天瞿迦梨言佛記汝得阿那含耶梵主答言實爾瞿迦梨言阿那含名為不還汝云何還梵主天復作是念如此等人不應與語而説偈言欲測無量法智者所不應若測無量法必為所燒害時梵主天説是偈已即往佛所頂禮佛足在一靣坐以瞿迦梨所説因緣具白世尊佛告梵言實爾實爾欲測無量法能燒凡夫爾時世尊即説偈言夫人生世斧在口中由其𢙣口自斬其身應讚者毀應毀者讚如斯𢙣人終不見樂迦梨偽謗於佛賢聖迦梨為重日千地獄時阿浮陀毀謗賢聖口意𢙣故入此地獄時梵主天聞是偈已禮佛而退如是我聞一時佛在舍衛國祇樹給孤獨園時有二天一名小勝善閉梵二名小勝光梵欲來詣佛時婆迦梵見此二梵即問之曰欲何所至二梵答言我等欲往詣世尊所問訊禮敬時婆迦梵即説偈言四梵字鸛雀三梵名為金七十二五百名曰為餘毗汝觀我金色赫然而明盛所有威光明暉光蔽梵天云何不觀我乃欲詣佛所爾時二梵以偈答言汝今有少光映蔽于梵天當知此光色皆有諸過患明智得解脫不樂斯光色爾時二梵説是偈已來詣佛所頂禮佛足在一靣坐二梵白佛言世尊我等欲來見佛時婆迦梵因問我言欲何所至我等答言欲詣佛所時婆迦梵説此偈言四梵名鸛雀三梵名為金七十二五百名曰為餘毗汝觀我金色赫然大熾盛所有身光明暉光蔽梵天云何不觀我乃欲詣佛所我等即便説偈答言汝今有少光映蔽於梵天當知此光色皆有諸過患智者得解脫不樂斯光色佛言梵天實爾實爾彼梵雖復少有光色映蔽梵天當知光色皆有過患智者解了不應樂此佛為二梵種種説法示教利喜二梵聞法歡喜頂禮還於天宮如是我聞一時佛在舍衛國祇樹給孤獨園時婆迦梵生於邪見言此處常堅實不壞不復往來於其生死若有過此不往來者無有是處爾時世尊知婆迦梵心之所念如來爾時譬如壯士屈申臂頃尋即往彼婆迦梵宮時婆迦梵語佛言大仙此處是常堅實不壞都無往來若有過此無往來者無有是處佛語梵言此處無常汝今云何橫生常想此處敗壞而復橫生不敗壞想此處不定橫生定想此處往來汝今橫生不往來想更有勝處都無往來汝便橫生更無勝想時婆迦梵即説偈言七十二梵作勝福悉皆於此而終沒一切諸梵皆知我唯我在此不退沒爾時世尊復説偈言汝謂為長壽其實壽短促我知汝壽命百千尼羅浮時婆迦梵説偈答曰婆伽婆世尊汝智實無盡過於生老憂為具眼者説我先造何業修何等戒行在此梵天上壽命得延長爾時世尊復説偈言往昔有群賊劫掠壞聚落剝脫繫縛人大取於財物汝當於爾時甚有大勇力救解於諸人然復不加害尋共彼諸人一劫中修善慈仁好惠施復能持戒行汝於睡及寤冝憶本所行又有人乘船於彼恆河中𢙣龍提船人盡欲加毒害汝時為神仙救濟於彼命此汝昔日時修戒之所致時婆迦梵即説偈言汝實能知我壽命之修短更有諸餘事汝亦悉知之汝光甚熾盛能蔽於諸梵靡所不了達故名婆伽婆爾時世尊為婆迦梵説種種法示教利喜尋復於彼沒還祇洹如是我聞一時佛在舍衛國祇樹給孤獨園時有一梵起大邪見而作是言我此處常不見有能生於我宮況復有能過於我上者爾時世尊入於三昧從閻浮提沒現於梵頂虛空中坐尊者憍陳如以淨天眼觀於世尊為至何處即知如來在梵頂上虛空中坐時憍陳如亦入是定於此而沒現梵頂上處如來下在於東靣時尊者摩訶迦葉以淨天眼觀於如來為至何處尋知世尊在梵頂上復入此定於此處沒在如來下現梵頂上在於南靣尊者目連以淨天眼觀於如來為至何處尋知世尊在梵頂上即入是定於此處沒現梵頂上處如來下在於西靣時尊者阿那律復以淨天眼觀察如來為至何處尋知世尊在梵頂上亦入是定於此處沒現梵頂上處如來下在於北靣爾時世尊告梵天言汝本所見為捨已不復告梵天汝本心念我不見有能生我宮者況能出過汝今試觀此等天身容貌光明勝汝已不時梵白佛唯然已見而今見之斯等光明昔所不見而今見之斯等光明真為殊勝自今已後更不敢言此處常恆無有變易佛告梵天此處無常空不自在佛為彼梵種種説法示教利喜入如是三昧從彼梵沒還於祇洹尊者憍陳如摩訶迦葉阿那律等亦為彼梵種種説法示教利喜亦入是定從彼處沒還於祇洹唯尊者大目揵連在彼而坐爾時彼梵問目連言世尊弟子頗有如汝有大威德神足者不目連答言諸餘聲聞亦有如是威德神足尊者目連即説偈言牟尼弟子大羅漢有大威德具三明得盡諸漏知他心能現神變化群生如是聲聞甚衆多是故汝今冝恭敬時尊者目連説是偈已種種説法示教利喜亦入是定從彼梵沒還於祇洹如是我聞一時佛在拘尸那竭力士生地娑羅林中爾時如來涅盤時到告阿難曰汝可為我於雙樹間北首敷座於時阿難受佛勑已於雙樹間北首敷座既敷座已還至佛所頂禮佛足在一靣坐白佛言世尊我於雙樹間北首敷座所作已竟爾時世尊即從座起往趣雙樹敷上北首右脅而臥足足相纍繫心在明起於念覺先作涅盤想爾時拘尸那竭國有一梵志名須跋陀羅先住彼國其年朽邁一百二十時彼國中諸力士輩供養恭敬尊重讚歎是阿羅漢時須跋陀羅傳聞人説婆伽婆於今日夜當入涅盤作是念言我於法中有所疑惑唯有瞿曇必能解釋決我所疑作是念已即出拘尸那竭往詣娑羅林尊者阿難在外經行時須跋陀見阿難已即詣其所白阿難言我聞他説沙門瞿曇於今日中夜當入無餘涅盤吾今須見咨決所疑阿難答言梵志佛身疲惓汝今擾惱須跋陀羅白阿難言我聞如來今日中夜入無餘涅盤我昔曾聞宿舊仙言若如來至真等正覺出現於世如優曇鉢花難可值遇我有少疑思得咨決願聽我見如是三請阿難答言莫擾惱佛爾時世尊以淨天耳遙聞阿難遮須跋陀不聽前進佛告阿難莫遮彼人聽其前進隨意問難時須跋陀羅聞佛慈矜聽令前進踊躍歡喜即至佛所問訊已訖在一靣坐白佛言世尊我有少疑聽我問不佛言恣汝所問須跋陀羅既蒙聽許白佛言世尊外道六師種種異見富蘭那迦葉末迦梨俱梨子阿闍耶毗羅坘子阿闍多翅舍婆羅迦尼陀迦旃延尼乾陀闍提子斯等六師各各自稱已為世尊竟為實得一切智不爾時世尊即説偈言三十一出家爾來過五十推求諸善法戒定行明達一切諸世間不知實方所况知實法者若修八正道能獲於初果乃至第四果若不修八正初果不可知况復第四果我於大衆中説法師子吼如此正法外亦無有沙門及與婆羅門佛説是時須跋陀羅遠塵離垢得法眼淨時須跋陀羅整鬱多羅僧合掌向佛白佛言世尊我今已得過三惡道時須跋陀羅白阿難言善哉阿難汝獲大利為佛弟子給侍第一我於今者亦得善利於佛法中願得出家阿難合掌白佛言須跋陀羅於佛法中願樂出家爾時世尊即告須跋陀羅善來比丘鬚髮自落法衣著身即得具戒得具戒已即成羅漢須跋陀羅即作是念我今不忍見於世尊入般涅盤我當先入須跋陀羅即時先入涅盤如來於後亦入涅盤爾時衆中有一比丘而説偈言雙樹入涅盤枝條四遍布上下而雨花繽紛散佛上所以雨花者世尊入涅盤釋提桓因復説偈言諸行無常是生滅法生滅滅已乃名涅盤時梵主天復説偈言世間有生類捨身歸終滅今者大聖尊具足於十力世尊無等倫今入於涅盤時尊者阿那律復説偈言法主意止住出入息已斷如來所成就行力悉滿足今入於涅盤其心無怖畏都捨於諸受如油盡燈滅滅有入涅盤心意得解脫時衆覩己身毛皆竪佛入涅盤始經七日爾時阿難闍維如來右繞説偈大悲梵世尊體同真淨寶有大神通力火出自然身千㲲用緾身內外二不燒澄函國宋藏云起世經闍那崛多共達摩笈多等譯丹藏則云闍那崛多譯取函國宋藏云起世因本經闍那崛多譯丹藏則云達摩笈多譯今撿開元録以起世經為闍那崛多譯亦為前經以起世因本經為達摩笈多譯亦為後經則經名前後皆同而但譯主少差耳及見注云前經初云婆伽婆在舍婆提城後經乃云在舍囉婆悉帝城緣生經亦云舍囉婆悉帝城故知同是笈多譯也恐二本相濫題下別云起世因本焉按云據此注文丹本為正故今以在舍婆提城者名為起世經為崛多譯而前之為澄函以在舍囉婆悉帝城者題加因本二字為笈多譯而却之為取函焉映函大樓炭經卷第一右經第十九幅十八行家室親屬四部兵之下宋丹藏本脫十五行文今依國本加之又為看舊宋丹藏者具録其文于左四部兵之下有云止頓其中爾時北方諸少王以金鉢滿盛銀粟以銀鉢盛滿金粟共往至轉輪王所白言天王來大善北方諸城國界富樂熾盛安穩五穀豐熟人民珍寶衆多工巧者饒明月珠玉琉璃象馬牛羊奴婢米穀豐饒倉庫儲滿願大王止此我等承受其教轉輪王便告諸少王言賢等各自治國以正法莫行非法賢等莫殺生莫盜竊莫犯人婦女莫妄語罵詈惡口兩舌莫念人惡當念慈心為正見奉行如是者即為受我教爾時諸小王持國界捧上轉輪王按行北方諸國云云映函中本起經卷下右經第十幅十四行下宋本闕瞿曇彌來作比丘尼品第九凡六紙今依他本補之又為看舊宋藏經者具録其文于左瞿曇來作比丘尼品第九爾時佛遊於迦維羅衛國釋氏精舍與大比丘僧千二百五十人俱是時大愛道瞿曇行到佛所稽首作禮却住一面叉手白佛言我聞女人精進可得沙門四道願得受佛法律我以居家有信欲出家為道佛言且止瞿曇無樂以女人入我法律服法衣者當盡壽清淨究暢梵行瞿曇又復求哀如是至三佛不肯聽便前作禮繞佛而去其後不久佛時與諸大比丘俱從釋氏精舍入迦維羅衛國大愛道聞佛從諸弟子來入國中心大歡喜即行到佛所稽首佛足下大愛道復白佛言我聞女人精進可得沙門四道願得受佛法律我以居家有信欲出家為道佛言止止瞿曇無樂以女人入我法律服法衣者當盡壽清淨究暢梵行大愛道則復求哀如是至三佛不肯聽便前作禮繞佛而去佛時與諸比丘留止是國避雨三月補成衣已著衣持鉢出國而去大愛道即與諸老母等俱行追佛佛行轉到那私縣頓止河上大愛道便前稽首作禮却住白佛言我聞女人精進可得沙門四道願得受佛法律我以居家有信欲出家為道佛言止止瞿曇無樂以女人入我法律服法衣者當盡壽清淨究暢梵行大愛道則復求哀如是至三佛不肯聽便前作禮繞佛而退住於門外被弊敗之衣徒跣而立顏面垢穢衣服汙塵身體疲勞噓唏悲啼賢者阿難見伯母大愛道如是即問言瞿曇何因弊衣徒跣面垢衣塵疲勞悲啼大愛道答言賢者阿難今我用女人故不得受佛法律是以自悲傷耳阿難言止止瞿曇且自寬意待我今入向佛説是事賢者阿難即入稽首佛足下長跪白佛言我從佛聞女人精進可得沙門四道今大愛道以至心欲受法律其已居家有信欲出家為道願佛許之佛言止止阿難無樂使女人入我法律為沙門也所以者何阿難譬如族姓之家生子多女少男當知是家以為𮕱弱不得大強盛也今使女人入我法律者必令佛清淨梵行不得久住譬如稻田禾稼具熟而有𢙣露災氣則令善穀傷敗今使女人入我法律者必令佛清淨大道不得久興盛阿難復言今大愛道多有善意佛初生時力自育養至于長大佛言有是阿難大愛道信多善意於我有恩我生七日而母終亡大愛道自育養我至于長大今我於天下為佛亦多有恩德於大愛道大愛道但由我故得來自歸佛自歸法自歸比丘僧又信佛信法信比丘僧不復疑苦不復疑習不復疑盡不復疑道方成其信成其禁戒成其多聞成其布施成其智慧亦能自禁制不殺生不盜竊不淫泆不妄語不飲酒如是阿難正使人終身相給施衣被飲食臥具病困醫藥不及我此恩德也佛告阿難假使女人欲作沙門者有八敬之法不得踰越當以盡壽學而行之譬如防水善治堤塘勿漏而已其能如是者可入我律戒何謂八敬之法一者比丘持大戒女人比丘尼當從受正法二者比丘僧持大戒半月已上比丘尼當禮事之三者比丘僧比丘尼不得相與並居同止四者三月止一處自相撿押所聞所見當自省察五者比丘尼不得訟問比丘僧事以所聞見若比丘僧有所聞見訟問比丘尼比丘尼即當自省察六者比丘尼有庶幾於道法得問比丘僧經律之事七者比丘尼自未得道若犯戒律當半月詣衆中首過自悔以棄憍慢之態八者比丘尼雖有百歲持大戒當處新受大戒幼稚比丘僧下坐以謙敬為之作禮是為八敬之法我教女人不得踰越當以盡壽學而行之假令大愛道審能持此八敬法者聽為沙門賢者阿難受佛語已熟諦便作禮而出報大愛道言瞿曇可勿復愁已得捨家之信去家就戒佛説女人作沙門者有八敬之法不得踰越但當終身勤意學行之耳持心當如防水善治堤塘勿漏而已阿難便一一為伯母説佛所教勑八敬之事言能如是者可入佛法律大愛道即歡喜而言唯諾阿難聽我一言譬如四姓家女沐浴塗香衣莊嚴事而人復欲利益之安隱不怖以好華香寶結為㻉瑤持與其女豈不愛樂頭首受耶今佛所教勑八敬法者我亦歡心願以首頂受之爾時大愛道便受大戒為比丘尼奉行法律遂得應真然後異時大愛道比丘尼與諸長老比丘尼俱行詣賢者阿難而問言阿難是諸長老比丘尼皆久修梵行且已見諦云何當使為新受大戒幼少比丘僧作禮阿難言小且待我今入問之阿難即入稽首佛足下白佛言大愛道比丘尼言是諸長老比丘尼皆久修梵行且已見諦云何當使為新受大戒幼少比丘僧作禮佛言止止阿難當慎此言勿得説也但汝所知不如我知若使女人不於我道作沙門者外諸異學梵志及諸居士皆當以衣被布地求哀於諸沙門言賢者有淨戒高行願行此衣上令我長得其福佛言阿難若使女人不於我道作沙門者天下人民皆當解髮布地求哀於諸沙門言賢者有戒聞慧行願行此髮上令我長得其福若使女人不於我道作沙門者天下人民皆當豫具衣被飯食臥床病瘦醫藥願諸沙門當自來取之若使女人不於我道作沙門者天下人民奉事沙門當如事日月如事天神過踰於諸外道異學者上若使女人不於我道作沙門者佛之正法當千歲興盛佛復語阿難以女人作沙門故使我法五百歲而衰微所以者何阿難女人有五處不能得作何等為五女人不得作如來至真等正覺女人不得作轉輪聖王女人不得作第二忉利天帝釋女人不得作第六魔天王女人不得作第七天梵天王夫此五處者皆丈夫得為之耳丈夫得於天下作佛得作轉輪聖王得作天帝釋得作魔天王得作梵天王佛説是已皆歡喜受行丁未歲高麗國大藏都監奉敕雕造
