body:
  text: 沙門守其等奉勑挍勘甚函大安般守意經二卷此經按經首序及見經文似是書者之錯經注不分而連書者也義當節而注之然往往多有不可分處故不敢擅節以遺後賢焉竟函受新歲經笁法護譯按此受新歲經法護譯者國本宋本皆編於容函中以當受歲經丹藏則容函中有名受歲經者而與此經大別今依開元録撿之則丹藏之經正是容函受歲經耳此宋藏經與此竟函新歲經文異義同似是同本異譯耳則開元録中以新歲經為單譯者厥義未詳今且欲類聚以待賢哲故以此經移編于竟函焉竟函護淨經失譯人名附東晉録第三幅五行一切衆人普使聞知已下國宋兩本有一切檀越施設法會等凡二百五十五字之文丹藏所無其文切要今為看舊丹藏經者具録于左一切衆人普使知聞一切檀越施設法會供齋調度持齋者得食不持齋者不得食此飯一日持齋得六十萬世餘糧不持齋者六十萬世墮餓鬼中何以故此信施難消故寧吞熱鐵丸不食此飯吞熱鐵丸須間耳食此信施久受大苦五百萬世中受餓鬼苦諸有設食之處一切如法作齋不得懷挾餘殘食歸給妻子若食此飯若腋底挾簷後五百世常挾熱鐵輪左腋底入從右腋底出一切齋飯不可不慎一米化作熱丸一切賢者施設福會於先嘗啜此食都作殘食唐作此會不如不作何以故諸天不歡鬼神不喜此人於先嘗者亦五百世中受餓鬼苦自今已後欲得福者如法作齋食可得福德諸天歡喜百神慶恱天神擁護經不虛言福報如影響佛説護淨經攝函十誦律卷第五此卷第二十六張第二行夜提之下乃至三十日皆如上説者丹本無此中九字而有又比丘得不具足衣乃至至三十日地了時尼薩耆波夜提等凡九十一行文國本宋本並無者今依丹本遆而足之又比丘得不具足衣停更望得衣故至十二日不得所望非望而得是衣十二日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十三日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十三日不得所望非望而得是衣十三日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十四日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十四日不得所望非望而得是衣十四日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十五日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十五日不得所望非望而得是衣十五日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十六日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十六日不得所望非望而得是衣十六日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十七日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十七日不得所望非望而得是衣十七日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至十八日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十八日不得所望非望而得是衣十八日應即作方若與人若作淨若受持若不作衣不與人不作淨不受持至十九日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至十九日不得所望非望而得是衣十九日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十日不得所望非望而得是衣二十日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十一日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十一日不得所望非望而得是衣二十一日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十二日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十二日不得所望非望而得是衣二十二日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十二日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十三日不得所望非望而得是衣二十三日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十四日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十四日不得所望非望而得是衣二十四日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十五日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十五日不得所望非望而得是衣二十五日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十六日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十六日不得所望非望而得是衣二十六日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十七日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十七日不得所望非望而得是衣二十七日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十八日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十八日不得所望非望而得是衣二十八日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至二十九日地了時尼薩耆波逸提又比丘得不具足衣停更望得衣故至二十九日不得所望非望而得是衣二十九日應即作衣若與人若作淨若受持若不作衣不與人不作淨不受持至三十日地了時尼薩耆波逸提同卷二十七張第十三行即今正本三十一張第十三行尼薩耆波夜提之下十二日乃至三十日亦如上説者丹本無此中十二字而有又比丘得不具足衣停更望得乃至至三十日地了時尼薩耆波夜提等凡九十二行國本宋本