又為看舊國宋藏者具録正本于左沙塞五分戒本一卷宋𦋺賔三藏佛陀什等譯大德僧聽春時一月過少一夜餘有一夜三月在老死至近佛法欲滅諸大德為得道故一心勤精進所以者何諸佛一心勤精進故得阿耨多羅三藐三菩提何况餘善道法未受具戒者已出僧今和合先作何事一人答言布薩説戒諸大德不來諸比丘説欲及清淨一人答言説欲訖合十指爪掌供養釋師子我今欲説戒僧當一心聽乃至小罪中心應大怖畏有罪一心悔後更莫復犯心馬馳惡道放逸難禁制佛説切戒行亦如利轡勒佛口説教誡善者能信受是人馬調順能破煩惱軍若不受教勑亦不愛樂戒是人馬不調沒在煩惱軍若人守護戒如𤛆牛愛尾繫心不放逸亦如猴著鎖日夜常精進求實智慧故是人佛法中能得清淨命大德僧聽今十五日布薩説戒僧一心作布薩説戒若僧時到僧忍聽一心共作布薩白如是諸大德今布薩説波羅提木叉一切共聽善思念之若有罪應發露無罪者默然默然故當知我及諸大德清淨如聖默然我及諸大德亦如是若比丘如是衆中乃至三唱憶有罪不發露得故妄語罪故妄語罪佛説遮道法發露者得安樂不發露罪益深諸大德已説戒經序今問諸大德是中清淨不第二第三亦如是説諸大德是中清淨默然故是事如是持諸大德是四波羅夷法半月半月戒經中説若比丘共諸比丘同學戒法戒羸不捨行淫法乃至共畜生是比丘得波羅夷不共住若比丘若聚落若空地盜心不與取若王若大臣若捉若縛若殺若擯語言汝賊汝小汝癡是比丘得波羅夷不共住若比丘若人若似人若自殺若與刀藥殺若教人殺若教自殺譽死讚死咄人用惡活為死勝生作是心隨心殺如是種種因緣彼因是死是比丘得波羅夷不共住若比丘不知不見過人法聖利滿足自稱我如是知如是見是比丘後時若問若不問為出罪求清淨故作是言我不知言知不見言見空誑妄語除增上慢是比丘得波羅夷不共住諸大德已説四波羅夷法若比丘犯一一戒不得共住如前後亦如是是比丘得波羅夷罪不應共住今問諸大德是中清淨不第二第三亦如是説諸大德是中清淨默然故是事如是持諸大德是十三僧伽婆尸沙法半月半月戒經中説若比丘故出不淨除夢中僧伽婆尸沙若比丘欲盛變心觸女人身若捉手若捉髮若捉一一身分摩著細滑僧伽婆尸沙若比丘欲盛變心向女人惡語隨淫欲法説僧伽婆尸沙若比丘欲盛變心向女人自讚身言姊妹淫欲供養是第一供養僧伽婆尸沙若比丘行媒法若為私通事持男意至女邊持女意至男邊乃至一交會僧伽婆尸沙若比丘自乞作房無主為身應如量作長佛十二搩手廣七搩手應將諸比丘求作處諸比丘應示作處無難處有行處若不將諸比丘求作處若過量作僧伽婆尸沙若比丘有主為身作房應將諸比丘求作處諸比丘應示作處無難處有行處若不將諸比丘求作處僧伽婆尸沙若比丘自不如法惡瞋故以無根波羅夷謗無波羅夷比丘欲破彼梵行是比丘後時若問若不問言我是事無根住瞋故謗僧伽婆尸沙若比丘自不如法惡瞋故於異分中取片若似片作波羅夷謗無波羅夷比丘欲破彼梵行是比丘後時若問若不問言我是事異分中取片若似片住瞋故謗僧伽婆尸沙
