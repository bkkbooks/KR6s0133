body:
  text: 沙門守其等奉勑挍勘孰函佛説木槵經不空譯此函國宋本中有佛説木槵經不空譯者今撿與前竟函木槵子經失譯人名今附東晉録者始終無異詳其文體即是漢晉之譯其在竟函者然矣按續開元釋教録有佛説木槵經不空譯者則今此孰函理必有之此應宋藏失真不空譯本而得竟函中經無譯人號者錯認為此不空之譯耳故今除却此函中者後賢若見佛説木槵經與彼竟函之經異者請須編此孰函中焉傾函根本説一切有部毗奈耶破僧事卷第十三此卷撿國前本及宋本中於第十四幅二十行爾時大子復白王言已下文脫今準國後本及丹本則有聽我出家乃至往四天王所或往等凡八十八行文今依二本足之又於十七幅第九行得神通已作如是已下文脫今準國後本及丹本則有念我得神通乃至同詣佛所等凡八十六行文今依二本足之又為看舊前本及宋本者具録其文于左爾時大子復白王言聽我出家王知其意不求世樂遂許出家時彼大子得王放已即入山中仙人住處出家修道父王即册其弟日智紹大子位時日曜大子既至山中繫念思惟證獨覺果於後時中身染疾患周旋消散還至婆羅痆斯城諸人見已而白王言日曜大子入山修道證獨覺果今來城內王既聞已即迎日曜禮其足已白言大仙汝須衣食我求福德今請大仙住我園林隨時安置所須之物我當供給時彼獨覺默然受請王見受請即勑日智大子侍養獨覺供給所須時獨覺仙即於定中觀見日智大子却後七日當捨其命告大子曰弟今何故不求出家弟言我願出家獨覺告曰白父王知日智大子往父王所白言我願出家願王聽許王聞此言遂生忿怒告太子曰汝兄日曜今已出家我終歿後須有繼嗣今不放汝時彼獨覺聞王不放其弟即詣王所説伽他曰日曜放日智令隨我出家出家最勝事諸佛所讚歎父王白言大仙當知汝已出家我之國法須有紹繼唯有日智令知國位在家修福其事足得何用出家時彼獨覺復説伽他曰王先別思此事復別却後七日日智命終王問獨覺日智大子却後七日必不活耶答言如是王言若如是者放令出家大子出家已發善心供養獨覺彼獨覺患風手執飯鉢掉動不安其大子見遂將金釧以承其鉢鉢遂不動大子觀已歡喜發如是願我今聽法亦復如是法入我心更不傾動往時獨覺未得果證為弟日智常説圓滿微妙勝法今得證果更不説法日智見已白獨覺言汝未出家恆常説法何因獲果遂即默然獨覺報言我實不説法日智問曰誰合説法獨覺報云汝知應正等覺出世之時當説種種圓滿妙法太子聞此發如是願願以此善根未來之世與佛作弟又得出家親承供養聞法領記獲大總持爾時辟支迦謂其弟曰却後七日汝當報終常守此心莫令忘失七日既滿未得果證垂將告謝重發誓言如前所願爾時佛告諸苾芻曰時辟支弟今阿難陀是緣過去世供養辟支迦當發願言未來世中與佛作弟親承供養多聞總持所以今時為我昆季聰明第一若水注時諸苾芻咸皆有疑即白佛言其阿難陀過去行何善業今蒙世尊於大衆中歎美稱揚聰明莫比總持強記領受無遺佛告諸苾芻阿難陀往昔自修善業廣説如前佛告諸苾芻往昔之時於賢劫中於時有情壽二萬歲有佛世尊號迦攝波出現於世在婆羅痆斯城仙人墮處施鹿林中佛有一弟子多聞不忘聰明第一彼有弟子從出家來常修梵行乃至命終不獲聖果臨終之時一心發願所作善根願當來之世與釋迦如來為親侍弟子如今無異於弟子之中聰明第一願釋迦如來與我授記如彼無異汝諸苾芻彼弟子者今阿難陀是以先世善心發願力故今於我弟子中聰明第一諸苾芻若作黑白雜染業者各獲其報汝等應捨雜染黑業常修白業佛在王舍城竹林迦蘭鐸迦園中有五百苾芻圍繞世尊皆是阿羅漢唯提婆達多未得聖果爾時國土飢荒人民無食乞求難得衆中有神通苾芻即騰虛空或下贍部林中取香美贍部之果滿鉢充足還至本處供養四衆自亦飽足或往蜜羅林下迦比陀林或下甘露園或下阿犁勒林取香美之果滿鉢充足還至本處供養四衆自亦充足或有苾芻神通自在即騰虛空往北俱盧洲取自然粳米香美之者滿鉢充足還至本處供養四衆自亦飽足或有苾芻神通自在虛空遊行往至餘國乞種種美妙飲食乃至滿鉢廣説如前或有苾芻以神通力往四天王所或往得神通已作如是念我得如是神通作諸變相神通亦得詣贍部林中取香美果滿鉢充足供養四衆自亦飽足廣説如前乃至三十三天取天厨食亦供養四衆自亦充足復更思念此摩揭陀國中誰人最勝我當歸伏因彼人故令一切人皆恭敬我復更思念此國大子阿闍世父王亡後太子為王我應降伏我若降得阿闍世太子令一切人皆恭敬我作此念已往詣阿闍世所即現神相化為白象即入大門從小門出或入小門從大門出已自現其身更入大門變為駿馬從小門出已自現其身欲入小門即為牛王從大門出已即真身現如法持鉢詣阿闍世所即變其身猶如小兒身衣金瓔坐太子膝上乍起乍坐流轉徘徊太子知是提婆達多神通之相或弄或抱或拍或嗚便唾口中提婆達多以供養利益貪心故即咽其唾時阿闍世起顛倒心作如是念此提婆達多勝佛神通時提婆達多自現真身是時大子心生恭敬便即頂禮及諸供養將五百寶車送提婆達多出時阿闍世還至本處每日兩回參提婆達多及承事供養時太子遣立五百大鐺作諸飲食送至提婆達多以為供養時提婆達多收取自食及五百苾芻圍繞共食時苾芻於王舍城晨朝乞食聞如是語此提婆達多得太子種種利供養日日二時恆日不絶及五百車輅寶車承事供養及五百鐺作諸飲食而為供養及將自食五百苾芻圍繞而食諸苾芻聞此事已次第乞食還至本處依法食訖收衣鉢洗足已往佛所頂禮佛足次第而坐而白佛言大德我等晨朝入王舍城乞食聞提婆達多從阿闍世太子所多得利養廣説如上乃至五百苾芻圍繞坐共食佛告諸苾芻時提婆達多受此利益供養猶此自害及以兼害何以故諸苾芻譬如芭蕉出果便即枯死猶此自害提婆達多受此利養亦復如是譬如竹葦若出花果便即枯死如騾懷妊有子便死諸苾芻提婆達多受此利益亦復如是諸苾芻提婆達多若受利養得彼無智提婆達多日夜長受惡名苦惱無利得如是報汝等苾芻應如是知爾時提婆達多廣得利養遂起貪心更不希求起顛倒心別生憶念世尊今既年老力弱今為四衆説法勞苦世尊不如與我四衆我自教示而為説法世尊當可宴寂而坐修習善法常住安樂是時提婆達多起此念已即失神通自不覺知我失神通爾時迦俱羅苾芻習四無畏除貪念心死生梵天即見提婆達多遂失神通是提婆達多亦不自知爾時大目揵連在揭伽國膠魚山恐怖鹿林中彼迦俱羅梵天子從彼天沒如屈申臂頃往目連處頂禮雙足却住一靣作如是語大德目連今可知提婆達多為利養故遂起貪心更復希求起顛倒心別生憶念世尊今既年老力弱今為四衆説法疲倦勞苦世尊不如與我四衆我自教示亦為説法世尊當可宴寂而坐證習善法常住安樂是時提婆達多起此念心即失神通自不覺知我失神通大德大目揵連起慈悲心往詣佛所説提婆達多如上緣起乃至失其神通自不覺知爾時大目揵連從梵天子默然受語爾時迦俱羅天子知目連受已心生歡喜頂禮目連雙足匆然不現爾時大目揵連見梵天去便即入如是定從膠魚山沒即於王舍城迦蘭鐸迦竹林園中踊現詣世尊所頂禮雙足却住一靣爾時大目揵連所受迦俱羅天子言語皆悉咨白是時世尊告目連曰汝先知提婆達多如上事耶為復報汝始知時目揵連白言世尊我先舊知爾時世尊共目揵連説是語時提婆達多共四苾芻一名迦利迦二名褰荼達驃三名羯吒謨洛迦底沙四名三沒羅達多共此四人同詣佛所回漢函右二函中國本有佛名經十八卷者今檢與下寧晉楚函中三十卷本同是一經後人見其卷數有異認為異經故重編入今以三十卷世所盛行故除此中十八卷者乃以摩訶衍論十卷為回函玄文論二十卷為漢函云俊乂密函右三函中國本有一切經源品次録三十卷沙門從梵撰者今檢但是標舉諸經卷中首尾之言於看覽藏經者所益無幾今且除之以新選挍正別録三十卷編其函焉寧晉楚函佛名經三十卷宋藏丹藏並無此經開元録云十六卷或三十一卷貞元録云或三十二卷或十四卷國本回漢函中亦有此經為十八卷挍曰既雜人偽多少任情按開元録偽妄亂真中云右一經時俗號為馬頭羅剎佛名經似是近代所集乃取流支所譯十二卷者錯綜而成於中取諸經名目後取辟支佛及菩薩阿羅漢名以為三寶次第總有三十二件禮三寶後皆有懺悔懺悔之下仍引馬頭羅剎偽經置之於後乃以凡俗鄙語雜於聖言尋其所集之者全是庸愚只如第四卷云南無法顯傳經在法寶中列此傳乃是東晉沙門法顯往遊天笁自記行迹元非是經置法寶中誤謬之甚又如第九卷云南無富樓那南無彌陀羅尼子此是一人之名分為二唱次云南無阿難羅睺羅此乃二人之名合之為一如斯謬妄其類實繁群愚倣習邪儻共傳若不指明恐穢真教故此述之貞元録云此經乃以凡俗鄙語雜於聖言本經雖真以有偽雜作此挍量編於偽妄亂真録中不得入藏由斯可否已數百年貞元十五年十月二十三日乃頒製曰大佛名經左右監門衛將軍知內侍省事馬承倩奏前件經未入藏目録勑旨冝令所司附入目録今於謬妄之處分者請合合者請分諸如此類伏請改正下順人望上副天心編入貞元新定釋教目録傳出梁朝附於梁代挍曰今撿國本大藏彼回漢函中亦有此經十八卷者以此三十卷本對彼挍之卷數雖異文義全同但一樣懺文此經再疊彼乃三疊又寶達偽經此有彼無為少異耳此一偽經古有二名一名大乘蓮華馬頭羅剎經古十六卷本用此名合之一名寶達菩薩問報應沙門經而無答字今此三十卷本用此名合之而妄加答字隋開皇十四年勑沙門法經等所撰衆經目録暨皇唐諸家目録並以此寶達經列為偽妄今佛名經前諸録家真偽不録開元録中收為偽妄而合此寶達偽經則妄中加妄也開元録云經至晉土其年未遠而喜事者以沙揉金而無括正何以別真偽乎農者禾草俱存后稷為之歎息金匱玉石同緘卞和為之懷耻涇渭淆雜龍蛇並進豈不耻之今列意謂非佛經者以示將來學士共知鄙倍焉遂摽此經而為其首録家懇囑如是國本如何二重重載彼十八卷經乃似是貞元録中奉制所收入者其分卷小異耳後人見此三十卷本認為異經故加入耳今欲刪正則彼十八卷者乃無寶達偽經稍正可存然此三十卷經本朝盛行行來日久國俗多有倚此而作福者今忽刪之彼必衆怒若俱存之理亦未可且順人情存此而刪彼因書古人之意以告雅正君子但其誤分錯合之處今隨改之如第十二卷云南無抅絺羅難陀此是二聖之名經錯合之今分為二第十三卷云南無賓頭盧南無頗羅墮此是一聖之名經誤分之今合為一此類不少不能具敘嗚呼阿難大聖也距佛不遠也經藏所集也而欲正一僧水鶴之偈僧竟不從况我凡夫乎佛世已遠乎經法遙傳乎而於舉國盛行久遠之典忽獨起以刪之而欲衆情之不怒己如螳螂之怒其臂以當車欲其不輾己也猶不足以譬其非分也心知偽妄力不能正末法之弊一至於此傷哉但有一理既所患在於偽妄亂真若於諸經之名諸羅漢號懺悔文等分明知是人所撰集有所錯處各依聖教本文而正之刪去寶達偽經而名之曰夾懺佛名經使人看其名分其主客如諸家夾注解經則其行於世亦庶幾乎可矣
