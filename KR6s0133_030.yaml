body:
  text: 沙門守其等奉勑挍勘孰凾佛說木槵經不空譯此凾國宋本中有佛說木槵經不空譯者今撿與前竟凾木槵子經失譯人名今附東晉錄者始終無異詳其文體即是漢晉之譯其在竟凾者然矣按續開元釋教錄有佛說木槵經不空譯者則今此孰凾理必有之此應宋藏失真不空譯本而得竟凾中經無譯人号者錯認為此不空之譯耳故今除却此凾中者後賢若見佛說木槵經與彼竟凾之經異者請須編此孰凾中焉傾凾根本說一切有部毗奈耶破僧事卷第十三此卷撿國前本及宋本中於第十四幅二十行尒時大子復白王言已下文脫今准國後本及丹本則有聽我出家乃至往四天王所或往等凢八十八行文今依二本足之又於十七幅第九行得神通已作如是已下文脫今准國後本及丹本則有念我得神通乃至同詣佛所等凡八十六行文今依二本足之又為看舊前本及宋本者具錄其文于左尒時大子復白王言聽我出家王知其意不求世樂遂許出家時彼大子得王放已即入山中仙人住處出家修道父王即冊其弟日智紹大子位時日曜大子既至山中繫念思惟證獨覺果於後時中身染疾患周旋消散還至婆羅痆斯城諸人見已而白王言日曜大子入山修道證獨覺果今來城內王既聞已即迎日曜禮其足已白言大仙汝須衣食我求福德今請大仙住我園林隨時安置所須之物我當供給時彼獨覺默然受請王見受請即勑日智大子侍養獨覺供給所須時獨覺仙即於定中觀見日智大子却後七日當捨其命告大子曰弟今何故不求出家弟言我願出家獨覺告曰白父王知日智大子往父王所白言我願出家願王聽許王聞此言遂生忿怒告太子曰汝兄日曜今已出家我終歿後須有継嗣今不放汝時彼獨覺聞王不放其弟即詣王所說伽他曰日曜放日智令隨我出家出家最勝事諸佛所讚歎父王白言大仙當知汝已出家我之國法湏有紹継唯有日智令知國位在家修福其事足得何用出家時彼獨覺復說伽他曰王先別思此事復別却後七日日智命終王問獨覺日智大子却後七日必不活耶荅言如是王言若如是者放令出家大子出家已發善心供養獨覺彼獨覺患風手執飯鉢掉動不安其大子見遂將金釧以承其鉢鉢遂不動大子觀已歡喜發如是願我今聽法亦復如是法入我心更不傾動往時獨覺未得果證為弟日智常說圓滿微妙勝法今得證果更不說法日智見已白獨覺言汝未出家恒常說法何因獲果遂即默然獨覺報言我實不說法日智問曰誰合說法獨覺報云汝知應正等覺出世之時當說種種圓滿妙法太子聞此發如是願願以此善根未來之世與佛作弟又得出家親承供養聞法領記獲大㹅持尒時辟支迦謂其弟曰却後七日汝當報終常守此心莫令忘失七日既滿未得果證垂將告謝重發誓言如前所願尒時佛告諸苾蒭曰時辟支弟今阿難陀是緣過去世供養辟支迦當發願言未來世中與佛作弟親承供養多聞㹅持所以今時為我昆季聦明第一若水注時諸苾蒭咸皆有疑即白佛言其阿難陀過去行何善業今蒙世尊於大眾中歎羙稱揚聦明莫比㹅持強記領受無遺佛告諸苾蒭阿難陀往昔自修善業廣說如前佛告諸苾蒭往昔之時於賢劫中於時有情壽二萬歲有佛世尊号迦攝波出現於世在婆羅痆斯城仙人墮處施鹿林中佛有一弟子多聞不忘聦明第一彼有弟子從出家來常修梵行乃至命終不獲聖果臨終之時一心發願所作善根願當來之世與釋迦如來為親侍弟子如今無異於弟子之中聦明第一願釋迦如來與我授記如彼無異汝諸苾蒭彼弟子者今阿難陀是以先世善心發願力故今於我弟子中聦明第一諸苾蒭若作黑白雜染業者各獲其報汝等應捨雜染黑業常修白業佛在王舍城竹林迦蘭鐸迦園中有五百苾蒭圍繞世尊皆是阿羅漢唯提婆達多未得聖果尒時國土飢荒人民無食乞求難得眾中有神通苾蒭即騰虛空或下贍部林中取香羙贍部之果滿鉢充足還至本處供養四眾自亦飽足或往蜜羅林下迦比陀林或下甘露園或下阿犁勒林取香羙之果滿鉢充足還至本處供養四眾自亦充足或有苾蒭神通自在即騰虛空往北俱盧洲取自然粳米香羙之者滿鉢充足還至本處供養四眾自亦飽足或有苾蒭神通自在虛空遊行往至餘國乞種種美妙飲食乃至滿鉢廣說如前或有苾蒭以神通力往四天王所或往得神通已作如是念我得如是神通作諸變相神通亦得詣贍部林中取香羙果滿鉢充足供養四眾自亦飽足廣說如前乃至三十三天取天厨食亦供養四眾自亦充足復更思念此摩揭陀國中誰人最勝我當歸伏因彼人故令一切人皆恭敬我復更思念此國大子阿闍世父王亡後太子為王我應降伏我若降得阿闍世太子令一切人皆恭敬我作此念已往詣阿闍世所即現神相化為白象即入大門從小門出或入小門從大門出已自現其身更入大門變為駿馬從小門出已自現其身欲入小門即為牛王從大門出已即真身現如法持鉢詣阿闍世所即變其身猶如小兒身衣金瓔坐太子膝上乍起乍坐流轉徘徊太子知是提婆達多神通之相或弄或抱或拍或嗚便唾口中提婆達多以供養利益貪心故即咽其唾時阿闍世起顛倒心作如是念此提婆達多勝佛神通時提婆達多自現真身是時大子心生恭敬便即頂禮及諸供養將五百寶車送提婆達多出時阿闍世還至本處每日兩迴㕘提婆達多及承事供養時太子遣立五百大鐺作諸飲食送至提婆達多以為供養時提婆達多收取自食及五百苾蒭圍繞共食時苾蒭於王舍城晨朝乞食聞如是語此提婆達多得太子種種利供養日日二時恒日不絕及五百車輅寶車承事供養及五百鐺作諸飲食而為供養及將自食五百苾蒭圍繞而食諸苾蒭聞此事已次第乞食還至本處依法食訖收衣鉢洗足已往佛所頂禮佛足次第而坐而白佛言大德我等晨朝入王舍城乞食聞提婆達多從阿闍世太子所多得利養廣說如上乃至五百苾蒭圍繞坐共食佛告諸苾蒭時提婆達多受此利益供養猶此自害及以兼害何以故諸苾蒭譬如芭蕉出果便即枯死猶此自害提婆達多受此利養亦復如是譬如竹葦若出花果便即枯死如騾懷妊有子便死諸苾蒭提婆達多受此利益亦復如是諸苾蒭提婆達多若受利養得彼無智提婆達多日夜長受惡名苦惱無利得如是報汝等苾蒭應如是知尒時提婆達多廣得利養遂起貪心更不希求起顛倒心別生憶念世尊今既年老力弱今為四眾說法勞苦世尊不如與我四眾我自教示而為說法世尊當可宴寂而坐修習善法常住安樂是時提婆達多起此念已即失神通自不覺知我失神通尒時迦俱羅苾蒭習四無畏除貪念心死生梵天即見提婆達多遂失神通是提婆達多亦不自知尒時大目揵連在揭伽國膠魚山恐怖鹿林中彼迦俱羅梵天子從彼天沒如屈申臂頃往目連處頂禮雙足却住一靣作如是語大德目連今可知提婆達多為利養故遂起貪心更復希求起顛倒心別生憶念世尊今既年老力弱今為四眾說法疲倦勞苦世尊不如與我四眾我自教示亦為說法世尊當可宴寂而坐證習善法常住安樂是時提婆達多起此念心即失神通自不覺知我失神通大德大目揵連起慈悲心往詣佛所說提婆達多如上緣起乃至失其神通自不覺知尒時大目揵連從梵天子默然受語尒時迦俱羅天子知目連受已心生歡喜頂禮目連雙足怱然不現尒時大目揵連見梵天去便即入如是定從膠魚山沒即於王舍城迦蘭鐸迦竹林園中踊現詣世尊所頂禮雙足却住一靣尒時大目揵連所受迦俱羅天子言語皆悉諮白是時世尊告目連曰汝先知提婆達多如上事耶為復報汝始知時目揵連白言世尊我先舊知尒時世尊共目揵連說是語時提婆達多共四苾蒭一名迦利迦二名褰荼達驃三名羯吒謨洛迦底沙四名三沒羅達多共此四人同詣佛所迴漢凾右二凾中國本有佛名經十八卷者今檢與下寧晉楚凾中三十卷本同是一經後人見其卷數有異認為異經故重編入今以三十卷世所盛行故除此中十八卷者乃以摩訶衍論十卷為迴凾玄文論二十卷為漢凾云俊乂密凾右三凾中國本有一切經源品次錄三十卷沙門從梵撰者今檢但是標舉諸經卷中首尾之言於看覽藏經者所益無幾今且除之以新選挍正別錄三十卷編其函焉寧晉楚凾佛名經三十卷宋藏丹藏並無此經開元錄云十六卷或三十一卷貞元錄云或三十二卷或十四卷國本迴漢函中亦有此經為十八卷挍曰既雜人偽多少任情按開元錄偽妄亂真中云右一經時俗号為馬頭羅剎佛名經似是近代所集乃取流支所譯十二卷者錯綜而成於中取諸經名目後取辟支佛及菩薩阿羅漢名以為三寶次第㹅有三十二件禮三寶後皆有懺悔懺悔之下仍引馬頭羅剎偽經置之於後乃以凡俗鄙語雜於聖言尋其所集之者全是庸愚只如第四卷云南無法顯傳經在法寶中列此傳乃是東晉沙門法顯往遊天笁自記行跡元非是經置法寶中誤謬之甚又如第九卷云南無富樓那南無彌陀羅尼子此是一人之名分為二唱次云南無阿難羅睺羅此乃二人之名合之為一如斯謬妄其𩔗寔繁群愚倣習邪儻共傳若不指明恐穢真教故此述之貞元錄云此經乃以凡俗鄙語雜於聖言本經雖真以有偽雜作此挍量編於偽妄亂真錄中不得入藏由斯可否已數百年貞元十五年十月二十三日乃頒製曰大佛名經左右監門衛將軍知內侍省事馬承倩奏前件經未入藏目錄勑旨冝令所司附入目錄今於謬妄之處分者請合合者請分諸如此類伏請改正下順人望上副天心編入貞元新定釋教目錄傳出梁朝附於梁代挍曰今撿國本大藏彼迴漢函中亦有此經十八卷者以此三十卷本對彼挍之卷數雖異文義全同但一樣懺文此經再疊彼乃三疊又寶達偽經此有彼無為少異耳此一偽經古有二名一名大乘蓮華馬頭羅剎經古十六卷本用此名合之一名寶達菩薩問報應沙門經而無荅字今此三十卷本用此名合之而妄加荅字隋開皇十四年勑沙門法經等所撰眾經目錄暨皇唐諸家目錄並以此寶達經列為偽妄今佛名經前諸錄家真偽不錄開元錄中收為偽妄而合此寶達偽經則妄中加妄也開元錄云經至晉土其年未遠而憙事者以沙揉金而無括正何以別真偽乎農者禾草俱存后稷為之歎息金匱玉石同緘卞和為之懷耻涇渭淆雜龍虵並進豈不耻之今列意謂非佛經者以示將來學士共知鄙倍焉遂摽此經而為其首錄家懇囑如是國本如何二重重載彼十八卷經乃似是貞元錄中奉制所收入者其分卷小異耳後人見此三十卷本認為異經故加入耳今欲刪正則彼十八卷者乃無寶達偽經稍正可存然此三十卷經本朝盛行行來日久國俗多有倚此而作福者今忽刪之彼必眾怒若俱存之理亦未可且順人情存此而刪彼因書古人之意以告雅正君子但其誤分錯合之處今隨改之如第十二卷云南無抅絺羅難陀此是二聖之名經錯合之今分為二第十三卷云南無賓頭盧南無頗羅墮此是一聖之名經誤分之今合為一此𩔗不少不能具敘嗚呼阿難大聖也距佛不遠也經藏所集也而欲正一僧水鶴之偈僧竟不從况我凡夫乎佛世已遠乎經法遙傳乎而於舉國盛行久遠之典忽獨起以刪之而欲眾情之不怒己如螗螂之怒其臂以當車欲其不輾己也猶不足以譬其非分也心知偽妄力不能正末法之弊一至於此傷哉但有一理既所患在於偽妄乱真若於諸經之名諸羅漢号懺悔文等分明知是人所撰集有所錯處各依聖教本文而正之刪去寶達偽經而名之曰夾懺佛名經使人看其名分其主客如諸家夾注解經則其行於世亦庶幾乎可矣
