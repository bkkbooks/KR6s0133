body:
  text: 沙門守其等奉勑校勘四分比丘尼羯磨之餘內護匡救僧衆𢷤罰羯磨法律藏所明僧之正法宗要有三故結集稱言是法是毗尼是佛所教法者謂五種遠離行何等五一者出離非世法二越度非受法三無欲非有欲四無結非有結五不親近生死非親近毗尼者謂五種出要行何等五一小欲非多欲二知足非無猒三易護非難護四易養非難養五智慧非愚癡佛所教者謂五種教誡行何等五一有罪行者制二無罪者聽三若制若聽法有減者如法舉之四數數違犯折伏與念五真實功德愛念稱歎故經云正法住正法滅謂之於此傳法之人亦有於三故聖誥稱言知法知律知摩夷知法者謂善持修多羅藏如阿難等知律者謂善持毗尼藏如優波離等知摩夷者謂善於訓導宰任玄綱如大迦葉等故凡欲暈蹤聖跡以隆道教繼䡄後代不絶於時者非茲而誰五種入衆法何等五一應以慈心二應自卑下如拭塵巾三應善知坐起上下威儀四不雜說俗事為衆說法若請他說五若見僧中有不可事心不安忍應作默然五種如法默然何等五一見他非法而默然二不得伴而默然三犯重而默然四同住默然五在同住地默然五種非法默然何等五一如法羯磨而心不同默然在之二得同意伴亦默然任之三若見小罪而默然四為作別住而默然五在戒場上而默然五種棄法何等五一比丘犯罪餘比丘問汝犯罪見不答言不見彼語言汝若見罪應懺悔二比丘犯罪餘比丘問汝犯罪見不答言不見彼語言汝若見罪應僧中懺悔三比丘犯罪餘比丘問言汝犯罪見不答言不見彼語言汝若見罪當於此僧中懺四比丘犯罪餘比丘問言汝犯罪見不答言不見衆僧應捨棄語言汝不見罪隨所至處不聽汝布薩如惡馬難調合韁杙俱棄汝亦如是五比丘犯罪餘比丘問言汝犯罪見不答言不見彼應僧中作不見舉羯磨五種作羯磨法何等五一見前二自言三不清淨四如法五和合斯謂知病知藥知對治善於廢興通塞存護之儀故致任持之功義顯於此三種調法謂呵責羯磨𢷤羯磨依止羯磨三種滅法謂罪處所多人語如草覆地三種不共住法謂三舉羯磨惡罵治滅𢷤羯磨呵責羯磨文先作舉作憶念與罪已然後作羯磨大德僧聽此比丘某甲喜共鬪諍共相罵詈口出刀劒互求長短彼自共鬪諍已若復有餘比丘鬪諍者即復往彼勸言汝等免力莫不如他汝等多聞智慧財富亦勝多有知識我等當為汝作伴儻令僧未有諍事而有諍事已有諍事而不除滅若僧時到僧忍聽為比丘某甲作呵責羯磨若後復更鬪諍共相罵詈言衆僧當更增罪治白如是大德僧聽此比丘某甲喜共鬪諍共相罵詈口出刀劒㸦求長短彼自共鬪諍已若復有餘比丘鬪諍者即復往彼勸彼言汝等免力莫不如他汝等智慧多聞財富亦勝多有知識我等當為汝作伴儻令僧未有諍事而有諍事已有諍事而不除滅僧為比丘某甲作呵責羯磨誰諸長老忍僧與比丘某甲作呵責羯磨若復更鬪諍共相罵詈者衆僧當更增罪治忍者默然不忍者說是初羯磨如是三說僧已忍為比丘某甲作呵責羯磨竟僧忍默然故是事如是持與羯磨已以奪三十五事令其折伏後若隨順改悔者僧應還與解羯磨與罪處所羯磨文先作舉作憶念與罪已然後作羯磨大德僧聽是比丘某甲無慙無愧多犯諸罪有見聞疑先自言犯後言不犯前後言語相違若僧時到僧忍聽僧今與比丘某甲罪處所羯磨白如是大德僧聽是比丘某甲無慙無愧多犯諸罪有見聞疑先自言犯後言不犯前後言語相違僧今與是比丘某甲罪處所羯磨誰諸長老忍僧今與比丘某甲罪處所羯磨者默然誰不忍者說是初羯磨如是三說僧已忍與比丘某甲罪處所羯磨竟僧忍默然故是事如是持與羯磨已以三十五事令其折伏後若隨順改悔僧應還與解羯磨與滅𢷤羯磨文先作舉作憶念與罪已然後作羯磨大德僧聽是比丘某甲犯某甲波羅夷罪若僧時到僧忍聽僧今與比丘某甲波羅夷罪滅𢷤羯磨不得共住不得共事白如是大德僧聽是比丘某甲犯某甲波羅夷罪僧今與比丘某甲波羅夷罪滅𢷤羯磨不得共住不得共事誰諸長老忍僧與比丘某甲波羅夷罪滅𢷤羯磨不得共住不得共事者默然誰不忍者說是初羯磨如是三說僧已忍與比丘某甲波羅夷罪滅𢷤羯磨不得共住不得共事竟僧忍默然故是事如是持此永𢷤無解法此後三羯磨皆是治罰法但以過有輕重階之為三前呵責羯磨等是調伏法罪處所羯磨等是折伏法滅𢷤羯磨等是驅出法故經言應調伏者而調伏之應折伏者而折伏之應罰黜者而罰黜之若隨事而言羯磨非一備明律典寧容具集故各當其分唯標一羯磨示之恆式餘類准以可知四分比丘尼羯磨竟入函目連問戒律中五百輕重事一卷按文國本有三百六十七問丹本同此則宋本只有二百二十問者脫之甚矣今取二本補之然亦不滿五百今疑譯本不足或恐題舉大數摽為三百而傳寫者錯三為五焉又為看宋藏者具録其文于左若不償計下國本丹本有十七張文錢直犯重問若他人持食具寄屋中經宿有犯不答不犯問續明油一升二升得著自房中不答得問藥酒得著自房中不答病得七日問都不用楊枝有犯不答犯墮問未曉得楊枝不答明星出後得用犯墮問中食後口得用楊枝不答得用若不用純灰皂莢計都不用犯墮過中亦犯墮中後除藥一切草木有形之味不得入口犯墮問若無楊枝口得用一切餘木不答盡得問貧乏得入市乞不答中前得中後不得亦不得乞錢若欲乞錢當將一白衣沙亦得問人捉比丘賣得走不答初時得經主不得問比丘戲得物作食請比丘得食不答不得犯墮問比丘尼不精進可勸罷道不答無此理問合藥施人而不知裁節服者死犯事不答好心與無犯𢙣心與犯重問比丘或十臘五臘竟不誦戒犯何事答若不誦或食人信施日日犯盜若先不知猶得懺悔問一切鬼神屋可寄宿不答行路得宿有觸擾意住犯墮問比丘噉生肉犯何事答犯墮問二男行欲不竟犯何事答犯決斷問二男欲口戲擬便止犯何事答犯墮成者犯决斷問牀席他人於上行欲其處可住不答見處淨可住問已唱僧跋上坐未食下坐先食犯何事答聞唱便食不犯問比丘不具六物犯何事答不乞作犯捨墮若乞不能得不犯問比丘大寒得通衣臥不答著衣得問比丘自稱貴姓及持戒強力乞得犯何事答犯捨墮問姊妹有腫病或有痛處比丘手案此處可治犯何事答若起心犯決斷不起犯墮問妹姊無兒息語比丘教我方術比丘即教犯何事答犯決斷問寄比丘物與人竟不與犯何事答自取不過犯重著故壞還計直輕重問聚落中都不著衣犯何事答犯墮問比丘噪犯何事答若聚落衆中一作犯墮三諫不休犯決斷問聚落中持弓刀看犯何事答先不知法無犯知突吉羅問比丘騎乘犯何事答雄者一往犯過三諫不止犯決斷雌者一載犯決斷問聚落中比丘看白衣鬪犯何事答犯墮問比丘暫捉碁子弄而戲犯何事答犯墮問聚落中三歲小兒抱嗚口犯何事答犯墮問聚落中合白衣相撲犯何事答犯突吉羅問聚落中看白衣合畜生犯何事答知非法故看犯墮不知不犯內起淫心口有染汙言犯決斷問比丘食不足得囑未具戒者不答得唯除婆羅門問山中曠野中見一無主器物可取用不答得用要須語王若王家之人若語餘人得用不得持去犯捨墮問道人作醫得取物不答若慈心治得作𢙣心不得無衣鉢前人與得取若有衣鉢前人強與為福事得取若人不與亦不得為福乞犯捨墮問食巾或少多將菜飯捉墮上要須浣不答不汙亦須日浣若有沙白衣付之日從受不犯若已付著室中無苦若不付又不浣犯捨墮問比丘私房小小出不閉戶有犯不答犯捨墮問比丘私房內拍手笑犯何事答犯捨墮問比丘得躑過小水小坑不答不得犯墮昔有一優婆塞請一比丘欲與作一領好衣比丘即隨去中道有一小水比丘便躑度此優婆塞便嫌心念我謂是好比丘欲與一領好衣而更跳躑溝坑我歸當與半領衣此是無著人即其人念前行見水復故躑過賢者復念我歸當與一張㲲前行見水復躑過賢者復念我歸當與一頓食無著復知其念前行見水便舉衣涉渡賢者問比丘何以不躑渡比丘言卿前與我一領衣已一躑過水正得半領復一躑正得一張㲲復一躑正得一頓食我今所不躑者恐復失食賢者乃知是得道人便向懺悔將歸大供養以此驗之知比丘不得躑過坑水問比丘走犯何事答犯墮有急事不犯問有人出家之後還來盜本家物犯何事答犯棄所以爾者初出家時一切盡捨非己物故問比丘本在俗時共父母兄弟藏物出家後家人盡死比丘還自來取物犯何事答若自取犯棄若有所親白衣可語使取作福應分半與官所以爾者此物無主應屬官不得全取取犯重問師更受戒小弟子弟子得下臘下戒及在下行不若不下得為作禮不答都無此理問比丘行他田地中或有苗或無苗有事不答有苗犯墮急事不犯無苗盡得問大悔人已發露或五三日或有難衆僧分散罪得决不答更求衆乃決問王者問比丘吉凶事比丘為說然後供養犯何事答若得食犯墮得衣犯捨墮若說征伐得供養犯重問比丘有緣事俗田行得不答得問比丘未滿五臘不依止犯何事答不依止師若飲水食飯日日犯盜若先不知法猶得懺悔問若比丘或十臘不誦戒答同上依止問比丘市賣自譽己物過價前人信貴買犯何事答犯盜問比丘行逈路有食無人受云何得食答正得舒一手下向一捉食便止過犯墮問比丘船行水大不得下得水中便利不答得問比丘書經竹木上誦訖拭去犯事不答犯墮問未滿五臘得並入誦律不答不得為可粗教誡而已若誦犯墮捨大戒不滅沙戒故是沙非答非問比丘晝眠犯何事答開戶不得犯墮問比丘得倚墮伏地不答私戶得衆中不得犯墮問比丘舍內都不著三衣犯何事答坐禪誦經不著犯墮問比丘行道著泥洹僧得繫腳不答大寒得問比丘畜漆器犯何事答漆木器盡不得用用犯墮問比丘已食手或搪飲食汙手更得受食不答得問比丘至上房中不坐輒坐犯何事答犯墮問比丘旋塔或比丘尼優婆夷隨後旋有犯不答若有優婆塞不犯問比丘生菜已淨有根得食不答得問弟子遠行寄師物或師寄弟子過期不還或經年歲可取用不答若去時無言不得用若知在是有主物若死是僧物問比丘教白衣不祭一切亡人為是理不答非假使父母不食敬心供養亦得其福問衆中得共師並坐不答不接得共盤食問比丘不寒三衣禮佛犯何事答衆多突吉羅問比丘得手自合藥不答被淨草得問比丘休道意已著俗服經時向其尊禮拜之禮然後還來投衆求服常位為應聽不答若不捨戒者應聽問比丘知其父母兄弟破落屬人而不購贖有罪不答若為行道不贖無罪問若人白僧稱言聖衆得然可不答不得然可問若人持物施僧言施聖衆應受不答若不言得分得取以衆通有俗故問行道過水使人負渡犯何事答若不老病犯墮問衆僧家奴比丘得小小請使不答小小取與得大事不得問比丘養爪甲長犯何事答犯墮問上坐比丘未浴下坐於前浴有犯不答犯墮問比丘器中忽有異物或復弊故不知誰許可取用不復可棄不答與僧不得私用問有一住處多去來僧所有遺亡或是新或是弊衣永無取用者可取不答與衆僧衆僧停一月一歲後得用若後主來僧物償若是貴寶衆後不能償者勿用問比丘有知舊白衣來造已得語上坐維那持僧食與不答僧先令得不令不得問比丘捨道還俗後更出家前師故是師非答非是問臨壇諸師僧可呼言師不答無此理不從受法者盡不得為師問一切師得呼為和上不稱為弟子不答不得正可敬重如俗中之尊問三自歸事品第十四問三自歸趣得人受復有不應受者不答除五逆罪得問三自歸斯行何事答身口意不行邪事及不隨邪見師問云何犯三歸答好邪見隨外道師問若犯三自歸云何悔答向本師悔若無本師向餘比丘亦得問若不能持得還不答得問若還還云何答向本師若一比丘言我從今日以後不復能歸佛法歸比丘僧如是三說若不滿三故成就三歸問或人受三自歸乃悔宿命𢙣逆為是理非答無此理問三歸正得從一人受復得從三人各得受一歸不答不得問受三歸法要終身復可得一年半年十日五日不答隨意多少問若從師受一年半年自歸日滿後故是師非答一從受法終身是師問三自歸得但受一二歸不答不得問受三歸現前無師得逢從文受不答不得問先受三歸犯不悔過得更受不答不得要當悔若欲當受捨先所受若不捨更受者不得問五戒事品第十五問不受三歸得受五戒不答不得問若受三歸犯而不悔者得受五戒不答不得問受五戒法可得但受五日十日一年二年不答隨意多少問犯五戒不悔得更受不答不捨不得更受不悔亦不得捨問五戒盡得悔不答若殺人淫其所尊及比丘尼盜三尊財盡不得悔餘得悔問五戒若不能持得中還不答得還若欲都還五戒者合三自歸還言從今日佛非我尊我非佛弟子如是至三法僧亦爾若還一二三四者但言我從今日不能復持某戒如是至三若不滿三戒猶成就問五戒可從五師各受一戒不答得問既受五戒偏所重可但分還一二不答得問五戒可但受一二三不答得隨意多少問比丘犯重戒或犯酒戒得不答得問頗有八戒白衣不答無唯有八閞齊問十戒事品第十六問不受五戒得受十戒不答若先三自歸得以十戒中即有五戒亦不復受問犯五戒不悔得受十戒不答不得若先不知悔已而受不悔不得問若師犯重戒從受十戒得不答亦得問若犯重戒受十戒得不答不得問沙犯十戒盡得悔不答同上五戒問沙品第十七問悔須衆不答不須衆但向本師得了若現在無師向餘一比丘亦得問沙半月一說戒不答無此理所以爾者以沙戒不函俗人然終已可說須十五日一集問沙犯戒得還向沙悔不答不得問沙得著俗服不答不得問師有種種違法事沙得捨更求師不答得問沙叛師以白衣師綜謵俗竟不捨戒或經年月還來投師故是沙非但悔過而已不須更受戒耶答故是沙但向師懺本不捨戒不得更受受亦不得戒問沙為賊所抄經歷年月或轉經主得逃不答轉經主不得問沙犯禁師僧已𢷤謝得更出家不答若不捨戒故是沙可懺而已問白衣時從沙受五戒然後出家受大戒本師故是沙得呼為師不答得呼為師但不得為禮沙應作禮白衣時從尼受五戒然後出家亦爾問比丘貪資之物其罪甚重昔有一比丘貪著一銅鐃死後作餓鬼衆分物竟便來其身絶大黤黮如純黑雲諸比丘驚怪此是何物衆中有得道者言是死比丘貪著鐃故墮餓鬼中今故貪惜來欲索之諸比丘即以鐃還既得便捉舌舐放地而去諸比丘還取之而絶臭不可近復使人更鑄作器猶臭不可用以此驗之知貪為大患比丘貪著衣服乃有自焚之酷昔有一比丘喜作衣晝夜染著得病困篤自知當死便舉頭視衣內起毒想言我死後誰敢著我此服者不久便命終作化生蛇還來纏衣衆舁死比丘出燒葬訖遣人往取衣物見蛇緾衣延咽吐毒不敢近即還白衆具說所見諸比丘便共往看之都無敢近者有一比丘得道便入四等觀毒不中便往近之語言此本是汝衣今非汝有何以護之便即捨去不遠入一草毒火出然草還自燒身命終即入地獄火燒一日之中三過被燒皆由貪害歲坐竟懺悔文第十八若僧聽多薩阿竭所受歲坐比丘應爾我從歲始至今歲竟六月中多所違失違失者戒事除二鼻二事餘不除是世尊集和僧所教勑今我是思念共諸君發露陳說所違失事君各忍受我若九十日無世尊定無世尊智無世尊戒故多犯無世尊智無世尊戒故犯無世尊戒故犯無世尊智故多失教事無世尊定故多犯亂意或念欲法不行欲事或念盜法不行盜事或念殺法不行殺事或念欺法不行欺事或念僧伽婆尸沙法不行僧伽婆尸沙事此九十日中所犯事通威儀問白衣欲出家比丘即受更為請師故是師非答非師若從受法者可為師若依隨者可為依止師問若有比丘不捨作沙即大道人而更受戒為僧不答得問若不得戒前所受戒故在不答在問後師是非答非問多人受戒而并請一人為師可得十人五人一時受不答無理問沙受大戒請一比丘為大戒師而此比丘不知羯磨及受戒法轉請一人與授以何者為師答與戒者為師是無法非師授五戒比丘唯得授婆羅門於餘者尼授比丘不得問中閒事問者犯僧殘問一切所有王者不全施得不答王者不嫌便得問見人行欲不呵犯事不答前人可諫不諫犯墮若不可諫向一比丘好發露問比丘先犯事更受戒得共住不答犯重不得更受戒决斷悔過得更作不悔亦不得况得共住問有急事比丘持弓箭上船可隨去不答主犯重寄載犯捨墮問比丘官逼作非法犯何事答不得作問二男共戲便止犯何事答成犯決斷問比丘盜聽二男行欲犯何事答無欲心聽犯墮有欲心聽身不失犯不失突吉羅問比丘病不能得行乘車馬不答雄者盡得雌者無想犯墮有想犯決斷不知是雌無罪問比丘嫌經不好賣去更作好者犯何事答賣經如賣父母罪同問二男角力犯何事答犯墮問畜生行欲比丘驗令全別離犯何事答犯墮問著小衣行留大衣得受人施不答言得問比丘夏中得受僧物不答若施僧物即應分不得亭問比丘有好知家結事委任之更異比丘從乞得物犯何事答觀主人意𢙣不得犯捨墮知主意好得取問鳩雀於人舍內作窠比丘破或塞鼠孔犯何事答鳩雀未有子得去有子不得鼠唯有一孔不得塞若有內外孔得塞內者問比丘得與師及同學得作書不答在他方情通異國不得問人出家王法父母不聽為得戒不答不得
