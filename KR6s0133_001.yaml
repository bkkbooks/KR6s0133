body:
  text: 沙門守其等奉勑挍勘服凾决定毗尼經宋本此經宋本第十二幅已下有其三節之文文断義絕難取解處右幅十四行云云何名為菩薩乘人雖淨持戒於聲聞乘不名淨戒優婆離菩薩乘人於之下便云恒河沙劫受五欲樂遊戲自在受諸樂已未曾捐捨發菩提心乃至第十四幅初四行云優婆離如來先說欲難捨離為小犯之下便云菩薩乘人清淨持戒於聲聞乘不名清淨菩薩乘人於無量劫堪任受身乃至第十五幅十九行優婆離云何菩薩乘人持深入戒聲聞乘人持次第戒菩薩乘人於之下便云瞋恨易得離名為大犯是為三節文断處也今檢他本則宋本錯將後節聲聞乘人持次第戒菩薩乘人於之下恒河沙劫受五欲樂乃至欲難捨離為小犯等四百八十七字之文安於初節菩薩乘人於之下却將初節云何名為之下菩薩乘人清淨持戒乃至聲聞乘人持次第戒菩薩乘人於等五百一十七字之文安於欲難捨離為小犯之下致令如是三節文断不唯如此前後倒錯其第二節菩薩乘人清淨持戒於聲聞人不名清淨優婆離菩薩乘人於等二十四字者是錯重寫焉今依二本削其重而序其亂者又為看舊宋藏經者略錄正文于左正文云優波離菩薩乘人於無量劫堪忍受身不生猒患是則名為菩薩乘人清淨持戒於聲聞乘最大破戒不名清淨又優波離菩薩乘人持不盡護戒聲聞乘人持盡護戒菩薩乘人持開通戒聲聞乘人持不開通戒菩薩乘人持深入戒聲聞乘人持次第戒優波離云何名為菩薩乘人持不盡護戒聲聞乘人持盡護戒菩薩乘人持戒之時於諸眾生及與他人應當隨順聲聞乘人不應隨順優波離以是義故菩薩乘人持不盡護戒聲聞乘人持盡護戒優波離云何名為菩薩乘人持開通戒聲聞乘人持不開通戒優波離菩薩乘人以日初分有所犯戒於日中分思惟當得一切種智菩薩尒時不破戒身以日中分有所犯戒於日後分思惟當得一切種智菩薩尒時不破戒身以日後分有所犯戒於夜初分思惟當得一切種智菩薩尒時不破戒身以夜初分有所犯戒於夜中分思惟當得一切種智菩薩尒時不破戒身以夜中分有所犯戒於夜後分思惟當得一切種智菩薩尒時不破戒身以夜後分有所犯戒於日初分思惟當得一切種智菩薩尒時不破戒身以是義故菩薩乘人持開通戒聲聞乘人持不開通戒菩薩不應生大慙愧亦復不應生大悔優波離聲聞乘人數數犯罪即時破失聲聞戒身所以者何聲聞乘人應當持戒断一切結如救頭然所有深心為涅盤故優波離以是義故聲聞乘人名持不開通戒優波離云何菩薩乘人持深入戒聲聞乘人持次第戒菩薩乘人於恒沙劫受五欲樂遊戲自在受諸樂已未曾捨離發菩提心菩薩尒時不名失戒所以者何菩薩乘人有於後時善能護持菩提之心乃至夢中一切結使不為其患菩薩乘人不應一時於一身中盡一切結應當漸漸盡一切結善根成就非不成就聲聞乘人如救頭然乃至一念受身不應生喜以是義故大乘之人持深入戒聲聞乘人持次第戒菩薩乘人持開通戒持不盡護戒聲聞乘人持不開通戒持盡護戒所以者何阿耨多羅三藐三菩提甚為難得具大莊嚴乃可得成大乘之人於無量劫往來生死不應生於猒離之心優波離如來觀察籌量為大乘人不應一向說猒離法不應一向說離欲法不應一向說速疾法常當為說發歡喜心相應說法常應為說甚深無雜無悔緾法常應為說無取無礙空無之法聞此法已當樂生死不生憂悔亦能滿足菩提之行憂波離白佛言世尊或有欲相應心而犯於戒有瞋相應心而犯於戒有癡相應心而犯於戒世尊菩薩犯戒於欲相應心瞋相應心癡相應心何者為重尒時世尊告優波離若有菩薩如恒河沙劫欲相應心而犯於戒或有菩薩因一瞋心而犯於戒等住菩薩大乘之道因瞋犯者當知最重所以者何因瞋恚故能捨眾生因貪欲故於諸眾生而生親愛優波離所以諸結能生親愛菩薩於此不應生畏所有諸結能捨眾生菩薩於此應生大畏優波離如來先說欲難捨離名為小犯瞋易得離名為大犯服凾須摩提經法護譯本開元錄云此經前後四譯三存一闕流志法師有先後二譯其先譯者即一闕也今撿諸藏國宋二藏有法護譯流志後譯而無什譯丹藏雖無流志後譯而有法護羅什二譯則若二藏㸦偹乍似三存具矣今詳丹藏所謂什譯者與諸藏法護譯始終無異又非羅什譯經之例而謂之什譯何也若同時異國二人各譯則容有二譯偶同而諸經無此例者况法護之後一百餘年羅什西來始事翻譯不應直書法護之譯而云重譯若云什公未見法護之譯而重譯之乃偶同耳則彼時聖教未廣人又勤學其會下㕘譯八百餘人並是東土英賢何必人人皆不見耶又凡重譯者欲異於前若全同者何煩重譯耶諸重譯經亦無此例若異凾隔越勢難相准容有錯誤而重載之如宋藏六字神呪王經未曾有經之類是也今以錯重皆刪去今此一凾一卷之經譯主雖為二人經本始終唯一而重載之者丹藏之錯何甚耶故今不取丹藏所謂什譯者由是言之開元之後什本亦失傷哉推凾大集經國宋二藏皆六十卷丹藏三十卷開元錄云三十卷按此經國本宋本皆六十卷凡十七品丹藏中三十卷十一品又經初首國宋兩本則有瓔珞品名丹藏所無其虛空藏品兩本在不可說後丹藏在無言品前又於寶𮫀品後兩本有無盡意品四卷丹藏即無而有日密分三卷如是不同者何耶今以開元錄前後文括而統之按梁沙門僧祐錄云此經凡有六本大集記云有十二叚說共成一經第一瓔珞品二陀羅尼自在王品三寶女品四不眴品五海慧品六無言品七不可說品八虛空藏品九寶幢品十虛空目品十一寶髻品十二無盡意品按云此則第一本也今以品次驗之是兩本六十卷中前分三十卷矣又云今撿經本與祐記不同第一陀羅尼自在王菩薩品二寶女品三不眴品四海慧品五虛空藏品六無言品七不可說品八寶幢分九虛空目分十寶髻品十一日密分按云此則第二本也今以品次驗之則今丹藏經三十卷者是矣又云隋朝僧就合大集經乃以明度五十校計經題為十方菩薩品編月藏後及無盡意成五十八卷者按云此則第四本也又云其合大集經亦有六十卷成者三十一二兩卷重有寶𮫀品足成六十卷其寶𮫀品在日密前二十六七卷是此復重編未詳何意又日密日藏梵本不殊重重編載誤之甚矣按云此則第五本也今以品次驗之則今兩藏本經六十卷者是矣但不重載寶𮫀品斯為少異耳即於前第四本五十八卷經中分彼日藏分十卷為十二卷足成六十耳其第三第六兩本今以諸藏所無故不煩敘經本如是不同藏中致斯有異耳謹按開元錄前後文相今此兩藏本經六十卷者有六失故不可依行錄云亦有經本分為瓔珞品者不然此是一叚不合分二按云此經分之一失也又云僧祐記中無日密分有無盡意品者不然今以無盡意經雖大集別分非無讖譯又非次第不合入中按云此經入中又為無讖譯二失也又云其虛空藏品祐在不可說後未詳所以按云此經在彼三失也又云日密日藏梵本不殊重重編載誤之甚矣按云此經重載四失也又云明度五十挍計經題為十方菩薩品編月藏後者非也既無憑准故不依彼按云此經依之五失也又明度經安世高譯而云那連堤耶舍譯按云此亦誤人六失也不獨如是其十方菩薩品即下難凾中明度五十校計經二卷耳無盡意品即下最凾中無盡意經六卷耳而於此中並重編之是亦雜沓難依者也是則理須正之正之如何略則如開元錄及丹藏經為三十卷乃正矣合則如開元錄中第六本為八十卷方備矣然今不能即正者以此六十卷本是本朝芬皇宗選行經行來已久久則難變耳虞凾大集經第五十九卷此經自下二卷則丹藏所無故今無可相校而國宋二本此卷之中皆有三節之文文断義絕難取解處一則第九幅十七行中有五陰中有之下便云所多得中味中語言等二則第十幅二十一行云言相未具者自不之下便云習自言我無罪等三則第十二幅二行云是為顛倒口之下便云能得佛何能使人得佛是為三節文断處也今准明度經此中二本皆錯將是為顛倒口之下所多得中味中語言乃至相未具者自不等凡二十七行揔三百七十九字進而寫之于五陰中有之下却將五陰中有之下習自言我無罪乃至是為顛倒口等凡二十七行揔三百七十六字退而寫之于相未具者自不之下致令三節之文文断義絕今依明度經進退而正之又為看舊國宋藏者略錄正文于左中有五陰中有習自言我無罪如是生死無數劫為顛倒轉入眼眼所多視好色生死罪中有五陰中有習自言我無罪如是生死無數劫為顛倒眼所多視中色生死罪中有五陰中有習自言我無罪如是生死無數劫為顛倒眼所多視惡色生死罪中有五陰中有習自言我無罪如是生死無數劫為顛倒轉入耳耳所多聞好聲生死罪中有五陰中有習自言我無罪如是生死無數劫為顛倒耳所多聞中聲生死罪中有五陰中有習自言我無罪如是生死無數劫為顛倒耳所多聞惡聲生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒轉入鼻鼻所多聞好香生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒鼻所多聞中香生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒鼻所多聞惡臭生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒轉入口口所多得羙味好語言生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒口所多得中味中語言生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒口所多得惡味惡語言生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒轉入身身所多得好細軟可身生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒身所多得中細軟生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒身所多得惡堅苦痛不可身生死罪中有五陰中有習自言我無罪如是生死無數劫是為顛倒佛言是為百八顛倒如是菩薩為不解諸菩薩報佛言我雖生死顛倒我欲依經法度人佛問諸菩薩言汝度人欲求使人作何等道諸菩薩報佛言我欲使人悉得佛道佛言若曹軰眾多何以故不自取佛但群軰相隨諸菩薩言我雖相隨不離經行佛問諸菩薩言若曹軰寧能一日俱得佛不諸菩薩報佛言我不能俱得佛佛問諸菩薩何以故諸菩薩報佛言我軰中有相未具者我曹軰中有功德未滿者我曹軰有生死罪未盡者佛告諸菩薩若曹軰有相未具者有功德未滿者有罪未盡者如若曹言相未具者自不能得佛何能使他人得佛伐凾般舟三昧經三卷後漢支婁迦讖譯上卷二十一幅何况守是三昧悉具足者下佛尒時頌偈曰等十六偈今此宋本本無而有長行十餘紙文詳其文相與中卷無著品四軰品文雖少異大旨無殊則長行之文例無重疊恐宋本錯將異譯之文連書耳故依東北二本去彼同後重疊之文安茲頌前要略之偈云又為看舊宋藏者具錄所安頌文于左佛尒時頌偈曰三千大千之國土滿中珍寶用布施設使不聞是像經其功德福為薄小若有菩薩求眾德當講奉行是三昧疾悉諷誦此經法其功德福無有量如一佛國塵世界皆破壞碎以為塵彼諸佛土過是數滿中珍寶用布施其有受持是世尊四句之義為人說是三昧者諸佛慧得聞功德叵比喻何况有人自講說受持諷誦念須轉加增進奉行者其功德福無有量假使一切皆為佛聖智清淨慧第一皆於億劫過其數講說一偈之功德至於泥洹讚詠福無數億劫悉歎誦不能盡究其功德於是三昧一偈事一切佛國所有地四方四隅及上下滿中珍寶以布施用供養佛天中天若有聞是三昧者得其福祐過於彼安諦諷誦講說者引譬功德不可喻其人貢高終不起亦無有趨惡道時解了深法不疑結行斯三昧德如是學士為以見奉吾德重精進普不著增益信明為菩薩力學三昧佛所讚囑累汝等常勤教力行精進無放逸自勇猛勤修行令得大道不復反其有誦受是三昧已為面見百千佛假使最後大恐懼持此三昧無所畏行是比丘以見我常為隨佛不遠離菩薩聞習三昧者義當受持為人說菩薩得是三昧者尒乃名曰達慧為逮揔持佛稱譽疾成佛道智如海常恒誦說是三昧當從佛法世尊教聞其種姓得等覺如佛所歎無有異鳳凾正法華經十卷第六卷初藥王菩薩品名并正文從初至第六幅初三行皆歸一乘此宋本中本無今依諸本加之宋本此中有法師品名今以下自有之此中除之又諸藏本皆分見七寶塔頌後之文吾往無數難稱量劫已下為梵志品通為二十八品今亦注出其品名又為看舊宋藏經者具錄其文于左正法華經藥王如來品第十佛告諸比丘道法一等無有二乘謂無上正真道往古來今無有兩正猶如眾流四瀆歸海合為一味如日所照靡不周徧未嘗增減若族姓子欲至正覺解無三途去來今者當學受持正法華經分別空慧無六度想不以香華伎樂供養為供養也當了三脫至三達智無極之慧乃為供養所以者何乃昔久遠劫難稱限尒時有佛号藥王如來至真等正覺明行成為善逝世閒解無上士道法御天人師為佛眾祐世界名大淨劫曰淨除藥王如來壽二十中劫諸聲聞眾三十六億菩薩大士有十二億時轉輪王名曰寶蓋典主四域王有千子端正勇猛有七寶聖臣降伏怨其王供養藥王如來具五中劫與眷屬俱一切施安奉敬藥王過五劫已告其千子吾以供侍如來若等亦當順遵前緒於時千子聞父王教復以五劫供養藥王如來進以上妙不違所安彼第一太子名曰善蓋閑居獨處靜然思念我等今者供養如來寧有殊特超彼者乎承佛威神虛空有天而語之曰族姓子豈欲知耶有法供養最尊無極又問曰何謂法之供養天曰爾當往問藥王如來普當為若分別說之善蓋即起詣藥王如來所稽首於地白藥王如來曰法之供養奉順典者為何謂乎世尊告曰法供養者順若如來所說經典深妙優奧開化一切世閒人民難受難見出家捨利志求菩薩諸篋之藏曠𨗿處中以㹅持印而印之精進力行不退轉輪現於六度無極之慧慇懃攬攝佛之道品不起法忍開入正要於諸群生設大慈哀降伏魔兵離諸往見覺了演暢十二因緣無我非身無人壽命志空無相無願之法不由眾行處於道塲而轉法輪勸諸天龍揵沓和等莫不樂仰開闡法藏護諸賢聖宣揚顯布菩薩諸行究竟眾苦無我非身群生違禁立以所便眾魔異道墮顛倒見貪倚有為常懷怖懅而為咨嗟諸佛之德使滅生死慰除所患而見安隱無為之事去來今佛所歎如是而剖判了微妙色像㹅持崖底諸法法忍開導宣布闡發諸器㩲便所冝將養正法是為法之供養設於諸經志在法忍敷陳典籍而順反復演訓其要無諸邪見無所從生不起法忍無我無人入諸因緣無瞋不諍無所訟訴無我無受循執句𧨏而無識著慧無放逸將御心息住無所住識理旨趣固導非𧨏洮汰通流諸所倚法不造見人怙恃真諦如法所歸無著無入断諸倚著滅諸無黠生老病死悉為除觀十二緣而不可盡覩諸往見不墮顛倒是為族姓子法之供養王子善蓋從藥王佛聞法供養應時逮得柔順法忍即脫身衣以覆佛上白世尊曰唯加聖恩建立我志如來滅後願護正法興法供養降魔怨敵將迎後法時佛知心念知其末世當護法城佛告比丘王子善蓋因佛現在以家之信出家為道當精進覺興諸德本不人成就立五神通惣持辯才無能断截佛滅度後神通惣持力無所畏即皆具足於十中劫藥王如來所說經法為轉法輪善蓋比丘護正法故於一世中化千億人志於無上正真道意而不退轉十四載人立聲聞緣覺地不可計人得生天上比丘欲知時王寶蓋豈將異乎今現在佛寶㷿如來至真等正覺是也其王千子此賢人劫中千佛興者是拘樓秦如來為始最後成者名曰欣樂太子善蓋今我身是是故當知一切所供無過法養去來今佛皆從是出若族姓子族姓女欲得供養十方諸佛即當受持正法華經持諷誦讀宣示一切分別一乘無有三乘道時佛頌曰假使有人欲解大法開化一切皆至正覺當孚受持斯法華經宣示遠近諸未聞者譬如眾流皆歸於海合為一味無有若干聲聞緣覺及菩薩道一切皆歸無上正真譬如日月照於天下百穀草木及諸荊𣗥斯典如是以無極慧照曜三界皆入一𧨏曩昔如來名曰藥王時有聖王名曰寶蓋五劫供養彼藥王佛一切施安無所乏少告諸千子使供養佛千子受教踊躍等心供養如來亦具五劫食飲牀臥幡蓋伎樂善蓋太子閑居自惟寧有供養踰於此乎空中天言法供養勝即自問曰何謂法養天便告曰當行問佛太子即問佛為具說難解之句深妙法藏空無相願乃入正慧大慈大悲降伏眾魔六十二見自然為除無常苦空非身之事無我無人無壽無命修至諸持不起法忍轉不退輪法法相照十二因緣展轉相生已解本無無有終始於是善蓋得柔䎡忍佛滅度後守護法城精進不懈得五神通惣持辯才開化一切時千億人皆立大道十四載人聲聞緣覺無央數人得生天上以故歎稱法供為最假使有人欲供養者當受持此正法華經分別如來善㩲方便無有二乘皆歸一道
