body:
  text: 沙門守其等奉敕挍勘容函受歲經此經丹藏則名受歲經而丹有宋無宋藏則名受新歲經而宋有丹無按此二經皆云法護譯名雖小似義乃大別則未知其孰是孰非又何二藏㸦有無耶今按開元録重譯録中容函之內有受歲經笁法護譯云與中阿含經第二十三卷初同本異譯單譯録中竟函之內有新歲經笁曇無蘭晉云法正譯注中有云中含大本無此等經故編於此今撿丹受歲經與彼中含二十三卷大同則真是容函重譯受歲經耳宋本受新歲經與彼中含全別而與竟函名新歲經者在文雖異大旨無殊似是彼經之異譯耳然今此容函宋藏受新歲經與彼竟函新歲經以為單譯耶則何有廣略之殊譯人之異又此何編於重譯中耶以為重譯耶則彼何列于單譯中耶此須待勘今且欲類聚以待賢哲故移受新歲經編于竟函此容函中取此丹藏經為真本焉又為看舊國宋藏者具録正經于左佛説受歲經西晉三藏笁法護譯聞如是一時婆伽婆在羅祇迦蘭陀竹園與大比丘衆俱受歲彼時尊者大目揵連告諸比丘諸賢比丘受歲者君當説君當教授君當教誡君當愛念謂第一故何以故諸賢或有人反戾難教與𢙣法俱謂梵行者亦不説亦不教授亦不教誡亦不愛念彼人謂第一故云何諸賢反戾難教謂梵行與俱者亦不説亦不教授亦不教誡亦不愛念彼人謂第一故此諸賢或一人𢙣求與𢙣求俱諸賢謂彼人𢙣求與𢙣求俱者此法反戾難教如是染欲瞋恨慳嫉不捨諛諂幻無羞無耻恚結口言恚結比丘語已還報其言比丘語已向多人説比丘語已而誹説各各有所説而外説之瞋恨結而廣與𢙣知識俱與𢙣伴俱不知恩潤不知反復諸賢謂彼人不知恩潤無反復者此反戾難教是為諸賢反戾難教法謂梵行與俱者亦不説亦不教授亦不教誡亦不愛念彼人謂第一故此諸賢比丘當白思量諸賢謂彼人者𢙣求與𢙣求俱是我所不念我若𢙣求與𢙣求俱他亦不念我比丘作等觀當莫𢙣求當作是學如是染欲瞋恨慳嫉不捨諛諂幻無羞無耻恚結口言恚結比丘語已還報其言比丘語已向多人説比丘語已而誹説各各有所説而外説之瞋恨而廣與𢙣知識俱與𢙣伴俱不知恩潤不知反復諸賢謂彼人不恩潤無反復者我所不愛我若不恩潤無反復者他亦不念我比丘當等觀當莫為無反復當學諸賢若比丘未受歲君説君當教授君當教誡君當愛念謂第一故何以故諸賢或有人無反戾與教法俱謂梵行與俱者當為説當為教授當為教誡愛念彼人謂第一故云何諸賢無反戾與教法俱謂梵行與俱者當為説當為教授當為教誡愛念彼人謂第一故此諸賢或一人無𢙣求不與𢙣求俱謂諸賢彼人無𢙣求不與𢙣求俱者此法無反戾如是不染欲不瞋恨不慳嫉不諛諂幻不無羞不無耻無恚結口不言恚結比丘語已不還報言比丘語已不向多人説比丘語已不誹説各各有所説不外之不瞋恨而廣之不與𢙣知識俱不與𢙣伴俱不無恩潤不無反復諸賢謂彼人此與教法俱是為諸賢不反戾與教法俱梵行與俱者當為説當為教授當為教誡愛念彼人為第一故此諸賢比丘當自思量諸賢謂彼人無𢙣求不與𢙣求俱者是我所念我若無𢙣求不與𢙣求俱者他亦念我比丘作等觀當莫𢙣求當作是學如是不染欲不瞋恨不慳嫉不捨不諛諂幻不無羞無耻無恚結口不言恚結比丘語已不還報言比丘語已不向多人説比丘語已不誹説各各有所説不外之不瞋恨而廣之不與𢙣知識俱不與𢙣伴俱不無恩潤不無反復諸賢彼人不無恩潤不無反復者我所愛念我若不無恩潤不無反復者他亦愛念我比丘作等觀不無恩潤不無反復當作是學此諸賢比丘觀已多有所益我為住𢙣求與𢙣求俱當不𢙣求與𢙣求俱此諸賢比丘觀而知我住𢙣求與𢙣求俱彼當不喜恱彼便進欲止此諸賢比丘觀而知我當不住𢙣求與𢙣求俱彼便喜恱清淨白佛世尊境界行見已樂行猶若諸賢有眼之士持極淨鏡自用觀靣此諸賢有眼之士自見靣塵垢便不喜恱彼便進欲除此垢諸賢有眼之士不自見靣有塵垢彼便恱喜清淨自見已樂行如是諸賢比丘觀而知我為住𢙣求與𢙣求俱彼進欲止此諸賢比丘觀而知我當不住𢙣求不與𢙣求俱彼便喜恱清淨白佛世尊境界住見已樂行如是住染欲不住不染欲如是住瞋恨不住不瞋恨如是住慳嫉不捨不住不慳嫉不捨如是住諛諂幻不住不諛諂幻如是住無羞無耻不住不無羞不無耻如是住恚結口言恚結不住不恚結口言恚結比丘語已還報其言不住比丘語已不還報比丘語已向多人説不住比丘語已不向多人説比丘語已而誹説不住比丘語已不誹説各各有所説而外説之不住各各所説不外説之瞋恨不住不瞋恨而廣與𢙣知識俱與𢙣伴俱不住不與𢙣知識俱不與𢙣伴俱不知恩潤不知反復不住不無恩潤不無反復此諸賢比丘觀而知我住不知恩潤不知反復彼便不喜恱彼便進欲上此諸賢比丘觀而知我住不無恩潤住不無反復彼便喜恱清淨白佛世尊境界行自見已樂行猶若諸賢有眼之士持清淨鏡自照面此諸賢有眼之士自見面有塵垢彼便不喜恱便進欲止此諸賢此有眼之士不自見面有塵垢彼即喜恱清淨自見已樂行如是諸賢比丘觀而知住不恩潤反復彼便不喜恱即進欲止此諸賢比丘觀而知當我住不無恩潤不無反復彼便喜恱清淨白佛世尊境界行自見已樂行樂行已恱喜恱喜已身信行身信行已知安樂安樂已意定意定已知如真見如真知見如真已無厭無厭已無染無染已解脫解脫已得解脫知生已盡梵行已成所作已辦不受後有知如真賢者目揵連如是説彼諸比丘聞尊者目揵連所説歡喜而樂竟止函佛説頻毗娑羅詣佛供養經西晉沙門法炬譯右一經經名譯主諸藏皆同而其文相國本宋本全同丹本大別似未知去取今按開元録云此經與增一阿含經第二十六卷等見品同本異譯撿之國宋二本與彼全同即是彼經中抄出耳何為異譯耶意者宋藏失法炬譯本遂抄彼本部為此別行然彼增一即東晉瞿曇僧伽提婆譯既抄彼經而云法炬譯者何耶况凡是抄經非異譯者開元録中曾被刪去此何獨存耶故今以丹藏為真本云又為看舊國宋藏者具録正經于左頻毗娑羅王詣佛供養經西晉沙門釋法炬譯如是我聞一時婆伽婆在舍衛城祇樹給孤獨園與大比丘衆千二百五十人俱為人敬仰悉來供養比丘比丘尼優婆塞優婆夷大王大子群臣下至人民悉來供養具衣被飲食牀臥疾瘦醫藥爾時世尊名德遠聞如是世尊如來至真等正覺明行成為善逝世間解無上士道法御天人師佛世尊為衆生説法初善中善竟善義甚深遠具諸梵行爾時摩竭王頻毗娑羅告諸群臣汝等嚴駕羽葆車所以然者我欲往迦尸拘薩羅國問訊世尊禮拜承事世尊出世甚難直亦甚難遇如來時時出世譬如優曇鉢華時乃出世世尊亦復如是亦甚難遇對曰如是天王爾時群臣聞摩竭國王頻毗顏色娑羅端正教便嚴駕羽葆車往詣王頻毗娑羅所便白王言車已嚴駕今正是時爾時摩竭王頻毗娑羅乘羽葆車群臣人民前後圍繞從羅城出以王威力漸漸往詣迦尸拘薩羅至舍衛城祇樹給孤獨園乘車至城門從車下步往詣祇桓至如來所猶如剎利王捨五威儀頭面禮世尊足以手摩抆世尊足自稱姓名我是摩竭國頻毗娑羅王中之王是頻毗娑羅王爾時世尊告頻毗娑羅王汝是大王剎利豪族我是釋子出家學道於此色身衆德具足乃屈大王至我所問訊起居康強叉手承事王白世尊曰蒙世尊恩我亦見剎利有智慧多聞者婆羅門有智慧者長者有智慧者沙門有智慧者各共論義我以此論盡往問沙門瞿曇若彼沙門瞿曇答以此論者我等以此論答若瞿曇沙門不答此論者亦當共論義便往至世尊所爾時世尊與説法從世尊聞法不復問論義况當有所難便歸命世尊法比丘僧是謂世尊身有功德説微妙法知時之行是時得等三歡喜於世尊所復有恭敬大聲聞衆行皆清白戒成就三昧成就智慧成就解脫成就解脫見慧成就所謂四雙八輩是謂世尊聲聞衆可敬可貴為第一尊是世間人民無上福田是謂第三歡喜於三耶三佛所爾時摩竭國王頻毗娑羅從佛聞微妙法聞微妙法已白世尊言願如來受我三月請遊羅閲城當供養衣被飲食牀臥具病瘦醫藥及比丘僧爾時世尊默然受頻毗娑羅王請爾時摩竭國王頻毗娑羅王見世尊默然受請便歡喜踊躍不能自勝即從坐起頭面禮世尊足右繞三匝便退而去祇桓門乘羽葆車還詣羅閲祇城自宮殿所爾時摩竭國王頻毗娑羅勑諸大臣人民卿等善聽我欲請世尊於此三月及比丘僧供養衣被飲食牀臥具病瘦醫藥汝等各相勸率答曰如是天王爾時摩竭國王頻毗娑羅在獨處坐便作是念我有資財能有所辦欲盡形壽供養世尊衣被飲食牀臥具病瘦醫藥及比丘僧當率勸大臣人民爾時摩竭國王頻毗娑羅即曰勸率諸大臣我向者在獨處坐便生是念我有資財能有所辦欲盡形壽供養世尊衣被飲食牀臥具病瘦醫藥及比丘僧我應勑群臣人民卿等隨其種類請佛及比丘僧汝等長夜受報無窮答曰如是天王群臣人民從王聞教已爾時世尊遊在舍衛城便出人間遊行與大比丘衆千二百五十人俱漸往詣羅祇爾時世尊住竹林迦蘭檀園與大比丘衆千二百五十人俱爾時摩竭國王頻毗娑羅聞佛至羅祇城住竹園迦蘭陀所與大比丘衆千二百五十人俱爾時王頻毗娑羅勑諸群臣速嚴駕羽葆車往詣迦蘭陀所問訊世尊爾時群臣聞摩竭國頻毗娑羅勑便往嚴駕羽葆車白頻毗娑羅曰車已嚴駕今正是時爾時摩竭國王頻毗娑羅便乘羽葆車群臣人民前後圍繞以王威勢出羅城往詣竹園迦蘭陀所便下車步入迦蘭陀詣世尊所猶如剎利王有五威儀謂劒金屣蓋天冠珠柄拂皆捨一面頭面禮世尊足在一面坐爾時摩竭國王頻毗娑羅白世尊言自還國已來在獨處坐便生是念我典此國界所有資財能有所辦欲盡形壽供養如來及比丘衆衣被飲食牀臥具病瘦醫藥亦當勸率臣人民使得蒙度使長夜得離三塗永處安隱爾時世尊告摩竭國王頻毗娑羅善哉善哉大王為衆生故發弘誓意欲安隱衆生義理深遠天人得安爾時世尊為摩竭國王頻毗娑羅説微妙法勸樂令聞皆令歡樂爾時摩竭國王頻毗娑羅從佛聞微妙法發歡喜心即從坐起禮世尊足繞佛三匝即退而去出迦蘭陀門還自乘車詣羅城入自宮裏坐其殿上即其日辦具甘饌飲食若于種味即其日為佛比丘僧敷衆坐具手執香爐升高樓上東向叉手至心念世尊亦自思惟今時已到願世尊知時見顧爾時世尊知時已到便著衣持鉢比丘僧前後圍繞入羅城往詣摩竭國王頻毗娑羅宮到已諸比丘僧各次第坐爾時摩竭國王頻毗娑羅見佛比丘僧坐已定自手執若于種甘饌飲食飯佛及比丘僧見世尊飯已攝鉢更敷小牀在如來前坐爾時世尊為摩竭國王頻毗娑羅説微妙法漸漸共議所謂論者施論戒論生天論欲穢濁漏為大若出家為要爾時世尊知王心歡喜不能自勝皆悉柔和猶如諸如來所應説法苦習盡道爾時世尊具為王説微妙法爾時二百五十婇女即於坐上逮法眼淨彼已見法得法選擇諸法奉持諸法無疑猶豫希望已斷得無所畏及所應學法歸依佛法衆受持五戒爾時世尊見王頻毗娑羅聞微妙法歡喜奉持爾時世尊便説此偈祠火最為首詩頌亦為首王為人中首衆流海為首衆星月為首光明日為首上下及四方諸所生品物天上及世間佛最無有上欲求種德者當求於三佛爾時世尊以此偈為王説即從坐起便退還去若函舍衛國王十夢經安公失譯經今付西晉録按此經與增一阿含經第五十一卷大愛道般涅槃品同本異譯今國宋二本文義相同此丹本與宋義同文異似非一譯而未知是非不敢去取然此丹本詳悉今且雙存以待賢哲若函四未曾有經一卷西晉笁法護譯右一經經名譯主諸藏皆同而國宋兩本文義全同始終唯説造塔功德未雖結名未曾有法然一經始末無四字之義此丹本經説轉輪聖王有四未曾有法以喻阿難亦有四未曾有法按開元録若函中有四未曾有經云與增一阿含八難品同本異譯今撿之丹本即是也其國宋本經即前毀函中未曾有經後漢失譯人名出古舊録者耳意者宋藏於此若函中失真四未曾有經而得毀函中未曾有經以為名脫四字遂加四字重編於此錯也意此錯之失凡有四焉失真四未曾有經一也未曾有經一本重載二也又彼失譯而為法護譯三也彼是大乘而抑之編此小乘藏中四也故去宋經而取丹本後賢欲知今所去經是何等者請見毀函未曾有經即是耳今為看舊國宋藏者具録正經于左佛説四未曾有法經西晉三藏笁法護譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園爾時世尊告諸比丘轉輪聖王有此四未曾有法云何為四於是轉輪聖王為人民類皆悉愛念未曾傷害譬如父子轉輪聖王亦復如是愛敬人民未曾有瞋怒向之譬如父有一子是謂轉輪聖王初未曾有法或復轉輪聖王遊人民間見皆歡喜如子親父是謂轉輪聖王二未曾有法復次轉輪聖王住不遊行時人民類其有覩者皆得歡喜彼轉輪聖王與人民説法其有聞者皆悉歡喜時人民聞轉輪聖王説法無有猒足是謂轉輪聖王三未曾有法復次轉輪聖王坐不遊行時人民類其有覩者皆悉歡喜彼轉輪聖王教勑人民此事可為此不可為此可親此不可親若為此事者長夜獲福無窮極若為此事長夜受苦亦無休息彼人民類聞轉輪聖王如此教勑喜無猒足是謂轉輪聖王有此未曾有法如是阿難比丘亦有四未曾有法云何為四於是阿難比丘若至比丘衆中諸比丘見皆悉歡喜彼阿難比丘為説法其聞法者皆悉歡喜諸比丘聞阿難所説無猒足是謂阿難比丘第一未曾有法若阿難比丘默然至比丘𡰱衆中其有見者皆悉歡喜彼阿難比丘為説法其聞法者皆得歡喜時比丘𡰱衆聞阿難説法不知猒足是謂阿難比丘第二未曾有法若復阿難默然至優婆塞處時優婆塞見皆歡喜彼阿難比丘為説法時優婆塞衆聞阿難所説無有猒足是謂阿難比丘第三未曾有法復次阿難比丘默然至優婆夷衆中彼衆見者皆悉歡喜彼阿難比丘為説法優婆夷聞者無有猒足是謂阿難比丘四未曾有法爾時諸比丘聞佛所説歡喜奉行丙午歲高麗國大藏都監奉敕雕造
