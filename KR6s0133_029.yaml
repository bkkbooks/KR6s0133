body:
  text: 沙門守其等奉勑挍勘集神州三寶感通録卷上之三岐州鳳泉寺立塔感文石如玉為函又現雙樹鳥獸等基石變如水精涇州大興國寺立塔三處各送舊石非界所有合用為函恰然相可秦州靜念寺立塔定基已瑞雲再覆雪下草木開花入函光照聲贊華州思覺寺立塔初陰雪將下日昭五色氣光數丈覆塔上屬天雨天花同州大興國寺立塔值雨無壅入函日出光繞於日十二月內夜光照五十里蒲州拪巖寺立塔地震山吼如鍾鼓聲又放光五道二百里皆見并州無量壽寺立塔初晝昏雲至乃日照將入函放光明天神無量定州恆嶽寺立塔異公來施布負土忽失之舊無水忽有水來前後非一相州大慈寺立塔陰雪將下日出入函雲復合後雨天花前後非一鄭州定學寺立塔感光如流星入寺設二千人供万餘人來食不盡嵩州間居寺立塔感兔來輿所初陰雪將下日明入函訖雲復合亳州開寂寺立塔界內無石別處三石合而成函至基盤石有二浪井夾之汝州興世寺立塔初雲將下日出入函訖雲合秦州岱嶽寺立塔廟夜鼓聲三重門自開騎自廟出迎光相非一青州勝福寺起塔掘基遇自然盤石函將入有光明牟州巨神山寺立塔獲紫芝二陰雲將下日開閉訖還合隋州智門寺立塔掘基得神龜甘露降黑蜂繞龜有似符文襄州大興國寺立塔初天陰將下日朗入函雲合楊州西寺立塔久旱舍利入境夜雨大洽蔣州拪霞寺立塔鄰人先夢佛從西北來入寺舍利至恰如所夢吳州大禹寺立塔舍利凡渡五江風波皆不起又放光獲紫芝蘇州虎丘山西寺立塔掘基得舍利空樂聞人井吼二日舍利方至衡州衡嶽寺立塔四遇逆風四乞順水峯上白雲闊二丈直至基所三匝乃散桂州緣化寺立塔未至十里烏有千計夾輿行飛入城乃散番州靈鷲寺立塔內有神仙雲氣像交州禪衆寺起塔益州法聚寺立塔初晦冥將下日朗掩已便暗廓州法講寺立塔初行郊西尓夜廓州光高數丈從東來入地內外皆見瓜州崇教寺起塔洧州官人王威送流人九十道逢舍利放之為期其囚被放千里一期無一逃者隨州人於溳水作魚獄三百既見舍利悉决放餘州亦多放矣王公百官以舍利應感非一拜表奉賀時有詔曰門下仰惟正覺覆護群生朕所以至心回向思崇勝業普及幽顯共為善因故分布舍利營建神塔而大聖垂慈頻示光相宮殿之內舍利降靈莫測來由得未曾有斯實群生多幸延此嘉福豈朕微誠所能致感覽表悚敬深今真形舍利猶有可依前式分送海內五十三州庶三塗六道俱免蓋纏稟識含靈同登妙果仁壽三年正月復分布舍利五十三州至四月八日同午時下其州如左恆州無雲雨天花遍城寺如此者二泉州循州營州三放白光出古石解作函洪州白頂烏引路杭州掘基自然石窟恰容石函涼州德州躄者行大鳥旋塔滄州觀州塔上五色雲現午至暮瀛州基內紫光冀州患盲躄者則幽州函如水鏡放光衆像徐州函出仙人僧等相莒州三現光基得占塔癡者言齊州萊州楚州野鹿來聽鶴翔塔上江州地出銅像潭州舍利至江鳥來迎送毛州天雨金銀花貝州宋州井苦變甘放光又雨花如雪趙州放赤光有佛像等相濟州二日放光香氣鍾音出空兖州壽州信州荊州雲蓋塔上雨花不下黎州地下瓦文千秋樂慈州雲蓋如飛仙泉涌病愈魏州潞州泉自涌病者愈汴州異香放光見像患差𣏌州故光許州去州九十里放光照見雲光覆塔甘井現沉州蘭州基下得石像又得二銅像梁州利州放光如日明豫州五色光文字金色顯州曹州光變最多安州感香一夕放光雲蓋魚集鄧州函作玉文現秦州重得舍利衛州光照於外洺州僧先患𦝫不得行聞舍利至起迎十里𣈆州三度放光懷州雄雉來馴附放光異迹陝州前後十一度現瑞洛州香氣如風又放光明鄭州放光幡內感通録竟既函辨正論第七卷右卷第六幅初行注生時之上二本有趙泰精思唯善是求之正文及有注文丹本五十一行國本四十五行撿之有方文足今加之又為看舊宋藏者具録其文于左趙泰精思唯善是求幽明録云趙泰字文和清河貝丘人公府辟不就精思典籍鄉黨稱名年三十五𣈆大始五年十月三日夜半卒心痛而死心上故暖身體屈申停尸十日氣從咽喉如雷聲眼開索飲食便起說初死時有二人乘黃馬從兵二人但言捉將去二人扶兩腋東行不知幾里便見大城如錫鐵正崔嵬從西城門入官府舍有二重黑門數十梁瓦屋男女當五六十住立吏著皂單衣將五六人注疏姓字男女有別言莫動當入斷呈府君泰名在第三十須將入府君西向坐科出案名復將南入黑門一人絳衣坐大屋下以次呼名前問生時所行事有何罪過行何功德作何善行言者各各不同主者言許汝等辝恆遣六部督録使者常在人閒疏記人所作善惡以相撿校人死有三惡道殺生禱祀最重奉佛法持五戒十善慈心布施死在福舍安隱無為泰答一無所事亦不犯惡科問都竟使為水官監作吏將千餘人接沙著岸上晝夜勤苦啼泣悔言生時不作善今墮此處當歸索代後轉水官都督惣知諸獄事給馬兵東到地獄案行復到泥犁地獄男女五六千人有大樹橫廣五十餘步高千丈四邊皆有劒上人著樹上然火其下十十五五墮火劒上貫其身體云此人呪咀罵詈𡙸人財物毀傷良善見泰父母及二弟在此獄中涕泣見二人賫文書來勑獄吏言有三人家事佛為其於寺中懸幡燒香呪願救解生時罪過出就福舍已見自然衣服徑詣一門云名開光大舍有三重黑門皆白壁赤柱此三人即入門見大殿珍寶耀目堂有二師子併伏𮨇負一金玉牀云名師子之座見一人身可長丈六姿顏金色項有日光坐此座上沙門立侍甚衆四坐並真人菩薩見泰山府君來作禮泰問吏人吏曰名佛天上天下度人之師便聞佛云言今欲慈度此惡道中及諸地獄中人皆令出聽時云有百萬九千人一時得出地獄即空徙著百里城中其在此中者皆奉法弟子當過福舍七日隨行所作功德有少有無者又見呼十人當上生天有車馬侍從迎之升虛空而去出復見一城云縱廣二百餘里名為吏受變形城云佐函一字頂輪王經第一卷此則國本宋本未見此經此卷國本有三處文意斷絶第七幅八九行云大福莊嚴一切安之下便云王身如傘蓋等第十三幅十九行云神通熾盛無量之下便云樂易成就等第二十幅八行云白傘蓋佛頂之下便云無邊一劫不能說等今按丹本則國本錯將白傘蓋佛頂之下王身如傘蓋乃至神通熾盛無量等凡一百四十九行之文進而安于一切安之下却將一切安之下樂易成就乃至白傘蓋佛頂等凡一百五十行之文退而安于神通熾盛無量之下致使如是三節文斷今依丹本進退正之又為看舊國本經者具録正文于左大福莊嚴一切安樂易成就於剎那頃作一切義利成就已於恆河沙數佛世界魔宮殿咸令萎萃映蔽一切魔光乃至有頂下至無閒大地獄邊際一切處照耀光耀驚覺一切有情復來旋繞世尊三匝已各各沒入本處菩提場所說一字頂輪王經示現真言大威德品第二爾時釋迦牟尼如來從彼三摩地起以佛眼觀一切佛剎彼一切天集會如師子奮迅而𮨇禮告金剛手祕密主言金剛手汝今諦聽一字佛頂大明王及四大佛頂及毫相等作大利益成就者明妃如來手如來鉢如來脣如來口法輪等大明王所有一切衆生界於一切有情勤修佛頂真言行菩薩等及一切有情菩薩乘受持者苾芻苾芻尼塢波塞迦塢波斯迦不被一切天世閒沮壞獲得不退轉一切皆獲安樂一切處一切苦惱悉皆除滅一切皆悉起大慈行同一味相不被火燒不被水漂不被刀傷不被毒中不被蛇囓不被一切難一切如來所說大真言明王受持菩薩及餘淨信大乘菩薩乘有情從此一切如來三摩地出生大真言受持者及餘大明王受持者應以牛黃於樺皮上寫此陀羅尼安頭髻中若是苾芻苾芻尼寫此陀羅尼繫在袈裟中若塢波塞迦塢波斯迦繫在手臂或在頸下若國王帶不被他之所侵擾晝夜臥安覺安大威德賢聖諸天而常擁護如是及餘有情若能持此者勤修真言行者一切處獲得無礙一切人見悉皆歡喜遠離一切苦得一切安樂一切人天供養恭敬一切天龍乾闥婆阿蘇羅路荼緊那羅摩呼羅伽餓鬼必舍遮一切難調障毗那夜迦不敢逼近離惡趣怖祕密主此大明王及明妃真言句一切有情勤修菩薩行者及修佛頂真言者以此作息災吉祥事惡星逼皆得息滅作一切衆生義利鉤召一切天龍藥叉祕密主我略說為修佛頂真言者速疾得悉地令作一切事業世尊說是已告金剛手此一切如來所說大真言王大佛頂白傘蓋佛頂高佛頂勝佛頂光聚佛頂如是大佛頂真言王入一切如來三摩地勤用力等敵皆殊勝三摩地成就一字頂輪王佛眼毫相大慈大悲佛牙并無能勝如來手如來鉢如來袈裟如來法輪并明妃等說從大悲奮迅大人相師子吼流出一切菩薩不能摧壞一切佛加持共隨喜大悲照耀憂暗者令作光明以甚深智作無塵垢令作吉祥吉祥一切世閒中最勝尊貴作最勝無塵無垢四無所畏令作端嚴慧令作廣大無量殊勝智令作堅固勇猛金剛鈎鎖身令作十力令作大威德令拂除愚暗令作一切佛智令作大護一切菩薩功德藏能令一切智智能令寂靜句令作無礙勇猛威德令作最勝慧難調衆生種性令生慈心能作一切如來熾盛三摩地大真言明王一字佛頂輪王而說真言曰曩莫三滿多沒䭾喃步嚕引釋迦牟尼佛世尊才說是真言譬如贍部洲大風吹一切樹林叢林藥草及華果悉皆震動如是才說是輪王一字真言三千大千世界六種震動須盧山亦皆大動大海騰沸及恆河沙數世界悉皆震動山谷及海猶如草一切山林河海皆悉震動一切魔宮如一熾盛火聚以佛威神加持力故悉皆恐怖魔衆諸天皆自不安歸依於佛世尊於一切世界中那洛迦趣有情悉皆獲得安樂爾時世尊作如是神力加持為令顯現輪王佛頂故自身作轉輪王形功德相莊嚴七寶成就一切光明熾盛晃耀照耀以無量法莊嚴閒錯嚴飾大輪王師子座而坐熾盛照耀一切圓光如輪周匝形成一聚光無有一有情有情衆當彼之際而敢不瞬目瞻覩彼所有慈氏等大菩薩彼皆剎那頃亦不能不瞬目而瞻視爾時觀自在菩薩金剛手祕密主菩薩以佛威力悶絶躃地剎那謨呼律閒則彼大威德摩𨢘首羅天帝釋天毗紐天夜摩天水天俱尾羅天風天路荼緊那羅摩呼羅伽等一切器仗悉皆墮落摩𨢘首羅三㦸叉墮落帝釋金剛杵墮落毗紐天輪俱尾羅棒水天羂索如是一切大威德天一切器仗墮落於地精氣威力神通皆奪由轉輪大真言明王加持故一切菩薩憶念菩提遊戲三摩地一切天龍藥叉乾闥婆阿蘇羅路荼緊那羅摩呼羅伽等皆歸依佛世尊悉皆戰掉如芭蕉身毛悚竪不能堪忍觀大輪王真言色形爾時世尊隱大輪王色形剎那頃說此一切如來所說大明妃能息一切難調有情能成就一切佛頂頂輪王能息一切鬪諍言訟一切如來部真言母一切菩薩母觀自在菩薩金剛手祕密主為令起故說此佛眼一切佛所說能成就一切義利速疾成就輪王佛頂故說真言曰曩莫薩嚩怛他底瓢一曷囉合毗藥二合二三藐三沒第毗藥二合三唵四嚕嚕塞普二合嚕五入嚩二合攞六底瑟姹二合七悉䭾魯左你八薩嚩囉他二合娑但你九娑嚩二合訶引十說是佛眼陀羅尼已觀自在菩薩金剛手祕密主等悉皆而起乃至所有一切天等衆會各復得本神通各還執本器仗皆歸依佛世尊心大歡喜瞻視觀察如來各作是讚言嗚呼奇哉觀自在菩薩金剛手祕密主白釋迦牟尼應正等覺言世尊是何奇特世尊曾所未見如來持此頂輪王形光明聚是何希奇佛言善男子持頂輪王色形三摩地一切諸佛世尊佛遊戲神通善男子如於大曼荼羅集會汝等作真言身變化住不思議顯示大威德如是如是如來轉輪王真言色形身住而顯示善男子此佛頂轉輪王一切如來真言身住最勝三摩地一切諸大菩薩及一切真言明王明妃一切諸天無能違越善男子有此真言轉輪王佛頂若有人誦持處五由旬內一切明世間出世間不流通不成就汝等所說清淨真言所加持真言不成就亦不往亦不現威德若才憶念此真言一切世間出世間真言悉皆成就汝等所說如持真言身一切不可成就不現應驗者以此真言應成就之五由旬內地方天龍藥叉𠃵闥婆阿蘇羅路荼加婁羅緊那羅摩呼羅伽菩薩住真言身者於處不堪忍住不遊行不成就不與現驗不與悉地何以故由住此佛頂輪王三摩地無能欺𣣋除佛眼真言三昧耶用此真言七遍誦之則其身寂靜若不然者其威德無能堪忍其修真言者必須初後誦此佛眼真言十地菩薩尚不能堪忍此輪王威德何况餘天王小類有情爾時世尊顯佛頂威德故欲現佛傘蓋威德故一切佛傘蓋加持故是時住白傘蓋佛頂王身如傘蓋形蓋此三千大千世界無一有情而作質礙白傘蓋形悉皆覆於佛頂其傘蓋頂於如來頂中觀自在菩薩金剛祕密主菩薩問佛世尊此是何傘蓋色形蓋覆三千大千世界而住住於世尊頂上不見其邊際不可得以觀察瞻覩不可往其邊際佛言仁者此名白傘蓋佛頂王無量如來所共宣說一切如來無量色寶普遍音聲一切真多摩尼寶間錯寶珠普遍現前不思議莊嚴而作影現是諸佛世尊傘蓋一切如來之傘蓋成佛頂王傘蓋作一切有情速疾成就是一切諸佛傘蓋名為白傘蓋大威德菩薩不得邊際於千俱知劫度量亦不得其邊際亦不能見邊際時世尊釋迦牟尼觀佛頂王以自神通威德加持住真言身形而說真言曰曩莫三滿多沒䭾南唵怛他覩瑟抳二合沙阿娜嚩路吉多母㗚䭾二合唵摩摩摩摩吽匿你弋反當彼之時此三千大千世界皆動搖震爾時世尊告諸菩薩言諸菩薩此白傘蓋佛頂真言能成就一切真言能鈎召是大明王不空無礙勇猛爾時世尊顯揚佛頂王威德故作一切有情利益故能息除一切灾禍逼迫能斷壞世間出世間真言以此真言句作加持無量菩薩稱讚無量俱知佛說此佛頂王光聚令現大威德故是輪王佛頂之威光金剛句而說真言曰曩莫三滿多沒䭾南一唵二怛他覩瑟尼二合沙三阿那嚩路枳帝四母㗚䭾二合五帝𪝥囉始六吽七入嚩二合攞入嚩二合攞八䭾迦䭾迦九娜囉娜囉十尾娜囉尾娜囉十一瞋那瞋那十二頻那頻那十三吽吽泮吒泮吒十四娑嚩二合引訶引說此真言已三千大千世界如寶爓燈形無量間錯照耀為蓮華色帝青寶蘂為爓晃耀而現一切虛空際一切寶聚為寶帳間錯鈴鐸一切莊嚴光聚變化力為門界道種種令普遍佛威德示現遍覆虛空界加持而住令一切菩薩作歡喜一切獲得安樂從佛頂出光明一切世間出世間真言明威皆斷壞令破𡙸其加持令不成就何以故大威光藏故爾時世尊告金剛手祕密主言祕密主此一切如來光明照耀光聚佛頂由此光明照曜三千大千世界下至無間地獄邊際乃至有頂照耀一切魔宮悉皆萎萃於虛空際作照耀金剛手此佛頂王能斷一切真言才誦此真言修行者隨意世間出世間真言令斷令破令壞唯除輪王佛頂白傘蓋主佛頂高佛頂勝佛頂佛眼五字如來心除此餘一切世間出世間真言明斷壞令打令伏令縛攝修行者若才稱名才誦隨意難調鬼魅令壞令打令馳走令挫辱金剛手此光聚佛頂不應非處誦持應於有舍利處誦持賢聖諸尊所攝受處何以故此威德光聚佛頂等同輪王威德故若不爾者即被傷即聖衆不降臨諸魔得便當知於清淨處及有舍利處聖人得道處先以三昧耶加持復以輪王三昧耶佛眼加持若異此者即被傷雖久修行亦不成就此光聚大真言王於修餘真言者不得輒誦何以故彼真言主威德故當知於間靜密處或於河側或於池邊或於海岸或於山間或於窟或於聖人作制底處其修行者獲大威德具力具大精進具念具慧等同餘部得悉地者威光威德猶如輪王真言成就祕密主此明王能生不思議威德祕密主此是如來威如來光如來加持一切諸佛之光明威德光明躰光明性與一切有情威德能生威光性金剛手能斷一切真言能調難調者能壞他真言威此是大威德大神通能成辦一切事爾時世尊復觀無盡法界知己衆生利益故能令如來力三摩地等流一切菩薩無邊力勇猛故說一切佛所加持修一切真言與安樂故真言曰曩莫三滿多沒䭾南唵入嚩二合攞入嚩二合攞你比也二合你比𢈔二合那二合都瑟尼二合沙度那度那吽引爾時一切世界悉皆震動一切天龍藥叉𠃵闥婆阿蘇羅路荼緊那羅摩呼羅伽迷悶癡亂皆失神通難調者被燒毗那夜迦出呵呵聲爾時世尊告祕密主言祕密主此名高佛頂王一切如來三摩地力勇猛大精進大力若有善男子善女人修習輪王佛頂者及餘淨信者所往處鬪戰論理諍訟一切處若誦所去處悉皆得勝或餘有大國王淨信佛法者用牛黃於樺皮上或素上書此真言繫旗纛上或於頸下則往他若見則便破敗他軍消融㸦不相救何以故以如來神力加持故或餘塢波塞迦塢波斯迦於頭上帶持彼人吉祥吉祥清淨威德吉慶威光威力不被他𣣋突獲得吉祥辨才祕密主我略說菩薩持此者獲得無量力勇健獲得如來加持一切魔無能沮壞一切諸天不敢逼近修此大真言者無有與等威力皆得成就若成就等同轉輪王真言何以故一切如來神力所加持三摩地力故是為高頂王爾時世尊釋迦牟尼如來現神通威德故一切罪息滅故一切𢙣趣摧壞故一切那洛迦苦息除故現不思議行神通故現一切如來神通威德積集故此佛頂真言王一切佛之所宣說真言曰曩莫三滿多沒䭾南唵入嚩二合攞惹𢈔瑟尼二合沙入嚩二合攞入嚩二合攞滿䭾娜麼滿䭾娜麼弩嚕二合麼弩嚕二合麼弩嚕二合麼郝賀那吽引才說是真言此世界及一切佛剎六種震動無有一有情受飢渴苦以一切佛威神力現大威德故一切地獄中一切飢渴悉皆止息一切有情悉令獲得飲食恆河沙數等如來同共宣說為大怖畏有情作利益故示現大神通金剛手有此佛頂王所流布處一切魔不得其便何况修行者若有善男子善女人若能常憶念此真言王復能持誦彼獲不思議神通成就具大精進神通圓滿一切諸天禮敬彼人不久獲不思議功德若有成就真言王者或有大乘淨信者或修習輪王佛頂者彼獲得不思議神通相應於一切有情中為最勝不應疑惑獲佛神通所求欲願獲得無疑一切神通平等真實無畏一切時等同諸佛金剛手若修勝佛頂真言者不久神通自在成就於剎那頃諸難調有情見者悉皆馳走所有魔衆諸天見彼皆失神通而悉馳走若有修習此真言成就者與轉輪王真言成就等無有異於地獄中亦作神通為處地獄有情作利益故如是一切有情息除飢苦我略說少分佛頂王三摩地神通熾盛無量無邊一劫不能說其福利功德
