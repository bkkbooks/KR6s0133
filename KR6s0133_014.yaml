body:
  text: 沙門守其等奉勑挍勘竭函寶性論第二卷第十三幅初二行聲聞僧寶之下宋本脫此有何義偈言境界諸功德乃至偈言果勝最無上等凡二十四行總三百三十八字今依他本足之又為看舊宋藏論者具録其文于左此有何義偈言境界諸功德證智及涅盤諸地淨無垢滿足大慈悲生於如來家具足自在通果勝最無上是勝歸依義此偈明何義略説菩薩十種勝義過諸聲聞辟支佛故何等為十一者觀勝二者功德勝三者證智勝四者涅盤勝五者地勝六者清淨勝七者平等心勝八者生勝九者神力勝十者果勝觀勝者謂觀真如境界是名觀勝偈言境界故功德勝者菩薩修行無厭足不同二乘少欲等是名功德勝偈言功德故證智勝者證二種無我是名證智勝偈言證智故涅盤勝者教化衆生故是名涅盤勝偈言涅盤故地勝者所謂十地等是名地勝偈言諸地故清淨勝者菩薩遠離智障是名清淨勝偈言淨無垢故平等心勝者菩薩大悲遍覆是名平等心勝偈言滿足大慈悲故生勝者諸菩薩生無生故是名生勝偈言生於如來家故神力勝者謂三昧自在神通等力勝是名神力勝偈言具足三昧自在通故果勝者究竟無上菩提故是名果勝偈言果勝最無上故力函轉識論第四幅十五行但遣前境未無識故之下釋曰謂是一切種子識者等凡五幅十三行文此宋本中本闕今依他本足之又為看舊宋藏論者具録其文于左釋曰謂是一切種子識者是阿梨耶識為諸法種子及所餘七識種子並能生自類無量諸法故通名一切法種子識也如此如此者由此等識能回轉造作無量識法或轉作根或轉作塵或轉作我或轉作識如此種種不同唯識所作云如此造作回轉也或於自於他㸦相隨逐者於自則轉為五陰或為色陰乃至識陰於他則轉為怨親中人種種不同望自五陰故稱為他如是自他㸦相轉作前後不同故云㸦相隨逐也種種所作並皆是識無別境界起種種分別等者一一識中皆具能所能分別即是識所分別即是境能即依他性所即分別性故云起種種分別及所分別也由如此義離識之外無別境但唯有識義成既未明遣識惑亂未除故名不淨品也問遣境在識乃可稱唯識義既境識俱遣何識可成答立唯識乃一往遣境留心卒終為論遣境為欲空心是其正意是故境識俱泯是其義成此境識俱泯即是實性實性即是阿摩羅識亦可卒終為論是摩羅識也記曰由二種宿業熏習及二種習氣能為集諦成立生死二種宿業熏習者即是諸業種子一宿業熏習二宿業熏習執宿業熏習即是所分別為分別性宿業熏習執即是能分別為依他性所即為境能即為識此二種業名相似集諦能得五陰生二種習氣者即諸煩惱一相習氣二重習氣相即煩惱體是依他性能攝前相貌重即煩惱境是分別性境界顯故也此二煩惱名真諦能集令未來五陰由此似真兩種集諦若宿業已盡更受別報能安立生死釋曰二種宿業熏習者一一種子備有兩義所分別即是宿業熏習能分別即是宿業熏習執所即分別性能作生起種子法門故説此法門名為宿業熏習有名而無體也能即依他性正是起業種子名宿業熏習執有體而不真實也二種習氣亦爾一一煩惱皆有兩義所分別即重習氣作起煩惱法門有名而無體能分別正是煩惱體亦有而不真實是依他性然此中所明分別依他與三無性中名字不同三無性中説分別名相類依他性名重以分別性當體有其相類能作煩惱法門説名煩惱也依他性正是煩惱體能得生死報故名重今此中為明分別性相類麁顯故名麁重依他性能執前相類故名為相各自有意若欲轉此中自三無性中名亦好也記曰如是如是分別若分別如是如是類此類類名分別性此但唯有名名所顯體實無此所顯體實無此分別者因他故起立名依他性此前後兩性未曾相離即是實實性若相離者唯識義不成有境識異故由不相離故唯識無境界無境界故識亦成無由境無識無故立唯識義是乃成立是故前性於後性不一不異若定一異則有過失何耶分別與依他定一者分別性決定永無不為五法藏所攝依他性亦應永無若爾便無生死解脫善𢙣律戒法此為不可既不如此故分別性與依他性不得定一若定異者則分別性便不能遣依他性既由觀分別性是無所有方見依他性亦無所有故不得定異又若分別性定異依他性者分別性體應定是有非謂永無有可異無何所論異是故但説不一不異不可定説一異也如無常與有為法亦不得定説一異前無後無是無常義五陰是有為法若無常與有為法定一者無常是無一切諸法並皆是無既不並無故不得定一若定異者觀無常時不應通有為法以其通故不得定異此亦是不一不異也如是一切諸法皆爾如色等與瓶亦不一不異若色與瓶定一香等不成瓶瓶則真實若色定異瓶見色不應通瓶是故不定一異也兩説亦爾若不見分別性則不見依他性是故不一不異然一切諸法但有三性攝法皆盡如來為衆生説諸法無性亦有三種三性如前説前二是俗諦後一是真諦真俗二諦攝一切法皆盡三無性者即不離前三性分別性名無相性無體相故依他性名無生性體及因果無所有體似塵相塵即分別性分別既無體亦是無也因亦無者本由分別性為境能發生識果境界既無云何生果如種子能生芽種子既無芽從何出是故無生也真實性名無性性無有性無無性約人法故無有性約二空故無無性即是非有性非無性故重稱無性性也此三無性是一切法真實以其離有故名常欲顯此三無性故明唯識義也若人修道智慧未住此唯識義者二執隨眠所生衆惑不得滅離根本不滅故由此義故立一乘皆令學菩薩道若謂但唯有識現前起此執者若未離此執不得入唯識中若智者不更緣此境二不顯現是時行者名入唯識何以故由修觀熟亂執盡是名無所得非心非境是智名出世無分別智即是境智無差別名如如智亦名轉依捨生死依但依如理故重及執二俱盡故麁重即分別性執即依他性二種俱盡也是名無流界是名不可思惟是名真實善是名常住果是名出世樂是名解脫身於三身中即法身釋曰二執隨眠所生果或不得滅離者即是見思二執隨眠煩惱能作種子生無量上心或皆以本識為其根本根本未滅支未盡如勝鬘經説無明住地不斷不究竟無邊四住地不斷不究竟也若智者不更緣此境二不顯現故者此境即此唯識境唯識散亂無由境故識無此識既無能緣唯識之心亦無故云二不顯現此二但談二識所現前境前境先已無故是名轉識品究竟也命函法界無差別論一卷提雲般若譯此論丹藏與國宋二藏不同此則丹本有五字四句二十四頌間挾七言一偈離為十二假假假各釋吾祖賢首疏所釋者此本也按彼國宋兩本有七言四句二十偈一舉並出後方次第釋之其初偈曰法界不生亦不滅無老病死無蘊過由彼發勝菩提心是故我今稽首禮者是也今按開元録及賢首疏並以此論為單譯而國宋兩本與此丹本文雖有異義則無殊必是開元之後後代重譯也但未詳何代何人之譯此須待勘二藏直以彼為提雲般若譯者錯耳今為看舊國宋藏者具録丹本文于左大乘法界無差別論堅慧菩薩造大唐于闐三藏提雲般若等譯稽首菩提心能為勝方便得離生老死病苦依過失菩提心略説有十二種義是此論體諸聰慧者應如次知所謂果故因故自性故異名故無差別故分位故無染故常恆故相應故不作義利故作義利故一性故此中最初顯示菩提心果令見勝利次即説彼所起之因然後安立此出生相及顯異名而無差別於一切位無有染著常與淨法而共相應不淨位中無諸功用於清淨位能作利益一性涅盤應知如是十二種義今此論中次第開闡何者名為菩提心果謂最寂靜涅盤界此唯諸佛所證非餘能得所以者何唯佛如來能永滅盡一切微細煩惱熱故於中無生永不復生意生諸薀故無老此功德增上殊勝圓滿究竟無衰變故無死永捨離不思議變易死故無病一切煩惱所知障病及與習氣皆永斷故無苦依無始時來無明住地所有習氣皆永除故無過失一切身語意誤犯不行故此則由菩提心為最上方便不退失因一切功德至於究竟而得彼果彼果者即涅盤界何者為涅盤界謂諸佛所有轉依相不思議法身以菩提心是不思議果因如白月初分故今頂禮復次頌曰能益世善法聖法及諸佛所依寶處如如地海種子復次菩提心如地一切世間善苗生長所依故如海一切聖法寶積聚處所故如種子一切佛樹出生相續之因故如是已説菩提心果云何此因頌曰信為其種子般若為其母三昧為胎藏大悲乳養人復次云何此因積集應知如轉輪王子其中於法深信為菩提心種子智慧通達為母三昧為胎藏由定樂住一切善法得安立故大悲為乳母以哀愍衆生於生死中無有猒倦一切種智得圓滿故云何自性頌曰自性無染著如火寶空水白法所成就猶如大山王復次應知此菩提心因積集已有二種相謂離染清淨相白法所成相離染清淨相者謂即此心自性不染又出客塵煩惱障得清淨譬如火摩尼寶虛空水等為灰垢雲土所覆翳時雖其自性無所染著然由遠離灰等故令火等得清淨如是一切衆生自性無差別心雖貪等煩惱所不能染然由遠離貪等故其心得清淨白法所成相者謂如是自性清淨心為一切白法所依即以一切白淨法而成其性如説須山衆寶所依即以衆寶而合成故云何異名頌曰至於成佛位不名菩提心名為阿羅訶淨我樂常度此心性明潔與法界同體如來依此心説不思議法復次此菩提心永離一切客塵過𢙣不離一切功德成就得四種最上波羅蜜名如來法身如説世尊如來法身即是常波羅蜜樂波羅蜜我波羅蜜淨波羅蜜如來法身即是客塵煩惱所染自性清淨心差別名字又如説舍利弗此清淨法性即是法界我依此自性清淨心説不思議法云何無差別頌曰法身衆生中本無差別相無作無初盡亦無有染濁法空智所知無相聖所行一切法依止斷常皆悉離復次此菩提心在於一切衆生身中有十種無差別相所謂無作以無為故無初以無起故無盡以無滅故無染濁以自性清淨故性空智所知以一切法無我一味相故無形相以無諸根故聖所行以是佛大聖境界故一切法所依以染淨諸法所依止故非常以是雜染非常法性故非斷以是清淨非斷法性故云何分位頌曰不淨衆生界染中淨菩薩最極清淨者是説為如來復次此菩提心無差別相故不淨位中名衆生界於染淨位名為菩薩最清淨位説名如來如説舍利弗即此法身為本際無邊煩惱藏所纏從無始來生死趣中生滅流轉説名衆生界復次舍利弗即此法身猒離生死漂流之苦捨於一切諸欲境界於十波羅蜜及八万四千法門中為求菩提而修諸行説名菩薩復次舍利弗即此法身解脫一切煩惱藏遠離一切苦永除一切煩惱隨煩惱垢清淨極清淨最極清淨住於法性至一切衆生所觀察地盡一切所知之地升無二丈夫處得無障礙無所著一切法自在力説名如來應正等覺是故舍利弗衆生界不異法身法身不異衆生界衆生界即是法身法身即是衆生界此但名異非義有別云何無染頌曰譬如明淨日為雲之所翳煩惱雲若除法身日明顯此復云何於不淨位中現有無量諸煩惱而不為染譬如日輪為雲所覆而性常清淨此心亦爾彼雜煩惱但為客故云何常恆頌曰譬如劫盡火不能燒虛空如是老病死不能燒法界如一切世間依虛空起盡諸根亦如是依無為生滅復次云何於此現有生老死而言是常譬如虛空雖劫災火起不能為害法界亦爾是故經言世尊生死者但隨俗説有世尊死者諸根隱沒生者諸根新起非如來藏有生老死若沒若起世尊如來藏過有為相寂靜常住不變不斷故云何相應頌曰如光明熱色與燈無異相如是諸佛法於法性亦然煩惱性相離空彼客煩惱淨法常相應不空無垢法復次云何未成正覺而言於此佛法相應譬如光明熱色等與燈無有異相諸佛法於法身亦如是如説舍利弗諸佛法身有功德法譬如燈有光明熱色不離不脫摩尼寶珠光色形狀亦復如是舍利弗如來所説諸佛法身智功德法不離不脫者所謂過恆河沙如來法也復次如説有二種如來藏空智何等為二所謂空如來藏一切煩惱若離若脫智不空如來藏過恆河沙不思議諸佛法不離不脫智云何不作義利頌曰煩惱藏纏覆不能益衆生如蓮花未開如金在糞中亦如月盛滿阿修羅所蝕復次衆生法身即與如是功德相應何故無有如來德用應知此如蓮未開諸𢙣見葉共包裹故如金墮廁在於覺觀糞穢中故如滿月被蝕我慢羅睺所執取故如池水被濁貪欲塵土所混雜故如金山被翳瞋恚泥垢所封著故如虛空被覆愚癡重雲之所蔽故如日未出在無明習氣地中故如世界未成在六處水大藏中故如雲無雨相違緣現前故總為頌曰如蓮金等未開顯佛體客塵翳亦然是時功德不自益反此則能為大利云何作義利頌曰如池無垢濁如蓮大開敷亦如上真金洗除衆糞穢如虛空清淨朗月星圍繞離欲解脫時功德亦如是譬如日明現威光遍世間如地生衆穀如海出衆寶如是益衆生令從諸有脫了知諸有性而起於大悲若盡若不盡斯皆無所著佛心如大雲住於實際空三昧總持法甘雨隨時降一切諸善苗因此而生長此偈中義與前相反應知則是清淨法身遠離客塵衆患故成就自性功德故證斯法者則名如來應正等覺於常住寂靜清涼不思議涅盤界恆受安樂為一切衆生之所歸仰云何一性頌曰此即是法身亦即是如來如是亦即是聖諦第一義涅盤不異佛猶如冷即水功德不相離故無異涅盤若如來法身異涅盤者經中不應作如是説如彼頌曰衆生界清淨應知即法身法身即涅盤涅盤即如來復次如有經言世尊即此阿耨多羅三藐三菩提名涅盤界即此涅盤界名如來法身世尊無異如來無異法身言如來者即法身也復次應知此亦不異苦滅諦是故經言非以苦壞名苦滅諦言苦滅者以從本以來無作無起無生無滅無盡離盡常恆不變無有斷絶自性清淨遠離一切煩惱藏具足過恆河沙不離不脫智不思議諸佛法是故説名如來法身世尊即此如來法身未離煩惱藏説名如來藏世尊如來藏智是如來空智世尊如來藏者一切聲聞獨覺本所不見本所不證唯佛世尊永壞一切煩惱藏具修一切苦滅道之所證得是故當知佛與涅盤無有差別譬如冷觸不異於水復次應知唯有一乘道若不爾者異此應有餘涅盤故同一法界豈有下劣涅盤勝妙涅盤耶亦不可言由下中上勝劣諸因而得一果以現見因差別果亦差別故是故經言世尊實無勝劣差別法證得涅盤世尊平等諸法證於涅盤世尊平等智平等解脫平等解脫見證得涅盤是故世尊涅盤界者名為一味所謂平等味解脫味也大乘法界無差別論命函國本宋本法界無差別論此是二藏所謂法界無差別論提雲般若譯者今按開元録及賢首疏則彼丹本五言二十四頌者真是提雲般若所譯而賢首疏所釋者又此論録及疏中並為單譯而國宋兩本與彼丹本文雖有異義則無殊必是開元之後後代重譯也但未知何代何人之譯此須待勘而二藏直以此為提雲般若之譯者錯也
