body:
  text: 沙門守其等奉勑挍勘蘇悉地羯囉經卷中之三蘇悉地羯囉經諸物量數品第三十復次廣説成就物量成就物者謂身莊嚴具諸倚仗等種種衣服如世常法所用量數應作成就然欲成就雌黃法者取末五兩為最上法三兩為中法一兩為下法成就牛黃者一兩為上半兩為中一分為下法成就雄黃者二兩為上法一兩為中法半兩為下法若欲成就安膳那者取三分為上二分為中一分為下成就酥者七兩為上五兩為中三兩為下成就灰者五兩為上三兩為中二兩為下若欲成就鬱金香者量比雌黃於安怛法説種種丸欲成就者其數須隻二十一丸為上十四為中七丸為下於本法中諸物量少應加數或依都量或如本法或世所貴尊量數多少亦可依之應觀念誦功力及觀同伴多少應當具備如本尊恩眷境界許多任可成就悉地之法有上中下諸物數量亦復如是蘇悉地羯囉經除一切障大灌頂曼茶羅法品第三十一復次廣説成就諸物祕密妙法令速悉地若欲起首成就法者先應偹辦諸悉地具次應以護摩之法而加威本尊真言及自灌頂欲灌頂者作曼茶羅如法供養作灌頂已然後起首作成就法次説灌頂大曼茶羅能得成就一切諸事如前所説明王曼茶羅淨地等法皆應如是其曼茶羅頓方四角安置四門其量八肘或七肘五肘唯開四門分明界道以五彩色而用畫之如其胎暈次外減半次外亦然於此西面四肘之外復作一曼茶羅其量五肘或四或三唯開東門或如根本大曼茶羅灌頂處所減半而作凡曼茶羅地勢皆須北門而瀉説為吉祥但曼茶羅地勢北瀉説為最勝或用一種彩色畫之於四角外作三鈷叉拔折羅於中台內如法畫作八蓮花諸曼茶羅亦應如是蓮花外周匝畫作吉祥妙印於四門中畫拔折羅復於諸角安吉祥瓶於外灌頂曼茶羅亦如是作凡欲灌頂必須四種所置瓶處並函界角隨所持誦真言及與明等於其台內畫本尊印并置一瓶所持真言隨其部類畫本尊主印所謂佛頂蓮花金剛應知此法置為祕密所持真言不識名號及部不貫者應安一瓶名辦諸事或安成就義利之瓶或安一瓶名諸真言次外東面畫佛頂印右邊部母印左邊部心印次右鑠底印次左牙印次右阿難次左須菩提諸餘真言及明等印左右安置乃至兩角次於北面畫觀自在菩薩印右邊部母印左邊部心印次右落澀印次左多羅印次右成就義菩薩印次左大勢至菩薩印諸餘真言及明等印左右安置乃至兩角次於南面畫金剛印右邊部母印左邊部心印次右金剛拳印次左食金剛印次右拔折羅印次左金剛棒印諸餘真言及明等印左右安置乃至兩角次於西面門南畫梵王印及梵吉祥明并諸眷屬乃至南角門北畫達羅神印及妃印并諸眷屬乃至北角次第三曼茶羅畫八方神各與眷屬令滿其位第二曼茶羅門外右邊畫難陀龍王左邊畫拔難陀龍王於三曼茶羅門外右邊畫孫陀龍王優波孫陀龍王曼茶羅外畫甘露瓶印如前作曼茶羅法已及供養已次應如法作三種事護摩為欲遣除毗那夜迦故應作阿毗遮嚕事為自利益故應作補瑟徵迦事為息諸災難故應作扇底迦事應以當部成辦諸事真言作阿毗遮嚕迦事或用甘露瓶真言通三部用應用當部心明作補瑟徵迦事應以當部母明作扇底迦事於曼茶羅所集聖者及以諸天各各以本真言而作三種護摩或以成辦諸事真言而作其護摩處曼茶羅西面門南作之如護摩法酥等諸物以三事真言各供養百遍或加其數為欲加威諸真言故應作如是三種護摩次為三部諸真言等各供養七遍其三部主應加其數或但三部各供養百遍如不辦者七遍三遍亦得滿足所持真言主於台曼茶羅內部尊之下安置於曼茶羅外東面別安訶利帝南面安置輸利尼西面安置醫迦熱吒北面安置句吒嚙利隨彼所樂而奉獻之如法供養諸真言已及護摩已前之安瓶隨所為者誦彼真言而用加被於本尊前所安之瓶還用彼真言而加被之其台內瓶應用明王真言而作加被當門為軍茶利所安置瓶亦須用彼真言加被於台曼茶羅東面兩角所安置瓶東北角者以部心真言東南角者用部母真言西北角者用能辦諸真言西南角者用一切真言如是加被此上瓶已及供養已次應右繞如前已説灌頂之法此亦如是安置吉祥所謂穀實藥草花果香樹枝花鬘及寶置於瓶內新帛繒綵用纏其頸諸灌頂法皆應如是即令同伴灌行者頂其同伴者皆須持誦如法清淨或求阿闍梨與其灌頂為欲除遣諸作障故先用軍茶利瓶而用灌頂第四應用所持真言而用灌頂其餘二瓶隨意而用如是畢已應以牛黃塗香薰香芥子線釧衣服皆應受用如法灌頂了已復為息諸障故應作護摩了已便即發遣或於平淨處所但一彩色作小曼茶羅極令方正其量二肘安置三部大印西面朔印如前安置淨瓶如法灌頂即應離諸障難本尊歡喜不久速成此是祕密最勝悉地蘇悉地羯囉經光顯諸物品第三十二復次如法灌頂畢已應作護摩經三七日或一七日或經一月或隨其成就相應或於本法所説每日三時用酥密及酪和以胡麻應作護摩或依本法或獻乳粥或以酪飯所成就物每日三時以香熏之以香水灑以真言加被其眼觀視其物以吉祥環安置於指撝按其物以牛黃水或白芥子灑散其上及於節日加諸供具奉獻彼物若白月成者取十五日若黑月成者取十四日如斯光顯其物皆用部母真言復重加諸香花鬘等物供養以香塗手安置茅環按所成物畢夜持誦於夜三時誦百八遍如斯光顯成就之物從始至終皆應如是若具此法速得成就佛部光顯真言曰唵帝誓帝若娑尾二合寧上悉悌娑去大也𤙖泮吒二合蓮花部光顯真言曰唵你去比也二合你去比也二合你去鉢也莽訶去室哩曳莎去訶去金剛部光顯真言曰唵若嚩二合羅若嚩引二合羅也滿度莎去訶去於三部法皆用赤羯囉微囉花以真言持誦散灑其物或用忙落底花或白芥子初首及末乃至中間皆應如是散霑其物或有境界及見異相亦如是散臨欲成就亦如是散便成光顯若欲成就酥等之物真言香水用灑其物便成光顯以如是法而光顯物縱不成者不應間斷或作曼茶羅以為光顯如前淨地用五種色作曼茶羅其量四肘而開一門於內院東面先置輪印於東北角置鉢印東南角置袈裟印次於北面置蓮花印於西北角置難上拏棒印於東北角置軍持瓶印次於南面置拔折羅印於東南角置那棒印於西南角置羯攞瓶印次於西面置金剛鈎金剛拳印於西南角置計利吉羅印於西北角置遜婆印復於東面輪右邊置佛眼部母印次於北面蓮花印右邊置半拏囉嚩思寧部母印次於南面拔折羅印右邊置忙莽計部母印次於曼茶羅門外如前所説置能摧諸難軍茶利印依前供養復於北面置六臂印馬頭印多羅印戰捺囉二合印及於當部所有眷屬次第安置其形皆白復於東面置如來鑠底印帝殊囉施印無能勝明王印無能勝妃印復於南面於當部內所有眷屬次第安之然於西面隨意安置三部諸印次於外院置俱尾囉等八方大神於其空處任置三部內成辦諸事真言等主次於中台置所持部主印所成就物隨於本法所説置於其中安其部主中台印上其物東邊置真言本所持印其物西邊安護摩爐次於西邊持誦人坐各各以本真言依法召請如前所説次第供養供養畢已以三部母明次第護摩光顯其物然後以本真言護摩而作光顯於諸光顯法中護摩為最凡初護摩先以部母明持誦香水灑淨其物護摩既畢亦如是灑或用忙莽計心明或用四字明王真言通用三部護摩而作光顯隨其所用真言為護摩者初且誦其真言次誦求請之句復中間誦其真言復誦求請之句復亦誦其真言遠安求請句如是真言之中三處上中下分安置求請之句最後安其𤙖泮吒莎去訶去字所謂闍嚩二合放光攞闍嚩引二合囉也令放光悉地成娑去馱也令成你去𭅤威耀你去跛耶跛跢跛跢去二合南諸威耀者帝闍潤澤帝闍也令潤澤拔馱也令增長忙尾覽摩莫延遲阿去尾遍入囉乞沙二合護持散你輕甜令瑞現前俱上嚕日耳𤙖泮吒莎去訶去以如是等求請之句光顯其物前後中間種種重説亦無所妨護摩畢已次應持誦白羯囉尾囉花散其物上而作光顯或持誦赤羯囉尾囉花或用白芥子或用酥摩那花而作光顯先用塗香塗手以按其物次以諸花持誦而散次散白芥子次燒香熏之次後持誦香水而灑應知如是次第初中後夜三時以本尊主真言持誦香水真言而灑次誦本持真言而灑畢已如前護摩念誦乃至日出具此法者速得成就如是光顯諸物及與己身決定速得成就其物縱少亦獲大驗具此法者其物增多及得清淨是故應作光顯之法此名一切成就祕密之法於諸節日應作如是光顯之法餘日隨時而作光顯念誦遍數滿已欲作成就法時先應初夜具作光顯之法然後成就中卷竟蘇悉地羯囉經卷下大唐中天笁三藏輸波迦羅譯分別悉地時分品第三十三復次我今解釋如説吉祥成就時節行者知已尋求悉地其時節者八月臘月正月二月及四月此等五月白十五日應作上成就其四月時必有雨難於二月時亦有風難於正月時有種種難但其臘月無諸難事於八月時應有雷雹霹靂之難如上所説之難皆成就相此五箇月求但作成就亦當應作扇底迦事即此五月黑十五日應作中下二成就法亦當應作補瑟徵迦事阿毗遮魯迦二事於月蝕時成就最上之物於日蝕時通上中下成就之物或月十五日或七或一或十三日或用三日應作成就及一切事若作最上成就應取上宿曜時其中下法類此應知然諸宿中鬼宿為最若作猛利成就還依猛利宿曜時等或與三種事法相應其所成就亦依三事而作或如本法所説或依本尊指授然十正二月一日至十五日於其中間應作一切成就及事或取本尊指日或諸月中黑白十三日亦得成就七月八月是雨時後節應於此時作扇底迦法九月十月是冬初節應於此時作補瑟徵迦法三月四月是春後節應於此時作阿毗遮嚕迦法正月二月是春初節應於此時通一切事五月六月是雨初節要欲成者作下悉地如是春冬及雨後節亦應成就三種悉地此中九品分別隨類分配於初夜分下成就時於中夜分中成就時於後夜分上成就時於初夜分是作扇底迦事時於中夜分是作阿毗遮嚕迦事時於後夜分是作補瑟徵迦事時於此三事九品分別隨類相應知其時節於其時分所現之相辨上中下然於日月蝕時即當作法不觀時分凡猛利成就及阿毗遮嚕迦事日月蝕時最是相應凡起首成就三日二日一日斷食上中下事類日應知蘇悉地羯囉經圓備成就品第三十四復次當説本法闕少成就支身若恐身力不濟勿須斷食念誦遍數滿已欲起成就更須念誦護摩花香讚歎種種供養觀念本尊取白㲲縷令童女合為繩如前作法繫作七結誦明七百遍於晨朝時以繫其腰便止失精明曰唵若而也反以俱忙束訖囉二合滿馱寧上莎去訶去曀醯曀醯莽忙伽去輕呼寧上乞使二合鉢囉二合忙尾捨蘇上麼囉二合帝莽若而也反囊莽比僧室㗚二合底丁以反也二合微者多去忙指嚂唵囉乞産二合俱嚕俱𭍌擬冝以反𡰱上莎訶唵俱蘭達哩蒲馱𤙖泮吒二合俱摩羅明佛部中用俱𭍌擬冝以反尼明蓮花部用忙莽計明金剛部用初中後分間誦求請之句若於本法自無求請之句應取安之然此三明當部用之其持誦繩或每日繫或作光顯法時應繫作曼茶羅時念誦之時於節日時皆須急繫又除惛沉故應合眼藥蘇嚕多安膳那澀砂蜜龍腦香蓽茇婆羅門桂得囉香自生石蜜各取等分搗篩為粖以馬口沫相和細研復以此明持誦百遍成就之時數數洗面以藥塗眼除去懈怠及以惛沉有諸難起遙皆悉見佛部明曰唵若嚩二合羅路者寧上莎訶蓮花部明曰唵微路枳寧上莎去訶去金剛部明曰唵滿度哩你異二合鉢帝二合莎訶此三部明通一切用之若有持誦人今欲成就之時念誦若乏以白檀香和水用部心明持誦七遍而飲三掬欲成就時先以水灑身應取善相方可作成就其善相者謂商佉輪鈎魚右旋印白蓮花幢莎悉底迦印滿瓶万字印金剛杵花鬘或見端正婦人纓珞嚴身或見懷妊婦人或擎衣物或見歡喜童女或見淨行婆羅門著新白衣或見乘車象馬根藥及果或見奇事或聞雷聲或聞誦吠陀聲或聞吹螺吹角諸音樂聲或聞孔雀之聲鶻鷓鵝鸚鵡等吉祥鳥聲或聞善言慰喻之音謂起首安樂成就可意之言或見慶雲閃電微風細雨或雨天花或有好香及見暈虹於此相中天所降者為上成就於空現者是中成就於地現者為下成就於此三相九品分別如上所現皆是吉祥反此見者即不成就見此相已深生歡喜以如是心方作成就蘇悉地羯囉經請尊加被成就品第三十五復次説奉請成就之法如前所説時節星曜及瑞相等於作曼茶羅法中及成就法中廣以陳説若不善相現時即以部母明護摩牛酥經一百遍然後作法亦得成就悉地前所分別曼茶羅地亦應依彼而作成就若上成就於山上作若中成就於池邊作若下成就隨處而作或與真言相應之處當就彼作不依此處成就稍遲於有舍利骨制底之中作一切內法真言皆得成就佛生處等八大制底成就之中最為勝上然於菩提道場無一切難能與成就相應魔王尚於彼處不能為難况餘諸類是故一切真言決定成就凡是猛利成就於冢間作或於空室或於一神獨居之廟或逈獨樹下或於河邊當作成就若欲成就女藥義者於林間作若欲成就龍王法者於泉邊作若欲成就富貴法者於屋上作若欲成就使者法時於諸人民集會之處作若欲成就入諸法於窟中作此是祕蜜分別成就之處揀擇地定已先應斷食如曼茶羅淨地之法或如念誦室法應淨其地處所清潔速得靈驗先以成辦諸事真言或用軍茶利真言持誦白芥子等物散打其地辟除諸難以佉達羅木為橛四枚其量二指纖其一頭如一股杵以紫檀香塗其橛上復以緋線纏之以跋折囉橛印作拳執之以此真言持誦一百遍釘於四角橛頭少現作一白幡於曼茶羅東西懸長竹竿上以金剛墻真言持誦鐵末百遍作三鈷跋折囉皆相接圍繞漫茶羅為金剛牆復以金剛鈎欄真言持誦鐵末百遍亦作三鈷跋折囉各橫置於竪跋折囉上繞曼茶羅為金剛鈎欄外曼茶羅門以軍茶利真言以跋折羅印而護其門第二重門以訶利帝母而護其門中台院門以無能勝而護其門此等護門三部通用或用其一通護三門此三聖者能摧諸難無有能壞此是祕密護成就物其台中心埋五寶等物若於人民集會之處作曼茶羅時其五寶等物不應埋之但置所成物下若於中𨓍及與室內或佛堂中作曼茶羅時亦復如是以上五處但持誦香水灑即便成淨不假掘地若於本念誦室中作此法速得成就於諸室中必不合作成就法於壞室中亦不合作欲作曼茶羅時七日已前於黃昏時以敬仰心觀念諸尊如對目前而奉請言於三部內一切諸尊及於本藏中諸尊與眷屬等我已久時念誦護摩堅持戒行以此真心供養諸尊願後七日降赴道場哀愍我故受此微供以大慈悲令我成就如是乃至滿其七日依時啓請然後作法又以閼伽花香飲食及讚歎等每日暮時別供一方護世諸神乃至三方皆應如是又以香塗手持誦其手以按其物而奉請之復以燒香熏物奉請又復斷食取好時日略作曼茶羅用奉請物或但用一色作圓曼茶羅唯開一門中置八蓮花其量二肘次餘外院隨意大小而作先於內院置三部主西面門北置摩首羅及妃佛右邊置帝殊羅施左邊置佛眼次觀自在右邊置摩訶室利左邊置六臂次金剛右邊置忙莽計左邊置明王心西邊門南置吉里吉利忿怒及金剛鈎如上所説皆於內院安置次於外院置八方神及置能辦諸事真言主等內外二院心所敬重真言主等樂皆應安置外門北邊置軍茶利門南置無能勝各以心真言而請供養於蓮花上置成就物而供養之或於蓮花上置滿迦羅瓶於上置其成就之物或於蓮花上置合子於中盛物或蓮花置瓦器於中盛物其物或於花台中盛置蓮花上加以手按持誦其物千遍或一百遍次復持誦花以擲物上次復以酥和安悉香而燒熏之次復香水微灑物上次復以部母明持誦其物於曼茶羅所有諸尊各以彼等真言持誦其物次復以牛酥護摩或用牛乳或以酥蜜胡麻和作護摩後以酪飯護摩於本法中所説諸物皆應護摩各取以曼茶羅內所有真言遍作護摩及各以真言持誦香水而灑其物如前所説光顯物法此亦如是持誦自眼用看其物心誦真言如是作法其物即成奉請凡一切物作奉請法速得成就或於本法所有一切供養及祭祀法一一皆應具作此奉請法曼茶羅中亦通受持其物其物亦通光顯其物於中若作成就諸作障者亦不得便亦通淨物依灌頂法亦通灌頂其物亦通灌頂自身此是祕密能辦諸事勝曼茶羅若作此法不久得成蘇悉地羯囉經補闕少法品第三十六我今當説補闕少法從受持物已每日三時澡浴三時供養及作護摩手按其物三時換衣節日斷食供養等法皆須增加三時禮拜懺悔隨喜勸請發願三時讀經及作曼茶羅三時歸依受戒三時護身如是作法定得成就或由放逸致有闕少即應以部母明持誦二十一遍便成滿足若闕此法成就亦闕或若有闕更須念誦一十万遍復應作此曼茶羅補前闕少然後方作成就其曼茶羅方四角安四門如前所説分布界道東面置佛右邊置佛毫左邊置佛鑠底右邊置佛慈左邊置佛眼右邊置輪王佛頂左邊置白傘佛頂右邊置帝殊羅尸左邊置最勝佛頂右邊置超越佛頂左邊置須菩提右邊置阿難於西南角置鉢於西北角置錫杖門外右邊置訶利帝母左邊置無能勝於曼茶羅外置能辦諸事中央置輪於上置其所成就物或置本尊外院置八方神門兩邊置難陀及拔難陀龍王各以本真言請或以部心明都請依法供養然後護摩其諸尊等或置其印或置其座以本真言成淨火已護摩酥密一百八遍又以酪飯及用胡麻各以本真言護摩百遍其事畢已復誦百遍此是祕密補𠍴過法所供養物皆須香美其所獻食用嗚那囉供及粆糖和酪作此法者諸尊皆得充滋歡喜得成就非但補闕亦應半月半月或於節日或復每日作此曼茶羅供養諸尊皆得充滋速與成就若不辦時隨力而作如前所説佛部曼茶羅法此蓮花部法亦皆同彼唯改圓作其量隨意東西置觀自在右邊置馬頭明王左邊置毗首嚕波右邊置三目左邊置四臂右邊置六臂左邊置十二臂右邊置能滿諸願又右邊置耶輸末底左邊置大吉祥右邊置多羅左邊置戰捺囉二合近門右邊置濕吠多左邊置半拏囉嚩悉寧中央置蓮花曼茶羅外置本部能辦諸事此是蓮花部補闕曼茶羅法如前所説佛部曼茶羅此金剛部亦復如是然須方作其量隨意東面置執金剛右邊置明王左邊置忙莾計右邊置軍茶利忿怒左邊置金剛鈎右邊置棒左邊置大力右邊置拳左邊置遜婆右邊置提防伽左邊置鉢那寧乞差二合跛右邊置忿怒火右邊近門置金剛可畏眼右邊近門置金剛無能勝曼茶羅外置本部能辦諸事諸餘外院及供養法皆如前説此是金剛部補闕之法如是供養畢已求得好夢晨朝澡浴著白淨衣以稻穀花及青俱蔞草香美白花供養所作曼茶羅地然後以牛糞遍塗掃却復作三簸多護摩右邊置俱蔞草柴酥蜜胡麻及飯所有護摩之物皆置於右左邊置閼伽器酥杓及諸物杓置於當前融酥次置杓前用成辦諸事真言灑其物等請部主尊安置供養用本真言以閼伽請其本尊亦復安置自身前置酥酥前置火酥火中間置成就物最初自身次酥次物次火次本持尊及部主尊如前五種之物置次應知部主左邊置帝闍寧明右邊置成辦諸事如前所説護摩法中次第安置先敷青俱蔞草置和酪飯散稻穀花獻莎嚩二合悉底二合供以好美香供養然後依法作護摩事所成就物置於金器或銀熟銅石商佉螺木嚩弭迦土器等敷阿説他樹於上置器或敷有乳樹或閼伽樹或芭蕉樹或蓮花或新淨白㲲隨取敷之又五重先敷地上置成就物復以五重而覆其物或可是繖或種種衣或諸雜物次第應知所盛之器然後以不散亂心作三簸多法以心光明其物及散灑之手執杓緩其酥置其物上誦本真言至其莎去字即瀉爐中呼其訶去字還觸其物却至酥器如是來去三處觸物不得斷絶是名三簸多護摩法經一千遍或一百遍或觀真言廣略或復成就上下輕重乃至護摩二十一遍此名都説遍數之限三簸多時以杓遍霑其物令皆潤膩初置物時先以水灑次按持誦次以眼看次獻供養護摩畢已還須如是於成就曼茶羅所説三種成就之相作此法時若有相現即須禁之應知不久即得成就其物若大置於右邊應右手執者置於左邊而三簸多之若成有情之物作其形像杓觸於頭而作護摩若成自身以杓觸頂而作護摩若為他故作三簸多者但稱其名而作護摩其成就物復有三種差別一但稱名二以物蓋隔之三但露現眼所觀見如是皆用其酥而作護摩若不獲酥當用牛乳或酥和乳或用三甜或觀成就差別應當用酪或如本所説而用護摩或以麻油護摩器仗若成吠多羅者應用堅木香心護摩或用蘇合等諸餘汁香或觀其物差別及與成就差別當取諸類香物與法相應者而作護摩若或犬肉還用彼脂諸餘肉類亦復如是其成就物或盡置於前以此所三簸多法説或如前説護摩之法當應廣作三簸多法護摩其物如是作已速得成就三簸多已洗灌令淨然後如法灌頂灌頂畢已供養護持置本尊前更加種種飲食供養本尊及當祭祀八方護世亦須如法供養護摩之地然後以諸澡豆及阿摩羅以自如法澡浴於其午時手按其物而加念誦又更別辦其線依前如法持誦臂釧衣灰白芥子水一一皆須如前持誦欲作成就之時如是護身之物先須持誦擬充後用如是念誦護身諸物成就之時有所用處皆即有驗是故應須預先持誦備擬花等供養之物亦須加法持誦置於側近次則依作曼茶羅如法供養而作成就用能辦諸事真言持誦五色界道線緾四橛上以軍茶利真言持誦瓶置外門前所緾之線兩頭俱繫瓶項稍令寬縱每出入時思念軍茶利舉線而入其線若以軍茶利真言持誦亦得或取本法真言持誦亦得如是所説辟除難法先淨其處然後作法其時於外祭祀入方護世大神并諸眷屬於其瓶上置𧿡折羅或置有果枝條其瓶及線或當部明王持誦或用部心或用部母持誦以護其處或於當部所有契印各於本方而安置之以辟諸難其橛以金剛橛真言持誦百遍其橛上一頭作三鈷杵形或一鈷形如是作已於淨室外四角釘之若作曼茶羅於界道角釘之此名金剛橛法能辦諸事其曼茶羅或用乾粖彩色或用種種香粖或以濕色用牛毛筆畫於諸角外畫三鈷杵其諸界道遍作三鈷杵形還用金剛牆真言持誦復於其界杵形之中更復橫置一杵遍應如是則名金剛鈎欄還用金剛鈎欄真言持誦如是作已無有能壞是故於中作成就法於諸門中及門外由各置跋折羅其成就法或於淨室中作或於露地作曼茶羅其量五肘或七或八觀其所成就事隨事大小而作於諸門中置跋折羅於諸角上置瓶於外門前置能辦諸事瓶於內東面置法輪印右邊置佛眼左邊置佛毫右置牙印左置鑠底印右置五種佛頂次第左右安置於佛部中所有諸尊隨意次第左右安置最後兩邊置阿難及須菩提次下近門置無能勝次於外院東面置悉達多明王北面置大勢至尊南面置妙吉祥尊西面置軍熱囉尊東面右置梵天及與色界諸天左置因陀羅上至他化自在乃至地居天神於東南方置火神與諸仙人以為眷屬於南方置焰摩王與毗舍遮布單那諸魔怛羅而為眷屬於西南方置泥唎帝神與諸羅剎而為眷屬於西面門南置嚩嚕拏神與諸龍衆而為眷屬門北置地神與諸阿修羅而為眷屬於西北方置風神與諸伽路拏而為眷屬於北方置多聞天王與諸藥叉而為眷屬於東北方置伊舍那神與諸鳩盤茶而為眷屬丁未歲高麗國大藏都監奉敕雕造
