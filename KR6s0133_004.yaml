body:
  text: 知函東方最勝燈王陀羅尼經闍那崛多譯正經六紙雜呪三紙此經丹藏即云東方最勝燈王如來經經初有歸敬辝者是也按開元録此經前後四譯三存一失即東晉失譯名為陀羅尼章句經或無章字者是第三譯而一失本也今此崛多譯宋本與丹名既不同文亦有異丹文大多倍宋本而有餘則未知孰是真本經耶今以丹本經首有歸敬辝者為崛多真本耳此宋本經文古語質似非崛多之譯又文中數云陀羅尼句即恐此經是失本陀羅尼句經宋藏失崛多譯而得彼失本經見經中有最勝燈王之言遂認為崛多譯燈王經耳不然何一人之譯而有名題始末之殊廣略質文之異耶今且雙存欲令四譯廣具矣因書其意伏俟明哲知函最勝燈王如來經丹本闍那崛多譯此經此本宋藏失之今得丹藏而編入云又為看舊宋本藏者具録其經于左我闍那崛多歸命大智海毗盧遮那佛東方最勝燈王如來經知丹隋天竺三藏闍那崛多等譯如是我聞一時佛在舍衛城祇樹給孤獨園與大比丘衆千二百五十人俱復有無量百千菩薩衆復有無量天人衆等所謂大梵天王帝釋天王四大天王所謂提頭賴吒天王毗婁勒叉天王毗婁博叉天王毗沙門天王功德大天為首等有八萬四千諸天衆那耶耶大將為首入部鬼神大將復有五百鬼子母及諸眷屬如是等無量天人世衆左右圍繞爾時去此佛剎百千億佛剎過已東方有一佛剎名無邊華世界彼世界中有一佛名最勝燈如來多他阿伽度阿羅呵三藐三佛陀現在逍遙說法彼如來於彼世界遣二菩薩來此娑婆世界一名大光菩薩二名甘露光菩薩言汝等二菩薩往向娑婆世界彼有一佛名釋迦牟尼多他阿伽度阿羅呵三藐三佛陀為彼釋迦牟尼多他阿伽度阿羅呵三藐三佛陀將此陀羅尼章句說為諸衆生故安樂故功德故增益故名聞故生力故隨所意行故受安樂故不擾亂故不殺衆生故擁護故而說呪曰多上絰地也反他優波𫺳泥覩𫺳泥羅叉㝹瞿波多上曳波囉闍婆𮇬闍上婆上𮇬闍婆𮇬摩上訶闍婆𮇬闍婆楞伽帝闍婆𮇬闍婆梨尼摩訶闍婆梨尼闍婆囉木企娑利摩娑利阿迦上𮇬摩迦上𮇬阿上企音溪摩上企那上企娑上婆𮇬摩訶娑婆𮇬三婆離郁句目句三摩帝摩訶三摩帝帝三摩帝摩訶三摩帝摩訶闍婆𮇬娑曳娑羅目句奢摩訶奢三摩弟摩訶三摩弟三目避毗目避阿囉細摩訶阿羅細摩那上細摩那細摩那細啼卑底莎婆呵爾時彼二菩薩受持此陀羅尼已譬如壯士屈申臂頃如是如是菩薩沒身從彼無邊華世界至舍衛城祇樹給孤獨園中現時菩薩至釋迦牟尼多他阿伽度阿羅呵三藐三佛陀邊到已頂禮佛足圍繞三匝即住一面住已彼菩薩白佛言世尊去此佛剎過八千億佛剎東方有一世界名無邊華彼世界中有一佛名最勝燈多他阿伽度阿羅呵三藐三佛陀現在逍遙為他說法彼婆伽婆最勝燈如來多他阿伽度阿羅呵三藐三佛陀遣我等至此娑婆世界彼最勝燈佛問訊世尊少病少𢙉起居輕利氣力安不復作是言世尊無有擾亂徒衆或比丘衆比丘尼衆優婆塞衆優婆夷衆或有人或非人或天或龍或夜叉羅剎或大鬼將或鳩盤茶或鳩盤神將或富單那或毗舍闍或餓鬼或虛妄鬼或蜈蚣或毒蛇或蝮蠍或雜毒蟲等或阿修羅羅睺羅伽或娑乾陀鬼或痟渴鬼或悶絶鬼或病鬼或蠱道或死尸或一日熱病二日三日四日熱病或自餘種種所擾亂鬼病不為擾亂也而最勝燈如來遣我等將此陀羅尼呪來為諸衆生利益故為養育衆生故為增長功德故增長威德故增色故出名聞故增力故隨意所受樂故隨所受安樂故不擾亂故為擁護故而說前呪爾時世尊告長老阿難言阿難汝受持此陀羅尼章句受已為他解說宣通流布阿難佛出世難聞難值此陀羅尼章句復甚難聞若有善男子善女人能受持此陀羅尼者或讀或誦或為他說顯揚彼人火不能燒刀杖不能傷諸毒不能害縣官不能殺梵天不恚彼人七世恆知宿命阿難此陀羅尼章句過去七十七億諸佛所說若有人毀謗此呪者即是毀謗彼等諸佛若有鬼神不敬重此呪者或與我奪某甲威力者或已呪奪不還者彼鬼神頭破作七分爾時阿逸多菩薩從座而起整衣服偏袒右肩右膝著地而白佛言世尊我亦說陀羅尼章句為衆生受利故得增益故增功德故增威力增色增名聞故增力故隨行受樂故隨所行受助樂故不擾亂故不殺害故擁護故而說呪曰多上絰他頞帝跋帝那上帝俱上那上帝阿迦跋帝波囉毗跋帝兜婁迷侯留留迷安那迦細波上那上迦上細迦上細摩訶迦細阿㝹多波上囉細毗佉祇摩訶佉祇斯茶比多茶比奚離上弭離上底離上尸離上覆施摩訶覆施覆覆施覆奢跋帝莎婆呵爾時佛告長老阿難言汝受此陀羅尼章句恆常受持讀誦為他解說宣通流布阿難佛出於世難可值遇聞此陀羅尼復倍甚難若有善男子善女人亦能受持此陀羅尼受已能持讀誦能為他人宣通解說彼人能知未來十四世事阿難此陀羅尼章句過去八萬四千億諸佛所說若有人毀謗此陀羅尼不信行者彼人則為毀謗過去諸佛是人則為背捨諸佛若有衆類奪我某甲精氣或奪已不還是人亦得如是罪過爾時文殊師利童子即從座起整衣服偏袒右肩右膝著地而白佛言世尊我亦說陀羅尼章句為衆生利益故安樂故增長功德故增長威德故增長色故增長名聞故增長力故隨意受樂故隨行受安樂故不擾亂故不殺害故守護故而說呪曰多上絰他阿上嗘摩上嗘那佉囉細那祁尼那伽薩婆囉尼𮇬遮嗘𮇬遮嗘囉跋帝旃茶𮇬旃茶上囉跋帝闍上嗘𮇬闍嗘囉跋帝禪地𮇬禪地羅帝莎婆呵爾時佛告長老阿難阿難汝受此陀羅尼恆常受持讀誦為他解說宣通流布阿難佛出世難聞此陀羅尼復倍甚難若有人能受持此陀羅尼復倍為難阿難若有善男子善女人能受此陀羅尼受已能持讀誦能為他人宣通解說彼人能知未來七世之事阿難此陀羅尼章句過去九十億諸佛所說若有人毀謗此陀羅尼不信行者彼人則為毀謗彼過去諸佛是人則為捨彼諸佛若有衆類奪我某甲精氣奪已不還是人亦得如是罪過爾時釋迦牟尼多他阿伽度阿羅呵三藐三佛陀告諸比丘言諸比丘我今亦說陀羅尼章句為利益衆生故安樂故增長功德故增長威德故增長色故增長名聞故增長力故隨意受樂故隨行受安樂故不擾亂故不殺害故守護故而說呪曰多上絰他阿知上跋知上那上知上俱上那上知上迦上那上知上吒羅跋泥恀羅跋泥覩多羅曳上阿羅上婆枳吒上枳吒上茶枳羅婁迷呼盧迷娑上𮇬摩訶娑𮇬荖迷摩訶荖迷利𮇬婁梨𮇬嗘𮇬𭥲𮇬嗘虛尓反寐伊上𮇬尸𮇬尸𮇬尸尸利尸羅跋知上阿上滯婆上滯那上滯俱上那滯頞那上跋帝波那上跋帝阿迦細摩迦細迦細迦娑上迦細頗細頗娑上頗細摩訶頗娑上頗細伊上泥寐泥多恀多恀波多恀多婆多恀莎婆訶爾時佛告長老阿難阿難汝受此陀羅尼恆常受持讀誦為他解說宣通流布阿難佛出世難聞此陀羅尼復倍甚難若有人能受持此陀羅尼復倍為難阿難若有善男子善女人能受此陀羅尼受已能持讀誦能為他人宣通解說彼人能知未來二十一世之事阿難此陀羅尼章句過去九十九億諸佛所說若有人毀謗此陀羅尼不信行者彼人則為毀謗彼過去諸佛是人則為捨彼諸佛若有衆類𡙸我某甲精氣𡙸已不還是人亦得如是罪過阿難若有善男子善女人受持此陀羅尼章句假使取乾枯樹結界守護作法誦呪尚能令彼枯樹生枝柯華果何况有識衆生受持此呪而不差者無是處耶歸命一切諸佛願我成就此呪莎波呵爾時世尊復告諸比丘言諸比丘我今更說陀羅尼章句為利益安樂增長功德威勢色力名聞隨意安樂不生𢙉害常守護故而說呪曰多上絰他阿嘖悼階反婆嘖吒稽吒囉稽吒嚧末底覩嚧末底兜𮇬覩羅兜𮇬婆𮇬娑上𮇬覩𮇬度𮇬度度𮇬蘇上𮇬婆哂呬婆哂利嗘利畢利底利莎婆呵爾時世尊告阿難言阿難汝受持此陀羅尼章句持已讀誦為他解說宣通流布阿難佛出世難聞此陀羅尼復倍為難若有誦此陀羅尼及以受持復倍為難阿難若有善男子善女人受持此陀羅尼章句受持已讀誦為他解說宣通彼人得知二十八世之事阿難此陀羅尼章句過去恆河沙諸佛所說若有人毀謗此呪則是毀謗彼等諸佛是人則為捨彼諸佛若有衆類奪我某甲精氣奪已不還是人亦得如是罪過若有呪師呪他人者彼人所有呪咀言說皆不能傷害將此呪欲守護他彼人一切諸天不能傷害一切諸龍不能傷害一切夜叉𠃵闥婆阿修羅迦婁羅緊那羅摩睺羅伽不能傷害一切羅剎不能傷害一切縣官不能為害一切劫賊不能為害一切人一切非人不能為害一切毒蛇毒蟲不能為害一切蝮蠍不能為害一切丁瘡一切冷熱瘧等亦不能害一日二日三日四日一切諸瘧不能為害若風作瘧陰所作瘧黃所作瘧亦不能害若有上官逼切來者或以枷鎖禁繫逼切或有疥病或癬病者或有惡瘡出身或有反華瘡或有濕癩或有舊痢更發或有赤頭創不能為害一切蠱道呪咀言說不能為害一切起死尸不能為害或諸天作者或諸龍作者或夜叉作者或羅剎作者或渴病佯病作者或佯癲作者或宿作諸病不能為害若患眼若患耳若口脣患齒患舌阿難我今略說一切所有苦逼者唯除宿殃耳所造業受報爾時世尊復告諸比丘言我今復說陀羅尼章句那上嘖俱上那上嘖那上咩音弭波上囉上那上哆伽上細平波上囉上伽上細莎婆呵過去諸佛阿羅呵三藐三佛陀已說此陀羅尼章句阿難若有人受持此陀羅尼讀誦為他解說宣通不忘彼人刀杖不傷蠱毒一切諸病不能傷彼不患頭病一切人非人不作𢙣若噉毒藥變成美食復次世尊說陀羅尼曰多上絰他吒上枳麼吒上枳賀嚧嚧暮上嚧上嚧上唎寐底羅寐莎婆呵阿難若有人讀誦此章句受持為他解說彼人刀杖不能傷害一切厄難中不縛不沒此呪呪結線帶行一切寒熱病不能傷一切毒藥呪即得差復次阿難我更說陀羅尼章句為諸衆生利益故安樂故增長功德故增長威德故增長色故增長名聞故增長力故隨意受樂故隨行受安樂故不擾亂故不殺害故守護故而說呪曰多上絰他阿上婆上易婆上邪毗伽帝婆邪波利輸陀音你阿婆邪陀䭾音你尼婁波迦囉迷阿那鳩𮇬阿俱羅毗輸陀上阿上那上毗𮇬阿毗羅毗輸阿那俱阿毗伽囉嗘音醯阿毗婆弟阿俱臂阿朱帝輸婆帝提帝闍婆上帝摩訶帝誓優波奢媒多羅婆上帝度沙奢摩上你頞羅他陀梨施薩帝稚陀梨施阿毗盧弟僧祇多羅剃阿羅他僧祇帝阿𣃥多婆囉薜娑上𮇬娑羅婆上帝悉弟輸弟輸薜烏婆婆婆上帝婆婆婆囉薜娑摩波囉輸祇婆摩質帝阿奴避佛䭾地師致帝尸羅毗叔弟質多毗叔弟阿薜弟婆闍羅那地𢙣迦叉地阿闍𥘢波上囉薜闍𣏳毗首陀曳阿那滯迦摩尼曳阿僧阿梨曳以破一切衆魔力降一切諸外道然法炬攝受一切行施莎婆呵阿難此呪名清淨除一切障礙陀羅尼章句之處三世諸佛所說顯示諸法文句若能誦此章句者即得除滅一切魔章句我某甲以此章句守護某甲結界某甲擁護某甲護持某甲養育某甲用作禳災除一切病破一切毒除去風病若有臍下病瘡有心痛若有腹痛若有背痛若下部痛若腰痛若有諸節痛若脛膝髖髀一切諸痛或復上分頭痛眼耳等痛齒舌脣口咽喉頸項兩脅膞二手一切肢節呪皆止定一切寒熱病或一日兩日三四日所作者風病黃病痰陰病等分病我今皆悉除滅平復如本願永斷絶願散滅無餘消滅盡若有餘者皆得散盡若未熟者即令熟散差若腫欲發願即消散而說偈言一切諸佛力一切羅漢力諸法威神力我呪護病者令其夜半吉令其盡日吉一切時皆吉合家眷屬吉四方四天王護持世閒者毗沙提頭賴毗婁及博叉及其眷屬等最勝威神力此處作吉祥守護於病人毗婆尸佛神尸棄佛神力憐愍一切衆彼神守護汝毗舍浮護神拘婁孫䭾神憐愍一切衆彼神守護汝迦那迦護神迦葉佛護神憐愍一切衆彼神守護汝釋迦牟尼尊所有諸神護憐愍一切衆彼神守護汝一生補菩薩所有諸神者憐愍一切衆彼神守護汝阿閦佛護神及毗盧遮那憐愍一切衆彼神守護汝頭沙波婆佛無量壽佛神彼等護汝命願汝壽百秋爾時彼二菩薩從東方最勝燈佛使者白釋迦牟尼佛言世尊我等今者亦欲說陀羅尼呪多上絰他優避盧婁避嗘離上寐離上首離那梨牟嗘富莎婆呵此呪功能如上所說佛告阿難阿難此陀羅尼章句若在劫賊之難應當心念若在怨讎之內應當心念在大火中應當心念若在河海大水難等中應當心念若在縣官內應當心念一切鬪諍言訟之難應當心念彼人如是等諸厄難中至心念者即得度此一切諸難如是等諸難不能為害若得他毒藥至其身中即變成食不能為害若有人日初出時誦念此陀羅尼章句至日中時誦念此陀羅尼章句至日沒時誦念此陀羅尼章句一切時能誦念此陀羅尼章句彼人一切厄難即得解脫阿難我為汝要言若有人誦此陀羅尼章句受持讀誦為他解說彼人若有處恐怖者無是處也或在縣官或在劫賊內或被火燒或水漂沒溺諸龍夜叉羅剎有大鬼將鳩盤荼富單那毗舍遮餓鬼阿修羅伽婁羅乾闥婆緊陀羅燋渴之病迷悶病佯癲蠱道起死尸鬼寒熱之病或一日作者二日三日四日作者月天所作日天所作星宿所作師子虎狼豺羆豹等毒蠱𢙣狗蟒蛇蝮蛇蚰蜒蠍等所有諸毒蠱人非人等不能為恐怖此陀羅尼章句若人受持一切鬼神一切夜叉一切羅剎一切鬼將諸鳩盤荼一切餓鬼不能為害人非人等一切恐怖不能壓伏阿難有人誦此陀羅尼章句者能合死者鞭杖得脫應合鞭杖輸少財物應合輸財毀辱得脫應合罵辱訶責得脫應合訶責令即得脫阿難若有人讀誦此陀羅尼章句受持為他解說或心隨喜或晝夜分別念之彼人火不能燒刀杖不能傷水不能溺毒藥不能殺蠱道不能害阿難我為汝略說天人世閒內我不見或梵天世或沙門婆羅門等世或魔修羅等世以此陀羅尼章句作守護者若作結界若作禳災心成擾亂或有恐怖無有是處所以者何諸佛受持此陀羅尼故即得過一切厄難阿難若有人誦此陀羅尼有樹欲乾枯為呪彼樹或為結界爾時彼樹還生枝柯華果等平復如本況復人之有識而不差者無是處耶唯除宿殃受業果報爾時四天王末後而復從座而起整理衣服偏袒右肩右膝著地合掌向佛而白佛言世尊我今亦說陀羅尼章句世尊若有人受持憶念為他解說宣揚顯我等為彼人守護持故憐愍慈念為彼法師說陀羅尼章句亦為此法本護持故願此法本久住於世降伏一切諸魔閉塞一切外道彼等法師欲令長壽色力辨等無畏增長世尊若許我等當說爾時世尊默然而許天王見佛默然心內許可即說陀羅尼章句多上絰他多上多上滯陀上陀上滯避陀滯斫枳裴陀滯裴檀池摩訶檀池檀茶澗婆泥吒知上吒吒泥摩訶吒吒泥俱吒泥俱吒泥摩訶俱吒泥瞻時占反摩𮇬懺摩𮇬摩𫺳𮇬莎婆呵世尊我等此陀羅尼為護持此本心內辨說世尊若有人受持此陀羅尼誦以復誦或為解說者悉無恐怖無處加害一切衆類隨從彼人不能為障礙攝護諸法故爾時世尊歎四天王言汝等人輩善哉善哉能為多人作大利益能為多人作於安樂能為多人守護天人世內汝等護持正法亦為彼等諸法師輩大作利益擁護安樂增長正念增長智慧增長辨才汝等發心爾時世尊說此偈言於此陀羅尼往昔諸佛說我今現亦說利益諸衆生若有正信者受持此章句二十八世中常得知宿命若有正信者聞此陀羅尼在在處處中得脫一切怖有人非人等夜叉鳩盤荼富單那鬼等不能為障礙若誦此呪者刀杖不能害惡毒不能煞大火不能燒一切蠱道等水淵不能溺若誦此章句𢙣魔若魔鬼欲界天神等不能為障礙誦此陀羅尼父母及兄弟一切眷屬等不見遠離別讀誦此章句一切事吉祥百千億劫中若造𢙣罪者七日誦此呪悉能消滅除百千億劫中諸菩薩造福於七日內中等分無有異四大天王者從四方來此毗沙提頭賴毗婁及叉并諸眷屬等妙色大威德以此呪威力守護彼法師爾時世尊告長老阿難言阿難汝受持此陀羅尼法本章句阿難此法本當作大利益大有功能大有威力阿難白佛言世尊我以受持章句永不忘失佛說此陀羅尼章句時長老阿難及彼一千二百五十比丘衆及彼他方來二菩薩帝釋天王大梵天王四天大王并及大衆天人阿修羅𠃵闥婆摩睺羅伽等聞佛所說歡喜奉行最勝燈王如來經竟必函須真天子經宋四卷丹三卷第一卷第九紙末二行人發無上正真道意已下五千菩薩之上丹本有為轉法輪甘教慈教乃至於泥越等不永泥越等凡三十八行宋本可五十行文今詳文相首尾疣贅不相連屬撿之即是下文宋本則第三卷丹本下卷分別品第八之末文耳丹藏錯亂重安於此故今不取庶後對勘者詳焉𠕀函賢劫經八卷按下己函賢劫千佛名號經與此經第六卷千佛名號品第二十同本異譯則此經可為單重合譯彼此俱可列于重譯而目録中皆列于單譯而分入乎隔函者何耶丁未歲高麗國大藏都監奉勑雕造
