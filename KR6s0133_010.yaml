body:
  text: 沙門守其等奉勑挍勘蘇悉地羯囉經卷下之二復於東面一所之處置日天子及與曜等復於西面一所之處置月天子與宿圍繞於西門曲兩邊置難陀難陀龍王於佛部中所有使者等類真言及明於其外院四面隨意安置然後依法啓請次第供養護摩念誦於最中央置其本尊或成就物如於曼茶羅法所說護身等事此亦如是次第應行此是佛部成諸物曼茶羅一切諸難無能得便於中作法速得成就一切諸尊增加衛護如前以五彩色作曼茶羅唯改圓作方於其內院東面處中置蓮花印右置七多羅明左置七吉祥明次左右置六大明王右置半拏嚩悉寧左置耶輸末底近門兩邊置一髻明妃及馬頭明王於外門前置能辦諸事瓶於門及角置拔折羅中置蓮花於其外院置其梵天及因陀羅摩𨢘首羅等淨居諸天及無垢行菩薩光㻴菩薩莊嚴菩薩無邊龍王遜陀及優波遜陀龍王及商佉持明仙王與諸持明仙俱如前諸方護世於此部中所有使者諸類真言及明隨意安置如前所說安置次第此亦如是一切諸難無能得便應當此中作成就法如前方作如所界道於內院東面置蘇悉地羯囉右置天尸金剛明妃左置金剛拳明妃右置遜婆明王左置計利枳里明王右置拔折囉尊左置拔折囉但吒右置金剛畝特伽羅鎚左置金剛商羯羅右置金剛鈎明妃左置忙莽計明妃於其外院東邊置勝慧使者金剛慧使者摩首羅及妃多聞天王及諸藥叉於其門前置辦諸事瓶於金剛部中所有使者真言及明部多毗舍遮乾闥婆摩羅伽及持明仙八方護世各於外院次第安置然後啓請如法供養護摩念誦起首成就其所啓請諸尊應用明王真言或用部母明請於曼茶羅所有諸尊各為置瓶如前曼茶羅所有諸法各為置瓶如前曼茶羅所有諸法此成就法亦皆如是若於此等曼茶羅中作成就者縱不具足護身之法亦得悉地為彼諸尊自有其誓若請我等赴曼茶羅者以虔誠心如法供養我等當與彼所求願是故於此應知無難必為加護若用部心真言及以部母或用明妃能辦諸事真言并及內護身真言而用啓請護身諸界速得成就此是三部祕密之法復次更說通三部祕密曼茶羅如法界道置跋折囉中央置本部主印其前置本真言主或如前置羯羅尸瓶其物盛於器等之中置其瓶上內院東面置如來印北面置觀自在印南面置金剛印西面右邊置嚕達羅左邊置多聞天王如前所說明王曼茶羅此亦如是次第安置右邊置部母明左置辦事明蓮花金剛二部左右亦爾西面右置嘺冝喬反唎左置落乞澀東面兩角置鉢及支伐羅北面兩角置但拏棒及軍持瓶南面兩角置跋折囉及母特伽羅西面兩角置輸羅及寶瓶於外門前別立置處所置無能勝東面門前置訶利帝母南面門前置句吒祇唎迦北面門前置翳迦契吒於其外院隨意遍置諸印如法啓請供養此是祕密都曼茶羅於中所作成就諸物皆得悉地頂行於此尚不得便何况諸餘毗那夜迦以諸美香花燈種種飲食持誦光顯然供養如於念誦及於曼茶羅所說供養法此亦如是應作若於淨室中作亦復如是其曼茶羅主種種供養應加四倍此是祕密之法供養畢已次應於外如法祭祀以酥燃燈其炷鮮淨供養本尊一一之物皆須奉獻閼伽若如是作法速得有驗以明王真言持誦白芥子或用能辦諸事真言或用先持有功真言持誦近置成就物邊用辟諸難便即退散又用本部主印置於左邊或但持誦大刀置於左邊於其八方所各置丈夫初於東方其人作帝釋裝束手執跋折囉形色一如帝釋於南方其人作熖摩裝束手執但拏棒於西方其人作龍王裝束手執羂索於北方其人作毗沙門裝束手執伽𠰹棒於東北方梵人作伊舍那裝束手執三鈷叉於東南方其人作火神裝束狀如仙人手執軍持及數珠於西南方其人作羅剎王裝束手執橫刀於西北方其人作風神裝束手執幢旗帝釋白色熖摩黑色龍王紅色毗沙門金色伊舍那白色帶黃火神火色羅剎王淺黑雲色風神青色其所著衣皆亦如是其人皆須受戒極令清淨有大膽勇善作護身之法形色端正盛年𦘺壯所執器仗皆須持誦於頸兩肩交絡花鬘備白芥子善知難相若有難至即散白芥子而用打之或擲花鬘或若其難衆多現大怖畏當以所執器仗而遙擬之彼若相逼以器仗擊散白芥子及擲花鬘以器仗擬及擊時不得移動本處若移本處當得便是故應須不動本處於本藏中所有護身之印難摧伏者持誦供養置己身邊若有極大猛害難來應自用彼諸印以擲打之或比來持誦有功真言誦白芥子散擊難者必若不止即應出外以好飲食加以豐多如法祭祀彼諸難衆一切護法揔有九種謂辟除諸難結地界結虛空界結曼茶羅界結方所結金剛牆結金剛鈎欄護物護身以除諸難作成就時如斯等法皆須憶念或若不辦前護方人應當置其當方器仗此亦不辦於諸方所置那邏遮器仗或張弓擩箭置諸方所或與助成就人明解藏法有智方便持誦有功戒行清潔立在門中助辦諸事辟除諸難乃至內院外院彼皆應助所有一切諸事至於暮閒皆須辦足日才沒已即起首成就中閒困時出曼茶羅外含水漱口以軍茶利真言用持誦水而飲三掬或以本尊心真言持誦少許蘇而用飲之所有疲極當得除愈復以蜜和蓽茇用佛部母明持誦以塗其眼惛沉難起即便除愈先以誠心面向東立觀察諸尊歸命啓請於三種吉祥瑞應於中隨得好相以歡喜心而作成就隨見先瑞成就亦爾是故行者應觀先瑞先當須觀察蘇悉地羯囉明王次則右繞辦諸事瓶入曼茶羅時隨所逢瓶皆右繞過到已頂禮諸尊及以遍觀各各以本真言而奉閼伽或以部心真言奉獻所請諸真言主當以明王真言請召所請明王當以明妃請召請已各示本印及誦本真言明等或但都示一印誦其真言及明若如是作速得悉地其成就物有置閼伽器中或置瓶上或掬合手內或但心念或置嚩囉二合弭迦器或置上迫置於內本尊之前所成諸器皆以牛黃塗之次用白芥子作護次持誦摩辣底花供養其物牛黃塗故便成禁住用其芥子便成作護以花供養便成光顯此三種法次第應作不得廢闕於本尊前置成就物於中不得餘物閒隔成就之物用兩種法為作護一謂手印二白芥子令成就物速有驗故數獻閼伽花香等具及酪數應供養其助成就之人護其物故常在其處如是安置供養物已然後以手按之或以眼觀以其不散心徐徐持誦中閒數數光顯其物如是相續竟夜持誦勿令間斷其夜三時以閼伽等次第供養若須出外漱口令助人替坐物前續次念誦其持誦人有所廢念其所助人皆須補闕持誦之時若大難至助成之人應拒其難如不能禁行者應自散白芥子以辟其難助成之人持誦其物於時東方有是難現謂大雨電應知帝釋之難於東南方有是難現謂火色大人或如晝日應知即是火天之難於其南方有是難現謂死尸形甚可怖畏高聲𠮧喚手執大刀皆悉劓鼻手執髑髏盛人血飲頭上火燃應知即是焰摩之難於西南方有是難現謂雨其屎尿穢曼茶羅及種種形甚可怖畏應知即是泥利𦍝難於其西方有是難現謂雨雷電霹靂雹等應知即是龍王之難於西北方有是難現謂有大黑風起應知即是風神之難於其北方有是難現謂大藥叉及女藥叉𢙉亂行者應知即是多聞天王難於東北方有是難現為象頭猪頭狗頭異形各持大山應知即是伊舍那難於其上方有諸天現具大威德應知即是上方天難下方之難地動及裂應知即是阿修羅難作上成就方現斯難如是等難於中夜現凡上成就難相還大中及下成准此應知於夜三時是其上中下相與時應即是成就時不相應即非成就其三種相謂暖氣煙光如是三相應次第現若上成就即具三相若中成就具前二相若下成就唯現初相或若持誦虔誠於初夜時三相次第現者即以部母明禁住其光或以明王心禁住其相及以持誦牛黃塗灑或以手按或酥灑或以散花或白芥子或但灑水禁住其相便即受用亦果其須或若初夜即成便作禁住念誦至其本時方可受用其中成就准此應知於其初夜下悉地成於其中夜獲中成就明相動時獲上成就其中成就中夜成就者如法禁已縱至明曉受用亦得其下成就准此應知各於本時其成者若不受用不亦為者其物縱成不即用又不禁住至其平曉亦不受用其物猶若萎花亦如穢食無所堪用以念誦故請啓真言入其物中時既過已其驗亦失又成就物雖初相現然不成就當時若禁其相已後還作光顯等法及諸節日供養灌頂便作成就經於三年若不成者當知此物不可得成上成就法限至三年若中成就至第六月若下成就不限其時禎成就法亦復如是蘇悉地羯囉經被偷成物却徵法品第三十七我今當說被偷之物却徵之法其物成已或作成就之時其物被偷偷物之時或見其形或但失物不見偷者於時不擇日宿亦不斷食發起嗔怒現前速應作此曼茶羅法用燒尸灰三角而作唯開西門於外門前置其本尊內院東角置蘇悉地羯囉明王右置金剛忿左置大怒右置金剛拳左置金剛鈎右置金剛計利者羅左置毗摩右置熱吒左置賔羅右置阿設寧左置商羯羅右置微若耶門右置迦引利門左置難地目佉左置金剛軍右置蘇摩呼及置諸餘大忿怒等為成就故次第安置如法啓請以赤色花及赤食等次第供養如前所說阿毗遮嚕迦法於此應作門外所置本尊應以美妙花等如法供養於其外院置八方神及置本部諸餘使者等尊亦須如是供養於其中央作護摩法其爐三角一一如前以七枚纖却地羅以己身血塗而用護摩或用苦練木或用燒尸殘柴而用護摩火著已後以燒尸灰和己身血而用護摩及以毒藥己身之血芥子油及赤芥子四種相和而用護摩復取四種物作偷物者形而坐其上以左手片片割折而取護摩若其能伏瞋者及明法者應作此法其偷物者慞惶恐怖賫持親付行者便應施彼無畏於時與彼作扇底迦法若不作者彼便命終或所將物更復加添密置尊前又成就物盜將日久若欲追取即應作此通三部成辦諸事曼茶羅四方而作中央安置蘇悉地羯囉明王印內院南面置金剛忿怒大忿忙莾雞金剛鈎食金剛拳金剛火金剛母特伽羅金剛怖畏金剛商羯囉鎖計利者羅慧金剛無能勝及置諸大忿怒及諸使者諸大威德真言主等於其南面次第安置內院北面置能滿諸願觀自在馬頭明王多面多手能現多形耶輸末底大吉祥落乞澀二合弭濕吠多半拏囉嚩悉寧去多囉戰捺囉末囉所有真言及明諸使者等各各次第如法安置內院東面置金輪佛頂等諸餘佛頂佛毫佛眼佛鑠底佛牙佛慈及無能勝等自餘明主及能辦事諸真言等諸餘真言及諸使者於其東面各各次第如法安置近門兩邊又門外者亦復如前依法安置於其外院八方神西門南邊置梵天王及與眷屬西門北邊置摩首羅及妃言那鉢底等諸眷屬俱及七忙怛囉母及八龍王并諸眷屬阿修羅王與諸眷屬歸依佛者大威德神於其外院各各如法次第安置至誠啓請次第供養於外西面置護摩爐以蠟作其盜物者形置簸箕中依阿毗遮嚕法啓請祭祀供養護摩次以刀割其形而作護摩或依本部所說阿毗遮嚕法依彼而作或本尊自盜及不與成亦如是作從黑月五日至十四日來中間作法說為勝達其形復以杖鞭及以火炙種種猛法打棒以末但那㓨依金剛橛法用㓨身分以黑芥子油和鹽遍塗其身隨意苦楚而致害之復以蓋尸之衣而覆其形以赤線緾獻赤色花持誦自眼努目視之於真言中置訶責句每日打之若將物來即當休止中夜應作是猛利法用俱徵那木塗黑芥油而作護摩又以毒藥及己身血芥油鹽及黑芥子惣與相和稱盜物者名而作護摩經八百遍或但用己身血和鹽而和護摩如是苦治若不還物即應更作至死猛法於阿毗遮嚕法中所說煞法遍作其法於真言置其殺句若將物來即止其法從乞歡喜彼若已用其物將餘物替亦止其事或已用其物復無物替但來悔謝亦止其事施彼歡喜彼或失及分與他隨殘所有持來還者亦止其事施彼歡喜應當以金剛徵那囉真言而作護摩或用大怒或用不淨忿怒而作護摩或於當部所說却追失物真言而作護摩然此三種真言通三部用真言曰囊上謨囉怛囊上二合怛囉二合夜也囊上莾室戰拏嚩日囉二合簸儜上曳莾賀藥乞沙二合細那囊鉢多上曳唵賀羅賀羅嚩日囉二合莾他莾他上嚩日囉二合度囊度囊上嚩日羅二合賀曩賀曩嚩日囉二合鉢者鉢者嚩日囉二合捺羅捺羅嚩日囉二合那囉野那囉也嚩日囉二合那囉野尾那囉也嚩日囉二合瞋去那瞋去那嚩日囉二合頻去那頻去那嚩日囉二合𤙖泮吒二合得其物已或得替已即護其物兼及護身當於節日次第而作光顯等法其中成就物及下成就一分應奉世尊一分應奉於阿闍梨出曼茶羅外取其一分奉先成就者一分當與同伴等人取第五分而自受用或作兩分一分自用一分奉四處諸有末物法皆如是先以閼伽奉獻尊等後取本分其先成就者分以閼伽供養倍其價直自取受用其價直者供養是也其阿闍梨若不在時其分還酬價直而自受用其愧直者心生慚愧即是價直出曼茶羅外奉先成就者時應作是言諸先成者受取本分手執閼伽第二第三應如是唱若無取者即當持與同伴之人勿懷疑慮彼等以虔誠心故以供養故堅持戒故侍行人故即是先成之人是故其分彼等應受三唱之時彼同伴者應如是報我等即是先成就者行人自分其物與同伴等其物若少不可分者即安善那及牛黃等不可分也應當以心作其分量而自受用有如是物唯一人用不可分者輪刀等是隨於本法所說成就應如是作其𭘻像等亦不可分於本法中成就之物其量縱少任加本量而作成就與伴同等或依先成之人物量而作成就縱減其半亦得成就或於本法所說分量皆須依行行人分物與同伴時應處分言汝等隨我種種驅使彼然諾已後當與之或若一身成就利益餘人依此藏教或餘法中並皆通許分與同伴等時隨其功勞節限分物不應偏儻物成就已先應供養本尊深生漸愧殷勤再請然後可分一切諸部法皆如是中下成就准此應知深生慚愧恭敬供養及施財物所得進止依其處分以如是事酬還物價物成就已先獻閼伽如法分與誦本真言及作手印以心觀念本尊及誦明王妃真言乃至觀念然後受用其物隨意升空至衆仙所彼無能壞及以輕蔑縱有怨敵亦無能彼成就者常念本尊不應廢忘其成就物常須心念或以眼視為持誦明王真言故諸仙恭敬持妃明故無諸怖畏作三摩耶印及作部印及眼視物皆不應廢與仙相見應先起敬而問訊言善來安樂復從何至彼若所問善言而答遊行空時不應於神廟上過及獨一樹并四衢道諸仙居處及以城郭祭祀之壇婆羅門集會處假使邪法仙衆所居之處不應過增上慢故經彼等過必當墮落為放逸故而墮落者即應持誦明王真言及以思惟若已墮落及欲墮時便得本位虛空雖無形色天眼見道譬如成者起心即至如亦在定不動而至是故遊彼先成就路以福力故自然衣服隨意宮殿用花林園觀種種諸鳥天女遊獻歌舞妓樂種種欲樂熾然光明如意劫樹能滿諸願為居止故寶石為座下流渠水耎草布地種種瓔珞及嚴身具并娛樂諸吉祥樹有甘露果乃至隨所意樂憶念之處皆現其前縱如是已常須護身不應廢忘應住清淨園林及諸山頂并海洲島江河灘渚以遊戲故應住其處於彼便有如前勝境或與先成仙衆共住又如前所說具足而作悉地之法其物不成者如法禁住護持藏棄如前更作先念誦法乃至還作成就之法如是作已若不成者重加精進又更念誦作成就法如是經滿七遍猶不成者當作此法決定成就所謂乞食精勤念誦發大恭敬巡入聖迹禮拜行道或復轉讀大般若經經七遍或一百或持勝物奉施僧伽或於入海河邊或於海島應作一肘窣覩波數滿一百於一一窣覩波前如法念誦滿一千遍最後第一百塔若放光者當知作法决定成就後作一千窣覩波於一一前念誦千遍假使無閒罪其數滿已不須作法自然成就又一切真言念誦一俱𦙁决定成就若作時念誦者經十二年縱有重罪亦皆成就假使法不具足皆得成就又念遍數及時滿已即當應作增益護摩或復作此成辦諸事曼茶羅於中而作四種護摩或於山頂或於牛群先所住處或恆河渚平治其地作曼茶羅量百八肘置一百八瓶於其四門立柱為門各於門前建立寶臺種種裝嚴以名花枝條作鬘繫其門柱及角幢上遍繞其處以酥燃燈滿一百八布曼茶羅及一百八香爐燒諸名香亦置其處內院一面其量七肘外院一面三肘餘是中央所有啓請及供養等皆悉如前准護摩法次當別說於中以本真言置羯攞舍瓶其瓶四面作護摩法於其內院東面遍置佛部諸尊其北面遍置蓮花部中諸尊於其南面遍置金剛部中諸尊於西面置嚕達囉神及多聞天王各并眷屬如前所說使者等尊內院若不容受當置外院其護方神與諸眷屬各置本位方其三部主及嚕達羅多聞天王先置本處次復各置明王明妃辦事真言主等并諸使者次第安置於外門前置軍茶利尊及置無能勝尊如是依法作曼茶羅成已用本部心而作啓請次第供養即於四方而作念誦然後其瓶四面所置之爐各依彼部中作護摩法是名增益諸尊護摩其供養食用烏那羅獻作此法已一切諸尊便成增益如是念誦作護摩已更以部母真言而護摩酥次以本尊真言乳粥酥和而作護摩更以部母真言胡麻和三甜而作護摩又以部母真言用酥護摩作此法已一切尊即便充足及成增益圓滿具足悉皆歡喜速與成就若作此曼茶羅乃至七度决定成就如前念誦及巡塔乃至七遍作此曼茶羅若不成者即以阿毗遮嚕迦法苦治本尊以蠟作其形像取其真言而念誦之先誦部母及明王真言中閒置本尊真言以阿毗遮嚕迦法護摩用芥子油塗其形像便著壯熱若伏他者遍身皆痛以瞋鞭打及以花打用前二真言以其瞋心而作供養譬如治罰鬼魅治罰本尊法亦如是如斯之法依教而作不得自專輒其尊即來現前與其成就滿本願已止其前事作扇底迦法或以毒藥己身血胡麻油鹽赤芥子揔相和竟夜護摩本尊於時慞惶唱言止止莫莫與成就如是作法經三日已亦復不來與成就者又加勇猛以無畏心便割己肉護摩三遍本尊即來乞彼歡喜心所求願即與成就若有闕過一一而說假使犯五無閒經於九夜割肉護摩决定而來與其成就此是與真言鬪爭之法以無畏心如法護身方可而作必不空過得成就已即應當速作扇底迦法若說愆過即須補闕於諸成就事中此曼茶羅為最於中作三種事得三種果於中應作一切諸事及以護摩治罰本尊如治鬼魅每時供養皆用新物護摩之物亦復如是此法不應放逸澡浴清淨如法護身不應輕慢明解藏教方以此法治罰本尊若違此者即使自
